<!DOCTYPE html>
<html lang="sr">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <?!= include('html/styles'); ?>
    <script>
      window.BLAGAJNA_WEB_APP_URL = '<?= ScriptApp.getService().getUrl() ?>';
    </script>
  </head>
  <body>
    <div class="m-shell">

      <!-- HEADER -->
      <header class="m-header">
        <div class="m-header-balance" id="m-balance" data-raw-value="0">— RSD</div>
        <div class="m-header-clock">
          <span id="m-current-date">—</span>
          <strong id="m-current-time">--:--</strong>
        </div>
        <div class="m-header-meta">
          <span id="m-date"></span>
          &nbsp;·&nbsp;
          <span data-current-user>...</span>
        </div>
        <div id="m-message" class="message m-message"></div>
        <div class="m-header-chips">
          <span class="m-chip">
            <i class="ti ti-building-bank" aria-hidden="true"></i>
            <select data-session-cashbox-select aria-label="Blagajna"></select>
          </span>
          <span class="m-chip">
            <i class="ti ti-coins" aria-hidden="true"></i>
            <select data-session-currency-select aria-label="Valuta"></select>
          </span>
          <button class="m-chip theme-toggle" data-theme-toggle type="button" aria-label="Promeni temu">
            <i class="ti ti-moon" aria-hidden="true"></i>
          </button>
          <button class="m-chip" id="m-all-balances-btn" type="button">
            <i class="ti ti-coins" aria-hidden="true"></i>
            Sve valute
          </button>
        </div>
      </header>

      <!-- CONTENT -->
      <div class="m-content">

        <!-- KNJIGA -->
        <section id="m-section-knjiga" class="m-section active" data-section>
          <div class="m-book-tools">
            <button id="m-traffic-summary-btn" type="button">
              <i class="ti ti-chart-arrows-vertical" aria-hidden="true"></i> Pregled prometa
            </button>
            <button id="m-knjiga-refresh" type="button" aria-label="Osveži knjigu">
              <i class="ti ti-refresh" aria-hidden="true"></i>
            </button>
          </div>
          <div class="m-traffic-summary" id="m-traffic-summary" hidden></div>
          <div id="m-knjiga-list"></div>
        </section>

        <!-- NALOZI -->
        <section id="m-section-nalozi" class="m-section" data-section>
          <h2>Nalozi za isplatu</h2>
          <button id="m-load-nalozi-btn" type="button">
            <i class="ti ti-refresh" aria-hidden="true"></i> Učitaj naloge
          </button>
          <div id="m-nalozi-list"></div>
        </section>

        <!-- SMENA -->
        <section id="m-section-smena" class="m-section" data-section>
          <h2>Smena</h2>

          <div class="card shift-status-card">
            <div class="card-head"><h3>Status smene</h3></div>
            <div id="m-shift-status" class="shift-status-body"></div>
            <button id="m-active-shift-balance-btn" type="button">
              <i class="ti ti-scale" aria-hidden="true"></i> Presek aktivne smene
            </button>
          </div>

          <div class="card">
            <div class="card-head"><h3>Otvori smenu</h3></div>
            <form id="m-open-shift-form" class="form-grid">
              <input name="cashbox_id" type="hidden">
              <label>Napomena pri otvaranju
                <textarea name="opening_note" rows="2"></textarea>
              </label>
              <button class="btn-primary" type="submit">Otvori smenu</button>
            </form>
          </div>

          <div class="card">
            <div class="card-head"><h3>Moje smene</h3></div>
            <button id="m-load-shifts-btn" type="button">
              <i class="ti ti-refresh" aria-hidden="true"></i> Učitaj moje smene
            </button>
            <div id="m-shifts-list"></div>
          </div>

          <div class="card optional-handover-card">
            <div class="card-head"><h3>Primopredaja smene</h3></div>
            <form id="m-handover-shift-form" class="form-grid">
              <div class="shift-current-label" data-active-shift-label>Aktivna smena će biti učitana automatski.</div>
              <input name="shift_id" type="hidden" required>
              <label>Email primaoca <input name="handover_to" type="email" required></label>
              <div data-physical-balance-inputs></div>
              <label>Napomena <textarea name="note"></textarea></label>
              <button type="submit">Predaj smenu</button>
            </form>
          </div>

          <div class="card">
            <div class="card-head"><h3>Zatvori smenu</h3></div>
            <form id="m-close-shift-form" class="form-grid">
              <div class="shift-current-label" data-active-shift-label>Aktivna smena će biti učitana automatski.</div>
              <input name="shift_id" type="hidden" required>
              <div data-physical-balance-inputs></div>
              <label>Napomena <textarea name="note"></textarea></label>
              <button class="btn-primary" type="submit">Zatvori smenu</button>
            </form>
          </div>

          <div id="m-shift-result" class="result-box"></div>
        </section>

        <!-- ZAKLJUČAK -->
        <section id="m-section-zakljucak" class="m-section" data-section>
          <h2>Dnevni zaključak</h2>

          <div class="card">
            <div class="card-head"><h3>Pripremi zaključak</h3></div>
            <form id="m-daily-preview-form" class="form-grid">
              <input name="cashbox_id" type="hidden">
              <label>Valuta <select name="currency" data-currency-options></select></label>
              <label>Datum <input name="closing_date" type="date" data-today required></label>
              <button type="submit">Pripremi zaključak</button>
            </form>
          </div>

          <div class="card">
            <div class="card-head"><h3>Zaključi dan</h3></div>
            <form id="m-daily-close-form" class="form-grid">
              <input name="cashbox_id" type="hidden">
              <label>Valuta <select name="currency" data-currency-options></select></label>
              <label>Datum <input name="closing_date" type="date" data-today required></label>
              <label>Fizičko stanje <input name="physical_balance" type="text" inputmode="decimal" placeholder="0,00" required></label>
              <label>Napomena <textarea name="note"></textarea></label>
              <button class="btn-primary" type="submit">Zaključi dan</button>
            </form>
          </div>

          <div id="m-daily-result" class="result-box"></div>
        </section>

      </div><!-- /m-content -->

      <!-- BOTTOM NAV -->
      <nav class="m-bottom-nav" aria-label="Navigacija">
        <button class="m-tab active" data-m-nav="m-section-knjiga" type="button">
          <i class="ti ti-book-2" aria-hidden="true"></i>
          <span>Knjiga</span>
        </button>
        <button class="m-tab" data-m-nav="m-section-nalozi" type="button">
          <i class="ti ti-file-invoice" aria-hidden="true"></i>
          <span>Nalozi</span>
          <span class="m-tab-badge" data-tab-count="m-section-nalozi" style="display:none"></span>
        </button>
        <button class="m-tab" data-m-nav="m-section-smena" type="button">
          <i class="ti ti-transfer" aria-hidden="true"></i>
          <span>Smena</span>
        </button>
        <button class="m-tab" data-m-nav="m-section-zakljucak" type="button">
          <i class="ti ti-scale" aria-hidden="true"></i>
          <span>Zaključak</span>
        </button>
      </nav>

    </div><!-- /m-shell -->

    <div class="m-fixed-actions" id="m-direct-actions" hidden>
      <button class="btn-in btn-lg" id="m-btn-uplata" type="button">
        <i class="ti ti-arrow-down-circle" aria-hidden="true"></i> UPLATA
      </button>
      <button class="btn-out btn-lg" id="m-btn-isplata" type="button">
        <i class="ti ti-arrow-up-circle" aria-hidden="true"></i> ISPLATA
      </button>
    </div>

    <div id="m-detail-overlay" class="m-detail-overlay" style="display:none" role="dialog" aria-modal="true">
      <div class="m-detail-sheet">
        <div class="sheet-handle"></div>
        <div class="card-head">
          <h3 id="m-detail-title" style="flex:1">Detalji transakcije</h3>
          <button class="btn-ghost small" id="m-detail-close" type="button" aria-label="Zatvori">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>
        <div id="m-detail-body"></div>
        <div class="m-detail-actions">
          <button id="m-detail-print" type="button">
            <i class="ti ti-printer" aria-hidden="true"></i> Blagajnički list
          </button>
          <button class="btn-out" id="m-detail-storno" type="button">
            <i class="ti ti-rotate-clockwise" aria-hidden="true"></i> Storno
          </button>
        </div>
      </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div id="sheet-overlay" class="sheet-overlay" style="display:none" role="dialog" aria-modal="true">
      <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheet-title"></div>
        <input type="text" id="sheet-amount" class="sheet-amount-input" inputmode="decimal" placeholder="0,00">
        <div id="sheet-cur-toggle" class="cur-toggle">
        </div>
        <input type="text" id="sheet-partner" placeholder="Primalac / uplatioc (opciono)">
        <input type="text" id="sheet-description" placeholder="Opis / razlog *">
        <button id="sheet-submit" class="btn-full btn-lg btn-in" type="button">
          <i class="ti ti-check" aria-hidden="true"></i>
          <span>Proknjiti</span>
        </button>
        <button id="sheet-cancel" class="btn-ghost btn-full" type="button">Otkaži</button>
      </div>
    </div>

    <!-- MESSAGE -->
    <div id="m-message" class="message" style="position:fixed;top:12px;left:12px;right:12px;z-index:200"></div>
    <!-- Legacy message id compatibility -->
    <div id="message" class="message" style="display:none"></div>

    <?!= include('html/scripts'); ?>
  </body>
</html>
