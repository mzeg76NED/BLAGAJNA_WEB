      ['Vezano za', documentRecord && ((documentRecord.entity_type || '') + ' ' + (documentRecord.entity_id || ''))],
      ['Status', documentRecord && documentRecord.status]
    ]);
  }

  function renderShiftSummary(targetId, shift, title) {
    renderSummaryCard(targetId, title || 'Smena', [
      ['ID smene', shift && shift.shift_id],
      ['Otvorio', shift && shift.opened_by],
      ['Zatvorio', shift && shift.closed_by],
      ['Status', shift && shift.status]
    ]);
  }

  function renderShiftBalanceSummary(targetId, balance) {
    renderSummaryCard(targetId, 'Presek smene', [
      ['ID smene', balance && balance.shift_id],
      ['Stanje', amountWithCurrency(balance && (balance.balance || balance.calculated_balance), balance && balance.currency)],
      ['Status', balance && balance.status]
    ]);
  }

  function renderDailyClosingSummary(targetId, closing, title) {
    renderSummaryCard(targetId, title || 'Dnevni zaključak', [
      ['ID zaključka', closing && closing.closing_id],
      ['Datum', closing && closing.closing_date],
      ['Obračunato', amountWithCurrency(closing && closing.calculated_balance, closing && closing.currency)],
      ['Fizički', amountWithCurrency(closing && closing.physical_balance, closing && closing.currency)],
      ['Razlika', amountWithCurrency(closing && closing.difference, closing && closing.currency)],
      ['Broj događaja', closing && (closing.included_event_count || closing.includedEventsCount)],
      ['Status', closing && closing.status]
    ]);
  }

  function renderSummaryCard(targetId, title, rows) {
    var body = (rows || []).filter(function(row) {
      return row[1] !== undefined && row[1] !== null && row[1] !== '';
    }).map(function(row) {
      var label = String(row[0] || '');
      var value = row[2] ? formatValue(row[1]) : escapeHtml(row[1]);
      if (label.toLowerCase().indexOf('status') !== -1) {
        value = renderStatusBadge(row[1]);
      }
      return '<div class="summary-row"><span class="summary-label">' + escapeHtml(row[0]) + '</span><span>' + value + '</span></div>';
    }).join('');
    renderHtml(targetId, '<div class="record summary-card"><div class="record-title">' + escapeHtml(title) + '</div>' + (body || '<div class="muted">Nema dodatnih podataka.</div>') + '</div>');
  }

  function amountWithCurrency(amount, currency) {
    if (amount === undefined || amount === null || amount === '') {
      return '';
    }
    return formatValue(amount) + (currency ? ' ' + formatValue(currency) : '');
  }

  function renderHtml(targetId, html) {
    var target = document.getElementById(targetId);
    if (target) {
      target.innerHTML = html;
    }
  }

  function cleanObject(source) {
    var result = {};
    Object.keys(source || {}).forEach(function(key) {
      if (source[key] !== '') {
        result[key] = source[key];
      }
    });
    return result;
  }

  function setInputValue(formId, name, value) {
    var input = document.querySelector('#' + formId + ' [name="' + name + '"]');
    if (input) {
      input.value = value || '';
    }
  }

  function setText(id, value) {
    var element = document.getElementById(id);
    if (element) {
      element.textContent = value;
    }
  }

  function formatValue(value) {
    if (value === undefined || value === null || value === '') {
      return '';
    }
    if (typeof value === 'object') {
      return JSON.stringify(value);
    }
    return String(value);
  }

  function formatNumber_(value) {
    var numberValue = Number(value || 0);
    if (!isFinite(numberValue)) {
      return formatValue(value);
    }
    return numberValue.toLocaleString('sr-RS', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function escapeHtml(value) {
    return formatValue(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  /* ═══════════════════════════════════════════════════════════════
     BLAGAJNIČKA KNJIGA — novi UI (redesign)
     Sve funkcije ispod su dodaci koji ne brišu postojeće funkcije.
  ═══════════════════════════════════════════════════════════════ */

  var currentQuickFormType_ = 'IN';
  var currentSheetType_     = 'IN';

  /* ─── Format helpers ─────────────────────────────────────────── */

  function formatAmount_(value) {
    var num = Number(value) || 0;
    return num.toLocaleString('sr-RS', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function parseAmountInput_(value) {
    var text = String(value || '').trim();
    if (!text) return 0;
    text = text.replace(/\s/g, '');
    if (text.indexOf(',') !== -1) {
      text = text.replace(/\./g, '').replace(',', '.');
    } else {
      var parts = text.split('.');
      if (parts.length > 2 || (parts.length === 2 && parts[1].length === 3)) {
        text = parts.join('');
      }
    }
    return parseFloat(text) || 0;
  }

  function bindAmountFormatting_() {
    document.querySelectorAll('#d-qf-amount,#sheet-amount,input[name="physical_balance"],[name^="physical_"]').forEach(function(input) {
      if (input.dataset.amountFormattingBound === '1') return;
      input.dataset.amountFormattingBound = '1';
      input.addEventListener('focus', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? String(amount).replace('.', ',') : '';
      });
      input.addEventListener('blur', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? formatAmount_(amount) : '';
      });
    });
  }

  function formatDateShort_(value) {
    if (!value) return '—';
    var d = value instanceof Date ? value : new Date(value);
    if (isNaN(d.getTime())) return String(value).substring(0, 10);
    return d.getDate() + '.' + (d.getMonth() + 1) + '.';
  }

  function parseDateSafe_(value) {
    if (!value) return null;
    var date = value instanceof Date ? value : new Date(value);
    return isNaN(date.getTime()) ? null : date;
  }

  function toInputDate_(date) {
    var d = parseDateSafe_(date);
    if (!d) return '';
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function formatDateTimeShort_(value) {
    if (!value) return '—';
    return formatDateShort_(value) + ' ' + formatTimeShort_(value);
  }

  function renderStatusBadge_(status) {
    var cls = STATUS_BADGE_MAP[status] || 'badge-draft';
    var lbl = STATUS_LABEL_MAP[status] || status;
    return '<span class="badge ' + cls + '">' + escapeHtml(lbl) + '</span>';
  }

  function isCashEventBalanceAffecting_(ev) {
    return ev.status === 'POSTED' || ev.status === 'LOCKED';
  }

  /* ─── Knjiga: učitaj i renderuj ──────────────────────────────── */

  function bindAnnouncementButtons_() {
    var canCreate = canCreatePaymentAnnouncement_();
    var canView = canViewPaymentAnnouncements_();
    ['d-new-announcement-btn', 'm-fab-najava', 'd-najave-add-btn'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.hidden = !canCreate;
      if (!btn.dataset.bound) {
        btn.dataset.bound = '1';
        btn.addEventListener('click', function() { openCreateAnnouncementDialog_(); });
      }
    });
    var navNajave = document.getElementById('d-nav-najave');
    if (navNajave) navNajave.hidden = !canView;
    var refreshBtn = document.getElementById('d-najave-refresh-btn');
    if (refreshBtn && !refreshBtn.dataset.bound) {
      refreshBtn.dataset.bound = '1';
      refreshBtn.addEventListener('click', loadDesktopAnnouncements_);
    }
  }

  function loadDesktopAnnouncements_() {
    bindAnnouncementButtons_();
    var target = document.getElementById('d-najave-list');
    if (!target) return;
    if (!canViewPaymentAnnouncements_()) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-lock" aria-hidden="true"></i><p>Nemate ovlašćenje za pregled najava.</p></div>';
      return;
    }

    callApi('apiListPaymentAnnouncements', [withUiDefaults({ cashbox_id: SESSION.cashboxId, currency: SESSION.currency })], function(rows) {
      renderDesktopAnnouncementsList_(rows || []);
    }, { quiet: true });
  }

  function renderDesktopAnnouncementsList_(rows) {
    var target = document.getElementById('d-najave-list');
    if (!target) return;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-bell-off" aria-hidden="true"></i><p>Nema najava uplate.</p></div>';
      return;
    }
    target.innerHTML = '<table class="po-table"><thead><tr>' +
      '<th>Br.</th><th>Datum</th><th>Uplatilac</th><th>Najavljeno</th><th>Status</th><th>Stvarna uplata</th><th>Razlika</th>' +
      '</tr></thead><tbody>' +
      rows.map(function(a) {
        var statusLabel = a.status === 'MATCHED' ? 'Uparena' : a.status === 'CANCELLED' ? 'Otkazana' : 'Čeka uplatu';
        var statusClass = a.status === 'MATCHED' ? 'po-status-paid' : a.status === 'CANCELLED' ? 'po-status-cancelled' : 'po-status-waiting';
        var diff = a.difference == null ? '—' : (Number(a.difference) > 0 ? 'VIŠAK ' : Number(a.difference) < 0 ? 'MANJAK ' : '') + formatAmount_(Math.abs(a.difference || 0));
        return '<tr data-announcement-id="' + escapeHtml(a.announcement_id) + '">' +
          '<td>' + (a.ref_no != null ? a.ref_no : '—') + '</td>' +
          '<td>' + escapeHtml(formatDateTimeShort_(a.created_at)) + '</td>' +
          '<td>' + escapeHtml(a.partner_name || '—') + '</td>' +
          '<td>' + formatAmount_(a.announced_amount) + ' ' + escapeHtml(a.currency || '') + '</td>' +
          '<td><span class="po-status ' + statusClass + '">' + statusLabel + '</span></td>' +
          '<td>' + (a.matched_amount == null ? '—' : formatAmount_(a.matched_amount) + ' ' + escapeHtml(a.currency || '')) + '</td>' +
          '<td>' + diff + '</td>' +

    target.querySelectorAll('[data-announcement-id]').forEach(function(row) {

        var id = row.getAttribute('data-announcement-id');
        var announcement = rows.find(function(a) { return a.announcement_id === id; });
        if (announcement) openAnnouncementDetail_(announcement);

  function loadKnjiga_(isBackground) {
    bindAnnouncementButtons_();

    var dateTo   = (document.getElementById('d-date-to')   || {}).value || '';

    var tbody = document.getElementById('d-knjiga-tbody') || document.getElementById('m-knjiga-list');

    if (!isBackground) {

      tbody.innerHTML = skeletonRow + skeletonRow + skeletonRow;

    callApi('apiGetCashMovementsReport', [withUiDefaults({

    })], function(events) {

      renderKnjigaTable_(LAST_KNJIGA_EVENTS);

  // FAZA 3t: batch provera priloga za spajalicu - jedan poziv za CEO trenutno učitanu
  // Knjigu, ne po redu. Ne blokira prvobitni render (radi se posle, pa se tabela samo
  // ponovo iscrta kad stigne odgovor - blagi "flicker" spajalica koje se pojave koji
  // trenutak kasnije je prihvatljiv, prvobitni render ne čeka na ovo).
  function refreshKnjigaDocsSummary_() {
    var ids = (LAST_KNJIGA_EVENTS || [])
      .filter(function(e) { return e.event_type !== 'ANNOUNCEMENT' && e.event_id; })
      .map(function(e) { return e.event_id; });
    if (!ids.length) {
      KNJIGA_DOCS_WITH_FILES_ = {};
      return;
    }
    callApi('apiGetDocumentsSummary', ['CASH_EVENT', ids], function(idsWithDocs) {
      var map = {};
      (idsWithDocs || []).forEach(function(id) { map[id] = true; });
      KNJIGA_DOCS_WITH_FILES_ = map;
      renderKnjigaTable_(LAST_KNJIGA_EVENTS);
    }, { quiet: true });
  }

  /* ─── Najave (payment announcements) merged into Knjiga ─────────
     Najave NE menjaju stanje blagajne (nisu cash_event), ali se prikazuju
     u Knjizi kao informativni red - isti "frontend merge" obrazac kao
     CASH_COUNT redovi u cashSheet.js, namerno bez diranja proverenog
     cash-movements.js endpoint-a. */

  var LAST_KNJIGA_ANNOUNCEMENTS = [];

  function canViewPaymentAnnouncements_() {
    // ANNOUNCER only has payment_announcements:create, not :view/:match - but they still
    // need to see the najave THEY created (backend scopes this to created_by = self, see
    // api/payment-announcements/list.js), otherwise a najava vanishes the moment it's
    // submitted with zero confirmation.
    return currentUserHasPrivilege_('payment_announcements:view') ||
      currentUserHasPrivilege_('payment_announcements:match') ||
      currentUserHasPrivilege_('payment_announcements:create');
  }

  function canCreatePaymentAnnouncement_() {
    return currentUserHasPrivilege_('payment_announcements:create');
  }

  function canMatchPaymentAnnouncements_() {
    return currentUserHasPrivilege_('payment_announcements:match');
  }

  function loadKnjigaAnnouncements_() {
    callApi('apiListPaymentAnnouncements', [withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency: SESSION.currency
    })], function(announcements) {
      LAST_KNJIGA_ANNOUNCEMENTS = announcements || [];
      renderKnjigaTable_(LAST_KNJIGA_EVENTS);
    }, { quiet: true });
  }

  function announcementToKnjigaRow_(a) {
    return {
      event_id: 'najava:' + a.announcement_id,
      ref_no: a.ref_no || null,
      event_date: a.matched_at || a.created_at,
      created_at: a.created_at,
      event_type: 'ANNOUNCEMENT',
      display_direction: 'INFO',
      direction: 'INFO',
      display_amount: a.announced_amount,
      amount: a.announced_amount,
      running_balance: null,
      partner_name: a.partner_name,
      description: 'NAJAVA UPLATE' + (a.purpose ? ' - ' + a.purpose : ''),
      status: a.status,
      posted_by: a.matched_by || a.created_by || '',
      created_by: a.created_by || '',
      currency: a.currency,
      cashbox_id: a.cashbox_id,
      __announcement: a
    };
  }

  function mergeAnnouncementsIntoEvents_(events) {
    if (!LAST_KNJIGA_ANNOUNCEMENTS.length) return events;
    var rows = LAST_KNJIGA_ANNOUNCEMENTS
      .filter(function(a) { return a.status !== 'CANCELLED'; })
      .map(announcementToKnjigaRow_);
    return rows.concat(events).sort(function(a, b) {
      return new Date(b.event_date || 0).getTime() - new Date(a.event_date || 0).getTime();
    });
  }

  function openCreateAnnouncementDialog_() {
    var cashboxes = uiState.config.cashboxes || [{ cashbox_id: SESSION.cashboxId || 'CB_MAIN', name: SESSION.cashboxName || 'Glavna blagajna' }];
    var currencies = uiState.config.currencies || [SESSION.currency || 'RSD'];
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>Najava uplate</h3>' +
        '<p style="color:var(--color-text-muted);font-size:12px;margin-top:-6px">Najava ne menja stanje blagajne - vidljiva je u Knjizi kao informativna stavka dok se ne uparí sa stvarnom uplatom.</p>' +
        '<form id="announcement-form" class="form-grid">' +
          '<label>Blagajna <select name="cashbox_id">' + cashboxes.map(function(item) {
            return '<option value="' + escapeHtml(item.cashbox_id) + '"' + (item.cashbox_id === SESSION.cashboxId ? ' selected' : '') + '>' + escapeHtml(item.name || item.cashbox_id) + '</option>';
          }).join('') + '</select></label>' +
          '<label>Valuta <select name="currency">' + currencies.map(function(code) {
            return '<option value="' + escapeHtml(code) + '"' + (code === SESSION.currency ? ' selected' : '') + '>' + escapeHtml(code) + '</option>';
          }).join('') + '</select></label>' +
          '<label>Uplatilac <input name="partner_name" type="text" required></label>' +
          '<label>Najavljeni iznos <input name="announced_amount" type="text" inputmode="decimal" required></label>' +
          '<label>Osnov <input name="purpose" type="text"></label>' +
          '<label>Napomena <textarea name="note"></textarea></label>' +
          '<div class="m-detail-actions">' +
            '<button type="button" class="btn-ghost" id="announcement-form-cancel">Otkaži</button>' +
            '<button type="submit" class="btn-primary" id="announcement-form-save">Sačuvaj najavu</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#announcement-form');
    var cancelBtn = overlay.querySelector('#announcement-form-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', close);
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      var data = {
        cashbox_id: form.elements.cashbox_id.value,
        currency: form.elements.currency.value,
        partner_name: form.elements.partner_name.value.trim(),
        announced_amount: parseAmountInput_(form.elements.announced_amount.value),
        purpose: form.elements.purpose.value.trim(),
        note: form.elements.note.value.trim()
      };

      if (!(data.announced_amount > 0)) { showMessage('Unesite iznos veći od nule.', 'error'); return; }
      callApi('apiCreatePaymentAnnouncement', [data], function() {
        showMessage('Najava uplate je sačuvana.', 'success');
        close();
        if (canViewPaymentAnnouncements_()) {
          loadKnjigaAnnouncements_();
          loadDesktopAnnouncements_();
        }
      }, { successMessage: 'Najava uplate je sačuvana.' });
    });
  }

  function openAnnouncementDetail_(a) {
    var isOpen = a.status === 'OPEN';
    var canMatch = isOpen && canMatchPaymentAnnouncements_();
    var canCancel = isOpen && (canCreatePaymentAnnouncement_() || canMatchPaymentAnnouncements_());
    var overlay = document.createElement('div');

      ['Uplatilac', a.partner_name || '—'],

      ['Valuta', a.currency || '—'],
      ['Najavljeni iznos', formatAmount_(a.announced_amount) + ' ' + escapeHtml(a.currency || '')],
      ['Osnov', a.purpose || '—'],
      ['Napomena', a.note || '—'],
      ['Kreirao', shortUserLabel_(a.created_by || '—')],
      ['Status', statusLabel]
    ];
    if (a.status === 'MATCHED') {
      rows.push(['Stvarna uplata', formatAmount_(a.matched_amount) + ' ' + escapeHtml(a.currency || '')]);
      rows.push(['Razlika', (a.difference == null ? '—' : (Number(a.difference) > 0 ? 'VIŠAK ' : Number(a.difference) < 0 ? 'MANJAK ' : '') + formatAmount_(Math.abs(a.difference || 0)) + ' ' + escapeHtml(a.currency || ''))]);

    overlay.innerHTML =

        '<div class="m-detail-actions">' +
          (canMatch ? '<button type="button" class="cash-count-action save" id="announcement-match-btn"><i class="ti ti-cash" aria-hidden="true"></i> UPLATA</button>' : '') +
          (canCancel ? '<button type="button" class="cash-count-action cancel" id="announcement-cancel-btn"><i class="ti ti-circle-x" aria-hidden="true"></i> Otkaži najavu</button>' : '') +
        '</div>' +
        '<button type="button" class="btn-ghost btn-full" id="announcement-detail-close">Zatvori</button>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var closeBtn = overlay.querySelector('#announcement-detail-close');
    if (closeBtn) closeBtn.addEventListener('click', close);
    var matchBtn = overlay.querySelector('#announcement-match-btn');
    if (matchBtn) matchBtn.addEventListener('click', function() { close(); openMatchAnnouncementDialog_(a); });
    var cancelBtn = overlay.querySelector('#announcement-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', function() {
      appPrompt_({
        title: 'Otkazivanje najave',
        message: 'Unesite razlog otkazivanja najave (opciono).',
        confirmText: 'Otkaži najavu',
        placeholder: 'Razlog (opciono)'
      }, function(reason) {

          showMessage('Najava je otkazana.', 'success');

        });

  function openMatchAnnouncementDialog_(a) {
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>UPLATA po najavi</h3>' +
        '<p style="color:var(--color-text-muted);font-size:12px;margin-top:-6px">Najavljeno: ' + formatAmount_(a.announced_amount) + ' ' + escapeHtml(a.currency || '') + ' od ' + escapeHtml(a.partner_name || '') + '. Unesite STVARNI primljeni iznos - knjiži se kao normalna uplata; eventualna razlika u odnosu na najavu automatski se evidentira kao VIŠAK/MANJAK.</p>' +
        '<form id="announcement-match-form" class="form-grid">' +
          '<label>Stvarni iznos uplate <input name="actual_amount" type="text" inputmode="decimal" value="' + escapeHtml(String(a.announced_amount || '')) + '" required></label>' +
          '<label>Napomena <textarea name="note"></textarea></label>' +
          '<div class="m-detail-actions">' +
            '<button type="button" class="btn-ghost" id="announcement-match-cancel">Otkaži</button>' +
            '<button type="submit" class="btn-primary" id="announcement-match-save">Knjiži uplatu</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#announcement-match-form');
    var cancelBtn = overlay.querySelector('#announcement-match-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', close);
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      var actualAmount = parseAmountInput_(form.elements.actual_amount.value);
      if (!(actualAmount > 0)) { showMessage('Unesite iznos veći od nule.', 'error'); return; }
      var data = { actual_amount: actualAmount, note: form.elements.note.value.trim() };
      callApi('apiMatchPaymentAnnouncement', [a.announcement_id, data], function(result) {
        var diff = result && result.announcement ? Number(result.announcement.difference || 0) : 0;
        var diffMsg = Math.abs(diff) > 0.000001
          ? (diff > 0 ? ' Zabeležen je VIŠAK od ' : ' Zabeležen je MANJAK od ') + formatAmount_(Math.abs(diff)) + ' ' + escapeHtml(a.currency || '') + '.'
          : '';
        showMessage('Uplata po najavi je proknjižena.' + diffMsg, 'success');
        close();
        loadKnjiga_(true);
        refreshBalance_();
      }, { successMessage: 'Uplata je proknjižena.' });
    });
  }

  function loadPendingPaymentOrderOutflows_(isBackground) {
    var target = document.getElementById('d-pending-payments-list');
    if (!target) return;
    if (!isBackground) {
      target.innerHTML = '<div class="empty-state compact"><p>Učitavam pending isplate...</p></div>';
    }
    callApi('apiListPendingPaymentOrderOutflows', [withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency: SESSION.currency
    })], function(rows) {
      renderPendingPaymentOrderOutflows_(rows || []);
    }, { quiet: true });
  }

  function renderPendingPaymentOrderOutflows_(rows) {
    var target = document.getElementById('d-pending-payments-list');
    if (!target) return;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state compact"><p>Nema pending isplata.</p></div>';
      return;
    }
    var canExecute = canPostDirectCashEvents_();
    target.innerHTML = rows.map(function(row) {
      var disabled = canExecute ? '' : ' disabled';
      var title = canExecute ? '' : ' title="Potrebna je aktivna smena glavnog blagajnika."';
      return '<div class="pending-payment-row" data-pending-payment-id="' + escapeHtml(row.pending_payment_id || row.event_id || '') + '">' +
        '<div><strong>Nalog ' + (row.order_ref_no != null ? '#' + row.order_ref_no : escapeHtml(row.order_id || row.linked_order_id || '—')) + '</strong>' +
          '<span>' + escapeHtml(row.pay_to_name || row.partner_name || '—') + '</span>' +
          '<small>' + escapeHtml(row.purpose || row.description || '—') + '</small></div>' +
        '<div class="pending-payment-amount">' + escapeHtml(formatAmount_(row.amount)) + ' ' + escapeHtml(row.currency || '') + '</div>' +
        '<button type="button" class="cash-count-action save" data-execute-pending-payment' + disabled + title + '>' +
          '<i class="ti ti-cash" aria-hidden="true"></i> Izvrši isplatu</button>' +
      '</div>';
    }).join('');
    target.querySelectorAll('[data-execute-pending-payment]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var row = btn.closest('[data-pending-payment-id]');
        var pendingId = row ? row.getAttribute('data-pending-payment-id') : '';
        if (!pendingId) return;
        executePendingPaymentOrderOutflow_(pendingId);
      });
    });
  }

  function executePendingPaymentOrderOutflow_(pendingPaymentId) {
    if (!canPostDirectCashEvents_()) {
      showDesktopMessage_('Isplata zahteva otvorenu smenu na ovoj blagajni.', 'error');
      return;
    }
    appConfirm_({
      title: 'Izvršenje isplate',
      message: 'Potvrđujete stvarnu isplatu iz pending zapisa ' + pendingPaymentId + '? Tek ova akcija menja stanje blagajne.',
      confirmText: 'Izvrši isplatu'
    }, function() {
      callApi('apiExecutePendingPaymentOrderOutflow', [pendingPaymentId, {}], function(result) {
        showDesktopMessage_('Isplata je proknjižena. CASH_OUTFLOW je kreiran kroz blagajnički tok.', 'success');
        loadPendingPaymentOrderOutflows_(true);
        loadKnjiga_(true);
        loadDesktopNalozi_();
        refreshBalance_();
      }, { successMessage: 'Isplata je izvršena.' });
    });
  }

  function updateKnjigaContext_() {
    var user = uiState.currentUser || {};
    var shift = uiState.activeShift || {};
    var userText = user.email ? shortUserLabel_(user.email) : 'Korisnik nije učitan';
    var shiftText = shift.shift_id
      ? 'Aktivna smena: ' + shortUserLabel_(shift.opened_by || '') + ' · ' + formatDateTimeShort_(shift.opened_at)
      : 'Nema aktivne smene za direktan rad';
    ['d-knjiga-context','m-knjiga-context'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = 'Korisnik: ' + userText + ' · ' + shiftText;
    });
  }

  function renderKnjigaTable_(events) {
    var isMobile = Boolean(document.getElementById('m-knjiga-list'));
    var container = document.getElementById(isMobile ? 'm-knjiga-list' : 'd-knjiga-tbody');
    var tfoot     = document.getElementById('d-knjiga-tfoot');
    if (!container) return;
    events = mergeOptimisticEvents_(events || []);
    events = mergeAnnouncementsIntoEvents_(events);
    if (!isMobile) events = filterKnjigaBySearch_(events);
    updateKnjigaContext_();

    if (!events.length) {
      var empty = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema transakcija za izabrani period.</p></div>';
      container.innerHTML = isMobile ? empty : '<tr><td colspan="6">' + empty + '</td></tr>';
      if (tfoot) tfoot.innerHTML = '';
      updateKnjigaTotals_(0, 0, 0, 0);
      renderCashbookKpis_([], 0, 0, 0, 0, 0, 0);
      return;
    }

    var totalIn = 0, totalOut = 0;
    var rows = [];
    var dateGroups = isMobile ? {} : events.reduce(function(index, ev) {
      var key = formatDateLong_(ev.event_date || ev.created_at);
      index[key] = (index[key] || 0) + 1;
      return index;
    }, {});
    var lastDateGroup = '';

    events.forEach(function(ev, idx) {
      var displayDirection = ev.display_direction || ev.direction;
      var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
      if (displayDirection === 'IN')  totalIn  += displayAmount;
      if (displayDirection === 'OUT' && !isTreasury) totalOut += displayAmount;
      // Rb. kolona: prikazuje STABILAN ref_no (permanentan broj dodeljen pri kreiranju,
      // ne menja se filtriranjem/paginacijom - koristi se i za reference "Storno stavke
      // #N"/"po najavi #N"), ne poziciju u trenutno ucitanoj listi. Optimisticne stavke
      // (tek poslate, server jos nije potvrdio) i dalje nemaju ref_no - za njih se
      // privremeno prikazuje "…" dok se ne osvezi sa servera.
      var rowNumber = events.length - idx;
      ev.__displayIndex = ev.ref_no != null ? ev.ref_no : '…';
      ev.__balanceAfter = Number(ev.running_balance || 0);
      ev.__balanceBefore = ev.__balanceAfter - (displayDirection === 'IN' ? displayAmount : displayDirection === 'OUT' ? -displayAmount : 0);
      if (!isMobile) {
        var dateKey = formatDateLong_(ev.event_date || ev.created_at);
        if (dateKey !== lastDateGroup) {
          rows.push(renderKnjigaDateGroup_(dateKey, dateGroups[dateKey] || 0));
          lastDateGroup = dateKey;
        }
      }
      rows.push(isMobile ? renderMobileEntry_(ev, rowNumber) : renderKnjigaRow_(ev, rowNumber, Number(ev.running_balance || 0)));
    });

    container.innerHTML = rows.join('');
    if (tfoot) tfoot.innerHTML = '';
    // events[0] might be a merged ANNOUNCEMENT row (running_balance: null, since najave
    // ne menjaju stanje) - uzimamo running_balance najnovijeg STVARNOG cash_event-a, ne
    // prvog reda po datumu, da završno stanje/KPI ne skoči na 0 kad je najava najnovija.
    var latestRealEvent = events.find(function(e) { return e.event_type !== 'ANNOUNCEMENT'; });
    var finalBalance = latestRealEvent ? Number(latestRealEvent.running_balance || 0) : 0;
    var netChange = totalIn - totalOut;
    var openingBalance = finalBalance - netChange;
    updateKnjigaTotals_(totalIn, totalOut, finalBalance, events.length);
    renderCashbookKpis_(events, totalIn, totalOut, finalBalance, openingBalance, netChange, events.length);

    container.querySelectorAll('[data-event-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        var eid = row.getAttribute('data-event-id');
        var ev = events.find(function(e) { return e.event_id === eid; });
        if (ev) openDetailPanel_(ev);
      });
    });
    container.querySelectorAll('[data-announcement-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        var aid = row.getAttribute('data-announcement-id');
        var announcement = LAST_KNJIGA_ANNOUNCEMENTS.find(function(a) { return a.announcement_id === aid; });
        if (announcement) openAnnouncementDetail_(announcement);
      });
    });
  }

  function mergeOptimisticEvents_(events) {
    var realIds = events.reduce(function(index, ev) {
      if (ev.event_id) index[ev.event_id] = true;
      return index;
    }, {});
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return !ev.event_id || !realIds[ev.event_id];
    });
    var visiblePending = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return (!SESSION.cashboxId || ev.cashbox_id === SESSION.cashboxId) &&
        (!SESSION.currency || ev.currency === SESSION.currency);
    });
    return visiblePending.concat(events);
  }

  function filterKnjigaBySearch_(events) {
    var input = document.getElementById('d-knjiga-search');
    var query = input ? String(input.value || '').trim().toLowerCase() : '';
    if (!query) return events;
    return events.filter(function(ev) {
      return [
        ev.event_id,
        ev.description,
        ev.partner_name,
        ev.created_by,
        ev.posted_by,
        ev.currency,
        cashEventUserLabel_(ev),
        cashEventReasonLabel_(ev)
      ].join(' ').toLowerCase().indexOf(query) !== -1;
    });
  }

  function renderCashbookKpis_(events, totalIn, totalOut, finalBalance, openingBalance, netChange, count) {
    if (!document.getElementById('d-kpi-opening')) return;
    var currency = SESSION.currency || '';
    var inCount = 0, outCount = 0;
    (events || []).forEach(function(ev) {
      var dir = ev.display_direction || ev.direction;
      if (dir === 'IN') inCount += 1;
      if (dir === 'OUT' && ev.event_type !== 'TREASURY_HANDOVER') outCount += 1;
    });
    var firstDate = events && events.length ? formatDateTimeShort_(events[events.length - 1].event_date || events[events.length - 1].created_at) : '—';
    var lastDate = events && events.length ? formatDateTimeShort_(events[0].event_date || events[0].created_at) : '—';
    var pct = openingBalance ? (netChange / Math.abs(openingBalance)) * 100 : 0;
    setText_('d-kpi-opening', formatAmount_(openingBalance) + ' ' + currency);
    setText_('d-kpi-opening-sub', firstDate);
    setText_('d-kpi-in', formatAmount_(totalIn) + ' ' + currency);
    setText_('d-kpi-in-sub', inCount + ' transakcija');
    setText_('d-kpi-out', formatAmount_(totalOut) + ' ' + currency);
    setText_('d-kpi-out-sub', outCount + ' transakcija');
    setText_('d-kpi-net', (netChange > 0 ? '+' : '') + formatAmount_(netChange) + ' ' + currency);
    setText_('d-kpi-net-sub', (pct > 0 ? '+' : '') + formatAmount_(pct) + '%');
    setText_('d-kpi-closing', formatAmount_(finalBalance) + ' ' + currency);
    setText_('d-kpi-closing-sub', lastDate);
    var net = document.getElementById('d-kpi-net');
    if (net) {
      net.classList.toggle('amount-positive', netChange > 0);
      net.classList.toggle('amount-negative', netChange < 0);
      net.classList.toggle('amount-neutral', netChange === 0);
    }
    if (document.getElementById('d-kpi-announced-total')) {
      var announcementTotals = computeAnnouncementTotals_();
      setText_('d-kpi-announced-total', formatAmount_(announcementTotals.total) + ' ' + currency);
      setText_('d-kpi-announced-paid', formatAmount_(announcementTotals.paid) + ' ' + currency);
      setText_('d-kpi-announced-remaining', formatAmount_(announcementTotals.remaining) + ' ' + currency);
    }
  }

  // Najave ne menjaju stanje blagajne pa se ne mogu izvesti iz cash_events - ovo je
  // agregacija nad već učitanim LAST_KNJIGA_ANNOUNCEMENTS (isti izvor koji se koristi za
  // spajanje najava u Knjigu, vidi mergeAnnouncementsIntoEvents_), bez novog endpoint-a.
  function computeAnnouncementTotals_() {
    var total = 0, paid = 0, remaining = 0;
    (LAST_KNJIGA_ANNOUNCEMENTS || []).forEach(function(a) {
      if (a.status === 'CANCELLED') return;
      var announced = Number(a.announced_amount || 0);
      total += announced;
      if (a.status === 'MATCHED') {
        paid += Number(a.matched_amount != null ? a.matched_amount : announced);
      } else {
        remaining += announced;
      }
    });
    return { total: total, paid: paid, remaining: remaining };
  }

  function formatDateLong_(value) {
    if (!value) return '—';
    var date = new Date(value);
    if (!isNaN(date.getTime())) {
      return String(date.getDate()).padStart(2, '0') + '.' + String(date.getMonth() + 1).padStart(2, '0') + '.' + date.getFullYear() + '.';
    }
    return formatDateShort_(value);
  }

  function renderKnjigaDateGroup_(dateLabel, count) {
    return '<tr class="cashbook-date-group"><td colspan="6"><span><i class="ti ti-circle-dot" aria-hidden="true"></i> ' +
      escapeHtml(dateLabel) + '</span><b>' + count + '</b></td></tr>';
  }

  function scheduleKnjigaRefresh_() {
    window.setTimeout(function() {
      loadKnjiga_(true);
      refreshBalance_();
    }, OPTIMISTIC_REFRESH_DELAY_MS);
  }

  function rememberOptimisticEvent_(ev) {
    ev.__addedAt = ev.__addedAt || Date.now();
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== ev.optimistic_id && item.event_id !== ev.event_id;
    });
    PENDING_OPTIMISTIC_EVENTS.unshift(ev);
    if (PENDING_OPTIMISTIC_EVENTS.length > 8) {
      PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.slice(0, 8);
    }
  }

  function removeOptimisticEvent_(tempId) {
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== tempId && item.event_id !== tempId;
    });
  }

  function buildOptimisticEvent_(tempId, direction, amount, currency, partner, desc, statusText) {
    var now = new Date();
    var signed = direction === 'OUT' ? -Number(amount || 0) : Number(amount || 0);
    var projectedBalance = currency === SESSION.currency ? getDisplayedBalanceRaw_() + signed : 0;
    return {
      optimistic_id: tempId,
      event_id: tempId,
      event_date: now.toISOString(),
      created_at: now.toISOString(),
      created_by: uiState.currentUser && uiState.currentUser.email || '',
      posted_at: now.toISOString(),
      posted_by: uiState.currentUser && uiState.currentUser.email || '',
      event_type: direction === 'IN' ? 'CASH_INFLOW' : 'CASH_OUTFLOW',
      cashbox_id: SESSION.cashboxId,
      currency: currency,
      direction: direction,
      amount: amount,
      display_direction: direction,
      display_amount: amount,
      partner_name: partner || '',
      description: desc || partner || '',
      status: statusText || 'KNJIŽENJE',
      running_balance: projectedBalance
    };
  }

  function cashCountEventKindFromDescription_(description) {
    var text = String(description || '').toUpperCase();
    if (text.indexOf('POČETAK SMENE') !== -1 || text.indexOf('POCETAK SMENE') !== -1) return 'Otvaranje smene';
    if (text.indexOf('ZAVRŠNI POPIS') !== -1 || text.indexOf('ZAVRSNI POPIS') !== -1 || text.indexOf('ZATVARANJE') !== -1) return 'Zatvaranje smene';
    return 'Kontrolni presek';
  }

  function cashCountEventKind_(ev) {
    if (ev && ev.count_type === 'SHIFT_OPENING') return 'Otvaranje smene';
    if (ev && ev.count_type === 'SHIFT_CLOSING') return 'Zatvaranje smene';
    if (ev && ev.count_type === 'CASHBOX_COUNT') return 'Kontrolni presek';
    return cashCountEventKindFromDescription_(ev && ev.description);
  }

  function cashCountDifferenceText_(ev) {
    var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var direction = ev.display_direction || ev.direction;
    if (!amount) return 'Bez razlike';
    var label = direction === 'OUT' ? 'Manjak' : 'Višak';
    return label + ': ' + formatAmount_(Math.abs(amount)) + ' ' + escapeHtml(ev.currency || SESSION.currency || '');
  }

  function cleanBusinessDescription_(description) {
    return String(description || '')
      .replace(/CNT-\d{8}-\d{6}-[A-F0-9]+/gi, '')
      .replace(/CEV-\d{8}-\d{6}-[A-F0-9]+/gi, '')
      .replace(/PRESEK SMENE\s*-\s*KOREKCIJA\s*-\s*/gi, '')
      .replace(/\s*\.\s*Razlika:/gi, '. Razlika:')
      .replace(/\s{2,}/g, ' ')
      .replace(/\s+\./g, '.')
      .trim();
  }

  function cashEventUserLabel_(ev) {
    if (ev.event_type === 'ANNOUNCEMENT') return ev.partner_name || 'Najava uplate';
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis|početak smene|završni popis/i.test(String(ev.description || '')));
    if (isCount) return cashCountEventKind_(ev);
    if (ev.event_type === 'TREASURY_HANDOVER') return 'Predaja u trezor';
    return ev.partner_name || ev.description || '—';
  }

  function isEventAlreadyReversed_(eventId) {
    if (!eventId) return false;
    return (LAST_KNJIGA_EVENTS || []).some(function(e) { return e.reversal_of_event_id === eventId; });
  }

  // Resolves an internal hash event_id (e.g. "CEV-a1b2...") to its human-readable
  // ref_no, using whatever's currently loaded in the Knjiga. Falls back to the raw
  // id if the referenced event isn't in the loaded window (e.g. outside the current
  // date filter) - better than showing nothing.
  function refNoForEventId_(eventId) {
    if (!eventId) return '';
    var found = (LAST_KNJIGA_EVENTS || []).find(function(e) { return e.event_id === eventId; });
    return found && found.ref_no != null ? ('#' + found.ref_no) : eventId;
  }

  function cashEventReasonLabel_(ev) {
    if (ev.event_type === 'ANNOUNCEMENT') {
      var statusLabel = ev.status === 'MATCHED' ? 'Uparena' : ev.status === 'CANCELLED' ? 'Otkazana' : 'Čeka uplatu';
      return 'NAJAVA · ' + statusLabel + (ev.description ? ' · ' + cleanBusinessDescription_(ev.description) : '');
    }
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis|početak smene|završni popis/i.test(String(ev.description || '')));
    if (isCount) return cashCountDifferenceText_(ev);
    return cleanBusinessDescription_(ev.description || '—');
  }

  function renderKnjigaRow_(ev, index, balance) {
    var isAnnouncement = ev.event_type === 'ANNOUNCEMENT';
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
    var isIn  = displayDirection === 'IN';
    var isOut = displayDirection === 'OUT' && !isTreasury;
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis/i.test(String(ev.description || '')));
    var rowClass = (isAnnouncement ? 'row-announcement' : isCount || isTreasury ? 'row-count' : isIn ? 'row-in' : isOut ? 'row-out' : 'row-opening') + (ev.optimistic_id ? ' optimistic' : '');
    var amtFmt  = formatAmount_(displayAmount);
    var balFmt  = isAnnouncement ? '—' : formatAmount_(balance);
    var dateStr = formatDateLong_(ev.event_date || ev.created_at);
    var label   = escapeHtml(cashEventUserLabel_(ev));
    var reason  = escapeHtml(cashEventReasonLabel_(ev));
    var createdBy = escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—'));
    var timeStr = escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date));
    var trace = ev.reversal_of_event_id ? ' · Storno stavke ' + escapeHtml(refNoForEventId_(ev.reversal_of_event_id))
      : isEventAlreadyReversed_(ev.event_id) ? ' · Stornirano' : '';
    var statusHint = ev.optimistic_id ? ' · Knjiženje...' : '';
    var idAttr = isAnnouncement ? 'data-announcement-id="' + escapeHtml(ev.__announcement.announcement_id) + '"' : 'data-event-id="' + escapeHtml(ev.event_id) + '"';
    var refDisplay = ev.ref_no != null ? ev.ref_no : '…';
    var clipBtn = (!isAnnouncement && KNJIGA_DOCS_WITH_FILES_[ev.event_id])
      ? ' <button type="button" class="cashbook-row-clip" title="Ima prilog - klikni za pregled" onclick="event.stopPropagation();openDocumentsDialogForEventId_(\'' + escapeHtml(ev.event_id) + '\')"><i class="ti ti-paperclip" aria-hidden="true"></i></button>'
      : '';
    return '<tr class="' + rowClass + ' cashbook-row" ' + idAttr + '>' +
      '<td><span class="cashbook-rb">' + refDisplay + '</span></td>' +
      '<td><span class="cashbook-row-date">' + dateStr + '</span><strong class="cashbook-row-time">' + timeStr + '</strong></td>' +
      '<td><div class="desc-main">' + label + clipBtn + '</div><div class="desc-reason">' + reason + '</div><div class="desc-sub">' + createdBy + trace + statusHint + '</div></td>' +
      '<td class="' + (isIn  ? 'cell-in'   : 'cell-dash') + '">' + (isIn  ? '<span class="amount-pill in">' + amtFmt + '</span>' : isAnnouncement ? '<span class="amount-pill" style="background:rgba(148,163,184,.18);color:#94a3b8">' + amtFmt + '</span>' : '—') + '</td>' +
      '<td class="' + (isOut ? 'cell-out'  : 'cell-dash') + '">' + (isOut ? '<span class="amount-pill out">' + amtFmt + '</span>' : '—') + '</td>' +
      '<td class="cell-bal">' + balFmt + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotals_(totalIn, totalOut, finalBalance) {
    return '<tr class="total-row">' +
      '<td colspan="3" style="font-weight:700;font-size:12px;padding:10px 12px">UKUPNO</td>' +
      '<td class="cell-in">'  + formatAmount_(totalIn)      + '</td>' +
      '<td class="cell-out">' + formatAmount_(totalOut)     + '</td>' +
      '<td class="cell-bal">' + formatAmount_(finalBalance) + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotalsHtml_(totalIn, totalOut, finalBalance) {
    return '<span><strong>Ukupno uplata</strong> <b class="cell-in">' + formatAmount_(totalIn) + '</b></span>' +
      '<span><strong>Ukupno isplata</strong> <b class="cell-out">' + formatAmount_(totalOut) + '</b></span>' +
      '<span><strong>Stanje</strong> <b class="cell-bal">' + formatAmount_(finalBalance) + ' ' + escapeHtml(SESSION.currency || '') + '</b></span>';
  }

  function updateKnjigaTotals_(totalIn, totalOut, finalBalance, count) {
    LAST_KNJIGA_TOTALS = {
      totalIn: totalIn,
      totalOut: totalOut,
      finalBalance: finalBalance,
      count: count || 0
    };

  function formatTimeShort_(value) {
    if (!value) return '—';
    // IMPORTANT: never regex-extract the HH:MM digits straight out of the raw
    // string - server timestamps are ISO UTC (e.g. "2026-07-10T07:42:00.000Z"),
    // and grabbing the first HH:MM substring displays UTC time unconverted,
    // which looked like transactions were logged hours in the past. Always
    // go through Date so the browser's local timezone (Europe/Belgrade) is applied.
    var date = new Date(value);
    if (!isNaN(date.getTime())) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }
    return String(value);
  }

  function shortUserLabel_(value) {
    if (!value) return '—';
    var text = String(value);
    return text.indexOf('@') > -1 ? text.split('@')[0] : text;
  }

  function bindEnterNavigationForForms_(formIds) {
    (formIds || []).forEach(function(formId) {
      var form = document.getElementById(formId);
      if (!form || form.dataset.enterNavBound === '1') return;
      form.dataset.enterNavBound = '1';
      form.addEventListener('keydown', function(event) {
        if (event.key !== 'Enter' || event.ctrlKey || event.metaKey || event.altKey) return;
        var target = event.target;
        if (!target || target.tagName === 'TEXTAREA' || target.type === 'submit' || target.type === 'button') return;
        if (target.tagName === 'SELECT' && target.size > 1) return;
        var fields = Array.prototype.filter.call(form.querySelectorAll('input, select, textarea, button'), function(el) {
          return !el.disabled && !el.hidden && el.type !== 'hidden' && el.offsetParent !== null;
        });
        var index = fields.indexOf(target);
        if (index === -1) return;
        event.preventDefault();
        var next = fields[index + 1];
        if (next) {
          next.focus();
          if (typeof next.select === 'function' && next.tagName === 'INPUT' && next.type !== 'date') next.select();
        }
      });
    });
  }

  function submitDesktopQuickForm_() {
    var type    = currentQuickFormType_;
    var amount  = parseAmountInput_((document.getElementById('d-qf-amount') || {}).value);
    var cur     = (document.getElementById('d-qf-currency')    || {}).value || SESSION.currency;
    var partner = ((document.getElementById('d-qf-partner')    || {}).value || '').trim();
    var desc    = ((document.getElementById('d-qf-description') || {}).value || '').trim();
    var isTreasury = type === 'TREASURY';
    var direction = type === 'IN' ? 'IN' : 'OUT';

    if (!amount || amount <= 0) { var a = document.getElementById('d-qf-amount'); if (a) a.focus(); return; }
    if (!isTreasury && !desc && !partner) { var d2 = document.getElementById('d-qf-description'); if (d2) d2.focus(); return; }
    if (!assertClientSideCashAmount_(direction, amount, cur)) return;
    if (isTreasury) {
      partner = 'Trezor';
      desc = desc || 'Predaja u trezor';
    }

    var tempId = 'OPT-' + Date.now();
    rememberOptimisticEvent_(buildOptimisticEvent_(tempId, direction, amount, cur, partner, desc, 'KNJIŽENJE'));
    renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
    if (cur === SESSION.currency) {
      updateTopbarBalance_(direction === 'IN' ? amount : -amount);
    }

    var data = { cashbox_id: SESSION.cashboxId, currency: cur, amount: amount, partner_name: partner, description: desc || partner };
    var fn   = type === 'IN' ? 'apiCreateCashInflow' : (isTreasury ? 'apiCreateTreasuryHandover' : 'apiCreateCashOutflow');

    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          removeOptimisticEvent_(tempId);

  function bindMobileFab_() {

    if (!fabBtn || !fabMenu || fabBtn.dataset.bound === '1') return;
    fabBtn.dataset.bound = '1';
    var setOpen = function(open) {
      if (open) fabMenu.removeAttribute('hidden'); else fabMenu.setAttribute('hidden', 'hidden');
      fabBtn.classList.toggle('active', open);
      fabBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    };
    fabBtn.addEventListener('click', function(event) {
      event.stopPropagation();
      setOpen(fabMenu.hasAttribute('hidden'));
    });
    // Zatvori meni posle klika na bilo koju opciju unutra (Uplata/Isplata/Trezor/Najava
    // otvaraju svoj dijalog preko postojećih handlera - meni sam ne treba da ostane otvoren).
    fabMenu.addEventListener('click', function(event) {
      if (event.target.closest('.m-fab-menu-item')) setOpen(false);
    });
    document.addEventListener('click', function(event) {
      if (!fabMenu.hasAttribute('hidden') && !event.target.closest('.m-fab-row')) setOpen(false);
    });

  function openSheet_(type) {
    currentSheetType_      = type;
    currentQuickFormType_  = type;
    var overlay = document.getElementById('sheet-overlay');
    var title   = document.getElementById('sheet-title');
    var submit  = document.getElementById('sheet-submit');
    var lbl     = submit ? submit.querySelector('span') : null;
    var isIn    = type === 'IN';
    var isTreasury = type === 'TREASURY';
    if (!overlay) return;

    if (title)  { title.textContent = isIn ? 'Nova uplata' : isTreasury ? 'Predaja u trezor' : 'Nova isplata'; title.className = 'sheet-title ' + (isIn ? 'in' : 'out'); }
    if (submit) submit.className = 'btn-full btn-lg ' + (isIn ? 'btn-in' : 'btn-out');
    if (lbl)    lbl.textContent  = isIn ? 'Proknjiti uplatu' : isTreasury ? 'Proknjiti predaju' : 'Proknjiti isplatu';

    document.querySelectorAll('#sheet-cur-toggle .cur-btn').forEach(function(btn) {
      var sel = (btn.dataset.currency || 'RSD') === SESSION.currency;
      btn.className = 'cur-btn' + (sel ? ' active ' + (isIn ? 'in' : 'out') : '');
    });

    ['sheet-amount','sheet-partner','sheet-description'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
    if (isTreasury) {
      var partner = document.getElementById('sheet-partner');
      var desc = document.getElementById('sheet-description');
      if (partner) partner.value = 'Trezor';
      if (desc) desc.value = 'Predaja u trezor';

    setTimeout(function() { var a = document.getElementById('sheet-amount'); if (a) a.focus(); }, 150);

  function closeSheet_() {
    var el = document.getElementById('sheet-overlay');

  function submitSheet_() {
    var amount  = parseAmountInput_((document.getElementById('sheet-amount') || {}).value);
    var partner = ((document.getElementById('sheet-partner')               || {}).value || '').trim();
    var desc    = ((document.getElementById('sheet-description')           || {}).value || '').trim();
    var type    = currentSheetType_;
    var cur     = SESSION.currency;
    var isTreasury = type === 'TREASURY';
    var direction = type === 'IN' ? 'IN' : 'OUT';

    var activeCur = document.querySelector('#sheet-cur-toggle .cur-btn.active');
    if (activeCur) cur = activeCur.dataset.currency || cur;

    if (!amount || amount <= 0) { var a = document.getElementById('sheet-amount'); if (a) a.focus(); return; }
    if (!isTreasury && !desc && !partner) { var d2 = document.getElementById('sheet-description'); if (d2) d2.focus(); return; }
    if (!assertClientSideCashAmount_(direction, amount, cur)) return;
    if (isTreasury) {
      partner = 'Trezor';
      desc = desc || 'Predaja u trezor';
    }

    closeSheet_();

    var tempId = 'OPT-' + Date.now();
    rememberOptimisticEvent_(buildOptimisticEvent_(tempId, direction, amount, cur, partner, desc, 'KNJIŽENJE'));
    renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
    if (cur === SESSION.currency) {
      updateMobileBalance_(direction === 'IN' ? amount : -amount);
    }

    var data = { cashbox_id: SESSION.cashboxId, currency: cur, amount: amount, partner_name: partner, description: desc || partner };
    var fn   = type === 'IN' ? 'apiCreateCashInflow' : (isTreasury ? 'apiCreateTreasuryHandover' : 'apiCreateCashOutflow');

    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          removeOptimisticEvent_(tempId);
          var realEvent = resp.data || resp;
          if (realEvent && realEvent.event_id) {
            realEvent.optimistic_id = realEvent.event_id;
            realEvent.running_balance = cur === SESSION.currency ? getDisplayedBalanceRaw_() : Number(realEvent.running_balance || 0);
            rememberOptimisticEvent_(realEvent);
          }
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          scheduleKnjigaRefresh_();
        }
        else {
          removeOptimisticEvent_(tempId);
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          if (cur === SESSION.currency) updateMobileBalance_(direction === 'IN' ? -amount : amount);
          var message = resp && resp.error ? resp.error.message : 'problem.';
          handleApiErrorForAppSession_(message);
          showMobileMessage_('Greška: ' + humanizeError_(message), 'error');
        }
      })
      .withFailureHandler(function(err) {
        removeOptimisticEvent_(tempId);
        renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
        if (cur === SESSION.currency) updateMobileBalance_(direction === 'IN' ? -amount : amount);
        var message = err && err.message ? err.message : 'problem.';
        handleApiErrorForAppSession_(message);
        showMobileMessage_('Greška: ' + humanizeError_(message), 'error');
      })
      [fn](data, getAppSessionId_());
  }

  function bindMobileHeaderSettings_() {
    var toggleBtn = document.getElementById('m-header-settings-btn');
    var panel = document.getElementById('m-header-chips');
    if (!toggleBtn || !panel || toggleBtn.dataset.bound === '1') return;
    toggleBtn.dataset.bound = '1';
    toggleBtn.addEventListener('click', function() {
      var isHidden = panel.hasAttribute('hidden');
      if (isHidden) {
        panel.removeAttribute('hidden');
      } else {
        panel.setAttribute('hidden', 'hidden');
      }
      toggleBtn.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
      toggleBtn.classList.toggle('active', isHidden);
    });
  }

  function bindMobileNav_() {
    bindMobileHeaderSettings_();
    document.querySelectorAll('[data-m-nav]').forEach(function(btn) {
      btn.addEventListener('click', function() {

        document.querySelectorAll('.m-section').forEach(function(s) {
          s.classList.toggle('active', s.id === target);

  /* ─── Nalozi helpers (mobile CRUD) ──────────────────────────────
     Mobile ranije samo prikazivao listu i blokirao svaku akciju
     (executeOrderDirect_ je samo ispisivao poruku). Sada koristi iste
     API pozive kao desktop pregled naloga (loadDesktopNalozi_ /
     bindPaymentOrderDetailActions_ / bindNewPaymentOrderScreen_), samo
     kroz kompaktan dijalog (.app-dialog-overlay) prilagođen telefonu. */

  var MOBILE_ORDERS_STATE = { records: [] };

  function loadMobileNalozi_() {
    var list = document.getElementById('m-nalozi-list');
    if (list) list.innerHTML = '<div class="empty-state compact"><p>Učitavam naloge...</p></div>';
    callApi('apiListPaymentOrders', [{}], function(result) {
      MOBILE_ORDERS_STATE.records = (Array.isArray(result) ? result.map(normalizePaymentOrder_) : [])
        .sort(comparePaymentOrdersNewestFirst_);
      renderMobileNalozi_();
    }, { quiet: true });
  }

  function renderMobileNalozi_() {
    var list = document.getElementById('m-nalozi-list');
    if (!list) return;
    var rows = MOBILE_ORDERS_STATE.records;
    if (!rows.length) {
      list.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema naloga za isplatu.</p></div>';
      updateTabCounts_(null, 0);
      return;
    }
    var actionable = rows.filter(function(o) { return o.status === 'DRAFT' || o.status === 'WAITING_PAYMENT' || o.status === 'PARTIALLY_PAID'; });
    list.innerHTML = rows.map(function(order) {
      var orderLabel = order.refNo != null ? ('Nalog #' + order.refNo) : escapeHtml(order.id);
      return '<div class="m-entry" data-order-id="' + escapeHtml(order.id) + '">' +
        '<div class="m-entry-dot" style="background:var(--color-out)"></div>' +
        '<div class="m-entry-info">' +
          '<div class="m-entry-desc">' + escapeHtml(order.recipient || '—') + '</div>' +
          '<div class="m-entry-meta">' + orderLabel + ' · ' + formatAmount_(order.remaining || order.amountOrdered) + ' ' + escapeHtml(order.currency || '') + '</div>' +
        '</div>' +
        '<span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span>' +
      '</div>';
    }).join('');
    list.querySelectorAll('[data-order-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        var order = MOBILE_ORDERS_STATE.records.find(function(o) { return o.id === row.getAttribute('data-order-id'); });
        if (order) openMobileOrderDetail_(order);
      });
    });
    updateTabCounts_(null, actionable.length);
  }

  function openMobileOrderDetail_(order) {
    var isPaid = order.status === 'PAID' || order.status === 'CLOSED';
    var pendingPaymentId = order.status === 'WAITING_PAYMENT' && order.cashEventId && !isPaid ? order.cashEventId : '';
    var canSendToCashier = (order.status === 'WAITING_PAYMENT' || order.status === 'PARTIALLY_PAID') && !pendingPaymentId;
    var canReject = order.status === 'WAITING_PAYMENT';
    var canApprove = order.status === 'DRAFT';
    var canEdit = order.status === 'DRAFT';
    var canExecute = !!pendingPaymentId && canPostDirectCashEvents_();
    var amount = order.remaining || order.amountOrdered;
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<div class="po-detail-head"><h3>' + (order.refNo != null ? 'Nalog #' + order.refNo : escapeHtml(order.id)) + '</h3><span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span></div>' +
        '<div class="po-detail-grid">' +
          renderPaymentOrderField_('Primalac', order.recipient) +
          renderPaymentOrderField_('Blagajna', order.cashbox) +
          renderPaymentOrderField_('Valuta', order.currency) +
          renderPaymentOrderField_('Rok za isplatu', formatDateShort_(order.dueDate)) +
          renderPaymentOrderField_('Osnov isplate', order.basis) +
        '</div>' +
        '<div class="po-detail-amount">' + escapeHtml(formatAmount_(amount)) + ' ' + escapeHtml(order.currency || '') + '</div>' +
        '<div class="m-detail-actions">' +
          '<button type="button" class="cash-count-action draft" id="m-order-edit" ' + (canEdit ? '' : 'disabled') + '><i class="ti ti-pencil" aria-hidden="true"></i> Izmeni nacrt</button>' +
          '<button type="button" class="cash-count-action save" id="m-order-approve" ' + (canApprove ? '' : 'disabled') + '><i class="ti ti-check" aria-hidden="true"></i> Odobri nalog</button>' +
          '<button type="button" class="cash-count-action cancel" id="m-order-reject" ' + (canReject ? '' : 'disabled') + '><i class="ti ti-circle-x" aria-hidden="true"></i> Odbij</button>' +
          '<button type="button" class="cash-count-action draft" id="m-order-send-payment" ' + (canSendToCashier ? '' : 'disabled') + '><i class="ti ti-send" aria-hidden="true"></i> Pošalji na isplatu</button>' +
          (pendingPaymentId ? '<button type="button" class="cash-count-action save" id="m-order-execute" ' + (canExecute ? '' : 'disabled') + '><i class="ti ti-cash" aria-hidden="true"></i> Izvrši isplatu</button>' : '') +
        '</div>' +
        '<button type="button" class="btn-ghost btn-full" id="m-order-close">Zatvori</button>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var closeBtn = overlay.querySelector('#m-order-close');
    if (closeBtn) closeBtn.addEventListener('click', close);
    var editBtn = overlay.querySelector('#m-order-edit');
    if (editBtn) editBtn.addEventListener('click', function() { close(); openMobileNewOrderForm_(order); });
    var approveBtn = overlay.querySelector('#m-order-approve');
    if (approveBtn) approveBtn.addEventListener('click', function() {
      callApi('apiIssuePaymentOrder', [order.id], function() {
        showMessage('Nalog je odobren i poslat na dalji tok.', 'success');
        close();
        loadMobileNalozi_();
      });
    });
    var rejectBtn = overlay.querySelector('#m-order-reject');
    if (rejectBtn) rejectBtn.addEventListener('click', function() {
      appPrompt_({
        title: 'Odbijanje naloga',
        message: 'Unesite razlog odbijanja naloga ' + order.id + '.',
        confirmText: 'Odbij nalog',
        placeholder: 'Razlog odbijanja'
      }, function(reason) {
        if (!String(reason || '').trim()) {
          showMessage('Razlog odbijanja je obavezan.', 'error');
          return;
        }
        callApi('apiRejectPaymentOrderByCashier', [order.id, reason], function() {
          showMessage('Nalog je odbijen.', 'success');
          close();
          loadMobileNalozi_();
        });
      });
    });
    var sendBtn = overlay.querySelector('#m-order-send-payment');
    if (sendBtn) sendBtn.addEventListener('click', function() {
      appConfirm_({
        title: 'Slanje naloga blagajni',
        message: 'Kreira se pending ISPLATA za nalog ' + order.id + '. Stanje blagajne se neće promeniti dok blagajnik ne potvrdi isplatu.',
        confirmText: 'Pošalji na isplatu'
      }, function() {
        callApi('apiSendPaymentOrderToCashier', [order.id], function() {
          showMessage('Nalog je poslat blagajni na isplatu.', 'success');
          close();
          loadMobileNalozi_();
        });
      });
    });
    var executeBtn = overlay.querySelector('#m-order-execute');
    if (executeBtn) executeBtn.addEventListener('click', function() {
      if (!canPostDirectCashEvents_()) {
        showMessage('Isplata zahteva otvorenu smenu na ovoj blagajni.', 'error');
        return;
      }
      appConfirm_({
        title: 'Izvršenje isplate',
        message: 'Potvrđujete stvarnu isplatu iz naloga ' + order.id + '? Tek ova akcija menja stanje blagajne.',
        confirmText: 'Izvrši isplatu'
      }, function() {
        callApi('apiExecutePendingPaymentOrderOutflow', [pendingPaymentId, {}], function() {
          showMessage('Isplata je proknjižena.', 'success');
          close();
          loadMobileNalozi_();
          loadKnjiga_(true);
          refreshBalance_();
        });
      });
    });
  }

  function openMobileNewOrderForm_(existingOrder) {
    var cashboxes = uiState.config.cashboxes || [{ cashbox_id: SESSION.cashboxId || 'CB_MAIN', name: SESSION.cashboxName || 'Glavna blagajna' }];
    var currencies = uiState.config.currencies || [SESSION.currency || 'RSD'];
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + (existingOrder ? 'Izmena nacrta naloga' : 'Novi nalog za isplatu') + '</h3>' +
        '<form id="m-new-order-form" class="form-grid">' +
          '<label>Blagajna <select name="cashbox_id">' + cashboxes.map(function(item) {
            return '<option value="' + escapeHtml(item.cashbox_id) + '">' + escapeHtml(item.name || item.cashbox_id) + '</option>';
          }).join('') + '</select></label>' +
          '<label>Valuta <select name="currency">' + currencies.map(function(code) {
            return '<option value="' + escapeHtml(code) + '">' + escapeHtml(code) + '</option>';
          }).join('') + '</select></label>' +
          '<label>Primalac <input name="pay_to_name" type="text" required></label>' +
          '<label>Iznos <input name="amount_ordered" type="text" inputmode="decimal" required></label>' +
          '<label>Osnov isplate <input name="purpose" type="text" required></label>' +
          '<label>Rok za isplatu <input name="due_date" type="date"></label>' +
          '<label>Napomena <textarea name="description"></textarea></label>' +
          '<div class="m-detail-actions">' +
            '<button type="button" class="btn-ghost" id="m-new-order-cancel">Otkaži</button>' +
            '<button type="submit" class="btn-primary" id="m-new-order-save">' + (existingOrder ? 'Sačuvaj izmene' : 'Sačuvaj nacrt') + '</button>' +
            '<button type="button" class="btn-primary" id="m-new-order-issue">Sačuvaj i izdaj</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#m-new-order-form');
    if (existingOrder) {
      form.elements.cashbox_id.value = existingOrder.cashbox || SESSION.cashboxId || '';
      form.elements.currency.value = existingOrder.currency || SESSION.currency || '';
      form.elements.pay_to_name.value = existingOrder.recipient || '';
      form.elements.amount_ordered.value = existingOrder.amountOrdered || '';
      form.elements.purpose.value = existingOrder.basis || '';
      form.elements.due_date.value = toInputDate_(parseDateSafe_(existingOrder.dueDate) || '') || '';
      form.elements.description.value = existingOrder.note || '';
    }
    var cancelBtn = overlay.querySelector('#m-new-order-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', close);
    function collect() {
      return {
        cashbox_id: form.elements.cashbox_id.value,
        pay_to_name: form.elements.pay_to_name.value.trim(),
        amount_ordered: parseAmountInput_(form.elements.amount_ordered.value),
        currency: form.elements.currency.value,
        purpose: form.elements.purpose.value.trim(),
        due_date: form.elements.due_date.value,
        description: form.elements.description.value.trim()
      };
    }
    function validate(data) {
      if (!data.cashbox_id) { showMessage('Izaberite blagajnu.', 'error'); return false; }
      if (!data.pay_to_name) { showMessage('Unesite primaoca isplate.', 'error'); return false; }
      if (!data.amount_ordered || data.amount_ordered <= 0) { showMessage('Unesite iznos veći od nule.', 'error'); return false; }
      if (!data.currency) { showMessage('Izaberite valutu.', 'error'); return false; }
      if (!data.purpose) { showMessage('Unesite osnov isplate.', 'error'); return false; }
      return true;
    }
    function save(afterSave) {
      var data = collect();
      if (!validate(data)) return;
      if (existingOrder) {
        callApi('apiUpdateDraftPaymentOrder', [existingOrder.id, data], function() {
          if (afterSave) afterSave(existingOrder.id);
        }, { successMessage: 'Nacrt naloga je ažuriran.' });
      } else {
        callApi('apiCreateDirectPaymentOrder', [data], function(result) {
          var orderId = result && (result.order_id || result.id) || '';
          if (afterSave) afterSave(orderId);
        }, { successMessage: 'Nacrt naloga je sačuvan.' });
      }
    }
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      save(function() { close(); loadMobileNalozi_(); });
    });
    var issueBtn = overlay.querySelector('#m-new-order-issue');
    if (issueBtn) issueBtn.addEventListener('click', function() {
      save(function(orderId) {
        if (!orderId) { showMessage('Nalog nije sačuvan i ne može biti izdat.', 'error'); return; }
        callApi('apiIssuePaymentOrder', [orderId], function() {
          showMessage('Nalog je izdat i čeka dalju obradu.', 'success');
          close();
          loadMobileNalozi_();
        }, { successMessage: 'Nalog je izdat.' });
      });
    });
  }

    ['d-users-role-filter','d-users-status-filter','d-users-cashbox-filter'].forEach(function(id) {
