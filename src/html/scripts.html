  function applyActiveShiftFields_() {
    var shift = uiState.activeShift || {};
    document.querySelectorAll('input[name="shift_id"]').forEach(function(input) {
      input.value = shift.shift_id || '';
    });
    document.querySelectorAll('[data-active-shift-label]').forEach(function(el) {
      el.textContent = activeShiftLabel_();
    });
    updateKnjigaContext_();
    renderShiftWorkflowState_();
  }

  function renderShiftWorkflowState_() {
    var shift = uiState.activeShift || {};
    var hasShift = Boolean(shift.shift_id);
    var canClose = canCloseCurrentActiveShift_();
    var statusHtml = hasShift
      ? '<div class="table-wrap"><table class="book-table shift-table"><thead><tr><th>Rb.</th><th>Blagajnik</th><th>Otvoreno</th><th>Zatvoreno</th><th>Status</th><th>ID</th></tr></thead><tbody>' +
        shiftRowHtml_(shift, 0) +
        '</tbody></table></div>' +
        '<div class="actions shift-inline-actions">' +
          '<button type="button" data-shift-status-count><i class="ti ti-calculator" aria-hidden="true"></i> Presek stanja</button>' +
          '<button type="button" class="btn-primary" data-shift-status-close><i class="ti ti-lock" aria-hidden="true"></i> Zatvori smenu</button>' +
        '</div>'
      : '<div class="shift-state empty"><strong>Nema aktivne smene</strong><span>Otvorite smenu kroz popis apoena da bi blagajna počela rad.</span></div>';
    ['d-shift-status','m-shift-status'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = statusHtml;
    });
    document.querySelectorAll('[data-shift-status-count]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var mobile = Boolean(btn.closest('#m-shift-status'));
        if (mobile) openMobileSection_('m-section-presek');
        else openDesktopSection_('presek');
      });
    });
    document.querySelectorAll('[data-shift-status-close]').forEach(function(btn) {
      btn.disabled = !canClose;
      btn.title = canClose ? '' : 'Smenu može zatvoriti samo korisnik koji ju je otvorio, supervizor ili administracija.';
      btn.addEventListener('click', function() {
        openShiftClosingDialog_(btn.closest('#m-shift-status') ? 'mobile' : 'desktop');
      });
    });
    document.querySelectorAll('#d-opening-count-form, #m-opening-count-form').forEach(function(form) {
      var card = form.closest('.card');
      if (card) card.style.display = 'none';
      setWorkflowFormDisabled_(form, hasShift);
    });
    document.querySelectorAll('.shift-open-action-card').forEach(function(card) {
      if (!hasShift) {
        card.removeAttribute('hidden');
        card.style.display = '';
      } else {
        card.setAttribute('hidden', 'hidden');
        card.style.display = 'none';
      }
    });
    document.querySelectorAll('#d-close-shift-form, #m-close-shift-form').forEach(function(form) {
      var card = form.closest('.card');
      if (card) card.style.display = 'none';
      setWorkflowFormDisabled_(form, !hasShift || !canClose);
    });
    document.querySelectorAll('.optional-handover-card').forEach(function(card) {
      card.style.display = 'none';
    });
    document.querySelectorAll('.shift-work-card').forEach(function(card) {
      card.setAttribute('hidden', 'hidden');
      card.style.display = 'none';
    });
    // Direct posting (Uplata/Isplata/Trezor) is allowed for ANY user while the
    // cashbox has an open shift - the shift is shared, not tied to whoever opened
    // it (mirrors the backend fix in cash-events/inflow.js, outflow.js,
    // treasury-handover.js, which no longer require opened_by === acting user).
    var canPostDirect = canPostDirectCashEvents_();
    ['d-shift-action-in','d-shift-action-out','d-shift-action-treasury','m-shift-action-in','m-shift-action-out','m-shift-action-treasury'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.disabled = !canPostDirect;
      btn.title = canPostDirect ? '' : 'Direktno knjiženje zahteva otvorenu smenu na ovoj blagajni.';
    });
    document.querySelectorAll('#d-active-shift-balance-btn, #m-active-shift-balance-btn').forEach(function(btn) {
      btn.disabled = !hasShift;
      btn.title = hasShift ? '' : 'Nema aktivne smene.';
    });
    renderShiftPageKpis_(shift, []);
    updateCountWorkflowVisibility_();
  }

  function openDesktopSection_(navKey) {
    var sectionId = 'd-section-' + navKey;
    document.querySelectorAll('.d-section').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    document.querySelectorAll('[data-d-nav]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-d-nav') === navKey);
    });
    updateDesktopDirectActionsVisibility_();
  }

  function openMobileSection_(sectionId) {
    document.querySelectorAll('.m-section').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    document.querySelectorAll('[data-m-nav]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-m-nav') === sectionId);
    });
    updateMobileDirectActionsVisibility_();
  }

  function openDesktopDirectAction_(buttonId) {
    openDesktopSection_('knjiga');
    window.setTimeout(function() {
      var btn = document.getElementById(buttonId);
      if (btn) btn.click();
    }, 0);
  }

  function openMobileDirectAction_(buttonId) {
    openMobileSection_('m-section-knjiga');
    window.setTimeout(function() {
      var btn = document.getElementById(buttonId);
      if (btn) btn.click();
    }, 0);
  }

  function setWorkflowFormDisabled_(form, disabled) {
    if (!form) return;
    form.classList.toggle('is-disabled-flow', disabled);
    Array.prototype.forEach.call(form.querySelectorAll('input, textarea, select, button'), function(el) {
      if (el.type === 'hidden') return;
      el.disabled = disabled;
    });
  }

  function loadCashbookFilterOptions_() {
    if (!document.getElementById('d-user-filter') && !document.getElementById('d-shift-filter') && !document.getElementById('d-cashsheet-shift')) return;
    callApi('apiGetCashbookFilterOptions', [SESSION.cashboxId], function(result) {
      renderCashbookUserFilter_(result && result.users || []);
      renderCashbookShiftFilter_(result && result.shifts || []);
    }, { quiet: true });
  }

  function renderCashbookUserFilter_(users) {
    var select = document.getElementById('d-user-filter');
    if (!select) return;
    var currentEmail = uiState.currentUser && uiState.currentUser.email || '';
    var options = [
      '<option value="">Svi korisnici</option>',
      currentEmail ? '<option value="' + escapeHtml(currentEmail) + '">Trenutni korisnik</option>' : ''
    ];
    (users || []).forEach(function(user) {
      var label = (user.full_name || shortUserLabel_(user.email)) + ' - ' + user.email + (user.role ? ' - ' + user.role : '');
      options.push('<option value="' + escapeHtml(user.email) + '">' + escapeHtml(label) + '</option>');
    });
    select.innerHTML = options.join('');
  }

  function renderCashbookShiftFilter_(shifts) {
    var activeShift = uiState.activeShift || {};
    var options = [
      '<option value="">Sve smene</option>',
      activeShift.shift_id ? '<option value="' + escapeHtml(activeShift.shift_id) + '">Aktivna smena - ' + escapeHtml(shortUserLabel_(activeShift.opened_by || '')) + ' - ' + escapeHtml(formatDateTimeShort_(activeShift.opened_at)) + '</option>' : ''
    ];
    (shifts || []).forEach(function(shift) {
      var label = shortUserLabel_(shift.opened_by || '') + ' - ' + formatDateTimeShort_(shift.opened_at) + ' - ' + (STATUS_LABEL_MAP[shift.status] || shift.status || '');
      options.push('<option value="' + escapeHtml(shift.shift_id) + '">' + escapeHtml(label) + '</option>');
    });
    ['d-shift-filter','d-cashsheet-shift'].forEach(function(id) {
      var select = document.getElementById(id);
      if (select) select.innerHTML = options.join('');
    });
  }

  function applyDirectCashPermission_() {
    var canPost = canPostDirectCashEvents_();
    ['d-quick-form-card','m-direct-actions'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (canPost) {
        el.removeAttribute('hidden');
        el.style.display = '';
      } else {
        el.setAttribute('hidden', 'hidden');
        el.style.display = 'none';
      }
    });
    var permissionCard = document.getElementById('d-direct-permission-card');
    var permissionText = document.getElementById('d-direct-permission-text');
    if (permissionCard) {
      if (canPost) {
        permissionCard.setAttribute('hidden', 'hidden');
      } else {
        permissionCard.removeAttribute('hidden');
      }
    }
    if (permissionText) {
      permissionText.textContent = uiState.activeShift && uiState.activeShift.shift_id
        ? 'Smenu je otvorio ' + shortUserLabel_(uiState.activeShift.opened_by || '') + '.'
        : 'Nema otvorene smene. Otvorite smenu da biste mogli da knjižite direktne uplate, isplate i predaju u trezor.';
    }
    if (!canPost) {
      showMessage(permissionText ? permissionText.textContent : 'Direktne uplate i predaju u trezor je moguće knjižiti tek kada je smena otvorena.', 'info');
    }
    updateDesktopDirectActionsVisibility_();
    updateMobileDirectActionsVisibility_();
    loadPendingPaymentOrderOutflows_(true);
  }

  function updateDesktopDirectActionsVisibility_() {
    var canPost = canPostDirectCashEvents_();
    ['d-btn-uplata','d-btn-isplata','d-btn-trezor'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.setAttribute('hidden', 'hidden');
      el.style.display = 'none';
    });
    var lockMessage = document.getElementById('d-quick-lock-message');
    var openShift = document.getElementById('d-open-shift-from-book');
    var hasShift = Boolean(uiState.activeShift && uiState.activeShift.shift_id);
    if (lockMessage) {
      if (hasShift) lockMessage.setAttribute('hidden', 'hidden');
      else lockMessage.removeAttribute('hidden');
    }
    if (openShift) {
      openShift.hidden = hasShift;
      openShift.disabled = hasShift;
      openShift.setAttribute('aria-hidden', hasShift ? 'true' : 'false');
      openShift.style.display = hasShift ? 'none' : '';
    }
    ['d-side-btn-uplata','d-side-btn-isplata','d-side-btn-trezor'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.disabled = !canPost;
      btn.classList.toggle('quick-action-button--locked', !canPost);
      btn.title = canPost ? '' : 'Dostupno kada je smena otvorena na ovoj blagajni.';
    });
  }

  function updateMobileDirectActionsVisibility_() {
    var actions = document.getElementById('m-direct-actions');
    if (!actions) return;
    var activeTabIsBook = Boolean(document.querySelector('#m-section-knjiga.active'));
    var canPost = canPostDirectCashEvents_();
    if (activeTabIsBook && canPost) {
      actions.removeAttribute('hidden');
      actions.style.display = '';
    } else {
      actions.setAttribute('hidden', 'hidden');
      actions.style.display = 'none';
    }
  }

  function canPostDirectCashEvents_() {
    if (!(uiState.activeShift && uiState.activeShift.shift_id)) {
      return false;
    }
    return uiState.canPostDirectCashEvents === true || isCurrentActiveShiftOwner_();
  }

  function updateCountWorkflowVisibility_() {
    var hasShift = Boolean(uiState.activeShift && uiState.activeShift.shift_id);
    ['d-cash-count-form','m-cash-count-form'].forEach(function(id) {
      var form = document.getElementById(id);
      if (!form) return;
      if (id === 'd-cash-count-form') {
        form.setAttribute('hidden', 'hidden');
        form.style.display = 'none';
        setWorkflowFormDisabled_(form, !hasShift);
        return;
      }
      if (hasShift) {
        form.removeAttribute('hidden');
        form.style.display = '';
        setWorkflowFormDisabled_(form, false);
      } else {
        form.setAttribute('hidden', 'hidden');
        form.style.display = 'none';
        setWorkflowFormDisabled_(form, true);
      }
    });
    ['d-count-lock','m-count-lock'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (hasShift) el.setAttribute('hidden', 'hidden');
      else el.removeAttribute('hidden');
    });
    var newBtn = document.getElementById('d-count-new-btn');
    if (newBtn) newBtn.disabled = !hasShift;
    var shiftOpenBtn = document.getElementById('d-shift-action-open');
    if (shiftOpenBtn) {
      shiftOpenBtn.hidden = hasShift;
      shiftOpenBtn.disabled = hasShift;
      shiftOpenBtn.setAttribute('aria-hidden', hasShift ? 'true' : 'false');
      shiftOpenBtn.style.display = hasShift ? 'none' : '';
    }
  }

  function enforceShiftStartup_(isDesktop, isMobile) {
    if (uiState.activeShift && uiState.activeShift.shift_id) return;
    showMessage('Prvo otvorite smenu. Direktne uplate, isplate i trezor nisu dostupni dok smena nije otvorena.', 'info');
    if (isMobile) {
      document.querySelectorAll('.m-section').forEach(function(section) {
        section.classList.toggle('active', section.id === 'm-section-smena');
      });
      document.querySelectorAll('[data-m-nav]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-m-nav') === 'm-section-smena');
      });
      updateMobileDirectActionsVisibility_();
    }
    if (isDesktop) {
      document.querySelectorAll('.d-section').forEach(function(section) {
        section.classList.toggle('active', section.id === 'd-section-smena');
      });
      document.querySelectorAll('[data-d-nav]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-d-nav') === 'smena');
      });
      updateDesktopDirectActionsVisibility_();
    }
  }

  function refreshActiveShiftState_(options) {
    options = options || {};
    if (!SESSION.cashboxId) return;
    callApi('apiGetActiveShiftState', [SESSION.cashboxId], function(result) {
      var previousId = uiState.activeShift && uiState.activeShift.shift_id || '';
      var nextShift = result && result.activeShift || null;
      var nextId = nextShift && nextShift.shift_id || '';
      uiState.activeShift = nextShift;
      uiState.canPostDirectCashEvents = result && result.canPostDirectCashEvents === true;
      applyActiveShiftFields_();
      applyDirectCashPermission_();
      updateCountWorkflowVisibility_();
      if (previousId !== nextId) {
        loadCashbookFilterOptions_();
        if (options.refreshKnjiga !== false) loadKnjiga_(true);
      }
      if (options.enforce && !nextId) {
        enforceShiftStartup_(Boolean(document.querySelector('.d-shell')), Boolean(document.querySelector('.m-shell')));
      }
    }, { quiet: true });
  }

  function bindBalanceOverviewButtons_() {
    ['d-all-balances-btn','m-all-balances-btn'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn || btn.dataset.bound === '1') return;
      btn.dataset.bound = '1';
      btn.addEventListener('click', showAllCurrencyBalances_);
    });
  }

  function bindShiftWorkActions_() {
    [
      ['d-shift-action-open', function() { openShiftOpeningDialog_('desktop'); }],
      ['d-shift-action-in', function() { openDesktopDirectAction_('d-btn-uplata'); }],
      ['d-shift-action-out', function() { openDesktopDirectAction_('d-btn-isplata'); }],
      ['d-shift-action-treasury', function() { openDesktopDirectAction_('d-btn-trezor'); }],
      ['d-shift-action-count', function() { openDesktopSection_('presek'); }],
      ['d-shift-action-sheet', function() {
        var shift = uiState.activeShift || {};
        openCashSheetForShift_(shift);
      }],
      ['d-shift-action-close', function() { openShiftClosingDialog_('desktop'); }],
      ['m-shift-action-open', function() { openShiftOpeningDialog_('mobile'); }],
      ['m-shift-action-in', function() { openMobileDirectAction_('m-btn-uplata'); }],
      ['m-shift-action-out', function() { openMobileDirectAction_('m-btn-isplata'); }],
      ['m-shift-action-treasury', function() { openMobileDirectAction_('m-btn-trezor'); }],
      ['m-shift-action-count', function() { openMobileSection_('m-section-presek'); }],
      ['m-shift-action-close', function() { openShiftClosingDialog_('mobile'); }]
    ].forEach(function(item) {
      var btn = document.getElementById(item[0]);
      if (!btn || btn.dataset.bound === '1') return;
      btn.dataset.bound = '1';
      btn.addEventListener('click', item[1]);
    });
  }

  function showAllCurrencyBalances_() {
    callApi('apiGetCashboxBalanceReport', [{ cashbox_id: SESSION.cashboxId }], function(rows) {
      var filtered = (rows || []).filter(function(row) {
        return row.cashbox_id === SESSION.cashboxId;
      });
      var html = filtered.length ? filtered.map(function(row) {
        return '<div class="detail-row" style="border-bottom:1px solid var(--color-border-light);padding:10px 0">' +
          '<span class="detail-key">' + escapeHtml(row.currency) + '</span>' +
          '<strong>' + formatAmount_(row.balance) + '</strong></div>';
      }).join('') : '<p>Nema podataka za blagajnu.</p>';
      appHtmlDialog_({
        title: 'Stanje po valutama',
        html: html,
        confirmText: 'Zatvori'
      });
    }, { quiet: true });
  }

      'home-group-approval': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','APPROVER'],

  function loadCashCounts_() {
    var filters = {
      cashbox_id: SESSION.cashboxId || getDefaultCashboxId()
    };
    callApi('apiGetCashCountsReport', [filters], function(rows) {
      CASH_COUNT_UI.rawRows = rows || [];
      renderCashCounts_(rows || []);
    }, { quiet: true });

  function cashCountBatchKey_(row) {
    return [
      row.posted_at || row.created_at || '',
      row.posted_by || row.created_by || '',
      row.count_type || '',
      row.shift_id || '',
      row.note || ''
    ].join('|');
  }

  function groupCashCounts_(rows) {
    var grouped = {};
    (rows || []).forEach(function(row) {
      var key = cashCountBatchKey_(row);
      if (!grouped[key]) {
        grouped[key] = {
          key: key,
          posted_at: row.posted_at || row.created_at,
          user: row.posted_by || row.created_by,
          count_type: row.count_type,
          shift_id: row.shift_id,
          note: row.note,
          status: row.status,
          rows: []
        };
      }
      grouped[key].rows.push(row);
    });
    return Object.keys(grouped).map(function(key) {
      var group = grouped[key];
      group.currencies = group.rows.map(function(row) { return row.currency; }).filter(Boolean).join(', ');
      group.calculated_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.calculated_balance_before || 0);
        return result;
      }, {});
      group.counted_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.counted_total || row.counted_cash_total || 0);
        return result;
      }, {});
      group.difference_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.difference || 0);
        return result;
      }, {});
      group.calculated_total = group.rows.reduce(function(total, row) { return total + Number(row.calculated_balance_before || 0); }, 0);
      group.counted_total = group.rows.reduce(function(total, row) { return total + Number(row.counted_total || row.counted_cash_total || 0); }, 0);
      group.difference_total = group.rows.reduce(function(total, row) { return total + Number(row.difference || 0); }, 0);
      group.has_difference = group.rows.some(function(row) { return Math.abs(Number(row.difference || 0)) > 0.000001; });
      return group;
    }).sort(function(a, b) {
      return new Date(b.posted_at || 0).getTime() - new Date(a.posted_at || 0).getTime();
    });
  }

  function cashCountTypeLabel_(type) {
    if (type === 'SHIFT_OPENING') return 'Otvaranje smene';
    if (type === 'SHIFT_CLOSING') return 'Zatvaranje smene';
    if (type === 'CASHBOX_COUNT') return 'Kontrolni presek';
    return type || 'Presek';
  }

  function renderCashCounts_(rows) {
    var groups = groupCashCounts_(rows);
    CASH_COUNT_UI.groups = groups;
    renderCashCountCurrencyFilter_(groups);
    renderCashCountsDesktop_();
    renderCashCountsMobile_(groups);
  }

  function renderCashCountsMobile_(groups) {
    var list = document.getElementById('m-counts-list');
    if (list) {
      list.innerHTML = groups.length ? groups.map(function(group, index) {
        return '<div class="m-entry count" data-count-index="' + index + '">' +
          '<div class="m-entry-dot" style="background:#d99a00"></div>' +
          '<div class="m-entry-info"><div class="m-entry-desc">' + escapeHtml(cashCountTypeLabel_(group.count_type)) + ' · ' + escapeHtml(group.currencies || '') + ' · ' + escapeHtml(formatDateTimeShort_(group.posted_at)) + '</div>' +
          '<div class="m-entry-meta">Popisano ' + cashCountCurrencySummary_(group.counted_by_currency) + '</div>' +
          '<div class="m-entry-meta">Razlika ' + cashCountDifferenceSummary_(group.difference_by_currency) + '</div></div>' +
        '</div>';
      }).join('') : '<div class="empty-state">Nema preseka za prikaz.</div>';
      list.querySelectorAll('[data-count-index]').forEach(function(row) {
        row.addEventListener('click', function() {
          renderCashCountDetail_(groups[Number(row.getAttribute('data-count-index'))], 'm-count-detail-body');
        });
      });
    }
    if (groups.length && !document.getElementById('d-count-detail-body')) {
      renderCashCountDetail_(groups[0], 'm-count-detail-body');
    }
  }

  function renderCashCountCurrencyFilter_(groups) {
    var select = document.getElementById('d-count-currency-filter');
    if (!select || select.dataset.boundCurrencies === '1') return;
    var seen = {};
    (uiState.config && uiState.config.currencies || []).forEach(function(code) { if (code) seen[code] = true; });
    (groups || []).forEach(function(group) {
      group.rows.forEach(function(row) { if (row.currency) seen[row.currency] = true; });
    });
    select.innerHTML = '<option value="">Sve valute</option>' + Object.keys(seen).sort().map(function(code) {
      return '<option value="' + escapeHtml(code) + '">' + escapeHtml(code) + '</option>';
    }).join('');
    select.dataset.boundCurrencies = '1';
  }

  function renderCashCountsDesktop_() {
    var tbody = document.getElementById('d-counts-tbody');
    if (!tbody) return;
    var filtered = applyCashCountFilters_(CASH_COUNT_UI.groups);
    CASH_COUNT_UI.filtered = filtered;
    var maxPage = Math.max(1, Math.ceil(filtered.length / CASH_COUNT_UI.pageSize));
    CASH_COUNT_UI.page = Math.max(1, Math.min(CASH_COUNT_UI.page, maxPage));
    renderCashCountKpis_(filtered);
    var start = (CASH_COUNT_UI.page - 1) * CASH_COUNT_UI.pageSize;
    var pageRows = filtered.slice(start, start + CASH_COUNT_UI.pageSize);
    tbody.innerHTML = pageRows.length ? pageRows.map(function(group, pageIndex) {
      var absoluteIndex = start + pageIndex;
      var diffClass = group.difference_total > 0 ? 'cell-in' : (group.difference_total < 0 ? 'cell-out' : 'cell-neutral');
      var selected = group.key === CASH_COUNT_UI.selectedKey ? ' is-selected' : '';
      return '<tr class="presek-row' + selected + '" data-count-index="' + absoluteIndex + '">' +
        '<td>' + escapeHtml(formatTimeOnly_(group.posted_at)) + '</td>' +
        '<td>' + escapeHtml(cashCountTypeLabel_(group.count_type)) + '</td>' +
        '<td>' + escapeHtml(shortUserLabel_(group.user || '—')) + '</td>' +
        '<td>' + renderCurrencyChips_(group.rows.map(function(row) { return row.currency; })) + '</td>' +
        '<td class="num">' + cashCountMainAmount_(group.calculated_by_currency) + '</td>' +
        '<td class="num">' + cashCountMainAmount_(group.counted_by_currency) + '</td>' +
        '<td class="num ' + diffClass + '">' + cashCountMainAmount_(group.difference_by_currency) + '</td>' +
        '<td>' + renderCompactStatusBadge_(group.status) + '</td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="8"><div class="empty-state">Nema preseka za izabrane filtere.</div></td></tr>';
    tbody.querySelectorAll('[data-count-index]').forEach(function(row) {
      row.addEventListener('click', function() {
        selectCashCountGroup_(Number(row.getAttribute('data-count-index')));
      });
    });
    updateCashCountPagination_(filtered.length, start, pageRows.length, maxPage);
    if (filtered.length) {
      var selected = filtered.filter(function(group) { return group.key === CASH_COUNT_UI.selectedKey; })[0];
      if (!selected) {
        selected = filtered[Math.min(CASH_COUNT_UI.selectedIndex, filtered.length - 1)] || filtered[0];
        CASH_COUNT_UI.selectedKey = selected.key;
      }
      renderCashCountDetail_(selected, 'd-count-detail-body');
    } else {
      CASH_COUNT_UI.selectedKey = '';
      renderCashCountDetail_(null, 'd-count-detail-body');
    }
  }

  function applyCashCountFilters_(groups) {
    var period = (document.getElementById('d-count-period-filter') || {}).value || 'today';
    var search = ((document.getElementById('d-count-search') || {}).value || '').toLowerCase().trim();
    var type = (document.getElementById('d-count-type-filter') || {}).value || '';
    var status = (document.getElementById('d-count-status-filter') || {}).value || '';
    var currency = (document.getElementById('d-count-currency-filter') || {}).value || '';
    setText_('d-count-kpi-period', cashCountPeriodLabel_(period));
    return (groups || []).filter(function(group) {
      if (!isCashCountInPeriod_(group, period)) return false;
      if (type && group.count_type !== type) return false;
      if (currency && !group.rows.some(function(row) { return row.currency === currency; })) return false;
      if (status === 'DIFFERENCE' && group.has_difference !== true) return false;
      if (status === 'DRAFT' && group.status === 'POSTED') return false;
      if (status && status !== 'DRAFT' && status !== 'DIFFERENCE' && group.status !== status) return false;
      if (search) {
        var haystack = [group.user, group.currencies, cashCountTypeLabel_(group.count_type), group.shift_id, group.note].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function cashCountPeriodLabel_(period) {
    if (period === 'yesterday') return 'juče';
    if (period === 'week') return 'ova nedelja';
    if (period === 'month') return 'ovaj mesec';
    if (period === 'all') return 'ukupno';
    return 'danas';
  }

  function isCashCountInPeriod_(group, period) {
    if (!period || period === 'all') return true;
    var d = new Date(group.posted_at || 0);
    if (isNaN(d.getTime())) return false;
    var now = new Date();
    var start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var end = new Date(start.getTime() + 86400000);
    if (period === 'yesterday') {
      end = start;
      start = new Date(start.getTime() - 86400000);
    } else if (period === 'week') {
      var day = (start.getDay() + 6) % 7;
      start = new Date(start.getTime() - day * 86400000);
      end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    } else if (period === 'month') {
      start = new Date(now.getFullYear(), now.getMonth(), 1);
      end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    }
    return d >= start && d < end;
  }

  function selectCashCountGroup_(index) {
    var group = CASH_COUNT_UI.filtered[index];
    if (!group) return;
    CASH_COUNT_UI.selectedIndex = index;
    CASH_COUNT_UI.selectedKey = group.key;
    renderCashCountsDesktop_();
  }

  function updateCashCountPagination_(total, start, length, maxPage) {
    setText_('d-count-page-info', total ? ('Prikazano ' + (start + 1) + '–' + (start + length) + ' od ' + total) : 'Prikazano 0 od 0');
    setText_('d-count-page-current', String(CASH_COUNT_UI.page));
    var prev = document.getElementById('d-count-page-prev');
    var next = document.getElementById('d-count-page-next');
    if (prev) prev.disabled = CASH_COUNT_UI.page <= 1;
    if (next) next.disabled = CASH_COUNT_UI.page >= maxPage;
  }

  function renderCashCountKpis_(groups) {
    var total = groups.length;
    var posted = groups.filter(function(group) { return group.status === 'POSTED'; }).length;
    var pending = total - posted;
    setText_('d-count-kpi-total', String(total));
    renderKpiMoney_('d-count-kpi-expected-main', 'd-count-kpi-expected-sub', sumCashCountMap_(groups, 'calculated_by_currency'));
    renderKpiMoney_('d-count-kpi-counted-main', 'd-count-kpi-counted-sub', sumCashCountMap_(groups, 'counted_by_currency'));
    renderKpiMoney_('d-count-kpi-diff-main', 'd-count-kpi-diff-sub', sumCashCountMap_(groups, 'difference_by_currency'), true);
    setText_('d-count-kpi-posted', String(posted));
    setText_('d-count-kpi-posted-pct', total ? Math.round(posted * 100 / total) + '%' : '0%');
    setText_('d-count-kpi-pending', String(pending));
    setText_('d-count-kpi-pending-pct', total ? Math.round(pending * 100 / total) + '%' : '0%');
  }

  function sumCashCountMap_(groups, field) {
    return (groups || []).reduce(function(result, group) {
      Object.keys(group[field] || {}).forEach(function(code) {
        result[code] = Number(result[code] || 0) + Number(group[field][code] || 0);
      });
      return result;
    }, {});
  }

  function setText_(id, value) {
    var el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function renderKpiMoney_(mainId, subId, values, diffOnly) {
    var codes = Object.keys(values || {}).filter(function(code) {
      return !diffOnly || Math.abs(Number(values[code] || 0)) > 0.000001;
    }).sort(function(a, b) {
      if (a === SESSION.currency) return -1;
      if (b === SESSION.currency) return 1;
      return a.localeCompare(b);
    });
    var main = document.getElementById(mainId);
    var sub = document.getElementById(subId);
    if (!codes.length) {
      if (main) {
        main.textContent = diffOnly ? 'Bez razlike' : '0,00';
        main.classList.remove('presek-danger', 'presek-success');
      }
      if (sub) sub.textContent = '—';
      return;
    }
    var first = codes[0];
    var value = Number(values[first] || 0);
    if (main) {
      main.textContent = first + ' ' + formatAmount_(value);
      main.classList.toggle('presek-danger', diffOnly && value < 0);
      main.classList.toggle('presek-success', diffOnly && value > 0);
    }
    if (sub) {
      sub.innerHTML = codes.slice(1).map(function(code) {
        var subValue = Number(values[code] || 0);
        var cls = diffOnly ? (subValue < 0 ? 'cell-out' : 'cell-in') : '';
        return '<span class="' + cls + '">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(subValue)) + '</span>';
      }).join(' · ') || '—';
    }
  }

  function renderCurrencyChips_(currencies) {
    var seen = {};
    return (currencies || []).filter(function(code) {
      if (!code || seen[code]) return false;
      seen[code] = true;
      return true;
    }).map(function(code) {
      return '<span class="presek-currency-chip">' + escapeHtml(code) + '</span>';
    }).join(' ');
  }

  function cashCountMainAmount_(values) {
    var codes = Object.keys(values || {}).sort(function(a, b) {
      if (a === SESSION.currency) return -1;
      if (b === SESSION.currency) return 1;
      return a.localeCompare(b);
    });
    if (!codes.length) return '—';
    var first = codes[0];
    return escapeHtml(formatAmount_(values[first])) + (codes.length > 1 ? ' +' + (codes.length - 1) : '');
  }

  function renderCompactStatusBadge_(status) {
    var label = status === 'POSTED' ? 'Proknjižen' : (STATUS_LABEL_MAP[status] || status || 'U obradi');
    return '<span class="presek-status-badge">' + escapeHtml(label) + '</span>';
  }

  function formatTimeOnly_(value) {
    if (!value) return '—';
    var d = new Date(value);
    if (isNaN(d.getTime())) return formatDateTimeShort_(value);
    return d.toLocaleTimeString('sr-RS', { hour: '2-digit', minute: '2-digit' });
  }

  function cashCountCurrencySummary_(values) {
    var currencies = Object.keys(values || {});
    if (!currencies.length) return '—';
    return currencies.map(function(code) {
      return '<span class="amount-line">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(values[code])) + '</span>';
    }).join(' ');
  }

  function cashCountDifferenceSummary_(values) {
    var currencies = Object.keys(values || {});
    if (!currencies.length) return '—';
    return currencies.map(function(code) {
      var value = Number(values[code] || 0);
      var cls = value >= 0 ? 'cell-in' : 'cell-out';
      return '<span class="amount-line ' + cls + '">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(value)) + '</span>';
    }).join(' ');
  }

  function renderCashCountDetail_(countGroup, targetId) {
    var target = document.getElementById(targetId);
    if (!target) return;
    var statusTarget = document.getElementById('d-count-detail-status');
    if (!countGroup) {
      target.classList.add('empty-state');
      target.classList.remove('count-detail-body');
      target.innerHTML = 'Izaberite presek iz tabele.';
      if (statusTarget) statusTarget.innerHTML = '';
      return;
    }
    target.classList.remove('empty-state');
    target.classList.add('count-detail-body');
    var group = countGroup.rows ? countGroup : { rows: [countGroup] };
    if (statusTarget) statusTarget.innerHTML = renderCompactStatusBadge_(group.status);
    var diffClass = group.difference_total > 0 ? 'cell-in' : (group.difference_total < 0 ? 'cell-out' : 'cell-neutral');
    var tab = CASH_COUNT_UI.detailTab || 'apoeni';
    target.innerHTML =
      '<div class="presek-detail-kpis">' +
        presekInfoBlock_('Vreme', formatDateTimeShort_(group.posted_at), 'ti ti-clock') +
        presekInfoBlock_('Vrsta', cashCountTypeLabel_(group.count_type), 'ti ti-calendar-stats') +
        presekInfoBlock_('Korisnik', shortUserLabel_(group.user || ''), 'ti ti-user') +
        presekInfoBlock_('Valuta', group.currencies || '—', 'ti ti-currency-euro') +
        presekInfoBlock_('Razlika', cashCountCurrencySummaryText_(group.difference_by_currency), 'ti ti-arrows-diff', diffClass) +
      '</div>' +
      '<div class="presek-tabs">' +
        renderPresekTabButton_('pregled', 'Pregled', tab) +
        renderPresekTabButton_('valute', 'Valute', tab) +
        renderPresekTabButton_('apoeni', 'Apoeni', tab) +
        renderPresekTabButton_('zapisnik', 'Zapisnik', tab) +
      '</div>' +
      '<div class="presek-tab-panel">' + renderPresekTabPanel_(group, tab) + '</div>';
    target.querySelectorAll('[data-count-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        CASH_COUNT_UI.detailTab = btn.getAttribute('data-count-tab') || 'apoeni';
        renderCashCountDetail_(group, targetId);
      });
    });
  }

  function presekInfoBlock_(label, value, icon, extraClass) {
    return '<div class="presek-info-block ' + escapeHtml(extraClass || '') + '">' +
      '<i class="' + escapeHtml(icon || 'ti ti-info-circle') + '" aria-hidden="true"></i>' +
      '<div><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>' +
    '</div>';
  }

  function renderPresekTabButton_(id, label, active) {
    return '<button type="button" class="presek-tab ' + (id === active ? 'active' : '') + '" data-count-tab="' + escapeHtml(id) + '">' + escapeHtml(label) + '</button>';
  }

  function renderPresekTabPanel_(group, tab) {
    if (tab === 'pregled') return renderPresekPregledTab_(group);
    if (tab === 'valute') return renderPresekValuteTab_(group);
    if (tab === 'zapisnik') return renderPresekZapisnikTab_(group);
    return renderPresekApoeniTab_(group);
  }

  function renderPresekPregledTab_(group) {
    return '<div class="presek-overview-grid">' +
      presekSummaryCard_('Očekivano', cashCountCurrencySummaryText_(group.calculated_by_currency)) +
      presekSummaryCard_('Popisano', cashCountCurrencySummaryText_(group.counted_by_currency)) +
      presekSummaryCard_('Razlika', cashCountCurrencySummaryText_(group.difference_by_currency), group.difference_total >= 0 ? 'cell-in' : 'cell-out') +
      presekSummaryCard_('Napomena', group.note || '—') +
    '</div>';
  }

  function presekSummaryCard_(label, value, cls) {
    return '<div class="presek-summary-card ' + escapeHtml(cls || '') + '"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>';
  }

  function renderPresekValuteTab_(group) {
    var rows = group.rows.map(function(count) {
      var diff = Number(count.difference || 0);
      return '<tr><td>' + escapeHtml(count.currency || '') + '</td>' +
        '<td class="num">' + formatAmount_(count.calculated_balance_before) + '</td>' +
        '<td class="num">' + formatAmount_(count.counted_total || count.counted_cash_total) + '</td>' +
        '<td class="num ' + (diff >= 0 ? 'cell-in' : 'cell-out') + '">' + formatAmount_(diff) + '</td></tr>';
    }).join('');
    return '<table class="presek-detail-table"><thead><tr><th>Valuta</th><th class="num">Očekivano</th><th class="num">Popisano</th><th class="num">Razlika</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function renderPresekApoeniTab_(group) {
    // Note: we only ever know the ACTUAL counted amount per denomination (what the
    // user physically entered). There is no per-apoen "expected" breakdown anywhere
    // in the data model - the calculated/expected balance is a single total per
    // currency, not split by denomination. Previously this table faked an
    // "Očekivano"/"Razlika" value per row by just repeating the counted amount and
    // hardcoding the difference to 0,00, which made it look like every denomination
    // matched exactly even when the real total didn't. Real Očekivano/Popisano/Razlika
    // (from the actual cash count record) are shown per currency below the table instead.
    var totalPieces = 0;
    var totalExpected = 0;
    var totalCounted = 0;
    var totalDiff = 0;
    var blocks = group.rows.map(function(count) {
      var currency = count.currency || '';
      var denoms = count.denominations || [];
      var expected = Number(count.calculated_balance_before || 0);
      var counted = Number(count.counted_total || count.counted_cash_total || 0);
      var diff = Number(count.difference || 0);
      totalExpected += expected;
      totalCounted += counted;
      totalDiff += diff;
      var body = denoms.length ? denoms.map(function(row) {
        var pieces = Number(row.quantity || 0);
        var amount = Number(row.denomination || 0) * pieces;
        totalPieces += pieces;
        return '<tr><td>' + formatAmount_(row.denomination) + '</td><td class="num">' + escapeHtml(pieces) + '</td><td class="num">' + formatAmount_(amount) + '</td></tr>';
      }).join('') : '<tr><td colspan="3">Nema unetih apoena za ovu valutu.</td></tr>';
      return '<section class="presek-currency-block">' +
        '<h3>' + escapeHtml(currency) + '</h3>' +
        '<table class="presek-detail-table"><thead><tr><th>Apoen</th><th class="num">Komada</th><th class="num">Iznos</th></tr></thead><tbody>' + body +
        '<tr class="presek-total-row"><td>UKUPNO POPISANO ' + escapeHtml(currency) + '</td><td class="num">—</td><td class="num">' + formatAmount_(counted) + '</td></tr>' +
        '</tbody></table>' +
        '<div class="presek-currency-summary">' +
          '<span>Očekivano (stanje pre popisa): <strong>' + formatAmount_(expected) + '</strong></span>' +
          '<span>Razlika: <strong class="' + (diff >= 0 ? 'cell-in' : 'cell-out') + '">' + formatAmount_(diff) + '</strong></span>' +
        '</div>' +
      '</section>';
    }).join('');
    return blocks + '<div class="presek-all-total"><strong>UKUPNO SVE VALUTE</strong><span>Komada: ' + totalPieces + '</span><span>Očekivano: ' + formatAmount_(totalExpected) + '</span><span>Popisano: ' + formatAmount_(totalCounted) + '</span><span class="' + (totalDiff >= 0 ? 'cell-in' : 'cell-out') + '">Razlika: ' + formatAmount_(totalDiff) + '</span></div>';
  }

  function renderPresekZapisnikTab_(group) {
    return '<div class="presek-zapisnik">' +
      '<p><strong>Vrsta:</strong> ' + escapeHtml(cashCountTypeLabel_(group.count_type)) + '</p>' +
      '<p><strong>Vreme:</strong> ' + escapeHtml(formatDateTimeShort_(group.posted_at)) + '</p>' +
      '<p><strong>Korisnik:</strong> ' + escapeHtml(shortUserLabel_(group.user || '')) + '</p>' +
      '<p><strong>Smena:</strong> ' + escapeHtml(group.shift_id || '—') + '</p>' +
      '<p><strong>Napomena:</strong> ' + escapeHtml(group.note || '—') + '</p>' +
    '</div>';
  }

  function cashCountCurrencySummaryText_(values) {
    var currencies = Object.keys(values || {});
    if (!currencies.length) return '—';
    return currencies.map(function(code) {
      return code + ' ' + formatAmount_(values[code]);
    }).join(' · ');
  }

  function renderCashCountSaveSummary_(targetId, results, title) {
    var rows = Array.isArray(results) ? results : [results || {}];
    var currencies = rows.map(function(item) { return item.currency; }).filter(Boolean).join(', ');
    var counted = rows.map(function(item) {
      return amountWithCurrency(item.counted_cash_total, item.currency);
    }).join(' · ');
    var calculated = rows.map(function(item) {
      return amountWithCurrency(item.calculated_balance_before, item.currency);
    }).join(' · ');
    var difference = rows.map(function(item) {
      return amountWithCurrency(item.difference, item.currency);
    }).join(' · ');
    var type = rows[0] && rows[0].count_type ? cashCountTypeLabel_(rows[0].count_type) : 'Presek stanja';
    renderSummaryCard(targetId, title || 'Presek blagajne je sačuvan', [
      ['Vrsta', type],
      ['Valute', currencies || '—'],
      ['Popisano', counted || '0,00'],
      ['Obračunato pre popisa', calculated || '0,00'],
      ['Razlika', difference || '0,00']
    ]);
  }

  function openCashSheetForEvent_(ev) {
    var dateEl = document.getElementById('d-cashsheet-date');
    var shiftEl = document.getElementById('d-cashsheet-shift');
    if (dateEl) {
      var eventDate = ev && (ev.event_date || ev.created_at);
      dateEl.value = eventDate ? String(eventDate).slice(0, 10) : (uiState.config && uiState.config.today) || '';
    }
    if (shiftEl) shiftEl.value = '';
    openDesktopSection_('blagajnicki-list');
    loadCashSheet_();
  }

  function loadCashSheet_() {
    var dateEl = document.getElementById('d-cashsheet-date');
    var shiftEl = document.getElementById('d-cashsheet-shift');
    var filters = withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency: SESSION.currency,
      date: dateEl && dateEl.value || (uiState.config && uiState.config.today) || '',
      shift_id: shiftEl && shiftEl.value || ''
    });
    callApi('apiGetCashSheetReport', [filters], function(sheet) {
      renderCashSheet_(sheet || {});
    }, { quiet: true });
  }

  function renderCashSheet_(sheet) {
    var doc = document.getElementById('d-cashsheet-document');
    var side = document.getElementById('d-cashsheet-side');
    var eventsTarget = document.getElementById('d-cashsheet-events');
    if (!doc || !side || !eventsTarget) return;
    var shift = sheet.shift || {};
    doc.innerHTML = '<div class="cashsheet-header">' +
      '<div><strong>BLAGAJNIČKI LIST</strong><span>' + escapeHtml(sheet.document_no || '') + '</span></div>' +
      '<div><span>Datum</span><strong>' + escapeHtml(sheet.date || '') + '</strong></div>' +
      '<div><span>Valuta</span><strong>' + escapeHtml(sheet.currency || SESSION.currency || '') + '</strong></div>' +
      '<div><span>Smena</span><strong>' + escapeHtml(shift.shift_id || 'Sve smene dana') + '</strong></div>' +
      '<div><span>Blagajnik</span><strong>' + escapeHtml(shortUserLabel_(shift.opened_by || '—')) + '</strong></div>' +
      '<div><span>Status</span><strong>' + escapeHtml(sheet.status || '') + '</strong></div>' +
    '</div>' +
    buildCashSheetKpiHtml_(sheet);
    side.innerHTML =
      '<div class="detail-row"><span class="detail-key">Status</span><strong>' + escapeHtml(sheet.status || '') + '</strong></div>' +
      '<div class="detail-row"><span class="detail-key">Očekivano</span><strong>' + formatAmount_(sheet.expected_closing_balance || sheet.calculated_closing_balance) + ' ' + escapeHtml(sheet.currency || '') + '</strong></div>' +
      '<div class="detail-row"><span class="detail-key">Fizički</span><strong>' + (sheet.physical_total == null ? 'Nije unet' : formatAmount_(sheet.physical_total) + ' ' + escapeHtml(sheet.currency || '')) + '</strong></div>' +
      '<div class="detail-row"><span class="detail-key">Razlika</span><strong>' + (sheet.difference == null ? '—' : formatAmount_(sheet.difference)) + '</strong></div>' +
      '<button class="btn-primary btn-full" type="button" onclick="window.print()">Štampa / PDF (ceo list)</button>';
    var events = sheet.events || [];
    LAST_CASHSHEET_EVENTS = events;
    eventsTarget.innerHTML = events.length ? events.map(function(ev, idx) {
      var dir = ev.display_direction || ev.direction;
      var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var isIn = dir === 'IN';
      var isOut = dir === 'OUT';
      var isCount = ev.event_type === 'CASH_COUNT' || /presek|popis/i.test(String(ev.description || ''));
      var rowClass = isCount ? 'row-count' : isIn ? 'row-in' : isOut ? 'row-out' : '';
      var displayName = cashEventUserLabel_(ev);
      var displayReason = cashEventReasonLabel_(ev);
      var canPrintReceipt = Boolean(ev.event_id) && ev.event_type !== 'ANNOUNCEMENT';
      return '<tr class="' + rowClass + '">' +
        '<td>' + (ev.ref_no != null ? ev.ref_no : '—') + '</td>' +
        '<td>' + escapeHtml(formatTimeShort_(ev.event_date || ev.created_at)) + '</td>' +
        '<td>' + escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—')) + '</td>' +
        '<td><div class="desc-main">' + escapeHtml(displayName || '—') + '</div><div class="desc-reason">' + escapeHtml(displayReason || '') + '</div></td>' +
        '<td class="cell-in">' + (isIn ? formatAmount_(Math.abs(amount)) : '—') + '</td>' +
        '<td class="cell-out">' + (isOut ? formatAmount_(Math.abs(amount)) : '—') + '</td>' +
        '<td class="cell-bal">' + formatAmount_(ev.running_balance) + '</td>' +
        '<td>' + renderStatusBadge_(ev.status) + '</td>' +
        '<td>' + (canPrintReceipt ? '<button class="small cashsheet-row-print-btn" type="button" title="Odštampaj priznanicu" onclick="printReceiptForEventId_(\'' + escapeHtml(ev.event_id) + '\')"><i class="ti ti-printer" aria-hidden="true"></i></button>' : '') + '</td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="9"><div class="empty-state">Nema prometa za izabrani period.</div></td></tr>';
  }

  // FAZA 3s: isti vizuelni jezik kao KPI red na Knjizi (.cashbook-kpis/.cashbook-kpi-card,
  // vidi renderCashbookKpis_) umesto ravnih tekstualnih redova - korisnik je tražio da
  // Blagajnički list izgleda "kao onaj na Knjizi". Samo za EKRANSKI prikaz - print verzija
  // (buildCashSheetPrintHtml_ ispod, koristi se i za d-section-blagajnicki-list štampu i za
  // mobilni print overlay) i dalje koristi jednostavne .cashsheet-calc redove jer se bolje
  // štampaju na papiru (gradijenti/senke kartica se gube/loše renderuju pri štampi).
  function buildCashSheetKpiHtml_(sheet) {
    var currency = sheet.currency || SESSION.currency || '';
    var diff = sheet.difference == null ? null : Number(sheet.difference || 0);
    var diffIcon = diff == null ? 'kpi-cyan' : (diff === 0 ? 'kpi-green' : 'kpi-red');
    var expected = sheet.expected_closing_balance || sheet.calculated_closing_balance;
    return '<div class="cashbook-kpis cashsheet-kpis">' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-blue"><i class="ti ti-wallet" aria-hidden="true"></i></div>' +
        '<div><span>Početno stanje</span><strong>' + formatAmount_(sheet.opening_balance) + ' ' + escapeHtml(currency) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-green"><i class="ti ti-trending-up" aria-hidden="true"></i></div>' +
        '<div><span>Ukupne uplate</span><strong class="amount-positive">' + formatAmount_(sheet.total_in) + ' ' + escapeHtml(currency) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-red"><i class="ti ti-trending-down" aria-hidden="true"></i></div>' +
        '<div><span>Ukupne isplate</span><strong class="amount-negative">' + formatAmount_(sheet.total_out) + ' ' + escapeHtml(currency) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-gold"><i class="ti ti-building-bank" aria-hidden="true"></i></div>' +
        '<div><span>Predato u trezor</span><strong>' + formatAmount_(sheet.total_treasury) + ' ' + escapeHtml(currency) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-cyan"><i class="ti ti-calculator" aria-hidden="true"></i></div>' +
        '<div><span>Očekivano završno</span><strong>' + formatAmount_(expected) + ' ' + escapeHtml(currency) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon kpi-blue"><i class="ti ti-clipboard-check" aria-hidden="true"></i></div>' +
        '<div><span>Fizički popis</span><strong>' + (sheet.physical_total == null ? 'Nije unet' : formatAmount_(sheet.physical_total) + ' ' + escapeHtml(currency)) + '</strong></div></article>' +
      '<article class="cashbook-kpi-card"><div class="cashbook-kpi-icon ' + diffIcon + '"><i class="ti ti-scale" aria-hidden="true"></i></div>' +
        '<div><span>Razlika</span><strong>' + (diff == null ? '—' : formatAmount_(diff) + ' ' + escapeHtml(currency)) + '</strong></div></article>' +
    '</div>';
  }

  function cashsheetCalcRow_(label, value, currency, cls) {
    var display = typeof value === 'string' ? value : formatAmount_(value) + ' ' + escapeHtml(currency || '');
    return '<div class="cashsheet-calc-row"><span>' + escapeHtml(label) + '</span><strong class="' + (cls || '') + '">' + display + '</strong></div>';
  }

  /* ─── Universal "Blagajnički list" print (works from mobile AND desktop) ───
     Desktop's #d-detail-print button navigates to the d-section-blagajnicki-list
     screen and reuses window.print() there (see openCashSheetForEvent_ above). Mobile
     has no equivalent section to navigate to, and its old print button pointed at
     print-cash-event.html, one of the print-*.html pages that still contain
     un-evaluated GAS scriptlet syntax (<?= ... ?>) and have never worked post-migration
     (see FAZA 3n notes). Rather than build a second mobile-only screen, this builds the
     SAME "Blagajnički list" html content into a dedicated print-only overlay that's
     injected into <body> on demand - works identically regardless of which screen
     (mobile or desktop, any tab) the user is currently on. */

  function buildCashSheetPrintHtml_(sheet) {
    sheet = sheet || {};
    var shift = sheet.shift || {};
    var currency = sheet.currency || SESSION.currency || '';
    var events = sheet.events || [];
    var header = '<div class="cashsheet-header">' +
      '<div><strong>BLAGAJNIČKI LIST</strong><span>' + escapeHtml(sheet.document_no || '') + '</span></div>' +
      '<div><span>Datum</span><strong>' + escapeHtml(sheet.date || '') + '</strong></div>' +
      '<div><span>Valuta</span><strong>' + escapeHtml(currency) + '</strong></div>' +
      '<div><span>Smena</span><strong>' + escapeHtml(shift.shift_id || 'Sve smene dana') + '</strong></div>' +
      '<div><span>Blagajnik</span><strong>' + escapeHtml(shortUserLabel_(shift.opened_by || '—')) + '</strong></div>' +
      '<div><span>Status</span><strong>' + escapeHtml(sheet.status || '') + '</strong></div>' +
    '</div>';
    var calc = '<div class="cashsheet-calc">' +
      cashsheetCalcRow_('Početno stanje', sheet.opening_balance, currency) +
      cashsheetCalcRow_('+ Ukupne uplate', sheet.total_in, currency, 'cell-in') +
      cashsheetCalcRow_('- Ukupne isplate', sheet.total_out, currency, 'cell-out') +
      cashsheetCalcRow_('- Predato u trezor', sheet.total_treasury, currency, 'cell-out') +
      cashsheetCalcRow_('= Očekivano završno stanje', sheet.expected_closing_balance || sheet.calculated_closing_balance, currency, 'cell-bal') +
      cashsheetCalcRow_('Završni presek / fizički popis', sheet.physical_total == null ? 'Fizički popis nije unet' : sheet.physical_total, currency) +
      cashsheetCalcRow_('Razlika', sheet.difference == null ? '—' : sheet.difference, currency, Number(sheet.difference || 0) === 0 ? 'cell-in' : 'cell-out') +
    '</div>';
    var rows = events.length ? events.map(function(ev, idx) {
      var dir = ev.display_direction || ev.direction;
      var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var isIn = dir === 'IN';
      var isOut = dir === 'OUT';
      var displayName = cashEventUserLabel_(ev);
      var displayReason = cashEventReasonLabel_(ev);
      return '<tr>' +
        '<td>' + (ev.ref_no != null ? ev.ref_no : '—') + '</td>' +
        '<td>' + escapeHtml(formatTimeShort_(ev.event_date || ev.created_at)) + '</td>' +
        '<td>' + escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—')) + '</td>' +
        '<td>' + escapeHtml(displayName || '—') + (displayReason ? ' — ' + escapeHtml(displayReason) : '') + '</td>' +
        '<td>' + (isIn ? formatAmount_(amount) : '—') + '</td>' +
        '<td>' + (isOut ? formatAmount_(Math.abs(amount)) : '—') + '</td>' +
        '<td>' + formatAmount_(ev.running_balance) + '</td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="7">Nema prometa za izabrani period.</td></tr>';
    var table = '<table class="book-table">' +
      '<thead><tr><th>Rb.</th><th>Vreme</th><th>Korisnik</th><th>Opis</th><th>Uplata</th><th>Isplata</th><th>Stanje</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
    return header + calc + table;
  }

  function ensurePrintCashSheetOverlay_() {
    var overlay = document.getElementById('print-cashsheet-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'print-cashsheet-overlay';
      document.body.appendChild(overlay);
    }
    return overlay;
  }

  function printCashSheetHtml_(sheet) {
    var overlay = ensurePrintCashSheetOverlay_();
    overlay.innerHTML = buildCashSheetPrintHtml_(sheet);
    document.documentElement.classList.add('printing-cashsheet-overlay');
    var cleanup = function() {
      document.documentElement.classList.remove('printing-cashsheet-overlay');
      window.removeEventListener('afterprint', cleanup);
    };
    window.addEventListener('afterprint', cleanup);
    // Give the overlay a tick to actually paint before invoking print().
    window.setTimeout(function() { window.print(); }, 30);
  }

  function printCashSheetForEvent_(ev) {
    var dateValue = ev && (ev.event_date || ev.created_at);
    var filters = withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency: SESSION.currency,
      date: dateValue ? String(dateValue).slice(0, 10) : (uiState.config && uiState.config.today) || '',
      shift_id: ''
    });
    callApi('apiGetCashSheetReport', [filters], function(sheet) {
      printCashSheetHtml_(sheet || {});
    }, { quiet: true });
  }

  /* ─── Priznanica (blagajnički uplatni/isplatni list) - štampa jedne stavke ──
     FAZA 3s. Isti univerzalni print-overlay obrazac kao Blagajnički list gore
     (ensurePrintCashSheetOverlay_ / html.printing-cashsheet-overlay), samo drugačiji
     sadržaj. Raspored/tekst je po uzoru na stari (GAS-era) print-cash-event.html izlaz
     koji je korisnik priložio kao PDF - dva primerka na jednoj strani (arhiva +
     korisnik), veliki iznos, iznos slovima, potpisi dole. */

  var SR_ONES = ['', 'jedan', 'dva', 'tri', 'četiri', 'pet', 'šest', 'sedam', 'osam', 'devet'];
  var SR_ONES_FEM = ['', 'jedna', 'dve', 'tri', 'četiri', 'pet', 'šest', 'sedam', 'osam', 'devet'];
  var SR_TEENS = ['deset', 'jedanaest', 'dvanaest', 'trinaest', 'četrnaest', 'petnaest', 'šesnaest', 'sedamnaest', 'osamnaest', 'devetnaest'];
  var SR_TENS = ['', '', 'dvadeset', 'trideset', 'četrdeset', 'pedeset', 'šezdeset', 'sedamdeset', 'osamdeset', 'devedeset'];
  var SR_HUNDREDS = ['', 'sto', 'dvesta', 'trista', 'četiristo', 'petsto', 'šeststo', 'sedamsto', 'osamsto', 'devetsto'];

  function srThreeDigitsToWords_(n, feminine) {
    var words = [];
    var h = Math.floor(n / 100);
    var rem = n % 100;
    if (h) words.push(SR_HUNDREDS[h]);
    if (rem >= 10 && rem < 20) {
      words.push(SR_TEENS[rem - 10]);
    } else {
      var t = Math.floor(rem / 10);
      var o = rem % 10;
      if (t) words.push(SR_TENS[t]);
      if (o) words.push(feminine ? SR_ONES_FEM[o] : SR_ONES[o]);
    }
    return words.join(' ');
  }

  function srPluralForm_(n, forms) {
    var mod100 = n % 100;
    var mod10 = n % 10;
    if (mod100 >= 11 && mod100 <= 14) return forms[2];
    if (mod10 === 1) return forms[0];
    if (mod10 >= 2 && mod10 <= 4) return forms[1];
    return forms[2];
  }

  function srIntegerToWords_(num) {
    num = Math.floor(Math.abs(num || 0));
    if (num === 0) return 'nula';
    var groups = [
      { value: 1000000000, forms: ['milijarda', 'milijarde', 'milijardi'], fem: true },
      { value: 1000000, forms: ['milion', 'miliona', 'miliona'], fem: false },
      { value: 1000, forms: ['hiljadu', 'hiljade', 'hiljada'], fem: true }
    ];
    var parts = [];
    var remaining = num;
    groups.forEach(function(group) {
      var count = Math.floor(remaining / group.value);
      if (!count) return;
      remaining = remaining % group.value;
      if (count === 1) {
        // "jedan/jedna" se izostavlja ispred hiljadu/milion/milijarda u standardnoj upotrebi
        // ("hiljadu dinara", ne "jedna hiljadu dinara"; "milion", ne "jedan milion").
        parts.push(group.forms[0]);
        return;
      }
      var groupWords = srThreeDigitsToWords_(count, group.fem);
      var noun = srPluralForm_(count, group.forms);
      parts.push(groupWords + ' ' + noun);
    });
    if (remaining) parts.push(srThreeDigitsToWords_(remaining, false));
    return parts.join(' ').replace(/\s+/g, ' ').trim();
  }

  function amountToSerbianWords_(amount, currency) {
    amount = Number(amount || 0);
    var negative = amount < 0;
    amount = Math.abs(amount);
    var wholePart = Math.floor(amount);
    var centsPart = Math.round((amount - wholePart) * 100);
    if (centsPart >= 100) { wholePart += 1; centsPart = 0; }
    var currencyWord = currency === 'EUR' ? 'evra' : currency === 'USD' ? 'dolara' : currency === 'CHF' ? 'franaka' : 'dinara';
    var words = srIntegerToWords_(wholePart) + ' ' + currencyWord + ' i ' + String(centsPart).padStart(2, '0') + '/100';
    words = words.charAt(0).toUpperCase() + words.slice(1);
    return (negative ? '− ' : '') + words;
  }

  function buildReceiptCopyHtml_(ev, copyLabel) {
    var isOut = (ev.display_direction || ev.direction) === 'OUT';
    var docTitle = isOut ? 'BLAGAJNIČKI ISPLATNI LIST' : 'BLAGAJNIČKI UPLATNI LIST';
    var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var currency = ev.currency || SESSION.currency || '';
    var ref = ev.ref_no != null ? ('#' + ev.ref_no) : (ev.event_id || '');
    var partnerLabel = isOut ? 'Isplaćeno:' : 'Uplatio:';
    var cashboxes = (uiState.config && uiState.config.cashboxes) || [];
    var cashbox = cashboxes.find(function(c) { return c.cashbox_id === (ev.cashbox_id || SESSION.cashboxId); });
    var cashboxName = (cashbox && cashbox.name) || SESSION.cashboxName || 'Blagajna';
    var actor = uiState.currentUser || {};
    return '<div class="receipt-copy">' +
      '<div class="receipt-copy-label">' + escapeHtml(copyLabel) + '</div>' +
      '<div class="receipt-head">' +
        '<div><strong>Industrija Mesa Nedeljković doo</strong><span>Interni dokument blagajničkog poslovanja</span></div>' +
        '<div class="receipt-head-right"><span>' + escapeHtml(cashboxName) + '</span><span>' + escapeHtml(currency) + '</span></div>' +
      '</div>' +
      '<div class="receipt-box">' +
        '<h3>' + docTitle + '</h3>' +
        '<div class="receipt-meta"><span>Broj: <strong>' + escapeHtml(ref) + '</strong></span><span>Datum: <strong>' + escapeHtml(formatDateTimeShort_(ev.event_date || ev.created_at)) + '</strong></span></div>' +
        '<div class="receipt-meta"><span>Status: <strong>' + escapeHtml(renderPlainStatusLabel_(ev.status)) + '</strong></span></div>' +
        '<div class="receipt-amount">' + formatAmount_(Math.abs(amount)) + ' ' + escapeHtml(currency) + '</div>' +
        '<div class="receipt-words">Slovima: ' + escapeHtml(amountToSerbianWords_(amount, currency)) + '</div>' +
      '</div>' +
      '<div class="receipt-details">' +
        '<div><strong>' + escapeHtml(partnerLabel) + '</strong><span>' + escapeHtml(ev.partner_name || '—') + '</span></div>' +
        '<div><strong>Svrha / opis:</strong><span>' + escapeHtml(cleanBusinessDescription_(ev.description || '') || '—') + '</span></div>' +
        '<div><strong>Knjižio:</strong><span>' + escapeHtml(ev.posted_by || ev.created_by || '—') + '</span></div>' +
        '<div><strong>Proknjiženo:</strong><span>' + escapeHtml(formatDateTimeShort_(ev.posted_at || ev.created_at)) + '</span></div>' +
      '</div>' +
      '<div class="receipt-sign-row"><div class="receipt-sign">Blagajnik</div><div class="receipt-sign">' + escapeHtml(isOut ? 'Primalac' : 'Primalac / uplatilac') + '</div></div>' +
      '<div class="receipt-footer">Generisano: ' + escapeHtml(formatDateTimeShort_(new Date().toISOString())) + ' · Korisnik: ' + escapeHtml(actor.email || actor.user_code || '—') + ' · CASH_EVENT ' + escapeHtml(ev.event_id || '') + '</div>' +
    '</div>';
  }

  function renderPlainStatusLabel_(status) {
    return STATUS_LABEL_MAP && STATUS_LABEL_MAP[status] ? STATUS_LABEL_MAP[status] : (status || '—');
  }

  function buildReceiptPrintHtml_(ev) {
    return '<div class="receipt-sheet">' +
      buildReceiptCopyHtml_(ev, 'PRIMERAK ZA ARHIVU / POTPIS') +
      buildReceiptCopyHtml_(ev, 'PRIMERAK ZA KORISNIKA') +
    '</div>';
  }

  function printReceiptForEvent_(ev) {
    if (!ev || !ev.event_id || ev.event_type === 'ANNOUNCEMENT') {
      showMessage('Priznanica je dostupna samo za proknjižene stavke (uplata/isplata/storno).', 'info');
      return;
    }
    var overlay = ensurePrintCashSheetOverlay_();
    overlay.innerHTML = buildReceiptPrintHtml_(ev);
    document.documentElement.classList.add('printing-cashsheet-overlay');
    var cleanup = function() {
      document.documentElement.classList.remove('printing-cashsheet-overlay');
      window.removeEventListener('afterprint', cleanup);
    };
    window.addEventListener('afterprint', cleanup);
    window.setTimeout(function() { window.print(); }, 30);
  }

  /* ─── Prilozi (dokumenti preko Google Drive-a) - FAZA 3s ───────────────────
     Jedan dijalog za pregled I dodavanje priloga uz proizvoljnu stavku (cash_event,
     nalog, zahtev...) - koristi već postojeću documents tabelu (entity_type/entity_id),
     samo prvi put ima stvaran upload backend (_lib/googleDrive.js). */

  // FAZA 3t: dodat "Obriši" (i eksplicitan "Preuzmi" link) - ranije je dijalog imao
  // SAMO prikaz+upload, korisnik je eksplicitno tražio "dodaj, briši, skini" iz istog
  // dijaloga. window.__docActions_ prati isti obrazac kao window.__recordActions
  // (renderActionRecords) - inline onclick sa key lookup-om umesto ugrađivanja
  // document_id direktno u onclick string (izbegava escaping komplikacije).
  function renderDocumentsListHtml_(docs, onDelete) {
    if (!docs || !docs.length) {
      return '<div class="empty-state" style="padding:8px 0">Nema prikačenih dokumenata.</div>';
    }
    window.__docActions_ = window.__docActions_ || {};
    return docs.map(function(d, index) {
      var key = 'doc-' + index + '-' + Date.now();
      window.__docActions_[key] = function() { onDelete(d); };
      return '<div class="detail-row" style="border-bottom:1px solid var(--color-border-light);padding:7px 0;gap:8px">' +
        '<a href="' + escapeHtml(d.file_url || '#') + '" target="_blank" rel="noopener" download="' + escapeHtml(d.file_name || '') + '"><i class="ti ti-file-download" aria-hidden="true"></i> ' + escapeHtml(d.file_name || 'Dokument') + '</a>' +
        '<span style="color:var(--color-text-muted);font-size:11px;text-align:right">' + escapeHtml(shortUserLabel_(d.uploaded_by || '—')) + '<br>' + escapeHtml(formatDateTimeShort_(d.created_at)) + '</span>' +
        '<button type="button" class="btn-ghost small" title="Obriši prilog" onclick="window.__docActions_[\'' + key + '\']()"><i class="ti ti-trash" aria-hidden="true"></i></button>' +
      '</div>';
    }).join('');
  }

  function loadAndRenderDocumentsFor_(entityType, entityId, targetId, onDelete) {
    var target = document.getElementById(targetId);
    if (!target) return;
    target.innerHTML = '<div class="empty-state" style="padding:8px 0">Učitavanje...</div>';
    callApi('apiListDocuments', [entityType, entityId], function(docs) {
      target.innerHTML = renderDocumentsListHtml_(docs, onDelete);
    }, { quiet: true, onComplete: function() {
      if (target.innerHTML.indexOf('Učitavanje') !== -1) {
        target.innerHTML = '<div class="empty-state" style="padding:8px 0">Nije moguće učitati dokumenta.</div>';
      }
    } });
  }

  function openDocumentsDialog_(entityType, entityId, entityLabel) {
    if (!entityId) return;
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>Dokumenti' + (entityLabel ? ' — ' + escapeHtml(entityLabel) : '') + '</h3>' +
        '<div id="documents-dialog-list"><div class="empty-state" style="padding:8px 0">Učitavanje...</div></div>' +
        '<form id="documents-dialog-form" class="form-grid" style="margin-top:12px">' +
          '<label>Prikači novi fajl <input type="file" name="file" required></label>' +
          '<label>Napomena <input type="text" name="note" placeholder="opciono"></label>' +
          '<div class="m-detail-actions">' +
            '<button type="button" class="cash-count-action cancel" id="documents-dialog-close">Zatvori (ESC)</button>' +
            '<button type="submit" class="cash-count-action save" id="documents-dialog-upload">Prikači (F5)</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.querySelector('#documents-dialog-close').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
    bindPrimaryFormShortcuts_(overlay.querySelector('#documents-dialog-form'));
    var handleDelete = function(doc) {
      if (!confirm('Obrisati prilog "' + (doc.file_name || 'dokument') + '"?')) return;
      callApi('apiDeleteDocument', [doc.document_id], function() {
        refresh();
      }, { successMessage: 'Prilog je obrisan.' });
    };
    var refresh = function() {
      loadAndRenderDocumentsFor_(entityType, entityId, 'documents-dialog-list', handleDelete);
      refreshKnjigaDocsSummary_();
    };
    refresh();
    overlay.querySelector('#documents-dialog-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = e.target;
      var fileInput = form.querySelector('[name="file"]');
      var noteInput = form.querySelector('[name="note"]');
      var submitBtn = document.getElementById('documents-dialog-upload');
      fileToBase64Payload(fileInput).then(function(payload) {
        if (submitBtn) submitBtn.disabled = true;
        callApi('apiUploadDocument', [entityType, entityId, {
          file_name: payload.fileName,
          mime_type: payload.mimeType,
          file_base64: payload.base64Data
        }, noteInput ? noteInput.value || '' : ''], function() {
          form.reset();
          refresh();
        }, {
          successMessage: 'Dokument je prikačen.',
          onComplete: function() { if (submitBtn) submitBtn.disabled = false; }
        });
      }).catch(function(error) {
        showMessage('Greška: ' + error.message, 'error');
      });
    });
  }

  // FAZA 3t: klik na spajalicu u Knjizi - nalazi stavku po event_id u već učitanoj listi
  // (isti obrazac kao printReceiptForEventId_) i otvara dijalog dokumenata za nju.
  function openDocumentsDialogForEventId_(eventId) {
    var found = (LAST_KNJIGA_EVENTS || []).find(function(e) { return e.event_id === eventId; });
    if (!found) {
      showMessage('Stavka nije pronađena u trenutno učitanoj listi.', 'error');
      return;
    }
    openDocumentsDialog_('CASH_EVENT', found.event_id, 'stavka ' + (found.ref_no != null ? '#' + found.ref_no : found.event_id));
  }

  // Nalazi učitanu stavku po event_id (Knjiga ili Blagajnički list već imaju ceo
  // objekat u memoriji) - koristi se za "klikni na listu, izaberi štampu" umesto
  // ručnog unosa ID-ja (vidi FAZA 3s napomenu u desktop.html Blagajnički list sekciji).
  function printReceiptForEventId_(eventId) {
    var found = (LAST_KNJIGA_EVENTS || []).find(function(e) { return e.event_id === eventId; }) ||
      (LAST_CASHSHEET_EVENTS || []).find(function(e) { return e.event_id === eventId; });
    if (!found) {
      showMessage('Stavka nije pronađena u trenutno učitanoj listi.', 'error');
      return;
    }
    printReceiptForEvent_(found);
  }

  function renderRecords(targetId, records, fields) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, renderEmptyState_('Nema podataka.'));
      return;
    }
    renderHtml(targetId, records.map(function(record) {
      return recordHtml(record, fields, []);
    }).join(''));
  }

  function renderActionRecords(targetId, records, fields, actionsFactory) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, renderEmptyState_(emptyStateMessageFor_(targetId)));
      return;
    }
    var html = records.map(function(record, index) {
      window.__recordActions = window.__recordActions || {};
      var actions = actionsFactory ? actionsFactory(record) : [];
      var actionHtml = actions.map(function(action, actionIndex) {
        var key = targetId + '-' + index + '-' + actionIndex + '-' + Date.now();
        window.__recordActions[key] = action.handler;
        return '<button class="small ' + escapeHtml(action.kind || '') + '" onclick="window.__recordActions[\'' + key + '\']()">' + escapeHtml(action.label) + '</button>';
      }).join('');
      return recordHtml(record, fields, actionHtml ? ['<div class="actions">' + actionHtml + '</div>'] : []);
    }).join('');
    renderHtml(targetId, html);
  }

  function renderDesktopRequestRecords(records) {
    records = records || [];
    if (!records.length) {
      renderHtml('desktop-table-result', renderEmptyState_('Nema zahteva koji čekaju odobrenje.'));
      closeRequestDetailPanel();
      return;
    }
    window.__desktopRequestRecords = records;
    var html = records.map(function(record, index) {
      var body = recordHtml(record, ['request_id', 'requested_for_name', 'amount', 'currency', 'purpose', 'status'], []);
      return body.replace('<div class="record"', '<div class="record" role="button" tabindex="0" onclick="showRequestDetailPanel(' + index + ')"');
    }).join('');
    renderHtml('desktop-table-result', html);
  }

  function showRequestDetailPanel(index) {
    var record = (window.__desktopRequestRecords || [])[index];
    if (!record) {
      return;
    }
    var panel = document.getElementById('d-request-detail-panel');
    var body = document.getElementById('d-rdp-body');
    if (!panel || !body) {
      return;
    }
    var actions = requestApprovalActions_(record).map(function(action, actionIndex) {
      var key = 'detail-' + index + '-' + actionIndex + '-' + Date.now();
      window.__recordActions = window.__recordActions || {};
      window.__recordActions[key] = action.handler;
      return '<button class="small ' + escapeHtml(action.kind || '') + '" onclick="window.__recordActions[\'' + key + '\']()">' + escapeHtml(action.label) + '</button>';
    }).join('');
    body.innerHTML = [
      detailRow_('Br. zahteva', record.ref_no != null ? record.ref_no : record.request_id),
      detailRow_('Primalac', record.requested_for_name),
      detailRow_('Iznos', amountWithCurrency(record.amount, record.currency), true),
      detailRow_('Svrha', record.purpose),
      detailRow_('Prioritet', renderPriorityBadge(record.priority) || record.priority, Boolean(renderPriorityBadge(record.priority))),
      detailRow_('Status', renderStatusBadge(record.status), true),
      actions ? '<div class="actions">' + actions + '</div>' : ''
    ].join('');
    panel.style.display = '';

    var panel = document.getElementById('d-request-detail-panel');

  function detailRow_(label, value, raw) {
    return '<div class="detail-row"><span class="detail-key">' + escapeHtml(label) + '</span><span>' + (raw ? formatValue(value) : escapeHtml(formatValue(value))) + '</span></div>';

  function renderTable(targetId, records, fields) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, renderEmptyState_(emptyStateMessageFor_(targetId)));
      return;
    }
    var head = fields.map(function(field) { return '<th>' + escapeHtml(labelForField_(field)) + '</th>'; }).join('');
    var rows = records.map(function(record) {
      return '<tr>' + fields.map(function(field) {
        return '<td>' + formatCellHtml_(field, displayFieldValue_(record, field)) + '</td>';
      }).join('') + '</tr>';
    }).join('');
    renderHtml(targetId, '<div class="table-wrap"><table><thead><tr>' + head + '</tr></thead><tbody>' + rows + '</tbody></table></div>');
  }

  function recordHtml(record, fields, extraHtml) {
    var title = fields.length ? formatValue(displayFieldValue_(record, fields[0])) : 'Zapis';
    var body = fields.slice(1).map(function(field) {
      return '<div><span class="badge">' + escapeHtml(labelForField_(field)) + '</span> ' + formatCellHtml_(field, displayFieldValue_(record, field)) + '</div>';
    }).join('');
    var priority = renderPriorityBadge(record.priority);
    return '<div class="record"><div class="record-title">' + escapeHtml(title) + (priority ? ' ' + priority : '') + '</div>' + body + (extraHtml || []).join('') + '</div>';

  function renderEmptyState_(message) {
    return '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>' + escapeHtml(message || 'Nema podataka.') + '</p></div>';
  }

  function emptyStateMessageFor_(targetId) {
    var messages = {
      'my-requests-list': 'Nemate podnetih zahteva.',
      'approval-requests-list': 'Nema zahteva koji čekaju odobrenje.',
      'waiting-orders-list': 'Nema naloga koji čekaju isplatu.',
      'execution-orders-list': 'Nema naloga koji čekaju izvršenje.',
      'daily-closing-result': 'Nema zaključaka za izabrani period.'

    return messages[targetId] || 'Nema podataka.';

  function labelForField_(field) {
    return FIELD_LABEL_MAP[field] || field;

  var REF_NO_FALLBACK_FIELDS_ = { request_id: 1, order_id: 1, event_id: 1 };

  function displayFieldValue_(record, field) {
    if (REF_NO_FALLBACK_FIELDS_[field] && record && record.ref_no != null) {
      return record.ref_no;
    }
    return record ? record[field] : undefined;

  function formatCellHtml_(field, value) {
    if (field === 'status' || field === 'document_status') {
      return renderStatusBadge(value);
    }
    if (field === 'priority') {
      return renderPriorityBadge(value) || escapeHtml(formatValue(value));
    }
    return escapeHtml(formatValue(value));

    if (!status) {
      return '';

    var cls = STATUS_BADGE_MAP[status] || 'badge-draft';
    var label = STATUS_LABEL_MAP[status] || status;
    return '<span class="badge ' + cls + '">' + escapeHtml(label) + '</span>';
