<script>
  var uiState = {
    config: {},
    currentUser: null,
    loading: false
  };

  document.addEventListener('DOMContentLoaded', function() {
    bindUi();
    var activeSection = document.querySelector('[data-section].active');
    showSection(activeSection ? activeSection.id : 'home');
    callApi('apiGetUiBootstrap', [Boolean(document.getElementById('desktop-user-card'))], function(data) {
      uiState.config = data.config || {};
      uiState.currentUser = data.user || null;
      fillConfigOptions();
      setTodayDefaults();
      applyDefaultCashboxFields();
      renderCurrentUser(uiState.currentUser);
      if (data.dashboard) {
        renderDesktopDashboard(data.dashboard);
      }
    }, { quiet: true });
  });

  function bindUi() {
    document.querySelectorAll('[data-target]').forEach(function(button) {
      button.addEventListener('click', function() {
        showSection(button.getAttribute('data-target'));
      });
    });

    bindForm('payment-request-form', function(data) {
      callApi('apiCreatePaymentRequest', [data], function(result) {
        renderPaymentRequestSummary('payment-request-result', result, 'Zahtev je sačuvan');
      }, { successMessage: 'Zahtev je sačuvan.' });
    });

    bindClick('payment-request-submit-btn', function() {
      var data = serializeForm('payment-request-form');
      callApi('apiCreatePaymentRequest', [data], function(result) {
        callApi('apiSubmitPaymentRequest', [result.request_id], function(submitted) {
          renderPaymentRequestSummary('payment-request-result', submitted, 'Zahtev je poslat na odobrenje');
          loadMyRequests(true);
        }, { successMessage: 'Zahtev je poslat na odobrenje.' });
      }, { quiet: true });
    });

    bindClick('load-my-requests-btn', loadMyRequests);
    bindClick('load-approval-requests-btn', loadApprovalRequests);
    bindClick('load-waiting-orders-btn', loadWaitingOrders);
    bindClick('load-my-shifts-home-btn', loadMyShifts);

    bindForm('execute-payment-form', function(data) {
      callApi('apiExecutePaymentOrder', [data.order_id, cleanObject({
        amount: data.amount,
        note: data.note
      })], function(result) {
        renderPaymentExecutionSummary('execute-payment-result', result);
        loadWaitingOrders(true);
        refreshDashboardInBackground();
      }, { successMessage: 'Isplata je uspešno izvršena.' });
    });

    bindForm('cash-inflow-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiCreateCashInflow', [data], function(result) {
        renderCashInflowSummary('cash-inflow-result', result);
        refreshDashboardInBackground();
      }, { successMessage: 'Uplata je uspešno knjižena.' });
    });

    bindForm('balance-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiCalculateCashboxBalance', [data.cashbox_id, data.currency], function(result) {
        renderHtml('balance-result', '<div class="record"><div class="record-title">Stanje: ' + escapeHtml(result) + ' ' + escapeHtml(data.currency) + '</div></div>');
      });
    });

    bindForm('document-form', function(data, form) {
      fileToBase64Payload(form.querySelector('[name="file"]')).then(function(filePayload) {
        callApi('apiAttachDocumentToEntity', [data.entity_type, data.entity_id, filePayload, data.note], function(result) {
          renderDocumentSummary('document-result', result, 'Dokument je dodat');
        }, { successMessage: 'Dokument je dodat.' });
      }).catch(function(error) {
        showMessage('Greška: dokument nije učitan. ' + error.message, 'error');
      });
    });

    bindClick('list-documents-btn', function() {
      var data = serializeForm('document-form');
      callApi('apiListDocumentsForEntity', [data.entity_type, data.entity_id], function(result) {
        renderRecords('document-result', result, ['document_id', 'file_name', 'status', 'file_url']);
      });
    });

    bindForm('open-shift-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiOpenShift', [data.cashbox_id, data.opening_note], function(result) {
        renderShiftSummary('shift-result', result, 'Smena je otvorena');
        refreshDashboardInBackground();
      }, { successMessage: 'Smena je otvorena.' });
    });

    bindClick('load-my-shifts-btn', loadMyShifts);

    bindForm('shift-balance-form', function(data) {
      callApi('apiGetShiftBalance', [data.shift_id], function(result) {
        renderShiftBalanceSummary('shift-result', result);
      });
    });

    bindForm('handover-shift-form', function(data) {
      callApi('apiHandoverShift', [data.shift_id, data.handover_to, data.physical_balance_json, data.note], function(result) {
        renderShiftSummary('shift-result', result, 'Primopredaja je evidentirana');
      }, { successMessage: 'Primopredaja je evidentirana.' });
    });

    bindForm('close-shift-form', function(data) {
      callApi('apiCloseShift', [data.shift_id, data.physical_balance_json, data.note], function(result) {
        renderShiftSummary('shift-result', result, 'Smena je zatvorena');
        refreshDashboardInBackground();
      }, { successMessage: 'Smena je zatvorena.' });
    });

    bindForm('daily-preview-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiPrepareDailyClosing', [data.cashbox_id, data.currency, data.closing_date], function(result) {
        renderDailyClosingSummary('daily-closing-result', result, 'Pregled dnevnog zaključka');
      });
    });

    bindForm('daily-close-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiCloseDailyCashbox', [data.cashbox_id, data.currency, data.closing_date, data.physical_balance, data.note], function(result) {
        renderDailyClosingSummary('daily-closing-result', result, 'Dnevni zaključak je kreiran');
        refreshDashboardInBackground();
      }, { successMessage: 'Dnevni zaključak je kreiran.' });
    });

    bindClick('load-daily-closings-btn', function() {
      callApi('apiListDailyClosings', [{}], function(result) {
        renderRecords('daily-closing-result', result, ['closing_id', 'closing_date', 'currency', 'status', 'difference']);
      });
    });

    bindClick('mobile-report-balance-btn', function() {
      loadReport('apiGetCashboxBalanceReport', 'mobile-report-filters-form', 'mobile-reports-result', ['cashbox_name', 'currency', 'balance']);
    });
    bindClick('mobile-report-waiting-orders-btn', function() {
      loadReport('apiGetOrdersWaitingPaymentReport', 'mobile-report-filters-form', 'mobile-reports-result', ['order_id', 'pay_to_name', 'remaining_amount', 'currency', 'status']);
    });
    bindClick('mobile-report-approval-requests-btn', function() {
      loadReport('apiGetRequestsForApprovalReport', 'mobile-report-filters-form', 'mobile-reports-result', ['request_id', 'requested_for_name', 'amount', 'currency', 'status']);
    });
    bindClick('mobile-report-missing-documents-btn', function() {
      loadReport('apiGetMissingDocumentsReport', 'mobile-report-filters-form', 'mobile-reports-result', ['entity_type', 'entity_id', 'date', 'description', 'document_status']);
    });
    bindClick('mobile-report-cash-movements-btn', function() {
      loadReport('apiGetCashMovementsReport', 'mobile-report-filters-form', 'mobile-reports-result', ['event_date', 'event_type', 'direction', 'amount', 'currency', 'partner_name', 'description', 'status']);
    });
    bindClick('mobile-report-cash-movements-shortcut', function() {
      window.setTimeout(function() {
        loadReport('apiGetCashMovementsReport', 'mobile-report-filters-form', 'mobile-reports-result', ['event_date', 'event_type', 'direction', 'amount', 'currency', 'partner_name', 'description', 'status']);
      }, 0);
    });

    bindDesktop();
  }

  function bindDesktop() {
    bindClick('desktop-refresh-btn', function() {
      loadDesktopDashboard();
    });
    bindClick('desktop-load-requests-btn', function() {
      callApi('apiListRequestsForApproval', [], function(result) {
        renderActionRecords('desktop-table-result', result, ['request_id', 'requested_for_name', 'amount', 'currency', 'purpose', 'status'], requestApprovalActions_);
      });
    });
    bindClick('desktop-load-orders-btn', function() {
      callApi('apiListOrdersWaitingForPayment', [], function(result) {
        renderActionRecords('desktop-table-result-orders', result, ['order_id', 'pay_to_name', 'amount_ordered', 'amount_paid', 'currency', 'status'], waitingOrderActions_);
      });
    });
    bindClick('desktop-load-shifts-btn', function() {
      callApi('apiGetMyActiveShifts', [], function(result) {
        renderTable('shift-result', result, ['shift_id', 'opened_by', 'opened_at', 'status']);
      });
    });
    bindClick('desktop-load-closings-btn', function() {
      callApi('apiListDailyClosings', [{}], function(result) {
        renderTable('daily-closing-result', result, ['closing_id', 'closing_date', 'currency', 'status', 'difference']);
      });
    });
    bindForm('desktop-balance-form', function(data) {
      data = withUiDefaults(data);
      callApi('apiCalculateCashboxBalance', [data.cashbox_id, data.currency], function(result) {
        renderHtml('balance-result', '<div class="record"><div class="record-title">Stanje: ' + escapeHtml(result) + ' ' + escapeHtml(data.currency) + '</div></div>');
      });
    });
    bindClick('report-balance-btn', function() {
      loadReport('apiGetCashboxBalanceReport', 'report-filters-form', 'reports-result', ['cashbox_name', 'currency', 'balance']);
    });
    bindClick('report-open-requests-btn', function() {
      loadReport('apiGetOpenPaymentRequestsReport', 'report-filters-form', 'reports-result', ['request_id', 'created_at', 'requested_for_name', 'amount', 'currency', 'priority', 'status', 'document_status']);
    });
    bindClick('report-approval-requests-btn', function() {
      loadReport('apiGetRequestsForApprovalReport', 'report-filters-form', 'reports-result', ['request_id', 'created_at', 'requested_for_name', 'amount', 'currency', 'priority', 'status']);
    });
    bindClick('report-waiting-orders-btn', function() {
      loadReport('apiGetOrdersWaitingPaymentReport', 'report-filters-form', 'reports-result', ['order_id', 'pay_to_name', 'amount_ordered', 'amount_paid', 'remaining_amount', 'currency', 'status']);
    });
    bindClick('report-executed-payments-btn', function() {
      loadReport('apiGetExecutedPaymentsReport', 'report-filters-form', 'reports-result', ['event_id', 'event_date', 'currency', 'amount', 'partner_name', 'linked_order_id', 'status']);
    });
    bindClick('report-cash-movements-btn', function() {
      loadReport('apiGetCashMovementsReport', 'report-filters-form', 'reports-result', ['event_date', 'event_id', 'event_type', 'direction', 'signed_amount', 'currency', 'partner_name', 'description', 'linked_order_id', 'status']);
    });
    bindClick('report-missing-documents-btn', function() {
      loadReport('apiGetMissingDocumentsReport', 'report-filters-form', 'reports-result', ['entity_type', 'entity_id', 'date', 'description', 'amount', 'currency', 'document_status']);
    });
    bindClick('report-daily-closings-btn', function() {
      loadReport('apiGetDailyClosingReport', 'report-filters-form', 'reports-result', ['closing_id', 'closing_date', 'currency', 'calculated_balance', 'physical_balance', 'difference', 'status']);
    });
    bindClick('report-differences-btn', function() {
      loadReport('apiGetDifferencesReport', 'report-filters-form', 'reports-result', ['source_type', 'source_id', 'date', 'currency', 'difference', 'status']);
    });
    bindClick('report-corrections-btn', function() {
      loadReport('apiGetCorrectionsAndReversalsReport', 'report-filters-form', 'reports-result', ['event_id', 'event_date', 'event_type', 'currency', 'direction', 'amount', 'status']);
    });
    bindClick('report-audit-exceptions-btn', function() {
      loadReport('apiGetAuditExceptionsReport', 'report-filters-form', 'reports-result', ['exception_type', 'entity_type', 'entity_id', 'date', 'description', 'status']);
    });
    bindClick('print-payment-request-btn', function() {
      openPrintView('print-payment-request', getPrintInputValue_('payment_request_id'));
    });
    bindClick('print-payment-order-btn', function() {
      openPrintView('print-payment-order', getPrintInputValue_('payment_order_id'));
    });
    bindClick('print-cash-event-btn', function() {
      openPrintView('print-cash-event', getPrintInputValue_('cash_event_id'));
    });
    bindClick('print-shift-btn', function() {
      openPrintView('print-shift-handover', getPrintInputValue_('shift_id'));
    });
    bindClick('print-daily-closing-btn', function() {
      openPrintView('print-daily-closing', getPrintInputValue_('daily_closing_id'));
    });
    bindClick('print-report-btn', function() {
      var reportTypeSelect = document.getElementById('print-report-type');
      openPrintReport(reportTypeSelect ? reportTypeSelect.value : 'missing-documents');
    });
  }

  function callApi(functionName, args, onSuccess, options) {
    options = options || {};
    if (!window.google || !google.script || !google.script.run) {
      showMessage('Greška: Apps Script okruženje nije dostupno.', 'error');
      return;
    }
    if (!options.quiet) {
      setLoading(true);
    }
    if (!options.quiet) {
      showMessage(options.loadingMessage || 'Obrađujem zahtev...', 'info');
    }
    var runner = google.script.run
      .withSuccessHandler(function(response) {
        if (!options.quiet) {
          setLoading(false);
        }
        if (!response || response.ok !== true) {
          showMessage('Greška: ' + (response && response.error ? response.error.message : 'poziv nije uspeo.'), 'error');
          return;
        }
        if (!options.quiet) {
          showMessage(options.successMessage || 'Uspešno izvršeno.', 'success');
        }
        if (onSuccess) {
          onSuccess(response.data);
        }
      })
      .withFailureHandler(function(error) {
        if (!options.quiet) {
          setLoading(false);
        }
        showMessage('Greška: ' + (error && error.message ? error.message : 'tehnički problem.'), 'error');
      });
    runner[functionName].apply(runner, args || []);
  }

  function showSection(sectionId) {
    document.querySelectorAll('[data-section]').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showMessage(message, type) {
    var box = document.getElementById('message');
    if (!box) {
      return;
    }
    box.textContent = message;
    box.className = 'message show ' + (type || 'info');
  }

  function setLoading(isLoading) {
    uiState.loading = isLoading;
    document.body.classList.toggle('loading', isLoading);
  }

  function serializeForm(formId) {
    var form = document.getElementById(formId);
    var data = {};
    if (!form) {
      return data;
    }
    Array.prototype.forEach.call(form.elements, function(element) {
      if (!element.name || element.type === 'file') {
        return;
      }
      data[element.name] = element.value;
    });
    return cleanObject(data);
  }

  function fileToBase64Payload(fileInput) {
    return new Promise(function(resolve, reject) {
      if (!fileInput || !fileInput.files || !fileInput.files[0]) {
        reject(new Error('Izaberite fajl.'));
        return;
      }
      var file = fileInput.files[0];
      var reader = new FileReader();
      reader.onload = function() {
        var result = String(reader.result || '');
        resolve({
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          base64Data: result.indexOf(',') === -1 ? result : result.split(',').pop()
        });
      };
      reader.onerror = function() {
        reject(new Error('Fajl nije moguće pročitati.'));
      };
      reader.readAsDataURL(file);
    });
  }

  function bindForm(formId, handler) {
    var form = document.getElementById(formId);
    if (!form) {
      return;
    }
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      handler(serializeForm(formId), form);
    });
  }

  function bindClick(id, handler) {
    var element = document.getElementById(id);
    if (element) {
      element.addEventListener('click', handler);
    }
  }

  function loadMyRequests(isBackground) {
    callApi('apiListMyPaymentRequests', [], function(result) {
      renderActionRecords('my-requests-list', result, ['request_id', 'requested_for_name', 'amount', 'currency', 'purpose', 'status'], function(record) {
        return approvedRequestActions_(record, loadMyRequests);
      });
    }, { quiet: Boolean(isBackground) });
  }

  function loadApprovalRequests(isBackground) {
    callApi('apiListRequestsForApproval', [], function(result) {
      renderActionRecords('approval-requests-list', result, ['request_id', 'requested_for_name', 'amount', 'currency', 'purpose', 'status'], requestApprovalActions_);
    }, { quiet: Boolean(isBackground) });
  }

  function loadWaitingOrders(isBackground) {
    callApi('apiListOrdersWaitingForPayment', [], function(result) {
      renderActionRecords('waiting-orders-list', result, ['order_id', 'pay_to_name', 'amount_ordered', 'amount_paid', 'currency', 'purpose'], waitingOrderActions_);
    }, { quiet: Boolean(isBackground) });
  }

  function requestApprovalActions_(record) {
    return [
      actionButton('Odobri', function() {
        callApi('apiApprovePaymentRequest', [record.request_id], function() {
          loadApprovalRequests(true);
          refreshDashboardInBackground();
        }, { successMessage: 'Zahtev je odobren.' });
      }),
      actionButton('Odobri + kreiraj nalog', function() {
        callApi('apiApproveAndIssuePaymentOrder', [record.request_id, { cashbox_id: getDefaultCashboxId() }], function(issued) {
          renderOrderSummary('desktop-table-result-orders', issued, 'Zahtev je odobren, nalog je kreiran i izdat');
          loadApprovalRequests(true);
          loadWaitingOrders(true);
          refreshDashboardInBackground();
        }, { successMessage: 'Zahtev je odobren, nalog je spreman za isplatu.' });
      }),
      actionButton('Odbij', function() {
        var reason = prompt('Razlog odbijanja');
        if (reason) {
          callApi('apiRejectPaymentRequest', [record.request_id, reason], function() {
            loadApprovalRequests(true);
            refreshDashboardInBackground();
          }, { successMessage: 'Zahtev je odbijen.' });
        }
      }, 'danger')
    ];
  }

  function approvedRequestActions_(record, reload) {
    if (record.status !== 'APPROVED') {
      return [];
    }
    return [
      actionButton('Kreiraj i izdaj nalog', function() {
        createAndIssueOrderFromRequest_(record, reload || loadMyRequests);
      })
    ];
  }

  function createAndIssueOrderFromRequest_(record, reload) {
    var cashboxId = getDefaultCashboxId();
    callApi('apiCreateAndIssuePaymentOrderFromRequest', [record.request_id, { cashbox_id: cashboxId }], function(issued) {
      renderOrderSummary('desktop-table-result-orders', issued, 'Nalog je kreiran i izdat');
      if (reload) {
        reload(true);
      }
      loadWaitingOrders(true);
      refreshDashboardInBackground();
    }, { successMessage: 'Nalog je kreiran i izdat.' });
  }

  function waitingOrderActions_(record) {
    return [
      actionButton('Izvrši odmah', function() {
        if (!confirm('Izvršiti isplatu za nalog ' + record.order_id + '?')) {
          return;
        }
        callApi('apiExecutePaymentOrder', [record.order_id, {}], function(result) {
          renderPaymentExecutionSummary('execute-payment-result', result);
          loadWaitingOrders(true);
          refreshDashboardInBackground();
        }, { successMessage: 'Isplata je izvršena za nalog ' + record.order_id + '.' });
      }),
      actionButton('Popuni formu', function() {
        showSection('execute-payment');
        setInputValue('execute-payment-form', 'order_id', record.order_id);
      }),
      actionButton('Odbij izvršenje', function() {
        var reason = prompt('Razlog odbijanja izvršenja');
        if (reason) {
          callApi('apiRejectPaymentOrderByCashier', [record.order_id, reason], loadWaitingOrders);
        }
      }, 'danger')
    ];
  }

  function loadMyShifts() {
    callApi('apiGetMyActiveShifts', [], function(result) {
      renderActionRecords('shift-result', result, ['shift_id', 'opened_at', 'status'], function(record) {
        return [
          actionButton('Presek', function() {
            callApi('apiGetShiftBalance', [record.shift_id], function(balance) {
              renderShiftBalanceSummary('shift-result', balance);
            });
          })
        ];
      });
    });
  }

  function loadDesktopDashboard() {
    callApi('apiGetManagementDashboardSummary', [{}], function(summary) {
      renderDesktopDashboard(summary);
    }, { quiet: true });
  }

  function loadReport(apiName, formId, targetId, fields) {
    callApi(apiName, [withUiDefaults(serializeForm(formId))], function(result) {
      renderTable(targetId, result || [], fields);
    });
  }

  function refreshDashboardInBackground() {
    if (document.getElementById('desktop-user-card')) {
      loadDesktopDashboard();
    }
  }

  function renderDesktopDashboard(summary) {
    var user = uiState.currentUser || {};
    setText('desktop-user-card', (user.full_name || user.email || 'Nepoznat korisnik') + ' · ' + (user.role || ''));
    summary = summary || {};
    setText('desktop-balance-card', summarizeBalances(summary.balances));
    setText('desktop-requests-card', String(summary.requestsForApprovalCount || 0));
    setText('desktop-orders-card', String(summary.ordersWaitingPaymentCount || 0));
    setText('desktop-missing-documents-card', String(summary.missingDocumentsCount || 0));
    setText('desktop-shifts-card', String(summary.openShiftsCount || 0));
    setText('desktop-closings-card', String(summary.dailyClosingsTodayCount || 0));
    setText('desktop-differences-card', String(summary.differencesCount || 0));
    setText('desktop-reversals-card', String(summary.reversalsTodayCount || 0));
  }

  function openPrintView(view, id) {
    if (!id) {
      showMessage('Unesite ID zapisa za štampu.', 'error');
      return;
    }
    window.open(getBasePrintUrl_() + '?view=' + encodeURIComponent(view) + '&id=' + encodeURIComponent(id), '_blank');
  }

  function openPrintReport(reportType) {
    var filters = serializeForm('report-filters-form');
    var query = Object.keys(filters).map(function(key) {
      return encodeURIComponent(key) + '=' + encodeURIComponent(filters[key]);
    }).join('&');
    var url = getBasePrintUrl_() + '?view=print-report&type=' + encodeURIComponent(reportType);
    window.open(query ? url + '&' + query : url, '_blank');
  }

  function printCurrentPage() {
    window.print();
  }

  function getBasePrintUrl_() {
    return window.location.href.split('?')[0];
  }

  function getPrintInputValue_(name) {
    var input = document.querySelector('#print-tools-form [name="' + name + '"]');
    return input ? input.value.trim() : '';
  }

  function summarizeBalances(balances) {
    balances = balances || [];
    if (!balances.length) {
      return '0';
    }
    return balances.slice(0, 3).map(function(item) {
      return formatValue(item.balance) + ' ' + formatValue(item.currency);
    }).join(' / ');
  }

  function fillConfigOptions() {
    fillSelects('[data-currency-options]', uiState.config.currencies || ['RSD', 'EUR']);
    fillSelects('[data-priority-options]', uiState.config.requestPriorities || ['NORMAL', 'URGENT']);
    fillSelects('[data-entity-options]', uiState.config.entityTypes || ['PAYMENT_REQUEST', 'PAYMENT_ORDER', 'CASH_EVENT', 'SHIFT', 'DAILY_CLOSING']);
  }

  function fillSelects(selector, values) {
    document.querySelectorAll(selector).forEach(function(select) {
      select.innerHTML = values.map(function(value) {
        return '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>';
      }).join('');
    });
  }

  function setTodayDefaults() {
    document.querySelectorAll('[data-today]').forEach(function(input) {
      input.value = uiState.config.today || '';
    });
  }

  function applyDefaultCashboxFields() {
    document.querySelectorAll('[name="cashbox_id"]').forEach(function(input) {
      input.value = input.value || getDefaultCashboxId();
    });
    document.querySelectorAll('[data-default-cashbox-label]').forEach(function(element) {
      element.textContent = getDefaultCashboxId();
    });
  }

  function withUiDefaults(data) {
    var result = Object.assign({}, data || {});
    if (!result.cashbox_id) {
      result.cashbox_id = getDefaultCashboxId();
    }
    return cleanObject(result);
  }

  function getDefaultCashboxId() {
    return (uiState.config && uiState.config.defaultCashboxId) ||
      (uiState.currentUser && uiState.currentUser.default_cashbox_id) ||
      'CB_MAIN';
  }

  function renderCurrentUser(user) {
    document.querySelectorAll('[data-current-user]').forEach(function(element) {
      element.textContent = user && user.email ? user.email + ' · ' + user.role : 'Korisnik nije učitan';
    });
  }

  function renderRecords(targetId, records, fields) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, '<div class="record">Nema podataka.</div>');
      return;
    }
    renderHtml(targetId, records.map(function(record) {
      return recordHtml(record, fields, []);
    }).join(''));
  }

  function renderActionRecords(targetId, records, fields, actionsFactory) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, '<div class="record">Nema podataka.</div>');
      return;
    }
    var html = records.map(function(record, index) {
      window.__recordActions = window.__recordActions || {};
      var actions = actionsFactory ? actionsFactory(record) : [];
      var actionHtml = actions.map(function(action, actionIndex) {
        var key = targetId + '-' + index + '-' + actionIndex + '-' + Date.now();
        window.__recordActions[key] = action.handler;
        return '<button class="small ' + escapeHtml(action.kind || '') + '" onclick="window.__recordActions[\'' + key + '\']()">' + escapeHtml(action.label) + '</button>';
      }).join('');
      return recordHtml(record, fields, actionHtml ? ['<div class="actions">' + actionHtml + '</div>'] : []);
    }).join('');
    renderHtml(targetId, html);
  }

  function renderTable(targetId, records, fields) {
    records = records || [];
    if (records.length === 0) {
      renderHtml(targetId, '<div class="record">Nema podataka.</div>');
      return;
    }
    var head = fields.map(function(field) { return '<th>' + escapeHtml(field) + '</th>'; }).join('');
    var rows = records.map(function(record) {
      return '<tr>' + fields.map(function(field) {
        return '<td>' + escapeHtml(formatValue(record[field])) + '</td>';
      }).join('') + '</tr>';
    }).join('');
    renderHtml(targetId, '<div class="table-wrap"><table><thead><tr>' + head + '</tr></thead><tbody>' + rows + '</tbody></table></div>');
  }

  function recordHtml(record, fields, extraHtml) {
    var title = fields.length ? formatValue(record[fields[0]]) : 'Zapis';
    var body = fields.slice(1).map(function(field) {
      return '<div><span class="badge">' + escapeHtml(field) + '</span> ' + escapeHtml(formatValue(record[field])) + '</div>';
    }).join('');
    return '<div class="record"><div class="record-title">' + escapeHtml(title) + '</div>' + body + (extraHtml || []).join('') + '</div>';
  }

  function actionButton(label, handler, kind) {
    return {
      label: label,
      handler: handler,
      kind: kind || ''
    };
  }

  function renderJson(targetId, value) {
    renderHtml(targetId, '<pre>' + escapeHtml(JSON.stringify(value, null, 2)) + '</pre>');
  }

  function renderPaymentRequestSummary(targetId, request, title) {
    renderSummaryCard(targetId, title || 'Zahtev za isplatu', [
      ['ID zahteva', request && request.request_id],
      ['Za isplatu', request && request.requested_for_name],
      ['Iznos', amountWithCurrency(request && request.amount, request && request.currency)],
      ['Svrha', request && request.purpose],
      ['Status', request && request.status]
    ]);
  }

  function renderOrderSummary(targetId, order, title) {
    renderSummaryCard(targetId, title || 'Nalog za isplatu', [
      ['ID naloga', order && order.order_id],
      ['Primaoc', order && order.pay_to_name],
      ['Iznos', amountWithCurrency(order && (order.amount_ordered || order.amount), order && order.currency)],
      ['Status', order && order.status]
    ]);
  }

  function renderPaymentExecutionSummary(targetId, result) {
    var event = (result && (result.cashEvent || result.cash_event || result.event)) || {};
    var order = (result && (result.order || result.paymentOrder || result.payment_order)) || {};
    renderSummaryCard(targetId, 'Isplata je proknjižena', [
      ['ID događaja', event.event_id],
      ['ID naloga', event.linked_order_id || order.order_id],
      ['Iznos', amountWithCurrency(event.amount || order.amount_paid || order.amount_ordered, event.currency || order.currency)],
      ['Status', event.status || order.status]
    ]);
  }

  function renderCashInflowSummary(targetId, event) {
    renderSummaryCard(targetId, 'Uplata je proknjižena', [
      ['ID događaja', event && event.event_id],
      ['Iznos', amountWithCurrency(event && event.amount, event && event.currency)],
      ['Opis', event && event.description],
      ['Status', event && event.status]
    ]);
  }

  function renderDocumentSummary(targetId, documentRecord, title) {
    var fileUrl = documentRecord && documentRecord.file_url;
    renderSummaryCard(targetId, title || 'Dokument', [
      ['ID dokumenta', documentRecord && documentRecord.document_id],
      ['Fajl', fileUrl ? '<a href="' + escapeHtml(fileUrl) + '" target="_blank" rel="noopener">' + escapeHtml(documentRecord.file_name || 'Otvori dokument') + '</a>' : documentRecord && documentRecord.file_name, Boolean(fileUrl)],
      ['Vezano za', documentRecord && ((documentRecord.entity_type || '') + ' ' + (documentRecord.entity_id || ''))],
      ['Status', documentRecord && documentRecord.status]
    ]);
  }

  function renderShiftSummary(targetId, shift, title) {
    renderSummaryCard(targetId, title || 'Smena', [
      ['ID smene', shift && shift.shift_id],
      ['Otvorio', shift && shift.opened_by],
      ['Zatvorio', shift && shift.closed_by],
      ['Status', shift && shift.status]
    ]);
  }

  function renderShiftBalanceSummary(targetId, balance) {
    renderSummaryCard(targetId, 'Presek smene', [
      ['ID smene', balance && balance.shift_id],
      ['Stanje', amountWithCurrency(balance && (balance.balance || balance.calculated_balance), balance && balance.currency)],
      ['Status', balance && balance.status]
    ]);
  }

  function renderDailyClosingSummary(targetId, closing, title) {
    renderSummaryCard(targetId, title || 'Dnevni zaključak', [
      ['ID zaključka', closing && closing.closing_id],
      ['Datum', closing && closing.closing_date],
      ['Obračunato', amountWithCurrency(closing && closing.calculated_balance, closing && closing.currency)],
      ['Fizički', amountWithCurrency(closing && closing.physical_balance, closing && closing.currency)],
      ['Razlika', amountWithCurrency(closing && closing.difference, closing && closing.currency)],
      ['Status', closing && closing.status]
    ]);
  }

  function renderSummaryCard(targetId, title, rows) {
    var body = (rows || []).filter(function(row) {
      return row[1] !== undefined && row[1] !== null && row[1] !== '';
    }).map(function(row) {
      var value = row[2] ? formatValue(row[1]) : escapeHtml(row[1]);
      return '<div class="summary-row"><span class="summary-label">' + escapeHtml(row[0]) + '</span><span>' + value + '</span></div>';
    }).join('');
    renderHtml(targetId, '<div class="record summary-card"><div class="record-title">' + escapeHtml(title) + '</div>' + (body || '<div class="muted">Nema dodatnih podataka.</div>') + '</div>');
  }

  function amountWithCurrency(amount, currency) {
    if (amount === undefined || amount === null || amount === '') {
      return '';
    }
    return formatValue(amount) + (currency ? ' ' + formatValue(currency) : '');
  }

  function renderHtml(targetId, html) {
    var target = document.getElementById(targetId);
    if (target) {
      target.innerHTML = html;
    }
  }

  function cleanObject(source) {
    var result = {};
    Object.keys(source || {}).forEach(function(key) {
      if (source[key] !== '') {
        result[key] = source[key];
      }
    });
    return result;
  }

  function setInputValue(formId, name, value) {
    var input = document.querySelector('#' + formId + ' [name="' + name + '"]');
    if (input) {
      input.value = value || '';
    }
  }

  function setText(id, value) {
    var element = document.getElementById(id);
    if (element) {
      element.textContent = value;
    }
  }

  function formatValue(value) {
    if (value === undefined || value === null || value === '') {
      return '';
    }
    if (typeof value === 'object') {
      return JSON.stringify(value);
    }
    return String(value);
  }

  function escapeHtml(value) {
    return formatValue(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
