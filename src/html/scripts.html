  function normalizePaymentRequest_(request) {
    request = request || {};
    var amount = Number(request.amount || 0);
    var currency = request.currency || 'RSD';
    var path = request.approvalPath || request.approval_path || decidePaymentRequestPath_(amount, currency);
    return {
      raw: request,
      id: request.id || request.request_id || request.requestNo || '',
      no: request.requestNo || request.request_id || request.id || '',
      date: request.createdAt || request.created_at || '',
      requester: request.requesterName || shortUserLabel_(request.createdBy || request.created_by || ''),
      createdBy: request.createdBy || request.created_by || '',
      recipient: request.recipientName || request.requested_for_name || '',
      cashboxId: request.cashboxId || request.preferred_cashbox_id || request.cashbox_id || '',
      cashbox: request.cashboxName || request.cashbox_id || request.preferred_cashbox_id || '',
      basis: request.requestBasis || request.purpose || '',
      amount: amount,
      currency: currency,
      status: request.status || 'DRAFT',
      dueDate: request.requestedPaymentDate || request.needed_by_date || '',
      priority: request.priority || 'NORMAL',
      explanation: request.explanation || request.description || '',
      approvalPath: path,
      linkedPaymentOrderId: request.linkedPaymentOrderId || request.linked_order_id || '',
      linkedPaymentOrderNo: request.linkedPaymentOrderNo || request.linked_order_id || '',
      directCashEventId: request.directCashEventId || request.direct_cash_event_id || '',
      rejectionReason: request.rejectionReason || request.rejection_reason || '',
      returnedForCorrectionReason: request.returnedForCorrectionReason || request.returned_for_correction_reason || '',
      attachments: request.attachments || [],
      activities: request.activities || []
    };
  }

  function decidePaymentRequestPath_(amount, currency) {
    amount = Number(amount || 0);
    if (!amount) return 'UNDECIDED';
    return amount <= getPaymentRequestLimit_(currency) ? 'AUTO_ORDER' : 'PAYMENT_ORDER';
  }

  function getPaymentRequestLimit_(currency) {
    var configuredRules = (uiState.config && uiState.config.paymentRequestApprovalRules) || {};
    var rule = configuredRules[currency] || PAYMENT_REQUEST_RULES[currency] || PAYMENT_REQUEST_RULES.RSD;
    return Number(rule.cashierDirectApprovalLimit || 0);
  }

  function paymentRequestStatusLabel_(status) {
    var map = {
      DRAFT: 'Nacrt',
      SUBMITTED: 'Poslat',
      CASHIER_REVIEW: 'U obradi',
      IN_REVIEW: 'U obradi',
      APPROVED: 'Odobren',
      APPROVED_FOR_DIRECT_PAYMENT: 'Deprecated direktno',
      ESCALATED_TO_ORDER: 'Potreban nalog',
      ORDER_CREATED: 'Kreiran nalog',
      CONVERTED_TO_ORDER: 'Kreiran nalog',
      PAID: 'Isplaćen',
      REJECTED: 'Odbijen',
      RETURNED_FOR_CORRECTION: 'Vraćen',
      CANCELLED: 'Poništen'
    };
    return map[status] || status || '—';
  }

  function paymentRequestStatusClass_(status) {
    if (status === 'PAID' || status === 'ORDER_CREATED' || status === 'CONVERTED_TO_ORDER') return 'po-status-paid';
    if (status === 'REJECTED') return 'po-status-rejected';
    if (status === 'CANCELLED') return 'po-status-cancelled';
    if (status === 'CASHIER_REVIEW' || status === 'IN_REVIEW' || status === 'RETURNED_FOR_CORRECTION' || status === 'ESCALATED_TO_ORDER' || status === 'APPROVED') return 'po-status-processing';
    return 'po-status-waiting';
  }

  function paymentRequestPathLabel_(path) {
    if (path === 'AUTO_ORDER' || path === 'DIRECT_PAYMENT') return 'Automatski nalog';
    if (path === 'PAYMENT_ORDER') return 'Nalog';
    return 'Neodlučeno';
  }

  function paymentRequestPathClass_(path) {
    if (path === 'AUTO_ORDER' || path === 'DIRECT_PAYMENT') return 'request-path-direct';
    if (path === 'PAYMENT_ORDER') return 'request-path-order';
    return 'request-path-undecided';
  }

  function populatePaymentRequestFilters_() {
    populatePaymentOrderSelect_('d-request-cashbox-filter', 'Blagajna', PAYMENT_REQUESTS_STATE.records.map(function(r) { return r.cashbox; }));
    populatePaymentOrderSelect_('d-request-currency-filter', 'Valuta', PAYMENT_REQUESTS_STATE.records.map(function(r) { return r.currency; }));
    populatePaymentOrderSelect_('d-request-status-filter', 'Status', PAYMENT_REQUESTS_STATE.records.map(function(r) { return r.status; }), paymentRequestStatusLabel_);
    populatePaymentOrderSelect_('d-request-requester-filter', 'Podnosilac', PAYMENT_REQUESTS_STATE.records.map(function(r) { return r.requester; }));
    populatePaymentOrderSelect_('d-request-recipient-filter', 'Primalac', PAYMENT_REQUESTS_STATE.records.map(function(r) { return r.recipient; }));
  }

  function filterPaymentRequests_() {
    var tab = PAYMENT_REQUESTS_STATE.tab || 'ALL';
    var search = ((document.getElementById('d-request-search') || {}).value || '').toLowerCase().trim();
    var from = (document.getElementById('d-request-date-from') || {}).value || '';
    var to = (document.getElementById('d-request-date-to') || {}).value || '';
    var cashbox = (document.getElementById('d-request-cashbox-filter') || {}).value || '';
    var currency = (document.getElementById('d-request-currency-filter') || {}).value || '';
    var status = (document.getElementById('d-request-status-filter') || {}).value || '';
    var requester = (document.getElementById('d-request-requester-filter') || {}).value || '';
    var recipient = (document.getElementById('d-request-recipient-filter') || {}).value || '';
    var path = (document.getElementById('d-request-path-filter') || {}).value || '';
    var fromDate = from ? new Date(from + 'T00:00:00') : null;
    var toDate = to ? new Date(to + 'T23:59:59') : null;
    return PAYMENT_REQUESTS_STATE.records.filter(function(req) {
      var d = req.date ? new Date(req.date) : null;
      if (fromDate && d && d < fromDate) return false;
      if (toDate && d && d > toDate) return false;
      if (cashbox && req.cashbox !== cashbox) return false;
      if (currency && req.currency !== currency) return false;
      if (status && req.status !== status) return false;
      if (requester && req.requester !== requester) return false;
      if (recipient && req.recipient !== recipient) return false;
      if (path && req.approvalPath !== path) return false;
      if (!matchesPaymentRequestTab_(req, tab)) return false;
      if (search) {
        var haystack = [req.no, req.recipient, req.requester, req.basis, req.linkedPaymentOrderNo, req.status, req.currency].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function matchesPaymentRequestTab_(req, tab) {
    if (tab === 'ALL') return true;
    if (tab === 'CREATED') return req.status === 'DRAFT' || req.status === 'SUBMITTED';
    if (tab === 'IN_PROGRESS') return req.status === 'CASHIER_REVIEW' || req.status === 'IN_REVIEW';
    if (tab === 'DIRECT') return req.approvalPath === 'AUTO_ORDER' || req.approvalPath === 'DIRECT_PAYMENT';
    if (tab === 'ORDER') return req.approvalPath === 'PAYMENT_ORDER' || req.status === 'APPROVED' || req.status === 'ORDER_CREATED' || req.status === 'ESCALATED_TO_ORDER' || req.status === 'CONVERTED_TO_ORDER';
    if (tab === 'PAID') return req.status === 'PAID';
    if (tab === 'REJECTED') return req.status === 'REJECTED';
    if (tab === 'RETURNED') return req.status === 'RETURNED_FOR_CORRECTION';
    if (tab === 'CANCELLED') return req.status === 'CANCELLED';
    return true;
  }

  function renderPaymentRequestsOverview_() {
    PAYMENT_REQUESTS_STATE.filtered = filterPaymentRequests_();
    renderPaymentRequestKpis_();
    renderPaymentRequestTable_();
    var selected = PAYMENT_REQUESTS_STATE.filtered.find(function(r) { return r.id === PAYMENT_REQUESTS_STATE.selectedId; }) || PAYMENT_REQUESTS_STATE.filtered[0] || null;
    PAYMENT_REQUESTS_STATE.selectedId = selected ? selected.id : '';
    renderPaymentRequestDetail_(selected);
  }

  function renderPaymentRequestKpis_() {
    var rows = PAYMENT_REQUESTS_STATE.filtered;
    var counts = { waiting: 0, direct: 0, order: 0, rejected: 0, returned: 0 };
    rows.forEach(function(req) {
      if (['SUBMITTED','CASHIER_REVIEW','IN_REVIEW','ESCALATED_TO_ORDER','APPROVED'].indexOf(req.status) !== -1) counts.waiting++;
      if (req.approvalPath === 'AUTO_ORDER' || req.approvalPath === 'DIRECT_PAYMENT') counts.direct++;
      if (req.approvalPath === 'PAYMENT_ORDER' || req.status === 'ORDER_CREATED' || req.status === 'CONVERTED_TO_ORDER') counts.order++;
      if (req.status === 'REJECTED') counts.rejected++;
      if (req.status === 'RETURNED_FOR_CORRECTION') counts.returned++;
    });
    setText_('d-request-kpi-total', rows.length);
    setText_('d-request-kpi-waiting', counts.waiting);
    setText_('d-request-kpi-direct', counts.direct);
    setText_('d-request-kpi-order', counts.order);
    setText_('d-request-kpi-rejected', counts.rejected);
    setText_('d-request-kpi-returned', counts.returned);
  }

  function renderPaymentRequestTable_() {
    var target = document.getElementById('d-zahtevi-list');
    if (!target) return;
    var rows = PAYMENT_REQUESTS_STATE.filtered;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema zahteva za izabrane filtere.</p></div>';
      return;
    }
    var pageSize = PAYMENT_REQUESTS_STATE.pageSize;
    var totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    PAYMENT_REQUESTS_STATE.page = Math.min(Math.max(1, PAYMENT_REQUESTS_STATE.page), totalPages);
    var start = (PAYMENT_REQUESTS_STATE.page - 1) * pageSize;
    var visible = rows.slice(start, start + pageSize);
    target.innerHTML =
      '<table class="po-table"><thead><tr>' +
        '<th>Broj zahteva</th><th>Datum</th><th>Podnosilac</th><th>Primalac</th><th>Blagajna</th><th>Osnov</th><th>Iznos</th><th>Valuta</th><th>Put</th><th>Status</th><th>Rok</th><th>Akcije</th>' +
      '</tr></thead><tbody>' +
      visible.map(function(req) {
        var selected = req.id === PAYMENT_REQUESTS_STATE.selectedId ? ' po-row-selected' : '';
        return '<tr class="po-row' + selected + '" data-request-id="' + escapeHtml(req.id) + '">' +
          '<td><strong>' + escapeHtml(req.no || '—') + '</strong></td>' +
          '<td>' + escapeHtml(formatDateTimeShort_(req.date)) + '</td>' +
          '<td>' + escapeHtml(req.requester || '—') + '</td>' +
          '<td>' + escapeHtml(req.recipient || '—') + '</td>' +
          '<td>' + escapeHtml(req.cashbox || '—') + '</td>' +
          '<td>' + escapeHtml(req.basis || '—') + '</td>' +
          '<td class="po-amount">' + escapeHtml(formatAmount_(req.amount)) + '</td>' +
          '<td>' + escapeHtml(req.currency || '—') + '</td>' +
          '<td><span class="request-path-pill ' + paymentRequestPathClass_(req.approvalPath) + '">' + escapeHtml(paymentRequestPathLabel_(req.approvalPath)) + '</span></td>' +
          '<td><span class="po-status ' + paymentRequestStatusClass_(req.status) + '">' + escapeHtml(paymentRequestStatusLabel_(req.status)) + '</span></td>' +
          '<td>' + escapeHtml(formatDateShort_(req.dueDate)) + '</td>' +
          '<td><button type="button" class="small" data-request-open="' + escapeHtml(req.id) + '"><i class="ti ti-eye" aria-hidden="true"></i></button></td>' +
        '</tr>';
      }).join('') +
      '</tbody></table>' +
      '<div class="po-pagination"><span>Prikazano ' + (start + 1) + '–' + (start + visible.length) + ' od ' + rows.length + '</span>' +
        '<button type="button" data-pr-page="prev">‹</button><strong>' + PAYMENT_REQUESTS_STATE.page + '</strong><button type="button" data-pr-page="next">›</button>' +
      '</div>';
    target.querySelectorAll('[data-request-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        PAYMENT_REQUESTS_STATE.selectedId = row.getAttribute('data-request-id') || '';
        renderPaymentRequestTable_();
        renderPaymentRequestDetail_(PAYMENT_REQUESTS_STATE.filtered.find(function(r) { return r.id === PAYMENT_REQUESTS_STATE.selectedId; }) || null);
      });
    });
    target.querySelectorAll('[data-request-open]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        PAYMENT_REQUESTS_STATE.selectedId = btn.getAttribute('data-request-open') || '';
        renderPaymentRequestTable_();
        renderPaymentRequestDetail_(PAYMENT_REQUESTS_STATE.filtered.find(function(r) { return r.id === PAYMENT_REQUESTS_STATE.selectedId; }) || null);
      });
    });
    target.querySelectorAll('[data-pr-page]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        PAYMENT_REQUESTS_STATE.page += btn.getAttribute('data-pr-page') === 'next' ? 1 : -1;
        renderPaymentRequestTable_();
      });
    });
  }

  function renderPaymentRequestDetail_(req) {
    var target = document.getElementById('d-request-detail-body');
    if (!target) return;
    if (!req) {
      target.className = 'po-empty-detail';
      target.innerHTML = 'Izaberite zahtev iz tabele za prikaz detalja.';
      return;
    }
    target.className = '';
    var limit = getPaymentRequestLimit_(req.currency);
    var inLimit = req.amount <= limit;
    var canEdit = req.status === 'DRAFT';
    var canSubmit = req.status === 'DRAFT';
    var canCreateOrder = ['SUBMITTED','CASHIER_REVIEW','IN_REVIEW','ESCALATED_TO_ORDER','APPROVED'].indexOf(req.status) !== -1 && !req.linkedPaymentOrderId && req.status !== 'PAID';
    var canReject = ['SUBMITTED','CASHIER_REVIEW','IN_REVIEW','ESCALATED_TO_ORDER'].indexOf(req.status) !== -1;
    var canReturn = canReject;
    var isPaid = req.status === 'PAID';
    var createOrderLabel = inLimit ? 'Kreiraj nalog' : 'Odobri i kreiraj nalog';
    target.innerHTML =
      '<div class="po-detail-head"><h3>Detalji zahteva</h3><span class="po-status ' + paymentRequestStatusClass_(req.status) + '">' + escapeHtml(paymentRequestStatusLabel_(req.status)) + '</span></div>' +
      '<div class="po-detail-amount">' + escapeHtml(formatAmount_(req.amount)) + ' ' + escapeHtml(req.currency || '') + '</div>' +
      '<div class="po-detail-grid">' +
        renderPaymentOrderField_('Broj zahteva', req.no) +
        renderPaymentOrderField_('Datum i vreme', formatDateTimeShort_(req.date)) +
        renderPaymentOrderField_('Podnosilac', req.requester) +
        renderPaymentOrderField_('Primalac', req.recipient) +
        renderPaymentOrderField_('Blagajna', req.cashbox) +
        renderPaymentOrderField_('Valuta', req.currency) +
        renderPaymentOrderField_('Rok za isplatu', formatDateShort_(req.dueDate)) +
        renderPaymentOrderField_('Osnov zahteva', req.basis) +
        renderPaymentOrderField_('Limit blagajnika', formatAmount_(limit) + ' ' + req.currency) +
        renderPaymentOrderField_('Iznos u limitu', inLimit ? 'Da' : 'Ne') +
        renderPaymentOrderField_('Preporučeni put', paymentRequestPathLabel_(req.approvalPath)) +
        renderPaymentOrderField_('Povezani nalog', req.linkedPaymentOrderNo || '—') +
      '</div>' +
      '<div class="request-detail-note"><strong>Obrazloženje</strong><br>' + escapeHtml(req.explanation || '—') + '</div>' +
      '<div class="po-tabs" data-request-detail-tabs><span class="active" data-tab="overview">Pregled</span><span data-tab="docs">Povezani dokumenti</span><span data-tab="activity">Aktivnosti</span></div>' +
      '<div class="request-detail-tabs-panel" data-request-panel="overview">' +
        '<div class="po-detail-columns">' +
          '<div><h4>Tok zahteva</h4>' + renderPaymentRequestTimeline_(req) + '</div>' +
          '<div><h4>Kontrola i validacija</h4>' + renderPaymentRequestControls_(req) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="request-detail-tabs-panel" data-request-panel="docs" hidden>' + renderPaymentRequestDocuments_(req) + '</div>' +
      '<div class="request-detail-tabs-panel" data-request-panel="activity" hidden>' + renderPaymentRequestActivities_(req) + '</div>' +
      '<div class="po-panel-actions">' +
        '<button type="button" id="d-request-open-detail"><i class="ti ti-external-link" aria-hidden="true"></i> Otvori detalje</button>' +
        '<button type="button" id="d-request-edit" ' + (canEdit ? '' : 'disabled title="Izmena je dostupna samo za nacrt."') + '><i class="ti ti-pencil" aria-hidden="true"></i> Edituj nacrt</button>' +
        '<button type="button" id="d-request-submit-draft" ' + (canSubmit ? '' : 'disabled title="Slanje je dostupno samo za nacrt."') + '><i class="ti ti-send" aria-hidden="true"></i> Pošalji zahtev</button>' +
        '<button type="button" id="d-request-create-order" ' + (canCreateOrder ? '' : 'disabled title="' + escapeHtml(req.linkedPaymentOrderId ? 'Nalog je već kreiran.' : 'Kreiranje naloga nije dostupno za ovaj zahtev.') + '"') + '><i class="ti ti-file-invoice" aria-hidden="true"></i> ' + escapeHtml(createOrderLabel) + '</button>' +
        '<button type="button" id="d-request-reject" ' + (canReject ? '' : 'disabled') + '><i class="ti ti-circle-x" aria-hidden="true"></i> Odbij</button>' +
        '<button type="button" id="d-request-return" ' + (canReturn ? '' : 'disabled') + '><i class="ti ti-arrow-back-up" aria-hidden="true"></i> Vrati na dopunu</button>' +
      '</div>';
    bindPaymentRequestDetailActions_(req);
  }

  function renderPaymentRequestTimeline_(req) {
    var items = [
      ['Kreiran', req.date, req.requester],
      ['Poslat', req.date, req.requester],
      ['U obradi', req.date, 'Blagajna']
    ];
    if (req.approvalPath === 'AUTO_ORDER' || req.approvalPath === 'DIRECT_PAYMENT') items.push(['Automatski nalog', req.linkedPaymentOrderNo || req.linkedPaymentOrderId || 'čeka kreiranje', 'Sistem']);
    if (req.approvalPath === 'PAYMENT_ORDER') items.push(['Nalog za isplatu', req.linkedPaymentOrderNo || req.linkedPaymentOrderId || 'čeka kreiranje', 'Viša instanca']);
    if (req.status === 'PAID') items.push(['Isplaćen', req.date, 'Blagajna']);
    if (req.status === 'REJECTED') items.push(['Odbijen', req.date, 'Obrada']);
    if (req.status === 'RETURNED_FOR_CORRECTION') items.push(['Vraćen na dopunu', req.date, 'Obrada']);
    if (req.status === 'CANCELLED') items.push(['Poništen', req.date, req.requester]);
    return '<div class="po-timeline">' + items.map(function(item, index) {
      return '<div class="po-timeline-item ' + (index === items.length - 1 ? 'current' : '') + '">' +
        '<span></span><strong>' + escapeHtml(item[0]) + '</strong><small>' + escapeHtml(item[2] || '—') + ' · ' + escapeHtml(formatDateTimeShort_(item[1]) || item[1] || '—') + '</small>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderPaymentRequestControls_(req) {
    var limit = getPaymentRequestLimit_(req.currency);
    var inLimit = req.amount <= limit;
    var rows = [
      ['Podnosilac validan', req.requester ? 'Da' : 'Ne', Boolean(req.requester)],
      ['Primalac identifikovan', req.recipient ? 'Da' : 'Ne', Boolean(req.recipient)],
      ['Iznos u limitu blagajnika', inLimit ? 'Da' : 'Ne', inLimit],
      ['Potrebna viša instanca', inLimit ? 'Ne' : 'Da', inLimit],
      ['Dupli zahtev pronađen', 'Ne', true],
      ['Prilozi prisutni', req.attachments.length ? 'Da' : 'Ne', true],
      ['Sredstva proverava blagajnik', req.status === 'PAID' ? 'Da' : 'U toku', true]
    ];
    return '<div class="new-order-rules">' + rows.map(function(row) {
      return '<div class="' + (row[2] ? 'request-rule-ok' : 'request-rule-warning') + '"><span>' + escapeHtml(row[0]) + '</span><strong>' + escapeHtml(row[1]) + '</strong></div>';
    }).join('') + '</div>';
  }

  function renderPaymentRequestDocuments_(req) {
    var docs = (req.attachments || []).map(function(doc) { return [doc.type || 'Prilog', doc.no || doc.name || '—', doc.date || '', doc.status || 'Dostavljen']; });
    if (req.linkedPaymentOrderNo || req.linkedPaymentOrderId) docs.push(['Nalog za isplatu', req.linkedPaymentOrderNo || req.linkedPaymentOrderId, formatDateShort_(req.date), 'Povezan']);
    if (req.directCashEventId) docs.push(['Blagajnički događaj', req.directCashEventId, formatDateShort_(req.date), 'Proknjižen']);
    if (!docs.length) return '<div class="po-empty-docs">Nema povezanih dokumenata u dostupnim podacima.</div>';
    return '<table class="po-doc-table"><thead><tr><th>Tip dokumenta</th><th>Broj dokumenta</th><th>Datum</th><th>Status</th></tr></thead><tbody>' +
      docs.map(function(doc) {
        return '<tr><td>' + escapeHtml(doc[0]) + '</td><td>' + escapeHtml(doc[1]) + '</td><td>' + escapeHtml(doc[2]) + '</td><td>' + escapeHtml(doc[3]) + '</td></tr>';
      }).join('') + '</tbody></table>';
  }

  function renderPaymentRequestActivities_(req) {
    var rows = req.activities || [];
    if (!rows.length) return '<div class="po-empty-docs">Nema aktivnosti za izabrani zahtev.</div>';
    return '<div class="request-activity-list">' + rows.map(function(row) {
      return '<div><strong>' + escapeHtml(row.title || 'Aktivnost') + '</strong><small>' + escapeHtml(formatDateTimeShort_(row.at)) + ' · ' + escapeHtml(row.user || '—') + '</small><span>' + escapeHtml(row.detail || '') + '</span></div>';
    }).join('') + '</div>';
  }

  function bindPaymentRequestDetailActions_(req) {
    document.querySelectorAll('[data-request-detail-tabs] span').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var name = tab.getAttribute('data-tab');
        document.querySelectorAll('[data-request-detail-tabs] span').forEach(function(t) { t.classList.toggle('active', t === tab); });
        document.querySelectorAll('[data-request-panel]').forEach(function(panel) {
          panel.hidden = panel.getAttribute('data-request-panel') !== name;
        });
      });
    });
    var open = document.getElementById('d-request-open-detail');
    if (open) open.addEventListener('click', function() {
      appHtmlDialog_({ title: 'Detalji zahteva ' + req.no, html: '<div class="request-detail-note">' + escapeHtml(req.explanation || 'Nema obrazloženja.') + '</div>' });
    });
    var edit = document.getElementById('d-request-edit');
    if (edit) edit.addEventListener('click', function() {
      if (req.status !== 'DRAFT') {
        showDesktopMessage_('Izmena je dostupna samo za nacrt zahteva.', 'error');
        return;
      }
      openEditPaymentRequestScreen_(req);
    });
    var submitDraft = document.getElementById('d-request-submit-draft');
    if (submitDraft) submitDraft.addEventListener('click', function() {
      if (req.status !== 'DRAFT') {
        showDesktopMessage_('Slanje je dostupno samo za nacrt zahteva.', 'error');
        return;
      }
      appConfirm_({
        title: 'Pošalji nacrt zahteva?',
        message: 'Zahtev će biti poslat na obradu. U okviru limita sistem kreira nalog za isplatu, a preko limita čeka višu instancu.',
        confirmText: 'Pošalji zahtev'
      }, function() {
        if (!shouldUseMockRequestAction_(req)) {
          callApi('apiSubmitPaymentRequest', [req.id], function(updated) {
            showDesktopMessage_('Zahtev je poslat na obradu.', 'success');
            replacePaymentRequestRecord_(req, updated);
            loadDesktopNavBadges_();
          }, { successMessage: 'Zahtev je poslat.' });
          return;
        }
        req.status = 'SUBMITTED';
        req.activities.push({ at: new Date().toISOString(), title: 'Zahtev poslat', user: newOrderCurrentUserName_(), detail: 'Nacrt je poslat na obradu.' });
        showDesktopMessage_('Zahtev je poslat na obradu.', 'success');
        renderPaymentRequestsOverview_();
      });
    });
    var createOrder = document.getElementById('d-request-create-order');
    if (createOrder) createOrder.addEventListener('click', function() {
      if (req.linkedPaymentOrderId) {
        showDesktopMessage_('Iz ovog zahteva je već kreiran nalog. Automatsko dupliranje nije dozvoljeno.', 'error');
        return;
      }
      appConfirm_({
        title: 'Kreiraj nalog iz zahteva?',
        message: 'Biće kreiran nalog za isplatu i povezan sa zahtevom ' + req.no + '. Zahtev i nalog ne menjaju stanje blagajne.',
        confirmText: 'Kreiraj nalog'
      }, function() {
        if (!shouldUseMockRequestAction_(req)) {
          callApi('apiApproveAndIssuePaymentOrder', [req.id, { cashbox_id: req.cashboxId || getDefaultCashboxId() }], function(issued) {
            req.status = 'ORDER_CREATED';
            req.approvalPath = 'PAYMENT_ORDER';
            req.linkedPaymentOrderId = issued.source_request_id ? issued.order_id : (issued.order_id || '');
            req.linkedPaymentOrderNo = issued.order_id || '';
            showDesktopMessage_('Nalog je kreiran i poslat blagajni. Stanje blagajne nije promenjeno.', 'success');
            loadDesktopPaymentRequests_();
          }, { successMessage: 'Nalog je kreiran iz zahteva.' });
          return;
        }
        req.status = 'ORDER_CREATED';
        req.approvalPath = 'PAYMENT_ORDER';
        req.linkedPaymentOrderId = 'ORD-MOCK-' + String(Date.now()).slice(-5);
        req.linkedPaymentOrderNo = 'NI-2026-' + req.linkedPaymentOrderId.slice(-5);
        req.activities.push({ at: new Date().toISOString(), title: 'Kreiran nalog', user: newOrderCurrentUserName_(), detail: 'Mock nalog ' + req.linkedPaymentOrderNo + ' povezan sa zahtevom.' });
        showDesktopMessage_('Mock nalog je kreiran i povezan sa zahtevom.', 'success');
        renderPaymentRequestsOverview_();
      });
    });
    var reject = document.getElementById('d-request-reject');
    if (reject) reject.addEventListener('click', function() {
      appPrompt_({
        title: 'Odbijanje zahteva',
        message: 'Unesite razlog odbijanja zahteva ' + req.no + '.',
        confirmText: 'Odbij zahtev',
        placeholder: 'Razlog odbijanja',
        danger: true
      }, function(reason) {
        if (!shouldUseMockRequestAction_(req)) {
          callApi('apiRejectPaymentRequest', [req.id, reason], function(updated) {
            showDesktopMessage_('Zahtev je odbijen uz razlog.', 'success');
            replacePaymentRequestRecord_(req, updated);
          }, { successMessage: 'Zahtev je odbijen.' });
          return;
        }
        req.status = 'REJECTED';
        req.rejectionReason = reason;
        req.activities.push({ at: new Date().toISOString(), title: 'Odbijeno', user: newOrderCurrentUserName_(), detail: reason });
        showDesktopMessage_('Zahtev je odbijen uz razlog.', 'success');
        renderPaymentRequestsOverview_();
      });
    });
    var returnBtn = document.getElementById('d-request-return');
    if (returnBtn) returnBtn.addEventListener('click', function() {
      appPrompt_({
        title: 'Vraćanje na dopunu',
        message: 'Unesite šta podnosilac treba da dopuni za zahtev ' + req.no + '.',
        confirmText: 'Vrati na dopunu',
        placeholder: 'Šta treba dopuniti?'
      }, function(note) {
        if (!shouldUseMockRequestAction_(req)) {
          callApi('apiReturnPaymentRequestForCorrection', [req.id, note], function(updated) {
            showDesktopMessage_('Zahtev je vraćen na dopunu.', 'success');
            replacePaymentRequestRecord_(req, updated);
          }, { successMessage: 'Zahtev je vraćen na dopunu.' });
          return;
        }
        req.status = 'RETURNED_FOR_CORRECTION';
        req.returnedForCorrectionReason = note;
        req.activities.push({ at: new Date().toISOString(), title: 'Vraćeno na dopunu', user: newOrderCurrentUserName_(), detail: note });
        showDesktopMessage_('Zahtev je vraćen na dopunu.', 'success');
        renderPaymentRequestsOverview_();
      });
    });
  }

    window.__newPaymentRequestBound = true;
    var form = document.getElementById('new-payment-request-form');

    if (cancel) cancel.addEventListener('click', function() { confirmLeaveNewPaymentRequest_(openPaymentRequestsOverview_); });
    var save = document.getElementById('new-request-save-draft');
    if (save) save.addEventListener('click', saveNewPaymentRequestDraft_);
    var submit = document.getElementById('new-request-submit');
    if (submit) submit.addEventListener('click', submitNewPaymentRequest_);
    var file = document.getElementById('new-request-file');
    if (file) file.addEventListener('change', handleNewRequestFiles_);
    form.querySelectorAll('input,select,textarea').forEach(function(input) {
      input.addEventListener('input', function() {
        NEW_PAYMENT_REQUEST_STATE.dirty = true;
        if (input.id === 'new-request-description') updateNewRequestDescriptionCounter_();
        clearNewRequestFieldError_(input.id);
        renderNewRequestPanels_();
      });
      input.addEventListener('change', function() {
        NEW_PAYMENT_REQUEST_STATE.dirty = true;
        clearNewRequestFieldError_(input.id);
        renderNewRequestPanels_();
      });
    });

      });

  function collectNewPaymentRequestData_() {
    return {
      cashbox_id: valueOf_('new-request-cashbox'),
      requested_for_name: valueOf_('new-request-recipient'),
      amount: parseAmountInput_(valueOf_('new-request-amount')),
      currency: valueOf_('new-request-currency'),
      purpose: valueOf_('new-request-purpose'),
      needed_by_date: valueOf_('new-request-needed-by'),
      priority: valueOf_('new-request-priority') || 'NORMAL',
      description: valueOf_('new-request-description'),
      approvalPath: decidePaymentRequestPath_(parseAmountInput_(valueOf_('new-request-amount')), valueOf_('new-request-currency')),
      document_status: NEW_PAYMENT_REQUEST_STATE.attachments.length ? 'ATTACHED' : 'NONE'
    };
  }

  function validateNewPaymentRequest_() {
    clearAllNewRequestErrors_();
    var data = collectNewPaymentRequestData_();
    var ok = true;
    if (!data.cashbox_id) ok = setNewRequestFieldError_('new-request-cashbox', 'Izaberite blagajnu.') && false;
    if (!data.requested_for_name) ok = setNewRequestFieldError_('new-request-recipient', 'Unesite primaoca isplate.') && false;
    if (!data.amount || data.amount <= 0) ok = setNewRequestFieldError_('new-request-amount', 'Unesite iznos veći od nule.') && false;
    if (!data.currency) ok = setNewRequestFieldError_('new-request-currency', 'Izaberite valutu.') && false;
    if (!data.purpose) ok = setNewRequestFieldError_('new-request-purpose', 'Unesite osnov zahteva.') && false;
    if (!data.description || data.description.length < 10) ok = setNewRequestFieldError_('new-request-description', 'Obrazloženje mora imati najmanje 10 karaktera.') && false;
    if (data.description && data.description.length > 500) ok = setNewRequestFieldError_('new-request-description', 'Obrazloženje može imati najviše 500 karaktera.') && false;
    if (data.needed_by_date) {
      var requestDate = parseDateSafe_(valueOf_('new-request-date'));
      var dueDate = parseDateSafe_(data.needed_by_date);
      if (requestDate && dueDate && dueDate < new Date(requestDate.getFullYear(), requestDate.getMonth(), requestDate.getDate())) {
        ok = setNewRequestFieldError_('new-request-needed-by', 'Rok ne sme biti pre datuma zahteva.') && false;
      }
    }
    if (data.priority === 'VERY_URGENT' && data.description.length < 30) {
      ok = setNewRequestFieldError_('new-request-description', 'Za vrlo hitno obrazloženje mora biti jasnije i duže.') && false;
    }
    if (!ok) {
      showDesktopMessage_('Popunite obavezna polja pre slanja zahteva.', 'error');
      var firstInvalid = document.querySelector('#new-payment-request-form .invalid');
      if (firstInvalid) firstInvalid.focus();
    }
    return ok;
  }

  function buildPaymentRequestApiPayload_(data) {
    return {
      requested_for_name: data.requested_for_name,
      amount: data.amount,
      currency: data.currency,
      purpose: data.purpose,
      description: data.description,
      preferred_cashbox_id: data.cashbox_id,
      needed_by_date: data.needed_by_date,
      priority: data.priority,
      document_status: NEW_PAYMENT_REQUEST_STATE.attachments.length ? 'ATTACHED' : 'NONE'
    };
  }

  function saveNewPaymentRequestDraft_() {
    var data = collectNewPaymentRequestData_();
    var canUseBackend = window.google && google.script && google.script.run &&
      data.requested_for_name && data.amount && data.currency && data.purpose;
    if (canUseBackend && NEW_PAYMENT_REQUEST_STATE.savedRequestId && NEW_PAYMENT_REQUEST_STATE.savedRequestId.indexOf('REQ-MOCK-') !== 0) {
      callApi('apiUpdatePaymentRequest', [NEW_PAYMENT_REQUEST_STATE.savedRequestId, buildPaymentRequestApiPayload_(data)], function(updated) {
        NEW_PAYMENT_REQUEST_STATE.status = updated.status || 'DRAFT';
        NEW_PAYMENT_REQUEST_STATE.mode = 'edit';
        NEW_PAYMENT_REQUEST_STATE.dirty = false;
        addNewRequestActivity_('Sačuvane izmene', 'Postojeći nacrt zahteva je ažuriran.');
        renderNewRequestPanels_();
        renderNewRequestActivities_();
        updateNewRequestStatusBadge_();
        showDesktopMessage_('Izmene nacrta zahteva su sačuvane.', 'success');
      }, { successMessage: 'Izmene nacrta su sačuvane.' });
      return;
    }
    if (canUseBackend && !NEW_PAYMENT_REQUEST_STATE.savedRequestId) {
      callApi('apiCreatePaymentRequest', [buildPaymentRequestApiPayload_(data)], function(created) {
        NEW_PAYMENT_REQUEST_STATE.savedRequestId = created.request_id;
        NEW_PAYMENT_REQUEST_STATE.status = created.status || 'DRAFT';
        NEW_PAYMENT_REQUEST_STATE.mode = 'edit';
        NEW_PAYMENT_REQUEST_STATE.dirty = false;
        setNewOrderValue_('new-request-number', created.request_id);
        addNewRequestActivity_('Sačuvan nacrt', 'Nacrt zahteva je sačuvan u evidenciji.');
        renderNewRequestPanels_();
        renderNewRequestActivities_();
        updateNewRequestStatusBadge_();
        showDesktopMessage_('Nacrt zahteva je sačuvan.', 'success');
      }, { successMessage: 'Nacrt zahteva je sačuvan.' });
      return;
    }
    if (!NEW_PAYMENT_REQUEST_STATE.savedRequestId) {
      NEW_PAYMENT_REQUEST_STATE.savedRequestId = 'REQ-MOCK-' + String(Date.now()).slice(-5);
      setNewOrderValue_('new-request-number', 'ZI-2026-' + NEW_PAYMENT_REQUEST_STATE.savedRequestId.slice(-5));
    }
    NEW_PAYMENT_REQUEST_STATE.status = 'DRAFT';
    NEW_PAYMENT_REQUEST_STATE.mode = NEW_PAYMENT_REQUEST_STATE.savedRequestId ? 'edit' : 'create';
    NEW_PAYMENT_REQUEST_STATE.dirty = false;
    addNewRequestActivity_('Sačuvan nacrt', canUseBackend ? 'Nacrt je već evidentiran.' : 'Nacrt je sačuvan lokalno dok se ne popune obavezna polja.');
    renderNewRequestPanels_();
    renderNewRequestActivities_();
    updateNewRequestStatusBadge_();
    showDesktopMessage_('Nacrt zahteva je sačuvan.', 'success');
  }

  function submitNewPaymentRequest_() {
    if (!validateNewPaymentRequest_()) return;
    var data = collectNewPaymentRequestData_();
    appConfirm_({
      title: 'Pošalji zahtev za isplatu?',
      message: 'Zahtev će biti poslat na obradu. U okviru limita sistem kreira nalog za isplatu; preko limita zahtev ide višoj instanci, pa se nakon odobrenja kreira nalog.',
      confirmText: 'Pošalji zahtev'
    }, function() {
      if (!NEW_PAYMENT_REQUEST_STATE.savedRequestId) {
        if (window.google && google.script && google.script.run) {
          callApi('apiCreatePaymentRequest', [buildPaymentRequestApiPayload_(data)], function(created) {
            NEW_PAYMENT_REQUEST_STATE.savedRequestId = created.request_id;
            setNewOrderValue_('new-request-number', created.request_id);
            callApi('apiSubmitPaymentRequest', [created.request_id], function() {
              NEW_PAYMENT_REQUEST_STATE.status = 'SUBMITTED';
              NEW_PAYMENT_REQUEST_STATE.dirty = false;
              addNewRequestActivity_('Zahtev poslat', data.approvalPath === 'AUTO_ORDER' ? 'U okviru limita: sistem kreira nalog za isplatu.' : 'Preko limita: čeka odobrenje više instance.');
              showDesktopMessage_('Zahtev je poslat na obradu. Stanje blagajne nije promenjeno.', 'success');
              openPaymentRequestsOverview_();
            }, { successMessage: 'Zahtev je poslat.' });
          }, { successMessage: 'Zahtev je kreiran.' });
          return;
        }
        NEW_PAYMENT_REQUEST_STATE.savedRequestId = 'REQ-MOCK-' + String(Date.now()).slice(-5);
        setNewOrderValue_('new-request-number', 'ZI-2026-' + NEW_PAYMENT_REQUEST_STATE.savedRequestId.slice(-5));
      } else if (window.google && google.script && google.script.run && NEW_PAYMENT_REQUEST_STATE.savedRequestId.indexOf('REQ-MOCK-') !== 0) {
        var submitSavedRequest = function() {
          callApi('apiSubmitPaymentRequest', [NEW_PAYMENT_REQUEST_STATE.savedRequestId], function() {
            NEW_PAYMENT_REQUEST_STATE.status = 'SUBMITTED';
            NEW_PAYMENT_REQUEST_STATE.dirty = false;
            addNewRequestActivity_('Zahtev poslat', data.approvalPath === 'AUTO_ORDER' ? 'U okviru limita: sistem kreira nalog za isplatu.' : 'Preko limita: čeka odobrenje više instance.');
            showDesktopMessage_('Zahtev je poslat na obradu. Stanje blagajne nije promenjeno.', 'success');
            openPaymentRequestsOverview_();
          }, { successMessage: 'Zahtev je poslat.' });
        };
        if (NEW_PAYMENT_REQUEST_STATE.dirty) {
          callApi('apiUpdatePaymentRequest', [NEW_PAYMENT_REQUEST_STATE.savedRequestId, buildPaymentRequestApiPayload_(data)], function() {
            submitSavedRequest();
          }, { successMessage: 'Izmene nacrta su sačuvane.' });
          return;
        }
        submitSavedRequest();
        return;
      }
      NEW_PAYMENT_REQUEST_STATE.status = 'SUBMITTED';
      NEW_PAYMENT_REQUEST_STATE.dirty = false;
      addNewRequestActivity_('Zahtev poslat', data.approvalPath === 'AUTO_ORDER' ? 'U okviru limita: sistem kreira nalog za isplatu.' : 'Preko limita: čeka odobrenje više instance.');
      var record = normalizePaymentRequest_({
        id: NEW_PAYMENT_REQUEST_STATE.savedRequestId,
        requestNo: valueOf_('new-request-number'),
        createdAt: new Date().toISOString(),
        createdBy: newOrderCurrentUserName_(),
        requesterName: newOrderCurrentUserName_(),
        cashboxId: data.cashbox_id,
        cashboxName: newOrderCashboxName_(data.cashbox_id),
        currency: data.currency,
        amount: data.amount,
        recipientName: data.requested_for_name,
        requestBasis: data.purpose,
        requestedPaymentDate: data.needed_by_date,
        priority: data.priority,
        explanation: data.description,
        status: 'SUBMITTED',
        approvalPath: data.approvalPath,
        attachments: NEW_PAYMENT_REQUEST_STATE.attachments,
        activities: NEW_PAYMENT_REQUEST_STATE.activities
      });
      MOCK_PAYMENT_REQUESTS.unshift(record.raw);
      showDesktopMessage_('Zahtev je poslat na obradu. Stanje blagajne nije promenjeno.', 'success');
      openPaymentRequestsOverview_();
    });
  }

  function confirmLeaveNewPaymentRequest_(callback) {
    if (!NEW_PAYMENT_REQUEST_STATE.dirty) {
      callback();
      return;
    }
    appConfirm_({
      title: 'Nesačuvane izmene',
      message: 'Imate nesačuvane izmene. Da li želite da napustite unos?',
      confirmText: 'Napusti unos',
      danger: true
    }, callback);
  }

  function handleNewRequestFiles_(event) {
    var files = Array.prototype.slice.call(event.target.files || []);
    files.forEach(function(file) {
      var okType = /\.(pdf|jpg|jpeg|png)$/i.test(file.name || '');
      if (!okType) {
        showDesktopMessage_('Prilog nije dodat: dozvoljeni su PDF, JPG i PNG fajlovi.', 'error');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showDesktopMessage_('Prilog nije dodat: maksimalna veličina je 10 MB.', 'error');
        return;
      }
      NEW_PAYMENT_REQUEST_STATE.attachments.push({
        id: 'att-' + Date.now() + '-' + Math.random().toString(16).slice(2),
        name: file.name,
        size: file.size,
        type: 'Prilog',
        status: 'Mock'
      });
      addNewRequestActivity_('Dodat prilog', 'Dodat prilog: ' + file.name + ' (mock upload).');
      NEW_PAYMENT_REQUEST_STATE.dirty = true;
    });
    event.target.value = '';
    renderNewRequestAttachments_();
    renderNewRequestActivities_();
    renderNewRequestPanels_();
  }

  function renderNewRequestAttachments_() {
    var target = document.getElementById('new-request-attachment-list');
    if (!target) return;
    if (!NEW_PAYMENT_REQUEST_STATE.attachments.length) {
      target.innerHTML = '<div class="new-order-empty-attachment">Još nema dodatih priloga.</div>';
      return;
    }
    target.innerHTML = NEW_PAYMENT_REQUEST_STATE.attachments.map(function(att) {
      return '<div class="new-order-attachment">' +
        '<i class="ti ti-file-type-pdf" aria-hidden="true"></i>' +
        '<div><strong>' + escapeHtml(att.name) + '</strong><span>' + escapeHtml(formatBytes_(att.size)) + ' · mock prilog</span></div>' +
        '<button type="button" data-new-request-remove-att="' + escapeHtml(att.id) + '"><i class="ti ti-x" aria-hidden="true"></i></button>' +
      '</div>';
    }).join('');
    target.querySelectorAll('[data-new-request-remove-att]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-new-request-remove-att');
        NEW_PAYMENT_REQUEST_STATE.attachments = NEW_PAYMENT_REQUEST_STATE.attachments.filter(function(att) { return att.id !== id; });
        NEW_PAYMENT_REQUEST_STATE.dirty = true;
        addNewRequestActivity_('Uklonjen prilog', 'Prilog je uklonjen iz zahteva.');
        renderNewRequestAttachments_();
        renderNewRequestActivities_();
        renderNewRequestPanels_();
      });
    });
  }

  function renderNewRequestPanels_() {
    renderNewRequestSummary_();
    renderNewRequestTimeline_();
    renderNewRequestRules_();
  }

  function renderNewRequestSummary_() {
    var target = document.getElementById('new-request-summary');
    if (!target) return;
    var data = collectNewPaymentRequestData_();
    var ruleText = data.approvalPath === 'AUTO_ORDER'
      ? 'U okviru limita: sistem će automatski kreirati nalog za isplatu.'
      : data.approvalPath === 'PAYMENT_ORDER'
        ? 'Preko limita: zahtev ide na odobrenje višoj instanci; nakon odobrenja kreira se nalog za isplatu.'
        : 'Unesite iznos da bi sistem odredio tok.';
    target.innerHTML =
      newOrderSummaryRow_('Primalac', data.requested_for_name || '—') +
      newOrderSummaryRow_('Iznos', data.amount ? formatAmount_(data.amount) : '—') +
      newOrderSummaryRow_('Valuta', data.currency || '—') +
      newOrderSummaryRow_('Blagajna', newOrderCashboxName_(data.cashbox_id)) +
      newOrderSummaryRow_('Podnosilac', valueOf_('new-request-requester') || '—') +
      newOrderSummaryRow_('Osnov', data.purpose || '—') +
      newOrderSummaryRow_('Put', paymentRequestPathLabel_(data.approvalPath)) +
      newOrderSummaryRow_('Pravilo', ruleText) +
      newOrderSummaryRow_('Prilozi', String(NEW_PAYMENT_REQUEST_STATE.attachments.length));
  }

  function renderNewRequestTimeline_() {
    var target = document.getElementById('new-request-timeline');
    if (!target) return;
    var data = collectNewPaymentRequestData_();
    var status = NEW_PAYMENT_REQUEST_STATE.status;
    var steps = [
      ['Kreiran', true, valueOf_('new-request-date')],
      ['U pripremi', status === 'PENDING_SEND' || status === 'DRAFT', status === 'DRAFT' ? 'Nacrt sačuvan' : 'Nije sačuvan'],
      ['Poslat blagajni', status === 'SUBMITTED', status === 'SUBMITTED' ? 'Čeka obradu' : '—'],
      [data.approvalPath === 'PAYMENT_ORDER' ? 'Odobrenje više instance' : 'Automatski nalog', Boolean(data.amount), paymentRequestPathLabel_(data.approvalPath)],
      ['Isplaćen / Odbijen', false, '—']
    ];
    target.innerHTML = '<div class="new-order-timeline">' + steps.map(function(step) {
      return '<div class="' + (step[1] ? 'active' : '') + '"><span></span><strong>' + escapeHtml(step[0]) + '</strong><small>' + escapeHtml(step[2] || '—') + '</small></div>';
    }).join('') + '</div>';
  }

  function renderNewRequestRules_() {
    var target = document.getElementById('new-request-rules');
    if (!target) return;
    var data = collectNewPaymentRequestData_();
    var limit = getPaymentRequestLimit_(data.currency || 'RSD');
    var inLimit = data.amount > 0 && data.amount <= limit;
    var requiredOk = data.cashbox_id && data.requested_for_name && data.amount > 0 && data.currency && data.purpose && data.description.length >= 10;
    var rows = [
      ['Podnosilac validan', 'Validno', true],
      ['Obavezna polja', requiredOk ? 'Popunjeno' : 'Nedostaje', requiredOk],
      ['Iznos u okviru limita blagajnika', data.amount ? (inLimit ? 'Da' : 'Ne') : '—', inLimit || !data.amount],
      ['Potrebno više odobrenje', data.amount ? (inLimit ? 'Ne' : 'Da') : '—', inLimit || !data.amount],
      ['Prilozi', NEW_PAYMENT_REQUEST_STATE.attachments.length ? 'Dostavljeni' : 'Nisu obavezni', true],
      ['Dupli zahtev', 'Nije pronađen', true]
    ];
    target.innerHTML = rows.map(function(row) {
      return '<div class="' + (row[2] ? 'request-rule-ok' : 'request-rule-warning') + '"><span>' + escapeHtml(row[0]) + '</span><strong>' + escapeHtml(row[1]) + '</strong></div>';
    }).join('');
  }

  function renderNewRequestActivities_() {
    var target = document.getElementById('new-request-activity-list');
    if (!target) return;
    var rows = NEW_PAYMENT_REQUEST_STATE.activities.slice(-8).reverse();
    target.innerHTML = '<table><thead><tr><th>Vreme</th><th>Aktivnost</th><th>Korisnik</th><th>Detalji</th></tr></thead><tbody>' +
      rows.map(function(row) {
        return '<tr><td>' + escapeHtml(formatDateTimeShort_(row.at)) + '</td><td>' + escapeHtml(row.title) + '</td><td>' + escapeHtml(row.user) + '</td><td>' + escapeHtml(row.detail) + '</td></tr>';
      }).join('') + '</tbody></table>';
  }

  function addNewRequestActivity_(title, detail) {
    NEW_PAYMENT_REQUEST_STATE.activities.push({
      at: new Date().toISOString(),
      title: title,
      detail: detail || '',
      user: newOrderCurrentUserName_()
    });
  }

  function updateNewRequestDescriptionCounter_() {
    var desc = document.getElementById('new-request-description');
    var count = document.getElementById('new-request-description-count');
    if (count) count.textContent = String((desc && desc.value || '').length);
  }

  function updateNewRequestStatusBadge_() {
    var badge = document.getElementById('new-request-status-badge');
    if (!badge) return;
    var map = { PENDING_SEND: 'ČEKA SLANJE', DRAFT: 'NACRT', SUBMITTED: 'POSLAT' };
    badge.textContent = map[NEW_PAYMENT_REQUEST_STATE.status] || NEW_PAYMENT_REQUEST_STATE.status;
  }

  function setNewRequestFieldError_(id, message) {
    var el = document.getElementById(id);
    if (!el) return false;
    el.classList.add('invalid');
    var label = el.closest('label') || el.parentElement;
    var error = label ? label.querySelector('.new-order-error') : null;
    if (!error && label) {
      error = document.createElement('span');
      error.className = 'new-order-error';
      label.appendChild(error);
    }
    if (error) error.textContent = message;
    return false;
  }

  function clearNewRequestFieldError_(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('invalid');
    var label = el.closest('label') || el.parentElement;
    var error = label ? label.querySelector('.new-order-error') : null;
    if (error) error.remove();
  }

  function clearAllNewRequestErrors_() {
    document.querySelectorAll('#new-payment-request-form .invalid').forEach(function(el) { el.classList.remove('invalid'); });
    document.querySelectorAll('#new-payment-request-form .new-order-error').forEach(function(el) { el.remove(); });
  }

  function loadDesktopNavBadges_() {
    var naloziBadge  = document.getElementById('nav-badge-nalozi');
    var zahteviBadge = document.getElementById('nav-badge-zahtevi');
    if (naloziBadge) callApi('apiListOrdersWaitingForPayment', [], function(r) {
      naloziBadge.textContent = r.length; naloziBadge.style.display = r.length > 0 ? '' : 'none';
    }, { quiet: true });
    if (zahteviBadge) callApi('apiListRequestsForApproval', [], function(r) {
      zahteviBadge.textContent = r.length; zahteviBadge.style.display = r.length > 0 ? '' : 'none';
    }, { quiet: true });
  }

  /* ─── Message helpers ────────────────────────────────────────── */

  function showDesktopMessage_(msg, type) {
    var el = document.getElementById('d-message');
    if (!el) return;
    el.textContent = msg;
    el.className   = 'message show ' + (type || 'info');
    scheduleMessageHide_(el, 'd-message', type);
  }

  function showMobileMessage_(msg, type) {
    var el = document.getElementById('m-message');
    if (!el) return;
    el.textContent = msg;
    el.className   = 'message show ' + (type || 'info');
    scheduleMessageHide_(el, 'm-message', type);
  }

  function appPrompt_(options, onConfirm) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Potvrda') + '</h3>' +
        '<p>' + escapeHtml(options.message || '') + '</p>' +
        '<textarea rows="4" data-dialog-input placeholder="' + escapeHtml(options.placeholder || options.label || '') + '"></textarea>' +
        '<div class="app-dialog-actions">' +
          '<button type="button" class="btn-ghost" data-dialog-cancel>Otkaži</button>' +
          '<button type="button" class="' + (options.danger ? 'btn-out' : 'btn-primary') + '" data-dialog-ok>' + escapeHtml(options.confirmText || 'Potvrdi') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var input = overlay.querySelector('[data-dialog-input]');
    var close = function() { overlay.remove(); };
    overlay.querySelector('[data-dialog-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', function() {
      var value = (input.value || '').trim();
      if (!value) {
        input.focus();
        showMessage('Unesite razlog pre potvrde.', 'error');
        return;
      }
      close();
      onConfirm(value);
    });
    window.setTimeout(function() { input.focus(); }, 50);
  }

  function appConfirm_(options, onConfirm) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Potvrda') + '</h3>' +
        '<p>' + escapeHtml(options.message || 'Da li želite da nastavite?') + '</p>' +
        '<div class="app-dialog-actions">' +
          '<button type="button" class="btn-ghost" data-dialog-cancel>Otkaži</button>' +
          '<button type="button" class="' + (options.danger ? 'btn-out' : 'btn-primary') + '" data-dialog-ok>' + escapeHtml(options.confirmText || 'Potvrdi') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.querySelector('[data-dialog-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', function() {
      close();
      onConfirm();
    });
  }

  function appHtmlDialog_(options) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Pregled') + '</h3>' +
        '<div>' + (options.html || '') + '</div>' +
        '<div class="app-dialog-actions" style="margin-top:12px">' +
          '<button type="button" class="btn-primary" data-dialog-ok>' + escapeHtml(options.confirmText || 'Zatvori') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', close);
  }

  function updateHeaderClock_() {
    var now = new Date();
    var dateText = now.toLocaleDateString('sr-RS', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
    var timeText = now.toLocaleTimeString('sr-RS', {
      hour: '2-digit',
      minute: '2-digit'
    });
    var dDate = document.getElementById('d-current-date');
    var dTime = document.getElementById('d-current-time');
    var mDate = document.getElementById('m-current-date');
    var mTime = document.getElementById('m-current-time');
    if (dDate) dDate.textContent = dateText;
    if (dTime) dTime.textContent = timeText;
    if (mDate) mDate.textContent = dateText;
    if (mTime) mTime.textContent = timeText;
  }

  function startHeaderClock_() {
    updateHeaderClock_();
    if (window.__blagajnaClockTimer) return;
    window.__blagajnaClockTimer = window.setInterval(updateHeaderClock_, 1000);
  }

  function startLiveRefresh_(isDesktop, isMobile) {
    if (window.__blagajnaLiveRefreshTimer) {
      window.clearInterval(window.__blagajnaLiveRefreshTimer);
    }
    window.__blagajnaLiveRefreshTimer = window.setInterval(function() {
      if (document.hidden) return;
      refreshActiveShiftState_({ enforce: false, refreshKnjiga: false });
      refreshBalance_();
      loadKnjiga_(true);
      if (isMobile) loadMobileNalozi_();
      if (isDesktop) loadDesktopNavBadges_();
    }, 15000);
  }

  function registerPwa_() {
    if (!('serviceWorker' in navigator)) return;
    try {
      navigator.serviceWorker.register('?view=sw').catch(function() {});
    } catch (err) {}
  }

  /* ─── Bootstrap: prošireni DOMContentLoaded ──────────────────── */

  document.addEventListener('DOMContentLoaded', function() {
    var isMobile  = Boolean(document.querySelector('.m-shell'));
    var isDesktop = Boolean(document.querySelector('.d-shell'));

    if (isMobile)  { bindMobileNav_();  bindMobileSheet_(); }
    if (isDesktop) { bindDesktopNav_(); bindDesktopQuickForm_(); }
    if (isMobile)  { bindModernShellForms_(); }
    bindBalanceOverviewButtons_();
    bindShiftWorkActions_();
    bindAmountFormatting_();
    bindDesktopEnterFlow_();
    startHeaderClock_();
    registerPwa_();

    // Današnji datum u date inputima
    var today = new Date().toISOString().split('T')[0];
    ['d-date-from','d-date-to'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = today;
    });
    document.querySelectorAll('[data-today]').forEach(function(el) { if (!el.value) el.value = today; });

    // Datum u mobilnom headeru
    var dateEl = document.getElementById('m-date');
    if (dateEl) {
      var now = new Date();
      dateEl.textContent = now.getDate() + '.' + (now.getMonth()+1) + '.' + now.getFullYear() + '.';
    }

    // Bootstrap API call
    callApi('apiGetUiBootstrap', [isDesktop], function(data) {
      uiState.config      = data.config || {};
      uiState.currentUser = data.user   || null;
      uiState.activeShift = data.activeShift || null;
      uiState.canPostDirectCashEvents = data.canPostDirectCashEvents === true;
      initializeSession();
      if (isMobile) {
        renderSheetCurrencyButtons_();
        bindSheetCurrencyButtons_();
      }
      fillConfigOptions();
      setTodayDefaults();
      renderPhysicalBalanceInputs();
      renderDenominationInputs_();
      applyDefaultCashboxFields();
      renderCurrentUser(uiState.currentUser);
      renderAppVersion_();
      applyActiveShiftFields_();
      applyDirectCashPermission_();
      loadCashbookFilterOptions_();
      bindBalanceOverviewButtons_();
      bindShiftWorkActions_();
      bindAmountFormatting_();
      enforceShiftStartup_(isDesktop, isMobile);

      // Ažuriraj korisnika u sidebar-u
      var navUser = document.querySelector('[data-nav-user]');
      if (navUser && uiState.currentUser) {
        navUser.textContent = (uiState.currentUser.full_name || uiState.currentUser.email || '') +
          ' · ' + (uiState.currentUser.role || '');
      }

      if (isDesktop && data.dashboard) renderDesktopDashboard(data.dashboard);
      if (isMobile)  applyRoleBasedHomeMobile_(uiState.currentUser && uiState.currentUser.role);

      refreshBalance_();
      loadKnjiga_(true);

      if (isMobile)  { refreshUrgentAlert(); loadMobileNalozi_(); }
      if (isDesktop) loadDesktopNavBadges_();
      startLiveRefresh_(isDesktop, isMobile);
    }, { quiet: true });
  });

</script>
