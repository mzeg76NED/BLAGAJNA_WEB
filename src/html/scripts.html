      if (el) el.addEventListener('change', renderUsersAdminOverview_);
    });
    var search = document.getElementById('d-users-search');
    if (search) search.addEventListener('input', renderUsersAdminOverview_);
    var reset = document.getElementById('d-users-reset-filters');
    if (reset) reset.addEventListener('click', function() {
      ['d-users-role-filter','d-users-status-filter','d-users-cashbox-filter'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
      if (search) search.value = '';
      renderUsersAdminOverview_();
    });
    var refresh = document.getElementById('d-users-refresh-btn');
    if (refresh) refresh.addEventListener('click', loadDesktopUsersAdmin_);
    var add = document.getElementById('d-users-add-btn');
    if (add) add.addEventListener('click', openCreateUserModal_);
    var repairOrderCashbox = document.getElementById('d-users-repair-order-cashbox-btn');
    if (repairOrderCashbox) repairOrderCashbox.addEventListener('click', confirmRepairPaymentOrderCashboxes_);
  }

  function loadDesktopUsersAdmin_(retryCount) {
    bindUsersAdminOverview_();
    if (!uiState.currentUser) {
      // Bootstrap (apiGetUiBootstrap) may still be in flight if the user opens this
      // screen right after login. Wait briefly instead of flashing a false
      // "Nemate ovlašćenje" message (see IZVESTAJ_TESTIRANJE_2026-07-09.md, tačka 3.3).
      var attempts = retryCount || 0;
      if (attempts < 20) {
        window.setTimeout(function() { loadDesktopUsersAdmin_(attempts + 1); }, 150);
        return;
      }
    }
    if (!canOpenUsersAdmin_()) {
      renderUsersAdminDenied_();
      return;
    }
    renderUsersAdminAllowed_();
    callApi('apiGetRolePermissionsMatrix', [], function(matrix) {
      USERS_ADMIN_STATE.permissionsMatrix = Array.isArray(matrix) ? matrix : [];
      USERS_ADMIN_STATE.rolePermissionsDirty = false;
      populateUsersAdminFilters_();
      callApi('apiListUsers', [{}], function(users) {
        USERS_ADMIN_STATE.users = Array.isArray(users) ? users.map(normalizeUsersAdminUser_) : [];
        if (!USERS_ADMIN_STATE.selectedUserId && USERS_ADMIN_STATE.users.length) {
          USERS_ADMIN_STATE.selectedUserId = USERS_ADMIN_STATE.users[0].user_id || '';
        }
        populateUsersAdminFilters_();
        renderUsersAdminOverview_();
      }, { quiet: true });
    }, { quiet: true });
  }

  function canOpenUsersAdmin_() {
    return currentUserHasPrivilege_('users:create') ||
      currentUserHasPrivilege_('users:update') ||
      currentUserHasPrivilege_('users:assign_roles') ||
      (uiState.currentUser && uiState.currentUser.role === 'ADMIN');
  }

  function currentUserHasPrivilege_(privilege) {
    var user = uiState.currentUser || {};
    var privileges = Array.isArray(user.privileges) ? user.privileges : [];
    return privileges.indexOf(privilege) !== -1 || user.role === 'ADMIN';
  }

  function isCurrentUserAdmin_() {
    return !!(uiState.currentUser && uiState.currentUser.role === 'ADMIN');
  }

  function renderUsersAdminDenied_() {
    var denied = document.getElementById('d-users-admin-denied');
    var content = document.getElementById('d-users-admin-content');
    if (denied) denied.hidden = false;
    if (content) content.hidden = true;
    var add = document.getElementById('d-users-add-btn');
    if (add) add.hidden = true;
    var repairOrderCashbox = document.getElementById('d-users-repair-order-cashbox-btn');
    if (repairOrderCashbox) repairOrderCashbox.hidden = true;
  }

  function renderUsersAdminAllowed_() {
    var denied = document.getElementById('d-users-admin-denied');
    var content = document.getElementById('d-users-admin-content');
    if (denied) denied.hidden = true;
    if (content) content.hidden = false;
    var add = document.getElementById('d-users-add-btn');
    if (add) add.hidden = !currentUserHasPrivilege_('users:create');
    var repairOrderCashbox = document.getElementById('d-users-repair-order-cashbox-btn');
    if (repairOrderCashbox) repairOrderCashbox.hidden = !isCurrentUserAdmin_();
  }

  /* ─── Valute (Currency CRUD) ─────────────────────────────────── */

  var CURRENCIES_ADMIN_STATE = { records: [] };

  function canOpenCurrenciesAdmin_() {
    return currentUserHasPrivilege_('currencies:manage');
  }

  function loadDesktopCurrencies_() {
    bindCurrenciesAdminOverview_();
    if (!canOpenCurrenciesAdmin_()) {
      renderCurrenciesAdminDenied_();
      return;
    }
    renderCurrenciesAdminAllowed_();
    callApi('apiListCurrencies', [], function(rows) {
      CURRENCIES_ADMIN_STATE.records = Array.isArray(rows) ? rows : [];
      renderCurrenciesAdminList_();
    }, { quiet: true });
  }

  function renderCurrenciesAdminDenied_() {
    var denied = document.getElementById('d-currencies-denied');
    var content = document.getElementById('d-currencies-content');
    if (denied) denied.hidden = false;
    if (content) content.hidden = true;
    var add = document.getElementById('d-currencies-add-btn');
    if (add) add.hidden = true;
  }

  function renderCurrenciesAdminAllowed_() {
    var denied = document.getElementById('d-currencies-denied');
    var content = document.getElementById('d-currencies-content');
    if (denied) denied.hidden = true;
    if (content) content.hidden = false;
    var add = document.getElementById('d-currencies-add-btn');
    if (add) add.hidden = false;
  }

  function renderCurrenciesAdminList_() {
    var target = document.getElementById('d-currencies-list');
    if (!target) return;
    var rows = CURRENCIES_ADMIN_STATE.records;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-coins" aria-hidden="true"></i><p>Nema definisanih valuta.</p></div>';
      return;
    }
    target.innerHTML = '<table class="po-table"><thead><tr>' +
      '<th>Šifra</th><th>Naziv</th><th>Status</th><th>Podrazumevana</th><th>Apoeni</th><th></th>' +
      '</tr></thead><tbody>' +
      rows.map(function(row) {
        var denomText = (row.denominations || []).join(', ') || '—';
        return '<tr data-currency-code="' + escapeHtml(row.currency_code) + '">' +
          '<td><strong>' + escapeHtml(row.currency_code) + '</strong></td>' +
          '<td>' + escapeHtml(row.name || '—') + '</td>' +
          '<td><span class="po-status ' + (row.active ? 'po-status-paid' : 'po-status-cancelled') + '">' + (row.active ? 'Aktivna' : 'Neaktivna') + '</span></td>' +
          '<td>' + (row.is_default ? '<i class="ti ti-star-filled" aria-hidden="true" title="Podrazumevana valuta"></i>' : '—') + '</td>' +
          '<td class="currency-denom-cell">' + escapeHtml(denomText) + '</td>' +
          '<td><button type="button" class="btn-ghost small" data-edit-currency><i class="ti ti-pencil" aria-hidden="true"></i> Izmeni</button></td>' +
        '</tr>';
      }).join('') +
      '</tbody></table>';
    target.querySelectorAll('[data-edit-currency]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var row = btn.closest('[data-currency-code]');
        var code = row ? row.getAttribute('data-currency-code') : '';
        var currency = CURRENCIES_ADMIN_STATE.records.find(function(c) { return c.currency_code === code; });
        if (currency) openCurrencyFormDialog_(currency);
      });
    });
  }

  function bindCurrenciesAdminOverview_() {
    if (window.__currenciesAdminBound) return;
    window.__currenciesAdminBound = true;
    var addBtn = document.getElementById('d-currencies-add-btn');
    if (addBtn) addBtn.addEventListener('click', function() { openCurrencyFormDialog_(null); });
    var refreshBtn = document.getElementById('d-currencies-refresh-btn');
    if (refreshBtn) refreshBtn.addEventListener('click', loadDesktopCurrencies_);
  }

  function openCurrencyFormDialog_(existing) {
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + (existing ? 'Izmena valute ' + escapeHtml(existing.currency_code) : 'Nova valuta') + '</h3>' +
        '<form id="currency-form" class="form-grid">' +
          '<label>Šifra valute (npr. RSD, EUR)' +
            '<input name="currency_code" type="text" maxlength="6" ' + (existing ? 'disabled value="' + escapeHtml(existing.currency_code) + '"' : '') + ' required></label>' +
          '<label>Naziv <input name="name" type="text" value="' + escapeHtml(existing ? existing.name : '') + '" required></label>' +
          '<label>Apoeni (odvojeni zarezom, npr. 5000,2000,1000,500,...)' +
            '<textarea name="denominations">' + escapeHtml(existing && existing.denominations ? existing.denominations.join(',') : '') + '</textarea></label>' +
          '<label class="checkbox-row"><input type="checkbox" name="active" ' + (!existing || existing.active ? 'checked' : '') + '> Aktivna</label>' +
          '<label class="checkbox-row"><input type="checkbox" name="is_default" ' + (existing && existing.is_default ? 'checked' : '') + '> Podrazumevana valuta</label>' +
          '<div class="m-detail-actions">' +
            '<button type="button" class="btn-ghost" id="currency-form-cancel">Otkaži</button>' +
            '<button type="submit" class="btn-primary" id="currency-form-save">Sačuvaj</button>' +
          '</div>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#currency-form');
    var cancelBtn = overlay.querySelector('#currency-form-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', close);
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      var data = {
        currency_code: existing ? existing.currency_code : form.elements.currency_code.value.trim().toUpperCase(),
        name: form.elements.name.value.trim(),
        denominations: form.elements.denominations.value,
        active: form.elements.active.checked,
        is_default: form.elements.is_default.checked
      };
      if (!existing && !data.currency_code) {
        showDesktopMessage_('Unesite šifru valute.', 'error');
        return;
      }
      if (!data.name) {
        showDesktopMessage_('Unesite naziv valute.', 'error');
        return;
      }
      if (existing) {
        callApi('apiUpdateCurrency', [existing.currency_code, data], function() {
          showDesktopMessage_('Valuta je ažurirana.', 'success');
          close();
          loadDesktopCurrencies_();
        });
      } else {
        callApi('apiCreateCurrency', [data], function() {
          showDesktopMessage_('Valuta je sačuvana.', 'success');
          close();
          loadDesktopCurrencies_();
        });
      }
    });
  }

  function confirmRepairPaymentOrderCashboxes_() {
    if (!isCurrentUserAdmin_()) {
      showDesktopMessage_('Samo ADMIN može da pokrene servisnu popravku blagajne naloga.', 'error');
      return;
    }
    appConfirm_({
      title: 'Servisna popravka naloga',
      message: 'Ova akcija će popraviti naloge koji imaju cashbox_id = FROM_REQUEST ili praznu blagajnu. Neće izvršiti isplate i neće promeniti iznose. Nastaviti?',
      confirmText: 'Pokreni popravku'
    }, function() {
      callApi('apiRepairPaymentOrdersCashboxFromRequest', [], function(report) {
        showDesktopMessage_('Popravka naloga je završena.', 'success');
        appHtmlDialog_({
          title: 'Rezultat popravke blagajni naloga',
          html: renderRepairPaymentOrderCashboxReport_(report || {}),
          confirmText: 'Zatvori'
        });
        loadPendingPaymentOrderOutflows_(true);
        if (typeof loadDesktopNalozi_ === 'function') {
          loadDesktopNalozi_();
        }
      }, { successMessage: 'Popravka naloga je završena.' });
    });
  }

  function renderRepairPaymentOrderCashboxReport_(report) {
    report = report || {};
    var repaired = Array.isArray(report.repaired_orders) ? report.repaired_orders : [];
    var skipped = Array.isArray(report.skipped_orders) ? report.skipped_orders : [];
    var errors = Array.isArray(report.errors) ? report.errors : [];
    var repairedHtml = repaired.length
      ? repaired.map(function(item) {
          return '<li><strong>' + escapeHtml(item.order_id || '') + '</strong>: ' +
            escapeHtml(item.old_cashbox_id || '-') + ' &rarr; ' + escapeHtml(item.new_cashbox_id || '-') +
            (item.linked_request_id ? ' <small>(' + escapeHtml(item.linked_request_id) + ')</small>' : '') +
          '</li>';
        }).join('')
      : '<li>Nema popravljenih naloga.</li>';
    var skippedHtml = skipped.length
      ? skipped.map(function(item) {
          return '<li><strong>' + escapeHtml(item.order_id || '') + '</strong>: ' + escapeHtml(item.reason || 'Preskočeno') + '</li>';
        }).join('')
      : '<li>Nema preskočenih naloga.</li>';
    var errorsHtml = errors.length
      ? '<h4>Greške</h4><ul>' + errors.map(function(item) {
          return '<li><strong>' + escapeHtml(item.order_id || '') + '</strong>: ' + escapeHtml(item.message || '') + '</li>';
        }).join('') + '</ul>'
      : '';
    return '<div class="users-admin-repair-report">' +
      '<p><strong>Pronađeno:</strong> ' + escapeHtml(report.found_count || 0) + '</p>' +
      '<p><strong>Popravljeno:</strong> ' + escapeHtml(report.repaired_count || 0) + '</p>' +
      '<p><strong>Preskočeno:</strong> ' + escapeHtml(report.skipped_count || 0) + '</p>' +
      '<h4>Popravljeni nalozi</h4><ul>' + repairedHtml + '</ul>' +
      '<h4>Preskočeni nalozi</h4><ul>' + skippedHtml + '</ul>' +
      errorsHtml +
    '</div>';
  }

  function normalizeUsersAdminUser_(user) {
    user = user || {};
    return {
      raw: user,
      user_id: user.user_id || '',
      user_code: user.user_code || '',
      email: user.email || '',
      full_name: user.full_name || '',
      role: user.role || 'VIEWER',
      active: user.active === true || user.active === 'TRUE' || user.active === 'true' || user.active === 1 || user.active === '1',
      default_cashbox_id: user.default_cashbox_id || '',
      app_login_status: user.app_login_status || inferUsersAdminLoginStatus_(user),
      privileges: Array.isArray(user.privileges) ? user.privileges.slice() : getUsersAdminRolePrivileges_(user.role || 'VIEWER'),
      last_login_at: user.last_login_at || '',
      last_logout_at: user.last_logout_at || '',
      failed_login_count: Number(user.failed_login_count || 0),
      locked_until: user.locked_until || '',
      last_google_session_email: user.last_google_session_email || '',
      created_at: user.created_at || '',
      updated_at: user.updated_at || ''
    };
  }

  function inferUsersAdminLoginStatus_(user) {
    if (!user || !user.user_code) return 'NO_USER_CODE';
    if (user.locked_until) return 'LOCKED';
    return 'PIN_SET';
  }

  function getUsersAdminRolePrivileges_(role) {
    var item = (USERS_ADMIN_STATE.permissionsMatrix || []).filter(function(row) { return row.role === role; })[0];
    return item && Array.isArray(item.privileges) ? item.privileges.slice() : [];
  }

  function populateUsersAdminFilters_() {
    populateUsersAdminRoleSelect_('d-users-role-filter', 'Sve role', '');
    populateUsersAdminCashboxSelect_('d-users-cashbox-filter', 'Sve blagajne', '');
  }

  function populateUsersAdminRoleSelect_(id, placeholder, selectedRole) {
    var el = document.getElementById(id);
    if (!el) return;
    var current = selectedRole !== undefined ? selectedRole : el.value;
    var roles = (USERS_ADMIN_STATE.permissionsMatrix || []).map(function(row) { return row.role; }).filter(Boolean);
    if (!roles.length) {
      roles = ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','CASHIER','APPROVER','REQUESTER','VIEWER','ANNOUNCER','ASSISTANT_CASHIER'];
    }
    el.innerHTML = '<option value="">' + escapeHtml(placeholder || 'Rola') + '</option>' + roles.map(function(role) {
      return '<option value="' + escapeHtml(role) + '">' + escapeHtml(role) + '</option>';
    }).join('');
    el.value = roles.indexOf(current) !== -1 ? current : '';
  }

  function populateUsersAdminCashboxSelect_(id, placeholder, selectedCashboxId) {
    var el = document.getElementById(id);
    if (!el) return;
    var current = selectedCashboxId !== undefined ? selectedCashboxId : el.value;
    var cashboxes = uiState.config && Array.isArray(uiState.config.cashboxes) ? uiState.config.cashboxes : [];
    var values = [];
    USERS_ADMIN_STATE.users.forEach(function(user) {
      if (user.default_cashbox_id && !cashboxes.some(function(cb) { return cb.cashbox_id === user.default_cashbox_id; })) {
        values.push({ cashbox_id: user.default_cashbox_id, name: user.default_cashbox_id });
      }
    });
    cashboxes.concat(values).forEach(function(cashbox) {
      if (!cashbox || !cashbox.cashbox_id) return;
      if (!values.some(function(item) { return item.cashbox_id === cashbox.cashbox_id; })) values.push(cashbox);
    });
    el.innerHTML = '<option value="">' + escapeHtml(placeholder || 'Blagajna') + '</option>' + values.map(function(cashbox) {
      return '<option value="' + escapeHtml(cashbox.cashbox_id) + '">' + escapeHtml(cashbox.name || cashbox.cashbox_id) + '</option>';
    }).join('');
    el.value = values.some(function(cashbox) { return cashbox.cashbox_id === current; }) ? current : '';
  }

  function filterUsersAdmin_() {
    var search = ((document.getElementById('d-users-search') || {}).value || '').toLowerCase().trim();
    var role = (document.getElementById('d-users-role-filter') || {}).value || '';
    var status = (document.getElementById('d-users-status-filter') || {}).value || '';
    var cashbox = (document.getElementById('d-users-cashbox-filter') || {}).value || '';
    return USERS_ADMIN_STATE.users.filter(function(user) {
      if (role && user.role !== role) return false;
      if (status === 'active' && !user.active) return false;
      if (status === 'inactive' && user.active) return false;
      if (cashbox && user.default_cashbox_id !== cashbox) return false;
      if (search) {
        var haystack = [user.user_id, user.user_code, user.email, user.full_name, user.role, user.default_cashbox_id].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function renderUsersAdminOverview_() {
    USERS_ADMIN_STATE.filtered = filterUsersAdmin_();
    renderUsersAdminKpis_();
    renderUsersAdminTable_();
    var selected = USERS_ADMIN_STATE.filtered.filter(function(user) { return user.user_id === USERS_ADMIN_STATE.selectedUserId; })[0] || USERS_ADMIN_STATE.filtered[0] || null;
    USERS_ADMIN_STATE.selectedUserId = selected ? selected.user_id : '';
    renderUsersAdminDetails_(selected);
  }

  function renderUsersAdminKpis_() {
    var rows = USERS_ADMIN_STATE.users;
    setText_('d-users-kpi-total', rows.length);
    setText_('d-users-kpi-active', rows.filter(function(user) { return user.active; }).length);
    setText_('d-users-kpi-inactive', rows.filter(function(user) { return !user.active; }).length);
    setText_('d-users-kpi-admins', rows.filter(function(user) { return user.role === 'ADMIN'; }).length);
    setText_('d-users-kpi-cashiers', rows.filter(function(user) { return user.role === 'CASHIER'; }).length);
    setText_('d-users-kpi-roles', (USERS_ADMIN_STATE.permissionsMatrix || []).length);
  }

  function renderUsersAdminTable_() {
    var target = document.getElementById('d-users-list');
    if (!target) return;
    var rows = USERS_ADMIN_STATE.filtered;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-users-off" aria-hidden="true"></i><p>Nema korisnika za izabrane filtere.</p></div>';
      return;
    }
    target.innerHTML =
      '<table class="po-table users-admin-table"><thead><tr>' +
        '<th>Korisnik</th><th>Kod</th><th>Rola</th><th>Status</th><th>Login</th><th>Poslednja prijava</th><th>Google sesija</th><th>Privilegije</th><th>Akcije</th>' +
      '</tr></thead><tbody>' +
      rows.map(function(user) {
        var selected = user.user_id === USERS_ADMIN_STATE.selectedUserId ? ' po-row-selected' : '';
        return '<tr class="po-row' + selected + '" data-user-id="' + escapeHtml(user.user_id) + '">' +
          '<td><strong>' + escapeHtml(user.full_name || '—') + '</strong><small>' + escapeHtml(user.email || user.user_id || '—') + '</small></td>' +
          '<td><strong>' + escapeHtml(user.user_code || '—') + '</strong></td>' +
          '<td><span class="user-role-badge">' + escapeHtml(user.role || '—') + '</span></td>' +
          '<td>' + renderUsersAdminStatusBadge_(user.active) + '</td>' +
          '<td>' + renderUsersAdminLoginBadge_(user) + '</td>' +
          '<td>' + escapeHtml(formatDateTimeShort_(user.last_login_at) || '—') + '</td>' +
          '<td>' + escapeHtml(user.last_google_session_email || '—') + '</td>' +
          '<td>' + escapeHtml(String((user.privileges || []).length)) + '</td>' +
          '<td class="users-admin-row-actions">' + renderUsersAdminRowActions_(user) + '</td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
    target.querySelectorAll('[data-user-id]').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target && e.target.closest('[data-user-action]')) return;
        USERS_ADMIN_STATE.selectedUserId = row.getAttribute('data-user-id') || '';
        renderUsersAdminTable_();
        renderUsersAdminDetails_(USERS_ADMIN_STATE.filtered.filter(function(user) { return user.user_id === USERS_ADMIN_STATE.selectedUserId; })[0] || null);
      });
    });
    target.querySelectorAll('[data-user-action]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var userId = btn.getAttribute('data-user-id') || '';
        var action = btn.getAttribute('data-user-action') || '';
        if (action === 'edit') openEditUserModal_(userId);
        if (action === 'toggle') confirmToggleUserActive_(userId);
      });
    });
  }

  function renderUsersAdminRowActions_(user) {
    var edit = currentUserHasPrivilege_('users:update') || currentUserHasPrivilege_('users:assign_roles');
    var toggle = currentUserHasPrivilege_('users:disable') || currentUserHasPrivilege_('users:update');
    return '<button type="button" class="btn-ghost small" data-user-action="edit" data-user-id="' + escapeHtml(user.user_id) + '"' + (edit ? '' : ' disabled') + '>Izmeni</button>' +
      '<button type="button" class="' + (user.active ? 'btn-out' : 'btn-primary') + ' small" data-user-action="toggle" data-user-id="' + escapeHtml(user.user_id) + '"' + (toggle ? '' : ' disabled') + '>' + (user.active ? 'Deaktiviraj' : 'Aktiviraj') + '</button>';
  }

  function renderUsersAdminStatusBadge_(active) {
    return '<span class="user-status-badge ' + (active ? 'is-active' : 'is-inactive') + '">' + (active ? 'Aktivan' : 'Neaktivan') + '</span>';
  }

  function renderUsersAdminLoginBadge_(user) {
    var status = user && user.app_login_status || 'PIN_NOT_SET';
    if (status === 'LOCKED') return '<span class="user-status-badge is-inactive">Zaključan</span>';
    if (status === 'PIN_SET') return '<span class="user-status-badge is-active">PIN podešen</span>';
    if (status === 'NO_USER_CODE') return '<span class="user-status-badge is-inactive">Nema koda</span>';
    return '<span class="user-status-badge is-inactive">PIN nije podešen</span>';
  }

  function renderUsersAdminDetails_(user) {
    var target = document.getElementById('d-users-detail-body');
    if (!target) return;
    if (!user) {
      target.className = 'po-empty-detail';
      target.innerHTML = 'Izaberite korisnika iz tabele za prikaz detalja.';
      return;
    }
    target.className = '';
    target.innerHTML =
      '<div class="po-detail-head users-admin-detail-head"><div><h3>' + escapeHtml(user.full_name || 'Korisnik') + '</h3><small>' + escapeHtml(user.email || '—') + '</small></div>' +
        '<div><span class="user-role-badge">' + escapeHtml(user.role || '—') + '</span>' + renderUsersAdminStatusBadge_(user.active) + '</div></div>' +

  function loginStatusLabel_(status) {
    var map = {
      PIN_SET: 'PIN podešen',

  function bindUsersAdminDetailTabs_() {
    var tabs = document.querySelectorAll('[data-users-detail-tabs] [data-users-tab]');
    if (!tabs.length) return;
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var target = tab.getAttribute('data-users-tab') || 'overview';
        tabs.forEach(function(item) {
          item.classList.toggle('active', item === tab);
        });
        document.querySelectorAll('[data-users-tab-panel]').forEach(function(panel) {
          panel.hidden = panel.getAttribute('data-users-tab-panel') !== target;
        });
      });

  function renderUsersAdminPrivileges_(privileges) {
    if (!privileges.length) return '<div class="po-empty-docs">Rola nema definisane privilegije.</div>';
    return '<div class="users-admin-privileges">' + privileges.map(function(privilege) {
      return '<span>' + escapeHtml(privilege) + '</span>';
    }).join('') + '</div>';
  }

  function renderUsersAdminRoleMatrix_(role) {
    var privileges = getUsersAdminRolePrivileges_(role);
    return renderUsersAdminPrivileges_(privileges);
  }

  function renderUsersAdminPrivilegesTab_(user) {
    var privileges = getUsersAdminRolePrivileges_(user.role || '');
    var canAssignRoles = currentUserHasPrivilege_('users:assign_roles');
    return '<div class="users-admin-role-summary">' +
        '<span>Rola korisnika</span>' +
        '<strong>' + escapeHtml(user.role || '—') + '</strong>' +
        '<p>Privilegije su izvedene iz role. Prava se menjaju na nivou role, ne pojedinačno po korisniku.</p>' +
        (!canAssignRoles ? '<small>Nemate pravo users:assign_roles, prikaz je samo za čitanje.</small>' : '<small>Izmene u matrici važe za sve korisnike sa tom rolom.</small>') +
      '</div>' +
      '<div class="users-admin-privilege-section"><h4>Privilegije role ' + escapeHtml(user.role || '—') + '</h4>' + renderUsersAdminPrivileges_(privileges) + '</div>' +
      '<div class="users-admin-privilege-section"><h4>Matrica prava po rolama</h4>' + renderUsersAdminPermissionsMatrix_(canAssignRoles) + '</div>';

  function renderUsersAdminPermissionsMatrix_(editable) {
    var matrix = USERS_ADMIN_STATE.permissionsMatrix || [];
    if (!matrix.length) {
      return '<div class="po-empty-docs">Matrica prava nije učitana.</div>';
    }
    var roles = matrix.map(function(row) { return row.role; }).filter(Boolean);
    var permissions = getUsersAdminAllPermissions_();
    var controls = editable
      ? '<div class="users-admin-matrix-actions"><button type="button" class="btn-primary small" data-save-role-permissions>Sačuvaj prava po rolama</button><button type="button" class="btn-ghost small" data-refresh-role-permissions>Osveži matricu</button></div>'
      : '';
    return controls + '<div class="users-admin-matrix-table-wrap"><table class="po-table users-admin-matrix-table"><thead><tr><th>Privilegija</th>' +
      roles.map(function(role) { return '<th>' + escapeHtml(role) + '</th>'; }).join('') +
      '</tr></thead><tbody>' +
      permissions.map(function(permission) {
        return '<tr><td><code>' + escapeHtml(permission) + '</code></td>' + roles.map(function(role) {
          var checked = getUsersAdminRolePrivileges_(role).indexOf(permission) !== -1;
          var disabled = !editable || role === 'ADMIN';
          return '<td><input type="checkbox" data-role-permission-check data-role="' + escapeHtml(role) + '" data-permission="' + escapeHtml(permission) + '"' + (checked ? ' checked' : '') + (disabled ? ' disabled' : '') + '></td>';
        }).join('') + '</tr>';
      }).join('') + '</tbody></table></div>';
  }

  function getUsersAdminAllPermissions_() {
    var result = [];
    (USERS_ADMIN_STATE.permissionsMatrix || []).forEach(function(row) {
      (Array.isArray(row.privileges) ? row.privileges : []).forEach(function(permission) {
        if (permission && result.indexOf(permission) === -1) result.push(permission);
      });
    });
    return result.sort();
  }

  function bindUsersAdminRolePermissionControls_() {
    document.querySelectorAll('[data-role-permission-check]').forEach(function(input) {
      input.addEventListener('change', function() {
        USERS_ADMIN_STATE.rolePermissionsDirty = true;
      });
    });
    var refresh = document.querySelector('[data-refresh-role-permissions]');
    if (refresh) refresh.addEventListener('click', function() {
      loadDesktopUsersAdmin_();
    });
    var save = document.querySelector('[data-save-role-permissions]');
    if (save) save.addEventListener('click', saveUsersAdminRolePermissions_);
  }

  function saveUsersAdminRolePermissions_() {
    if (!currentUserHasPrivilege_('users:assign_roles')) {
      showDesktopMessage_('Nemate ovlašćenje za izmenu prava po rolama.', 'error');
      return;
    }
    var grouped = {};
    document.querySelectorAll('[data-role-permission-check]').forEach(function(input) {
      var role = input.getAttribute('data-role') || '';
      var permission = input.getAttribute('data-permission') || '';
      if (!role || role === 'ADMIN') return;
      if (!grouped[role]) grouped[role] = [];
      if (input.checked) grouped[role].push(permission);
    });
    var roles = Object.keys(grouped);
    if (!roles.length) {
      showDesktopMessage_('Nema izmena za čuvanje.', 'info');
      return;
    }
    var index = 0;
    var saveNext = function() {
      if (index >= roles.length) {
        showDesktopMessage_('Prava po rolama su sačuvana.', 'success');
        loadDesktopUsersAdmin_();
        return;
      }
      var role = roles[index++];
      callApi('apiUpdateRolePermissions', [role, grouped[role]], saveNext, { quiet: true });
    };
    saveNext();
  }

  function getUsersAdminCashboxLabel_(cashboxId) {
    if (!cashboxId) return '—';
    var cashboxes = uiState.config && Array.isArray(uiState.config.cashboxes) ? uiState.config.cashboxes : [];
    var match = cashboxes.filter(function(cashbox) { return cashbox.cashbox_id === cashboxId; })[0];
    return match ? (match.name || match.cashbox_id) : cashboxId;
  }

  function openCreateUserModal_() {
    if (!currentUserHasPrivilege_('users:create')) {
      showDesktopMessage_('Nemate ovlašćenje za dodavanje korisnika.', 'error');
      return;
    }
    openUserAdminModal_({ mode: 'create' });
  }

  function openEditUserModal_(userId) {
    var user = USERS_ADMIN_STATE.users.filter(function(item) { return item.user_id === userId; })[0];
    if (!user) return;
    if (!currentUserHasPrivilege_('users:update') && !currentUserHasPrivilege_('users:assign_roles')) {
      showDesktopMessage_('Nemate ovlašćenje za izmenu korisnika.', 'error');
      return;
    }
    openUserAdminModal_({ mode: 'edit', user: user });
  }

    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog users-admin-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + (isEdit ? 'Izmeni korisnika' : 'Dodaj korisnika') + '</h3>' +
        '<form id="users-admin-modal-form" class="form-grid users-admin-modal-form" novalidate>' +
          (isEdit ? '<input type="hidden" name="user_id" value="' + escapeHtml(user.user_id || '') + '">' : '') +
          '<label>Korisnički kod<input name="user_code" type="text" value="' + escapeHtml(user.user_code || '') + '" autocomplete="off" spellcheck="false" required></label>' +
          '<label>Ime i prezime<input name="full_name" type="text" value="' + escapeHtml(user.full_name || '') + '" required></label>' +
          '<label>Email<input name="email" type="email" value="' + escapeHtml(user.email || '') + '"' + (isEdit ? ' readonly' : '') + ' required><small>Email je kompatibilno/informativno polje; login koristi korisnički kod.</small></label>' +
          '<label>Rola<select name="role" required></select></label>' +
          '<label>Status<select name="active"><option value="true">Aktivan</option><option value="false">Neaktivan</option></select></label>' +
          '<label>Default blagajna<select name="default_cashbox_id"></select></label>' +
          (!isEdit
            ? '<label>Početni PIN<input name="initial_pin" type="password" inputmode="numeric" autocomplete="new-password" required></label>' +
              '<label>Potvrda PIN-a<input name="initial_pin_confirm" type="password" inputmode="numeric" autocomplete="new-password" required></label>'
            : '<div class="users-admin-pin-reset"><strong>Reset PIN-a</strong><p>PIN se ne prikazuje. Popunite oba polja samo ako želite da resetujete PIN.</p>' +
              '<label>Novi PIN<input name="new_pin" type="password" inputmode="numeric" autocomplete="new-password"></label>' +
              '<label>Potvrda novog PIN-a<input name="new_pin_confirm" type="password" inputmode="numeric" autocomplete="new-password"></label>' +
              '<button type="button" class="cash-count-action draft" data-reset-pin ' + ((currentUserHasPrivilege_('users:update') || currentUserHasPrivilege_('users:assign_roles')) ? '' : 'disabled') + '><i class="ti ti-key" aria-hidden="true"></i> Resetuj PIN</button></div>') +
          '<label>Napomena<textarea name="note" rows="3" placeholder="Interna napomena za ovu izmenu"></textarea></label>' +
          '<div class="users-admin-modal-privileges"><strong>Privilegije izabrane role</strong><p>Privilegije su izvedene iz role i nije ih moguće menjati pojedinačno.</p><div data-modal-role-privileges></div></div>' +
        '</form>' +
        '<div class="app-dialog-actions">' +
          '<button type="button" class="btn-ghost" data-dialog-cancel>Odustani</button>' +
          '<button type="button" class="btn-primary" data-dialog-ok>' + (isEdit ? 'Sačuvaj izmene' : 'Kreiraj korisnika') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var form = overlay.querySelector('#users-admin-modal-form');
    populateUsersAdminModalSelects_(form, user);
    if (isEdit) {
      form.elements.active.value = user.active ? 'true' : 'false';
      form.elements.default_cashbox_id.value = user.default_cashbox_id || '';
    }
    var close = function() { overlay.remove(); };
    overlay.querySelector('[data-dialog-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', function() {
      if (isEdit) submitUpdateUser_(form, close);
      else submitCreateUser_(form, close);
    });
    var resetPin = overlay.querySelector('[data-reset-pin]');
    if (resetPin) resetPin.addEventListener('click', function() { submitResetUserPin_(form); });
    bindUsersAdminModalPrivilegePreview_(form);
    window.setTimeout(function() {
      var first = form.querySelector(isEdit ? '[name="user_code"]' : '[name="user_code"]');
      if (first) first.focus();

  function populateUsersAdminModalSelects_(form, user) {
    var roleSelect = form.elements.role;
    if (roleSelect) {
      var roles = (USERS_ADMIN_STATE.permissionsMatrix || []).map(function(row) { return row.role; }).filter(Boolean);
      if (!roles.length) roles = ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','CASHIER','APPROVER','REQUESTER','VIEWER','ANNOUNCER','ASSISTANT_CASHIER'];
      roleSelect.innerHTML = roles.map(function(role) {
        return '<option value="' + escapeHtml(role) + '">' + escapeHtml(role) + '</option>';
      }).join('');
      roleSelect.value = user && user.role ? user.role : roles[0];
      roleSelect.disabled = !currentUserHasPrivilege_('users:assign_roles');
    }
    var activeSelect = form.elements.active;
    if (activeSelect && user) {
      if ((user.active && !currentUserHasPrivilege_('users:disable')) || (!user.active && !currentUserHasPrivilege_('users:update'))) {
        activeSelect.disabled = true;
        activeSelect.title = 'Promena statusa zahteva odgovarajuće users pravo.';
      }
    }
    var cashboxSelect = form.elements.default_cashbox_id;
    if (cashboxSelect) {
      var cashboxes = uiState.config && Array.isArray(uiState.config.cashboxes) ? uiState.config.cashboxes : [];
      cashboxSelect.innerHTML = '<option value="">Bez podrazumevane blagajne</option>' + cashboxes.map(function(cashbox) {
        return '<option value="' + escapeHtml(cashbox.cashbox_id) + '">' + escapeHtml(cashbox.name || cashbox.cashbox_id) + '</option>';
      }).join('');
    }
    if (user && user.user_id && !currentUserHasPrivilege_('users:update')) {
      ['user_code', 'full_name', 'default_cashbox_id'].forEach(function(name) {
        if (form.elements[name]) form.elements[name].disabled = true;
      });
    }
  }

  function bindUsersAdminModalPrivilegePreview_(form) {
    var roleSelect = form && form.elements.role;
    var target = form ? form.querySelector('[data-modal-role-privileges]') : null;
    if (!roleSelect || !target) return;
    var render = function() {
      target.innerHTML = renderUsersAdminPrivileges_(getUsersAdminRolePrivileges_(roleSelect.value || ''));
    };
    roleSelect.addEventListener('change', render);
    render();
  }

  function validateUsersAdminForm_(form, isEdit) {
    var userCode = (form.elements.user_code.value || '').trim();
    var email = (form.elements.email.value || '').trim();
    var fullName = (form.elements.full_name.value || '').trim();
    var role = form.elements.role.value || '';
    if (!/^[A-Za-z0-9._-]{2,40}$/.test(userCode)) {
      showDesktopMessage_('Korisnički kod je obavezan i sme da sadrži slova, brojeve, tačku, donju crtu ili crticu.', 'error');
      form.elements.user_code.focus();
      return false;
    }
    if (!isEdit && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
      showDesktopMessage_('Unesite validan email korisnika.', 'error');
      form.elements.email.focus();
      return false;
    }
    if (!fullName) {
      showDesktopMessage_('Ime i prezime su obavezni.', 'error');
      form.elements.full_name.focus();
      return false;
    }
    if (!role) {
      showDesktopMessage_('Rola je obavezna.', 'error');
      form.elements.role.focus();
      return false;
    }
    if (!isEdit) {
      var pin = form.elements.initial_pin.value || '';
      var pinConfirm = form.elements.initial_pin_confirm.value || '';
      if (!/^\d{4,}$/.test(pin)) {
        showDesktopMessage_('Početni PIN je obavezan i mora imati najmanje 4 cifre.', 'error');
        form.elements.initial_pin.focus();
        return false;
      }
      if (pin !== pinConfirm) {
        showDesktopMessage_('Potvrda PIN-a se ne poklapa.', 'error');
        form.elements.initial_pin_confirm.focus();
        return false;
      }
    }
    return true;
  }

  function submitCreateUser_(form, close) {
    if (!validateUsersAdminForm_(form, false)) return;
    var payload = {
      user_code: form.elements.user_code.value.trim(),
      email: form.elements.email.value.trim(),
      full_name: form.elements.full_name.value.trim(),
      role: form.elements.role.value,
      active: form.elements.active.value === 'true',
      default_cashbox_id: form.elements.default_cashbox_id.value || '',
      initial_pin: form.elements.initial_pin.value || ''
    };
    callApi('apiCreateUser', [payload], function(created) {
      if (close) close();
      showDesktopMessage_('Korisnik je kreiran.', 'success');
      USERS_ADMIN_STATE.selectedUserId = created && created.user_id || '';
      loadDesktopUsersAdmin_();
    }, { successMessage: 'Korisnik je kreiran.' });
  }

  function submitUpdateUser_(form, close) {
    if (!validateUsersAdminForm_(form, true)) return;
    var userId = form.elements.user_id.value || '';
    var payload = {};
    if (currentUserHasPrivilege_('users:update')) {
      payload.user_code = form.elements.user_code.value.trim();
      payload.full_name = form.elements.full_name.value.trim();
      payload.default_cashbox_id = form.elements.default_cashbox_id.value || '';
    }
    if (currentUserHasPrivilege_('users:assign_roles')) {
      payload.role = form.elements.role.value;
    }
    if (!form.elements.active.disabled) {
      payload.active = form.elements.active.value === 'true';
    }
    callApi('apiUpdateUserPermissions', [userId, payload], function(updated) {
      if (close) close();
      showDesktopMessage_('Korisnik je ažuriran.', 'success');
      USERS_ADMIN_STATE.selectedUserId = updated && updated.user_id || userId;
      loadDesktopUsersAdmin_();
    }, { successMessage: 'Korisnik je ažuriran.' });
  }

  function submitResetUserPin_(form) {
    var userId = form.elements.user_id.value || '';
    var pin = form.elements.new_pin.value || '';
    var pinConfirm = form.elements.new_pin_confirm.value || '';
    if (!/^\d{4,}$/.test(pin)) {
      showDesktopMessage_('Novi PIN mora imati najmanje 4 cifre.', 'error');
      form.elements.new_pin.focus();
      return;
    }
    if (pin !== pinConfirm) {
      showDesktopMessage_('Potvrda novog PIN-a se ne poklapa.', 'error');
      form.elements.new_pin_confirm.focus();
      return;
    }
    callApi('apiResetUserPin', [userId, pin], function(updated) {
      showDesktopMessage_('PIN je resetovan.', 'success');
      form.elements.new_pin.value = '';
      form.elements.new_pin_confirm.value = '';
      USERS_ADMIN_STATE.selectedUserId = updated && updated.user_id || userId;
      loadDesktopUsersAdmin_();
    }, { successMessage: 'PIN je resetovan.' });
  }

  function confirmToggleUserActive_(userId) {
    var user = USERS_ADMIN_STATE.users.filter(function(item) { return item.user_id === userId; })[0];
    if (!user) return;
    if (!currentUserHasPrivilege_('users:disable') && !currentUserHasPrivilege_('users:update')) {
      showDesktopMessage_('Nemate ovlašćenje za promenu statusa korisnika.', 'error');
      return;
    }
    var nextActive = !user.active;
    appConfirm_({
      title: nextActive ? 'Aktivacija korisnika' : 'Deaktivacija korisnika',
      message: nextActive
        ? 'Da li želite da aktivirate ovog korisnika?'
        : 'Da li želite da deaktivirate ovog korisnika? Deaktiviran korisnik neće moći da koristi akcije u sistemu.',
      confirmText: nextActive ? 'Aktiviraj korisnika' : 'Deaktiviraj korisnika',
      danger: !nextActive
    }, function() {
      callApi('apiUpdateUserPermissions', [user.user_id, { active: nextActive }], function(updated) {
        showDesktopMessage_(nextActive ? 'Korisnik je aktiviran.' : 'Korisnik je deaktiviran.', 'success');
        USERS_ADMIN_STATE.selectedUserId = updated && updated.user_id || user.user_id;
        loadDesktopUsersAdmin_();
      });
    });
  }

  function bindPaymentOrdersOverview_() {
    if (window.__paymentOrdersOverviewBound) return;
    window.__paymentOrdersOverviewBound = true;
    ['d-order-period-filter','d-order-cashbox-filter','d-order-currency-filter','d-order-status-filter'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('change', function() {
        PAYMENT_ORDERS_STATE.page = 1;
        renderPaymentOrdersOverview_();
      });
    });
    var search = document.getElementById('d-order-search');
    if (search) search.addEventListener('input', function() {
      PAYMENT_ORDERS_STATE.page = 1;
      renderPaymentOrdersOverview_();
    });
    var reset = document.getElementById('d-order-reset-filters');
    if (reset) reset.addEventListener('click', function() {
      ['d-order-cashbox-filter','d-order-currency-filter','d-order-status-filter'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
      var period = document.getElementById('d-order-period-filter');
      if (period) period.value = 'today';
      if (search) search.value = '';
      PAYMENT_ORDERS_STATE.page = 1;
      renderPaymentOrdersOverview_();
    });
    var newBtn = document.getElementById('d-order-new-btn');
    if (newBtn) newBtn.addEventListener('click', function() {
      openNewPaymentOrderScreen_();
    });
    var exportBtn = document.getElementById('d-order-export-btn');
    if (exportBtn) exportBtn.addEventListener('click', function() {
      showDesktopMessage_('Izvoz pregleda naloga je TODO; podaci su prikazani bez izmene poslovne logike.', 'info');
    });
  }

  // Učitava desktop pregled naloga za isplatu.
  // Ova funkcija je konsolidovana nakon uklanjanja duplirane definicije.
  function loadDesktopNalozi_() {
    callApi('apiListPaymentOrders', [{}], function(result) {
      PAYMENT_ORDERS_STATE.records = (Array.isArray(result) ? result.map(normalizePaymentOrder_) : [])
        .sort(comparePaymentOrdersNewestFirst_);
      PAYMENT_ORDERS_STATE.page = 1;
      populatePaymentOrderFilters_();
      renderPaymentOrdersOverview_();
      loadDesktopNavBadges_();
    }, { quiet: true });
  }

  function comparePaymentOrdersNewestFirst_(a, b) {
    var aTime = paymentOrderSortTime_(a);
    var bTime = paymentOrderSortTime_(b);
    if (aTime !== bTime) return bTime - aTime;
    return String(b.id || '').localeCompare(String(a.id || ''), 'sr');
  }

  function paymentOrderSortTime_(order) {
    var raw = order && order.raw || {};
    var value = order && (order.createdAt || order.date || order.issuedAt) ||
      raw.created_at || raw.issued_at || raw.updated_at || '';
    var parsed = value ? new Date(value).getTime() : 0;
    return isNaN(parsed) ? 0 : parsed;
  }

  function normalizePaymentOrder_(order) {
    order = order || {};
    var amountOrdered = Number(order.amount_ordered || order.amount || 0);
    var amountPaid = Number(order.amount_paid || 0);
    var remaining = Math.max(0, amountOrdered - amountPaid);
    return {
      raw: order,
      id: order.order_id || order.id || '',
      refNo: order.ref_no != null ? order.ref_no : null,
      date: order.issued_at || order.created_at || order.updated_at || '',
      createdAt: order.created_at || '',
      issuedAt: order.issued_at || '',
      executedAt: order.executed_at || order.paid_at || '',
      issuer: order.issued_by || order.created_by || '',
      recipient: order.pay_to_name || order.recipient_name || order.requested_for_name || '',
      cashbox: order.cashbox_id || '',
      basis: order.purpose || order.payment_basis || order.description || '',
      amountOrdered: amountOrdered,
      amountPaid: amountPaid,
      remaining: remaining,
      currency: order.currency || '',
      status: order.status || '',
      dueDate: order.due_date || order.payment_due_date || '',
      sourceRequestId: order.source_request_id || '',
      cashEventId: order.linked_cash_event_id || order.cash_event_id || '',
      note: order.note || order.rejection_reason || ''
    };
  }

  function paymentOrderStatusLabel_(status) {
    var map = {
      DRAFT: 'Nacrt',
      ISSUED: 'Čeka na isplati',
      WAITING_PAYMENT: 'Čeka na isplati',
      PARTIALLY_PAID: 'Delimično isplaćen',
      PAID: 'Isplaćen',
      CLOSED: 'Zatvoren',
      IN_PROGRESS: 'U obradi',
      REJECTED: 'Odbijen',
      REJECTED_BY_CASHIER: 'Odbijen od blagajne',
      CANCELLED: 'Otkazan'
    };
    return map[status] || status || '—';
  }

  function paymentOrderStatusClass_(status) {
    if (status === 'PAID' || status === 'CLOSED') return 'po-status-paid';
    if (status === 'REJECTED' || status === 'REJECTED_BY_CASHIER') return 'po-status-rejected';
    if (status === 'CANCELLED') return 'po-status-cancelled';
    if (status === 'IN_PROGRESS' || status === 'PARTIALLY_PAID') return 'po-status-processing';
    return 'po-status-waiting';
  }

  function populatePaymentOrderFilters_() {
    populatePaymentOrderSelect_('d-order-cashbox-filter', 'Blagajna', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.cashbox; }));
    populatePaymentOrderSelect_('d-order-currency-filter', 'Valuta', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.currency; }));
    populatePaymentOrderSelect_('d-order-status-filter', 'Status', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.status; }), paymentOrderStatusLabel_);
  }

  function populatePaymentOrderSelect_(id, label, values, formatter) {
    var el = document.getElementById(id);
    if (!el) return;
    var current = el.value;
    var unique = [];
    (values || []).forEach(function(value) {
      if (value && unique.indexOf(value) === -1) unique.push(value);
    });
    unique.sort();
    el.innerHTML = '<option value="">' + escapeHtml(label) + '</option>' + unique.map(function(value) {
      return '<option value="' + escapeHtml(value) + '">' + escapeHtml(formatter ? formatter(value) : value) + '</option>';
    }).join('');
    if (unique.indexOf(current) !== -1) el.value = current;
  }

  function filterPaymentOrders_() {
    var period = (document.getElementById('d-order-period-filter') || {}).value || 'today';
    var search = ((document.getElementById('d-order-search') || {}).value || '').toLowerCase().trim();
    var cashbox = (document.getElementById('d-order-cashbox-filter') || {}).value || '';
    var currency = (document.getElementById('d-order-currency-filter') || {}).value || '';
    var status = (document.getElementById('d-order-status-filter') || {}).value || '';
    var now = new Date();
    var start = null;
    if (period === 'today') {
      start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    } else if (period !== 'all') {
      start = new Date(now.getTime() - (Number(period) || 0) * 24 * 60 * 60 * 1000);
    }
    return PAYMENT_ORDERS_STATE.records.filter(function(order) {
      var d = order.date ? new Date(order.date) : null;
      if (start && d && d < start) return false;
      if (cashbox && order.cashbox !== cashbox) return false;
      if (currency && order.currency !== currency) return false;
      if (status && order.status !== status) return false;
      if (search) {
        var haystack = [order.id, order.recipient, order.issuer, order.basis, order.currency, order.cashbox, order.status].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function renderPaymentOrdersOverview_() {
    PAYMENT_ORDERS_STATE.filtered = filterPaymentOrders_();
    renderPaymentOrderKpis_();
    renderPaymentOrderTable_();
    var selected = PAYMENT_ORDERS_STATE.filtered.find(function(o) { return o.id === PAYMENT_ORDERS_STATE.selectedId; }) || PAYMENT_ORDERS_STATE.filtered[0] || null;
    PAYMENT_ORDERS_STATE.selectedId = selected ? selected.id : '';
    renderPaymentOrderDetail_(selected);
  }

  function renderPaymentOrderKpis_() {
    var rows = PAYMENT_ORDERS_STATE.filtered;
    var counts = { waiting: 0, paid: 0, rejected: 0, cancelled: 0, processing: 0 };
    rows.forEach(function(order) {
      if (order.status === 'PAID' || order.status === 'CLOSED') counts.paid++;
      else if (order.status === 'REJECTED' || order.status === 'REJECTED_BY_CASHIER') counts.rejected++;
      else if (order.status === 'CANCELLED') counts.cancelled++;
      else if (order.status === 'IN_PROGRESS' || order.status === 'PARTIALLY_PAID') counts.processing++;
      else counts.waiting++;
    });
    setText_('d-order-kpi-total', rows.length);
    setText_('d-order-kpi-waiting', counts.waiting);
    setText_('d-order-kpi-paid', counts.paid);
    setText_('d-order-kpi-rejected', counts.rejected);
    setText_('d-order-kpi-cancelled', counts.cancelled);
    setText_('d-order-kpi-processing', counts.processing);
  }

  function renderPaymentOrderTable_() {
    var target = document.getElementById('d-nalozi-list');
    if (!target) return;
    var rows = PAYMENT_ORDERS_STATE.filtered;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema naloga za izabrane filtere.</p></div>';

    }
    var pageSize = PAYMENT_ORDERS_STATE.pageSize;
    var totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    PAYMENT_ORDERS_STATE.page = Math.min(Math.max(1, PAYMENT_ORDERS_STATE.page), totalPages);
    var start = (PAYMENT_ORDERS_STATE.page - 1) * pageSize;
    var visible = rows.slice(start, start + pageSize);
    target.innerHTML =
      '<table class="po-table"><thead><tr>' +
        '<th>Broj naloga</th><th>Datum</th><th>Izdavalac</th><th>Primalac</th><th>Blagajna</th><th>Osnov isplate</th><th>Iznos</th><th>Valuta</th><th>Status</th>' +
      '</tr></thead><tbody>' +
      visible.map(function(order) {
        var selected = order.id === PAYMENT_ORDERS_STATE.selectedId ? ' po-row-selected' : '';
        return '<tr class="po-row' + selected + '" data-order-id="' + escapeHtml(order.id) + '">' +
          '<td><strong>' + escapeHtml(order.id || '—') + '</strong></td>' +
          '<td>' + escapeHtml(formatDateTimeShort_(order.date)) + '</td>' +
          '<td>' + escapeHtml(shortUserLabel_(order.issuer || '—')) + '</td>' +
          '<td>' + escapeHtml(order.recipient || '—') + '</td>' +
          '<td>' + escapeHtml(order.cashbox || '—') + '</td>' +
          '<td>' + escapeHtml(order.basis || '—') + '</td>' +
          '<td class="po-amount">' + escapeHtml(formatAmount_(order.remaining || order.amountOrdered)) + '</td>' +
          '<td>' + escapeHtml(order.currency || '—') + '</td>' +
          '<td><span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span></td>' +
        '</tr>';
      }).join('') +
      '</tbody></table>' +
      '<div class="po-pagination"><span>Prikazano ' + (start + 1) + '–' + (start + visible.length) + ' od ' + rows.length + '</span>' +
        '<button type="button" data-po-page="prev">‹</button><strong>' + PAYMENT_ORDERS_STATE.page + '</strong><button type="button" data-po-page="next">›</button>' +
        '<select id="d-order-page-size"><option value="20">20 po strani</option><option value="50">50 po strani</option></select>' +
      '</div>';
    var pageSizeEl = document.getElementById('d-order-page-size');
    if (pageSizeEl) {
      pageSizeEl.value = String(PAYMENT_ORDERS_STATE.pageSize);
      pageSizeEl.addEventListener('change', function() {
        PAYMENT_ORDERS_STATE.pageSize = Number(this.value) || 20;
        PAYMENT_ORDERS_STATE.page = 1;
        renderPaymentOrderTable_();
      });
    }
    target.querySelectorAll('[data-order-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        PAYMENT_ORDERS_STATE.selectedId = row.getAttribute('data-order-id') || '';
        renderPaymentOrderTable_();
        renderPaymentOrderDetail_(PAYMENT_ORDERS_STATE.filtered.find(function(o) { return o.id === PAYMENT_ORDERS_STATE.selectedId; }) || null);
      });
    });
    target.querySelectorAll('[data-po-page]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var dir = btn.getAttribute('data-po-page');
        PAYMENT_ORDERS_STATE.page += dir === 'next' ? 1 : -1;
        renderPaymentOrderTable_();
      });
    });
  }

  function renderPaymentOrderDetail_(order) {
    var target = document.getElementById('d-order-detail-body');
    if (!target) return;
    if (!order) {
      target.className = 'po-empty-detail';
      target.innerHTML = 'Izaberite nalog iz tabele za prikaz detalja.';
      return;
    }
    target.className = '';
    var isPaid = order.status === 'PAID' || order.status === 'CLOSED';
    var pendingPaymentId = order.status === 'WAITING_PAYMENT' && order.cashEventId && !isPaid ? order.cashEventId : '';
    var canSendToCashier = (order.status === 'WAITING_PAYMENT' || order.status === 'PARTIALLY_PAID') && !pendingPaymentId;
    var canReject = order.status === 'WAITING_PAYMENT';
    var canApprove = order.status === 'DRAFT';
    var canEdit = order.status === 'DRAFT';
    var amount = order.remaining || order.amountOrdered;
    var sendLabel = pendingPaymentId ? 'Poslato blagajni' : 'Pošalji na isplatu';
    target.innerHTML =
      '<div class="po-detail-head"><h3>Detalji naloga</h3><span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span></div>' +
      '<div class="po-detail-grid">' +
        renderPaymentOrderField_('Broj naloga', order.id) +
        renderPaymentOrderField_('Datum i vreme', formatDateTimeShort_(order.date)) +
        renderPaymentOrderField_('Izdavalac', shortUserLabel_(order.issuer || '—')) +
        renderPaymentOrderField_('Primalac', order.recipient) +
        renderPaymentOrderField_('Blagajna', order.cashbox) +
        renderPaymentOrderField_('Valuta', order.currency) +
        renderPaymentOrderField_('Rok za isplatu', formatDateShort_(order.dueDate)) +
        renderPaymentOrderField_('Osnov isplate', order.basis) +
      '</div>' +
      '<div class="po-detail-amount">' + escapeHtml(formatAmount_(amount)) + ' ' + escapeHtml(order.currency || '') + '</div>' +
      '<div class="po-tabs"><span class="active">Pregled</span><span>Povezani dokumenti</span><span>Aktivnosti</span></div>' +
      '<div class="po-detail-columns">' +
        '<div><h4>Tok naloga</h4><div id="d-order-timeline">' + renderPaymentOrderTimeline_(order) + '</div></div>' +
        '<div><h4>Povezani dokumenti</h4>' + renderPaymentOrderDocuments_(order) + '</div>' +
      '</div>' +
      '<div class="po-panel-actions">' +
        '<button type="button" class="cash-count-action draft" id="d-order-edit" ' + (canEdit ? '' : 'disabled') + '><i class="ti ti-pencil" aria-hidden="true"></i> Edituj nacrt</button>' +
        '<button type="button" class="cash-count-action save" id="d-order-approve" ' + (canApprove ? '' : 'disabled') + '><i class="ti ti-check" aria-hidden="true"></i> Odobri nalog</button>' +
        '<button type="button" class="cash-count-action cancel" id="d-order-reject" ' + (canReject ? '' : 'disabled') + '><i class="ti ti-circle-x" aria-hidden="true"></i> Odbij</button>' +
        '<button type="button" class="cash-count-action draft" id="d-order-send-payment" ' + (canSendToCashier && !isPaid ? '' : 'disabled') + '><i class="ti ti-send" aria-hidden="true"></i> ' + sendLabel + '</button>' +
      '</div>';
    bindPaymentOrderDetailActions_(order);
    loadPaymentOrderTimeline_(order.id);
  }

  function renderPaymentOrderField_(label, value) {
    return '<div class="po-detail-field"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>';
  }

  function renderPaymentOrderTimeline_(order) {
    var items = [
      ['Nalog kreiran', order.createdAt || order.date, order.issuer, ''],
      ['Poslat na odobrenje', order.issuedAt || order.date, order.issuer, ''],
      ['Čeka na isplati', order.date, 'Sistem', '']
    ];
    if (order.executedAt || order.status === 'PAID' || order.status === 'CLOSED') items.push(['Stvarna isplata izvršena', order.executedAt || order.date, 'Blagajna', 'success']);
    if (order.status === 'REJECTED' || order.status === 'REJECTED_BY_CASHIER') items.push(['Odbijen', order.raw.updated_at || order.date, order.issuer, 'danger']);
    if (order.status === 'CANCELLED') items.push(['Otkazan', order.raw.updated_at || order.date, order.issuer, 'danger']);
    return '<div class="po-timeline">' + items.map(function(item, index) {
      var cls = 'po-timeline-item ' + (index === items.length - 1 ? 'current ' : '') + (item[3] || '');
      return '<div class="' + cls + '">' +
        '<span></span><strong>' + escapeHtml(item[0]) + '</strong><small>' + escapeHtml(shortUserLabel_(item[2] || '—')) + ' · ' + escapeHtml(formatDateTimeShort_(item[1])) + '</small>' +
      '</div>';
    }).join('') + '</div>';
  }

  function loadPaymentOrderTimeline_(orderId) {
    if (!orderId || !document.getElementById('d-order-timeline')) return;
    callApi('apiGetPaymentOrderTimeline', [orderId], function(items) {
      var target = document.getElementById('d-order-timeline');
      if (!target || PAYMENT_ORDERS_STATE.selectedId !== orderId) return;
      target.innerHTML = renderPaymentOrderTimelineItems_(items || []);
    }, { quiet: true });
  }

  function renderPaymentOrderTimelineItems_(items) {
    if (!items.length) {
      return '<div class="po-empty-docs">Nema aktivnosti za nalog.</div>';
    }
    return '<div class="po-timeline">' + items.map(function(item, index) {
      var tone = item.tone || '';
      var cls = 'po-timeline-item ' + (index === items.length - 1 ? 'current ' : '') + tone;
      return '<div class="' + cls + '">' +
        '<span></span><strong>' + escapeHtml(item.label || 'Aktivnost') + '</strong>' +
        '<small>' + escapeHtml(shortUserLabel_(item.by || '—')) + ' · ' + escapeHtml(formatDateTimeShort_(item.at)) + '</small>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderPaymentOrderDocuments_(order) {
    var docs = [];
    if (order.sourceRequestId) docs.push(['Zahtev za isplatu', order.sourceRequestId, formatDateShort_(order.date)]);
    if (order.cashEventId) docs.push(['Blagajnički događaj', order.cashEventId, formatDateShort_(order.executedAt || order.date)]);
    if (!docs.length) return '<div class="po-empty-docs">Nema povezanih dokumenata u dostupnim podacima.</div>';
    return '<table class="po-doc-table"><thead><tr><th>Tip dokumenta</th><th>Broj dokumenta</th><th>Datum</th></tr></thead><tbody>' +
      docs.map(function(doc) {
        return '<tr><td>' + escapeHtml(doc[0]) + '</td><td>' + escapeHtml(doc[1]) + '</td><td>' + escapeHtml(doc[2]) + '</td></tr>';
      }).join('') + '</tbody></table>';
  }

  function bindPaymentOrderDetailActions_(order) {
    var edit = document.getElementById('d-order-edit');
    if (edit) edit.addEventListener('click', function() {
      if (order.status !== 'DRAFT') {
        showDesktopMessage_('Izmena je dostupna samo za nacrt naloga.', 'error');
        return;
      }
      openEditPaymentOrderScreen_(order);
    });
    var open = document.getElementById('d-order-open-detail');
    if (open) open.addEventListener('click', function() {
      showDesktopMessage_('Detaljan prikaz naloga biće povezan sa ekranom za novi/detaljni nalog u narednoj fazi.', 'info');
    });
    var approve = document.getElementById('d-order-approve');
    if (approve) approve.addEventListener('click', function() {
      callApi('apiIssuePaymentOrder', [order.id], function() {
        showDesktopMessage_('Nalog je odobren. Sledeći korak je slanje blagajni na isplatu.', 'success');
        loadDesktopNalozi_();
      });
    });
    var reject = document.getElementById('d-order-reject');
    if (reject) reject.addEventListener('click', function() {
      appPrompt_({
        title: 'Odbijanje naloga',
        message: 'Unesite razlog odbijanja naloga ' + order.id + '.',
        confirmText: 'Odbij nalog',
        placeholder: 'Razlog odbijanja'
      }, function(reason) {
        if (!String(reason || '').trim()) {
          showDesktopMessage_('Razlog odbijanja je obavezan.', 'error');
          return;
        }
        callApi('apiRejectPaymentOrderByCashier', [order.id, reason], function() {
          showDesktopMessage_('Nalog je odbijen.', 'success');
          loadDesktopNalozi_();
        });
      });
    });
    var sendPayment = document.getElementById('d-order-send-payment');
    if (sendPayment) sendPayment.addEventListener('click', function() {
      if (order.cashEventId) {
        showDesktopMessage_('Nalog je već poslat blagajni i čeka isplatu.', 'info');
        return;
      }
      appConfirm_({
        title: 'Slanje naloga blagajni',
        message: 'Kreira se pending ISPLATA za nalog ' + order.id + '. Stanje blagajne se neće promeniti dok blagajnik ne potvrdi isplatu.',
        confirmText: 'Pošalji na isplatu'
      }, function() {
        callApi('apiSendPaymentOrderToCashier', [order.id], function() {
          showDesktopMessage_('Nalog je poslat blagajni na isplatu.', 'success');
          loadDesktopNalozi_();
          loadPendingPaymentOrderOutflows_(true);
        });
      });
    });
  }

    var form = document.getElementById('new-payment-order-form');

    NEW_PAYMENT_ORDER_STATE.savedOrderId = order.id || '';
    NEW_PAYMENT_ORDER_STATE.mode = 'edit';

    NEW_PAYMENT_ORDER_STATE.attachments = [];

    clearAllNewOrderErrors_();
    populateNewOrderSelects_();

    return {
      cashbox_id: valueOf_('new-order-cashbox'),
      pay_to_name: valueOf_('new-order-recipient'),
      amount_ordered: parseAmountInput_(valueOf_('new-order-amount')),

  function validateNewPaymentOrder_() {
    clearAllNewOrderErrors_();
    var data = collectNewPaymentOrderData_();
    var ok = true;
    if (!data.cashbox_id) ok = setNewOrderFieldError_('new-order-cashbox', 'Izaberite blagajnu.') && false;
    if (!data.pay_to_name) ok = setNewOrderFieldError_('new-order-recipient', 'Unesite primaoca isplate.') && false;
    if (!data.amount_ordered || data.amount_ordered <= 0) ok = setNewOrderFieldError_('new-order-amount', 'Unesite iznos veći od nule.') && false;
    if (!data.currency) ok = setNewOrderFieldError_('new-order-currency', 'Izaberite valutu.') && false;
    if (!data.purpose) ok = setNewOrderFieldError_('new-order-purpose', 'Unesite osnov isplate.') && false;
    if (!valueOf_('new-order-date')) ok = setNewOrderFieldError_('new-order-date', 'Unesite datum i vreme.') && false;
    if (!ok) showDesktopMessage_('Popunite obavezna polja pre čuvanja naloga.', 'error');
    return ok;
  }

  function saveNewPaymentOrderDraft_(afterSave) {
    if (!validateNewPaymentOrder_()) return;
    if (NEW_PAYMENT_ORDER_STATE.savedOrderId) {
      callApi('apiUpdateDraftPaymentOrder', [NEW_PAYMENT_ORDER_STATE.savedOrderId, collectNewPaymentOrderData_()], function(result) {
        NEW_PAYMENT_ORDER_STATE.status = result && result.status || 'DRAFT';
        NEW_PAYMENT_ORDER_STATE.dirty = false;
        addNewOrderActivity_('Sačuvan nacrt', 'Izmene na nacrtu naloga su sačuvane.');
        updateNewOrderStatusBadge_();
        renderNewOrderSummary_();
        renderNewOrderTimeline_();
        renderNewOrderActivities_();
        if (afterSave) afterSave(NEW_PAYMENT_ORDER_STATE.savedOrderId);
      }, { successMessage: 'Nacrt naloga je ažuriran.' });
      return;
    }
    callApi('apiCreateDirectPaymentOrder', [collectNewPaymentOrderData_()], function(result) {
      var orderId = result && result.order_id || result && result.id || '';
      NEW_PAYMENT_ORDER_STATE.savedOrderId = orderId;
      NEW_PAYMENT_ORDER_STATE.status = 'DRAFT';
      NEW_PAYMENT_ORDER_STATE.dirty = false;
      if (orderId) setNewOrderValue_('new-order-number', orderId);
      addNewOrderActivity_('Sačuvan nacrt', 'Nacrt naloga je sačuvan.');
      updateNewOrderStatusBadge_();
      renderNewOrderSummary_();
      renderNewOrderTimeline_();
      renderNewOrderActivities_();
      if (afterSave) afterSave(orderId);
    }, { successMessage: 'Nacrt naloga je sačuvan.' });
  }

  function issueNewPaymentOrder_() {
    if (!validateNewPaymentOrder_()) return;
    appConfirm_({
      title: 'Izdavanje naloga',
      message: 'Da li ste sigurni da želite da izdate nalog blagajni? Nakon izdavanja, blagajnik će videti nalog i moći će da ga izvrši.',
      confirmText: 'Izdaj nalog'
    }, function() {
      var issueSaved = function(orderId) {
        if (!orderId) {
          showDesktopMessage_('Nalog nije sačuvan i ne može biti izdat.', 'error');
          return;
        }
        callApi('apiIssuePaymentOrder', [orderId], function() {
          NEW_PAYMENT_ORDER_STATE.status = 'WAITING_PAYMENT';
          NEW_PAYMENT_ORDER_STATE.dirty = false;
          addNewOrderActivity_('Izdat nalog', 'Nalog je poslat blagajni na isplatu.');
          showDesktopMessage_('Nalog je izdat i čeka isplatu.', 'success');
          openPaymentOrdersOverview_();
        }, { successMessage: 'Nalog je izdat.' });
      };
      if (NEW_PAYMENT_ORDER_STATE.savedOrderId) {
        if (NEW_PAYMENT_ORDER_STATE.dirty) saveNewPaymentOrderDraft_(issueSaved);
        else issueSaved(NEW_PAYMENT_ORDER_STATE.savedOrderId);
      } else {
        saveNewPaymentOrderDraft_(issueSaved);
      }
    });
  }

  function confirmLeaveNewPaymentOrder_(callback) {
    if (!NEW_PAYMENT_ORDER_STATE.dirty) {
      callback();
      return;
    }
    appConfirm_({
      title: 'Nesačuvane izmene',
      message: 'Imate nesačuvane izmene na nalogu. Da li želite da izađete bez čuvanja?',
      confirmText: 'Izađi bez čuvanja',
      danger: true
    }, callback);
  }

  function handleNewOrderFiles_(event) {
    var files = Array.prototype.slice.call(event.target.files || []);
    files.forEach(function(file) {
      var okType = /\.(pdf|jpg|jpeg|png)$/i.test(file.name || '');
      if (!okType) {
        showDesktopMessage_('Prilog nije dodat: dozvoljeni su PDF, JPG i PNG fajlovi.', 'error');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showDesktopMessage_('Prilog nije dodat: maksimalna veličina je 10 MB.', 'error');
        return;
      }
      NEW_PAYMENT_ORDER_STATE.attachments.push({
        id: 'att-' + Date.now() + '-' + Math.random().toString(16).slice(2),
        name: file.name,
        size: file.size,
        type: file.type || 'file'
      });
      addNewOrderActivity_('Dodat prilog', 'Dodat prilog: ' + file.name);
      NEW_PAYMENT_ORDER_STATE.dirty = true;
    });
    event.target.value = '';
    renderNewOrderAttachments_();
    renderNewOrderActivities_();
    renderNewOrderSummary_();
  }

      return;
    }
    target.innerHTML = NEW_PAYMENT_ORDER_STATE.attachments.map(function(att) {
      return '<div class="new-order-attachment">' +
        '<i class="ti ti-file-type-pdf" aria-hidden="true"></i>' +
        '<div><strong>' + escapeHtml(att.name) + '</strong><span>' + escapeHtml(formatBytes_(att.size)) + ' · lokalni prilog</span></div>' +
        '<button type="button" data-new-order-remove-att="' + escapeHtml(att.id) + '"><i class="ti ti-x" aria-hidden="true"></i></button>' +
      '</div>';
    }).join('');
    target.querySelectorAll('[data-new-order-remove-att]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-new-order-remove-att');
        NEW_PAYMENT_ORDER_STATE.attachments = NEW_PAYMENT_ORDER_STATE.attachments.filter(function(att) { return att.id !== id; });

  function setNewOrderFieldError_(id, message) {
    var el = document.getElementById(id);
    if (!el) return false;
    el.classList.add('invalid');
    var label = el.closest('label') || el.parentElement;
    var error = label ? label.querySelector('.new-order-error') : null;
    if (!error && label) {
      error = document.createElement('span');
      error.className = 'new-order-error';
      label.appendChild(error);
    }
    if (error) error.textContent = message;
    return false;
  }

  function clearNewOrderFieldError_(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('invalid');

    var error = label ? label.querySelector('.new-order-error') : null;
    if (error) error.remove();
