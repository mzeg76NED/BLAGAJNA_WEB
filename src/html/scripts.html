  function cleanObject(source) {
    var result = {};
    Object.keys(source || {}).forEach(function(key) {
      if (source[key] !== '') {
        result[key] = source[key];
      }
    });
    return result;
  }

  function setInputValue(formId, name, value) {
    var input = document.querySelector('#' + formId + ' [name="' + name + '"]');
    if (input) {
      input.value = value || '';
    }
  }

  function setText(id, value) {
    var element = document.getElementById(id);
    if (element) {
      element.textContent = value;
    }
  }

  function formatValue(value) {
    if (value === undefined || value === null || value === '') {
      return '';
    }
    if (typeof value === 'object') {
      return JSON.stringify(value);
    }
    return String(value);
  }

  function formatNumber_(value) {
    var numberValue = Number(value || 0);
    if (!isFinite(numberValue)) {
      return formatValue(value);
    }
    return numberValue.toLocaleString('sr-RS', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function escapeHtml(value) {
    return formatValue(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  /* ═══════════════════════════════════════════════════════════════
     BLAGAJNIČKA KNJIGA — novi UI (redesign)
     Sve funkcije ispod su dodaci koji ne brišu postojeće funkcije.
  ═══════════════════════════════════════════════════════════════ */

  var currentQuickFormType_ = 'IN';
  var currentSheetType_     = 'IN';

  /* ─── Format helpers ─────────────────────────────────────────── */

  function formatAmount_(value) {
    var num = Number(value) || 0;
    return num.toLocaleString('sr-RS', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function parseAmountInput_(value) {
    var text = String(value || '').trim();
    if (!text) return 0;
    text = text.replace(/\s/g, '');
    if (text.indexOf(',') !== -1) {
      text = text.replace(/\./g, '').replace(',', '.');
    } else {
      var parts = text.split('.');
      if (parts.length > 2 || (parts.length === 2 && parts[1].length === 3)) {
        text = parts.join('');
      }
    }
    return parseFloat(text) || 0;
  }

  function bindAmountFormatting_() {
    document.querySelectorAll('#d-qf-amount,#sheet-amount,input[name="physical_balance"],[name^="physical_"]').forEach(function(input) {
      if (input.dataset.amountFormattingBound === '1') return;
      input.dataset.amountFormattingBound = '1';
      input.addEventListener('focus', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? String(amount).replace('.', ',') : '';
      });
      input.addEventListener('blur', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? formatAmount_(amount) : '';
      });
    });
  }

  function formatDateShort_(value) {
    if (!value) return '—';
    var d = value instanceof Date ? value : new Date(value);
    if (isNaN(d.getTime())) return String(value).substring(0, 10);
    return d.getDate() + '.' + (d.getMonth() + 1) + '.';
  }

  function formatDateTimeShort_(value) {
    if (!value) return '—';
    return formatDateShort_(value) + ' ' + formatTimeShort_(value);
  }

  function renderStatusBadge_(status) {
    var cls = STATUS_BADGE_MAP[status] || 'badge-draft';
    var lbl = STATUS_LABEL_MAP[status] || status;
    return '<span class="badge ' + cls + '">' + escapeHtml(lbl) + '</span>';
  }

  function isCashEventBalanceAffecting_(ev) {
    return ev.status === 'POSTED' || ev.status === 'LOCKED';
  }

  /* ─── Knjiga: učitaj i renderuj ──────────────────────────────── */

  function loadKnjiga_(isBackground) {
    var dateFrom = (document.getElementById('d-date-from') || {}).value || '';
    var dateTo   = (document.getElementById('d-date-to')   || {}).value || '';
    var userFilter = (document.getElementById('d-user-filter') || {}).value || '';
    var shiftFilter = (document.getElementById('d-shift-filter') || {}).value || '';
    var tbody = document.getElementById('d-knjiga-tbody') || document.getElementById('m-knjiga-list');
    if (!tbody) return;

    if (!isBackground) {
      var skeletonRow = '<tr class="loading-row"><td colspan="6"><div class="skeleton" style="height:14px;margin:4px 0"></div></td></tr>';
      tbody.innerHTML = skeletonRow + skeletonRow + skeletonRow;
    }

    callApi('apiGetCashMovementsReport', [withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency:   SESSION.currency,
      date_from:  dateFrom,
      date_to:    dateTo,
      user:       userFilter,
      shift_id:   shiftFilter
    })], function(events) {
      LAST_KNJIGA_EVENTS = events || [];
      renderKnjigaTable_(events || []);
      refreshBalance_();
    }, { quiet: true });
  }

  function updateKnjigaContext_() {
    var user = uiState.currentUser || {};
    var shift = uiState.activeShift || {};
    var userText = user.email ? shortUserLabel_(user.email) : 'Korisnik nije učitan';
    var shiftText = shift.shift_id
      ? 'Aktivna smena: ' + shortUserLabel_(shift.opened_by || '') + ' · ' + formatDateTimeShort_(shift.opened_at)
      : 'Nema aktivne smene za direktan rad';
    ['d-knjiga-context','m-knjiga-context'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = 'Korisnik: ' + userText + ' · ' + shiftText;
    });
  }

  function renderKnjigaTable_(events) {
    var isMobile = Boolean(document.getElementById('m-knjiga-list'));
    var container = document.getElementById(isMobile ? 'm-knjiga-list' : 'd-knjiga-tbody');
    var tfoot     = document.getElementById('d-knjiga-tfoot');
    if (!container) return;
    events = mergeOptimisticEvents_(events || []);
    updateKnjigaContext_();

    if (!events.length) {
      var empty = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema transakcija za izabrani period.</p></div>';
      container.innerHTML = isMobile ? empty : '<tr><td colspan="6">' + empty + '</td></tr>';
      if (tfoot) tfoot.innerHTML = '';
      updateKnjigaTotals_(0, 0, 0, 0);
      return;
    }

    var totalIn = 0, totalOut = 0;
    var rows = [];

    events.forEach(function(ev, idx) {
      var displayDirection = ev.display_direction || ev.direction;
      var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      if (displayDirection === 'IN')  totalIn  += displayAmount;
      if (displayDirection === 'OUT') totalOut += displayAmount;
      var rowNumber = events.length - idx;
      rows.push(isMobile ? renderMobileEntry_(ev, rowNumber) : renderKnjigaRow_(ev, rowNumber, Number(ev.running_balance || 0)));
    });

    container.innerHTML = rows.join('');
    if (tfoot) tfoot.innerHTML = '';
    updateKnjigaTotals_(totalIn, totalOut, events.length ? Number(events[0].running_balance || 0) : 0, events.length);

    container.querySelectorAll('[data-event-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        var eid = row.getAttribute('data-event-id');
        var ev = events.find(function(e) { return e.event_id === eid; });
        if (ev) openDetailPanel_(ev);
      });
    });
  }

  function mergeOptimisticEvents_(events) {
    var realIds = events.reduce(function(index, ev) {
      if (ev.event_id) index[ev.event_id] = true;
      return index;
    }, {});
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return !ev.event_id || !realIds[ev.event_id];
    });
    var visiblePending = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return (!SESSION.cashboxId || ev.cashbox_id === SESSION.cashboxId) &&
        (!SESSION.currency || ev.currency === SESSION.currency);
    });
    return visiblePending.concat(events);
  }

  function scheduleKnjigaRefresh_() {
    window.setTimeout(function() {
      loadKnjiga_(true);
      refreshBalance_();
    }, OPTIMISTIC_REFRESH_DELAY_MS);
  }

  function rememberOptimisticEvent_(ev) {
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== ev.optimistic_id && item.event_id !== ev.event_id;
    });
    PENDING_OPTIMISTIC_EVENTS.unshift(ev);
    if (PENDING_OPTIMISTIC_EVENTS.length > 8) {
      PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.slice(0, 8);
    }
  }

  function removeOptimisticEvent_(tempId) {
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== tempId && item.event_id !== tempId;
    });
  }

  function buildOptimisticEvent_(tempId, direction, amount, currency, partner, desc, statusText) {
    var now = new Date();
    return {
      optimistic_id: tempId,
      event_id: tempId,
      event_date: now.toISOString(),
      created_at: now.toISOString(),
      created_by: uiState.currentUser && uiState.currentUser.email || '',
      posted_at: now.toISOString(),
      posted_by: uiState.currentUser && uiState.currentUser.email || '',
      event_type: direction === 'IN' ? 'CASH_INFLOW' : 'CASH_OUTFLOW',
      cashbox_id: SESSION.cashboxId,
      currency: currency,
      direction: direction,
      amount: amount,
      display_direction: direction,
      display_amount: amount,
      partner_name: partner || '',
      description: desc || partner || '',
      status: statusText || 'KNJIŽENJE',
      running_balance: 0
    };
  }

  function renderKnjigaRow_(ev, index, balance) {
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isIn  = displayDirection === 'IN';
    var isOut = displayDirection === 'OUT';
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis/i.test(String(ev.description || '')));
    var rowClass = (isCount ? 'row-count' : isIn ? 'row-in' : isOut ? 'row-out' : 'row-opening') + (ev.optimistic_id ? ' optimistic' : '');
    var amtFmt  = formatAmount_(displayAmount);
    var balFmt  = formatAmount_(balance);
    var dateStr = formatDateShort_(ev.event_date || ev.created_at);
    var label   = escapeHtml(ev.partner_name || ev.description || '—');
    var reason  = escapeHtml(ev.description || '—');
    var createdBy = escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—'));
    var timeStr = escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date));
    var trace = ev.reversal_of_event_id ? ' · Veza: ' + escapeHtml(ev.reversal_of_event_id) : '';
    var statusHint = ev.optimistic_id ? ' · Knjiženje...' : '';
    return '<tr class="' + rowClass + '" data-event-id="' + escapeHtml(ev.event_id) + '">' +
      '<td>' + index + '</td>' +
      '<td>' + dateStr + '</td>' +
      '<td><div class="desc-main">' + label + '</div><div class="desc-reason">' + reason + '</div><div class="desc-sub">' + timeStr + ' · ' + createdBy + ' · ' + escapeHtml(ev.event_id) + trace + statusHint + '</div></td>' +
      '<td class="' + (isIn  ? 'cell-in'   : 'cell-dash') + '">' + (isIn  ? amtFmt : '—') + '</td>' +
      '<td class="' + (isOut ? 'cell-out'  : 'cell-dash') + '">' + (isOut ? amtFmt : '—') + '</td>' +
      '<td class="cell-bal">' + balFmt + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotals_(totalIn, totalOut, finalBalance) {
    return '<tr class="total-row">' +
      '<td colspan="3" style="font-weight:700;font-size:12px;padding:10px 12px">UKUPNO</td>' +
      '<td class="cell-in">'  + formatAmount_(totalIn)      + '</td>' +
      '<td class="cell-out">' + formatAmount_(totalOut)     + '</td>' +
      '<td class="cell-bal">' + formatAmount_(finalBalance) + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotalsHtml_(totalIn, totalOut, finalBalance) {
    return '<span><strong>Ukupno uplata</strong> <b class="cell-in">' + formatAmount_(totalIn) + '</b></span>' +
      '<span><strong>Ukupno isplata</strong> <b class="cell-out">' + formatAmount_(totalOut) + '</b></span>' +
      '<span><strong>Stanje</strong> <b class="cell-bal">' + formatAmount_(finalBalance) + ' ' + escapeHtml(SESSION.currency || '') + '</b></span>';
  }

  function updateKnjigaTotals_(totalIn, totalOut, finalBalance, count) {
    LAST_KNJIGA_TOTALS = {
      totalIn: totalIn,
      totalOut: totalOut,
      finalBalance: finalBalance,
      count: count || 0
    };
    var html = renderKnjigaTotalsHtml_(totalIn, totalOut, finalBalance);
    var row = document.getElementById('d-knjiga-total-row');
    if (row) {
      row.innerHTML = '<td colspan="3">UKUPNO</td>' +
        '<td class="cell-in">' + formatAmount_(totalIn) + '</td>' +
        '<td class="cell-out">' + formatAmount_(totalOut) + '</td>' +
        '<td class="cell-bal">' + formatAmount_(finalBalance) + '</td>';
    }
    renderMobileTrafficSummary_();
  }

  function renderMobileTrafficSummary_() {
    var box = document.getElementById('m-traffic-summary');
    if (!box) return;
    box.innerHTML = renderKnjigaTotalsHtml_(LAST_KNJIGA_TOTALS.totalIn, LAST_KNJIGA_TOTALS.totalOut, LAST_KNJIGA_TOTALS.finalBalance) +
      '<span><strong>Stavki</strong> <b>' + LAST_KNJIGA_TOTALS.count + '</b></span>';
  }

  function renderMobileEntry_(ev, index) {
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isIn   = displayDirection === 'IN';
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis/i.test(String(ev.description || '')));
    var dotBg  = isCount ? '#d99a00' : isIn ? 'var(--color-in)'  : 'var(--color-out)';
    var color  = isCount ? '#d99a00' : isIn ? 'var(--color-in)'  : 'var(--color-out)';
    var prefix = isCount ? '' : displayAmount < 0 ? '−' : (isIn ? '+' : '−');
    var label  = escapeHtml(ev.partner_name || ev.description || '—');
    var reason = escapeHtml(ev.description || '—');
    var meta   = escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date)) +
      ' · ' + escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—')) +
      ' · ' + escapeHtml(ev.event_id) +
      (ev.reversal_of_event_id ? ' · Veza: ' + escapeHtml(ev.reversal_of_event_id) : '');
    var statusHint = ev.optimistic_id ? ' · Knjiženje...' : '';
    return '<div class="m-entry' + (isCount ? ' count' : '') + (ev.optimistic_id ? ' optimistic' : '') + '" data-event-id="' + escapeHtml(ev.event_id) + '">' +
      '<div class="m-entry-dot" style="background:' + dotBg + '"></div>' +
      '<div class="m-entry-info">' +
        '<div class="m-entry-desc"><span class="m-entry-no">' + index + '.</span> ' + label + '</div>' +
        '<div class="m-entry-meta">' + reason + '</div>' +
        '<div class="m-entry-meta">' + meta + statusHint + '</div>' +
      '</div>' +
      '<div class="m-entry-amt" style="color:' + color + '">' + (isCount ? 'POPIS' : prefix + formatAmount_(Math.abs(displayAmount))) + '</div>' +
    '</div>';
  }

  /* ─── Detail panel (desktop) ─────────────────────────────────── */

  function openDetailPanel_(ev) {
    var panel = document.getElementById('d-detail-panel');
    var title = document.getElementById('d-detail-title');
    var body  = document.getElementById('d-detail-body');
    if (!panel || !title || !body) {
      openMobileDetailPanel_(ev);
      return;
    }
    CURRENT_SELECTED_EVENT_ID = ev.event_id || '';
    var printEventInput = document.querySelector('#print-tools-form [name="cash_event_id"]');
    if (printEventInput && CURRENT_SELECTED_EVENT_ID) {
      printEventInput.value = CURRENT_SELECTED_EVENT_ID;
    }

    var isCount  = ev.event_type === 'CASH_COUNT';
    var isIn     = ev.direction === 'IN';
    var dirLabel = isCount ? 'PRESEK' : isIn ? '↓ UPLATA' : '↑ ISPLATA';
    var dirColor = isCount ? '#d99a00' : isIn ? 'var(--color-in)' : 'var(--color-out)';

    title.innerHTML = '<span style="color:' + dirColor + '">' + dirLabel + '</span> · ' + escapeHtml(ev.event_id);

    var rows = [
      ['Iznos', '<span style="font-size:16px;font-weight:700;color:' + dirColor + '">' + formatAmount_(ev.amount) + ' ' + escapeHtml(ev.currency || SESSION.currency) + '</span>'],
      ['Datum',         formatDateShort_(ev.event_date || ev.created_at)],
      ['Primalac/uplatioc', escapeHtml(ev.partner_name || '—')],
      ['Opis',          escapeHtml(ev.description || '—')],
      ['Status',        renderStatusBadge_(ev.status)],
      ['Vreme',         escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date))],
      ['Uneo',          escapeHtml(ev.posted_by || ev.created_by || '—')]
    ];
    if (ev.reversal_of_event_id) {
      rows.push(['Veza storna', escapeHtml(ev.reversal_of_event_id)]);
    }

    body.innerHTML = rows.map(function(r) {
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--color-border-light);font-size:13px">' +
        '<span style="color:var(--color-text-muted)">' + r[0] + '</span><span>' + r[1] + '</span></div>';
    }).join('');

    var printBtn  = document.getElementById('d-detail-print');
    var stornoBtn = document.getElementById('d-detail-storno');
    if (printBtn) {
      printBtn.disabled = isCount;
      printBtn.title = isCount ? 'Popis se evidentira u preseku smene, bez blagajničkog lista za uplatu/isplatu.' : '';
      printBtn.onclick  = function() {
        if (!isCount) openPrintView('print-cash-event', ev.event_id);
      };
    }
    if (stornoBtn) {
      var canReverse = !isCount && ev.status !== 'REVERSED' && ev.event_type !== 'REVERSAL';
      stornoBtn.disabled = !canReverse;
      stornoBtn.title = canReverse ? '' : 'Ova stavka je već storno ili storno događaj.';
      stornoBtn.onclick = function() {
        if (!canReverse) return;
        appPrompt_({
          title: 'Storno stavke',
          message: 'Unesite razlog storna za stavku ' + ev.event_id + '. Sistem će napraviti povezanu storno stavku, bez brisanja originala.',
          label: 'Razlog storna',
          confirmText: 'Storniraj',
          danger: true
        }, function(reason) {
          var originalText = stornoBtn.textContent;
          stornoBtn.disabled = true;
          stornoBtn.textContent = 'Storniram...';
          callApi('apiReverseCashEvent', [ev.event_id, reason], function() {
            panel.style.display = 'none';
            loadKnjiga_(true);
            refreshBalance_();
          }, {
            successMessage: 'Storno je evidentiran.',
            onComplete: function() {
              stornoBtn.disabled = false;
              stornoBtn.textContent = originalText;
            }
          });
        });
      };
    }

    panel.style.display = '';
    document.querySelectorAll('#d-knjiga-tbody tr').forEach(function(r) {
      r.classList.toggle('selected', r.getAttribute('data-event-id') === ev.event_id);
    });
  }

  function openMobileDetailPanel_(ev) {
    var overlay = document.getElementById('m-detail-overlay');
    var title = document.getElementById('m-detail-title');
    var body = document.getElementById('m-detail-body');
    if (!overlay || !title || !body) return;
    var isCount = ev.event_type === 'CASH_COUNT';
    var isIn = ev.direction === 'IN';
    var dirColor = isCount ? '#d99a00' : isIn ? 'var(--color-in)' : 'var(--color-out)';
    title.innerHTML = '<span style="color:' + dirColor + '">' + (isCount ? 'PRESEK' : isIn ? 'UPLATA' : 'ISPLATA') + '</span>';
    var rows = [
      ['ID', escapeHtml(ev.event_id || '—')],
      ['Iznos', '<strong style="color:' + dirColor + '">' + formatAmount_(ev.amount) + ' ' + escapeHtml(ev.currency || SESSION.currency) + '</strong>'],
      ['Datum', formatDateShort_(ev.event_date || ev.created_at)],
      ['Primalac/uplatioc', escapeHtml(ev.partner_name || '—')],
      ['Opis', escapeHtml(ev.description || '—')],
      ['Status', renderStatusBadge_(ev.status)],
      ['Vreme', escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date))],
      ['Uneo', escapeHtml(ev.posted_by || ev.created_by || '—')]
    ];
    if (ev.reversal_of_event_id) {
      rows.push(['Veza storna', escapeHtml(ev.reversal_of_event_id)]);
    }
    body.innerHTML = rows.map(function(r) {
      return '<div class="detail-row" style="border-bottom:1px solid var(--color-border-light);padding:9px 0">' +
        '<span class="detail-key">' + r[0] + '</span><span style="text-align:right;overflow-wrap:anywhere">' + r[1] + '</span></div>';
    }).join('');
    var closeBtn = document.getElementById('m-detail-close');
    var printBtn = document.getElementById('m-detail-print');
    var stornoBtn = document.getElementById('m-detail-storno');
    if (closeBtn) closeBtn.onclick = function() { overlay.style.display = 'none'; };
    overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };
    if (printBtn) {
      printBtn.disabled = isCount;
      printBtn.onclick = function() { if (!isCount) openPrintView('print-cash-event', ev.event_id); };
    }
    if (stornoBtn) {
      var canReverse = !isCount && ev.status !== 'REVERSED' && ev.event_type !== 'REVERSAL' && !ev.optimistic_id;
      stornoBtn.disabled = !canReverse;
      stornoBtn.onclick = function() {
        if (!canReverse) return;
        appPrompt_({
          title: 'Storno stavke',
          message: 'Unesite razlog storna za stavku ' + ev.event_id + '.',
          label: 'Razlog storna',
          confirmText: 'Storniraj',
          danger: true
        }, function(reason) {
          callApi('apiReverseCashEvent', [ev.event_id, reason], function() {
            overlay.style.display = 'none';
            loadKnjiga_(true);
            refreshBalance_();
          }, { successMessage: 'Storno je evidentiran.' });
        });
      };
    }
    overlay.style.display = 'flex';
  }

  function formatTimeShort_(value) {
    if (!value) return '—';
    var text = String(value);
    var match = text.match(/(\d{1,2}):(\d{2})/);
    if (match) return match[1].padStart(2, '0') + ':' + match[2];
    var date = new Date(value);
    if (!isNaN(date.getTime())) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }
    return text;
  }

  function shortUserLabel_(value) {
    if (!value) return '—';
    var text = String(value);
    return text.indexOf('@') > -1 ? text.split('@')[0] : text;
  }

  /* ─── Desktop: quick form ────────────────────────────────────── */

  function bindDesktopQuickForm_() {
    var btnIn  = document.getElementById('d-qf-type-in');
    var btnOut = document.getElementById('d-qf-type-out');
    var submit = document.getElementById('d-qf-submit');
    var label  = document.getElementById('d-qf-submit-label');
    if (!btnIn || !btnOut || !submit) return;

    function setQuickType(type) {
      currentQuickFormType_ = 'IN';
      if (type === 'OUT' || type === 'TREASURY') currentQuickFormType_ = type;
      btnIn.classList.toggle('active', currentQuickFormType_ === 'IN');
      btnOut.classList.toggle('active', currentQuickFormType_ !== 'IN');
      submit.className = (currentQuickFormType_ === 'IN' ? 'btn-in' : 'btn-out') + ' btn-full btn-lg';
      if (label) {
        label.textContent = currentQuickFormType_ === 'IN'
          ? 'Proknjiti uplatu'
          : currentQuickFormType_ === 'TREASURY'
            ? 'Proknjiti predaju u trezor'
            : 'Proknjiti isplatu';
      }
    }

    btnIn.addEventListener('click', function() { setQuickType('IN'); });
    btnOut.addEventListener('click', function() { setQuickType('OUT'); });
    submit.addEventListener('click', submitDesktopQuickForm_);
    bindDesktopEnterFlow_();

    var btnU = document.getElementById('d-btn-uplata');
    var btnI = document.getElementById('d-btn-isplata');
    var btnT = document.getElementById('d-btn-trezor');
    if (btnU) btnU.addEventListener('click', function() { setQuickType('IN'); var a = document.getElementById('d-qf-amount'); if (a) a.focus(); });
    if (btnI) btnI.addEventListener('click', function() { setQuickType('OUT'); var a = document.getElementById('d-qf-amount'); if (a) a.focus(); });
    if (btnT) btnT.addEventListener('click', function() {
      setQuickType('TREASURY');
      var partner = document.getElementById('d-qf-partner');
      var desc = document.getElementById('d-qf-description');
      if (partner) partner.value = 'Trezor';
      if (desc) desc.value = 'Predaja u trezor';
      var a = document.getElementById('d-qf-amount');
      if (a) a.focus();
    });
  }

  function bindDesktopEnterFlow_() {
    if (window.__blagajnaEnterFlowBound) return;
    window.__blagajnaEnterFlowBound = true;
    var amount = document.getElementById('d-qf-amount');
    var partner = document.getElementById('d-qf-partner');
    var desc = document.getElementById('d-qf-description');
    if (amount) amount.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (partner) partner.focus();
      }
    });
    if (partner) partner.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (desc) desc.focus();
      }
    });
  }

  function submitDesktopQuickForm_() {
    var type    = currentQuickFormType_;
    var amount  = parseAmountInput_((document.getElementById('d-qf-amount') || {}).value);
    var cur     = (document.getElementById('d-qf-currency')    || {}).value || SESSION.currency;
    var partner = ((document.getElementById('d-qf-partner')    || {}).value || '').trim();
    var desc    = ((document.getElementById('d-qf-description') || {}).value || '').trim();
    var isTreasury = type === 'TREASURY';
    var direction = type === 'IN' ? 'IN' : 'OUT';

    if (!amount || amount <= 0) { var a = document.getElementById('d-qf-amount'); if (a) a.focus(); return; }
    if (!isTreasury && !desc && !partner) { var d2 = document.getElementById('d-qf-description'); if (d2) d2.focus(); return; }
    if (isTreasury) {
      partner = 'Trezor';
      desc = desc || 'Predaja u trezor';
    }

    var tempId = 'OPT-' + Date.now();
    rememberOptimisticEvent_(buildOptimisticEvent_(tempId, direction, amount, cur, partner, desc, 'KNJIŽENJE'));
    renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
    if (cur === SESSION.currency) {
      updateTopbarBalance_(direction === 'IN' ? amount : -amount);
    }

    var data = { cashbox_id: SESSION.cashboxId, currency: cur, amount: amount, partner_name: partner, description: desc || partner };
    var fn   = type === 'IN' ? 'apiCreateCashInflow' : isTreasury ? 'apiCreateTreasuryHandover' : 'apiCreateDirectCashOutflow';

    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          removeOptimisticEvent_(tempId);
          var realEvent = resp.data || resp;
          if (realEvent && realEvent.event_id) {
            realEvent.optimistic_id = realEvent.event_id;
            rememberOptimisticEvent_(realEvent);
          }
          resetDesktopQuickForm_();
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          scheduleKnjigaRefresh_();
        }
        else {
          removeOptimisticEvent_(tempId);
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          if (cur === SESSION.currency) updateTopbarBalance_(direction === 'IN' ? -amount : amount);
          showDesktopMessage_('Greška: ' + humanizeError_(resp && resp.error ? resp.error.message : 'problem.'), 'error');
        }
      })
      .withFailureHandler(function(err) {
        removeOptimisticEvent_(tempId);
        renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
        if (cur === SESSION.currency) updateTopbarBalance_(direction === 'IN' ? -amount : amount);
        showDesktopMessage_('Greška: ' + humanizeError_(err && err.message ? err.message : 'tehnički problem.'), 'error');
      })
      [fn](data);
  }

  function prependDesktopOptimistic_(tempId, direction, amount, currency, label) {
    var tbody = document.getElementById('d-knjiga-tbody');
    if (!tbody) return;
    var isIn = direction === 'IN';
    var now  = new Date();
    var html = '<tr class="' + (isIn ? 'row-in' : 'row-out') + ' optimistic" data-optimistic-id="' + tempId + '" data-event-id="' + tempId + '">' +
      '<td><div class="skeleton" style="width:18px;height:12px"></div></td>' +
      '<td>' + now.getDate() + '.' + (now.getMonth()+1) + '.</td>' +
      '<td><div class="desc-main">' + escapeHtml(label) + '</div>' +
          '<div class="desc-sub" style="color:#c2974a"><i class="ti ti-loader-2 spin" aria-hidden="true"></i> Knjiženje...</div></td>' +
      '<td class="' + (isIn  ? 'cell-in'   : 'cell-dash') + '">' + (isIn  ? formatAmount_(amount) : '—') + '</td>' +
      '<td class="' + (!isIn ? 'cell-out'  : 'cell-dash') + '">' + (!isIn ? formatAmount_(amount) : '—') + '</td>' +
      '<td class="cell-bal">...</td></tr>';
    tbody.insertAdjacentHTML('afterbegin', html);
  }

  function removeDesktopOptimistic_(tempId) {
    var el = document.querySelector('[data-optimistic-id="' + tempId + '"]');
    if (el) el.remove();
  }

  function resetDesktopQuickForm_() {
    ['d-qf-amount','d-qf-partner','d-qf-description'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = '';
    });
  }

  /* ─── Mobile: bottom sheet ───────────────────────────────────── */

  function bindMobileSheet_() {
    var btnU   = document.getElementById('m-btn-uplata');
    var btnI   = document.getElementById('m-btn-isplata');
    var btnT   = document.getElementById('m-btn-trezor');
    var submit = document.getElementById('sheet-submit');
    var cancel = document.getElementById('sheet-cancel');
    var overlay= document.getElementById('sheet-overlay');

    if (btnU)    btnU.addEventListener('click',    function() { openSheet_('IN'); });
    if (btnI)    btnI.addEventListener('click',    function() { openSheet_('OUT'); });
    if (btnT)    btnT.addEventListener('click',    function() { openSheet_('TREASURY'); });
    if (submit)  submit.addEventListener('click',  submitSheet_);
    if (cancel)  cancel.addEventListener('click',  closeSheet_);
    if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSheet_(); });

    renderSheetCurrencyButtons_();
    bindSheetCurrencyButtons_();
  }

  function bindSheetCurrencyButtons_() {
    document.querySelectorAll('#sheet-cur-toggle .cur-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var type = currentSheetType_;
        document.querySelectorAll('#sheet-cur-toggle .cur-btn').forEach(function(b) {
          b.className = 'cur-btn' + (b === btn ? ' active ' + (type === 'IN' ? 'in' : 'out') : '');
        });
      });
    });
  }

  function renderSheetCurrencyButtons_() {
    var container = document.getElementById('sheet-cur-toggle');
    if (!container) return;
    var currencies = uiState.config.currencies || [SESSION.currency || 'RSD'];
    container.innerHTML = currencies.map(function(currency) {
      return '<button class="cur-btn" data-currency="' + escapeHtml(currency) + '" type="button">' + escapeHtml(currency) + '</button>';
    }).join('');
  }

  function openSheet_(type) {
    currentSheetType_      = type;
    currentQuickFormType_  = type;
    var overlay = document.getElementById('sheet-overlay');
    var title   = document.getElementById('sheet-title');
    var submit  = document.getElementById('sheet-submit');
    var lbl     = submit ? submit.querySelector('span') : null;
    var isIn    = type === 'IN';
    var isTreasury = type === 'TREASURY';
    if (!overlay) return;

    if (title)  { title.textContent = isIn ? 'Nova uplata' : isTreasury ? 'Predaja u trezor' : 'Nova isplata'; title.className = 'sheet-title ' + (isIn ? 'in' : 'out'); }
    if (submit) submit.className = 'btn-full btn-lg ' + (isIn ? 'btn-in' : 'btn-out');
    if (lbl)    lbl.textContent  = isIn ? 'Proknjiti uplatu' : isTreasury ? 'Proknjiti predaju' : 'Proknjiti isplatu';

    document.querySelectorAll('#sheet-cur-toggle .cur-btn').forEach(function(btn) {
      var sel = (btn.dataset.currency || 'RSD') === SESSION.currency;
      btn.className = 'cur-btn' + (sel ? ' active ' + (isIn ? 'in' : 'out') : '');
    });

    ['sheet-amount','sheet-partner','sheet-description'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
    if (isTreasury) {
      var partner = document.getElementById('sheet-partner');
      var desc = document.getElementById('sheet-description');
      if (partner) partner.value = 'Trezor';
      if (desc) desc.value = 'Predaja u trezor';
    }

    overlay.style.display = 'flex';
    setTimeout(function() { var a = document.getElementById('sheet-amount'); if (a) a.focus(); }, 150);
  }

  function closeSheet_() {
    var el = document.getElementById('sheet-overlay');
    if (el) el.style.display = 'none';
  }

  function submitSheet_() {
    var amount  = parseAmountInput_((document.getElementById('sheet-amount') || {}).value);
    var partner = ((document.getElementById('sheet-partner')               || {}).value || '').trim();
    var desc    = ((document.getElementById('sheet-description')           || {}).value || '').trim();
    var type    = currentSheetType_;
    var cur     = SESSION.currency;
    var isTreasury = type === 'TREASURY';
    var direction = type === 'IN' ? 'IN' : 'OUT';

    var activeCur = document.querySelector('#sheet-cur-toggle .cur-btn.active');
    if (activeCur) cur = activeCur.dataset.currency || cur;

    if (!amount || amount <= 0) { var a = document.getElementById('sheet-amount'); if (a) a.focus(); return; }
    if (!isTreasury && !desc && !partner) { var d2 = document.getElementById('sheet-description'); if (d2) d2.focus(); return; }
    if (isTreasury) {
      partner = 'Trezor';
      desc = desc || 'Predaja u trezor';
    }

    closeSheet_();

    var tempId = 'OPT-' + Date.now();
    rememberOptimisticEvent_(buildOptimisticEvent_(tempId, direction, amount, cur, partner, desc, 'KNJIŽENJE'));
    renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
    if (cur === SESSION.currency) {
      updateMobileBalance_(direction === 'IN' ? amount : -amount);
    }

    var data = { cashbox_id: SESSION.cashboxId, currency: cur, amount: amount, partner_name: partner, description: desc || partner };
    var fn   = type === 'IN' ? 'apiCreateCashInflow' : isTreasury ? 'apiCreateTreasuryHandover' : 'apiCreateDirectCashOutflow';

    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          removeOptimisticEvent_(tempId);
          var realEvent = resp.data || resp;
          if (realEvent && realEvent.event_id) {
            realEvent.optimistic_id = realEvent.event_id;
            rememberOptimisticEvent_(realEvent);
          }
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          scheduleKnjigaRefresh_();
        }
        else {
          removeOptimisticEvent_(tempId);
          renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
          if (cur === SESSION.currency) updateMobileBalance_(direction === 'IN' ? -amount : amount);
          showMobileMessage_('Greška: ' + humanizeError_(resp && resp.error ? resp.error.message : 'problem.'), 'error');
        }
      })
      .withFailureHandler(function(err) {
        removeOptimisticEvent_(tempId);
        renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
        if (cur === SESSION.currency) updateMobileBalance_(direction === 'IN' ? -amount : amount);
        showMobileMessage_('Greška: ' + humanizeError_(err && err.message ? err.message : 'problem.'), 'error');
      })
      [fn](data);
  }

  function prependMobileOptimistic_(tempId, direction, amount, currency, label) {
    var list = document.getElementById('m-knjiga-list');
    if (!list) return;
    var isIn   = direction === 'IN';
    var dotBg  = isIn ? 'var(--color-in)' : 'var(--color-out)';
    var color  = isIn ? 'var(--color-in)' : 'var(--color-out)';
    var prefix = isIn ? '+' : '−';
    var html = '<div class="m-entry optimistic" data-optimistic-id="' + tempId + '">' +
      '<div class="m-entry-dot" style="background:' + dotBg + '"></div>' +
      '<div class="m-entry-info">' +
        '<div class="m-entry-desc">' + escapeHtml(label) + '</div>' +
        '<div class="m-entry-meta" style="color:#c2974a"><i class="ti ti-loader-2 spin" aria-hidden="true"></i> Knjiženje...</div>' +
      '</div>' +
      '<div class="m-entry-amt" style="color:' + color + '">' + prefix + formatAmount_(amount) + '</div>' +
    '</div>';
    list.insertAdjacentHTML('afterbegin', html);
  }

        if (target === 'm-section-knjiga') loadKnjiga_(true);
        if (target === 'm-section-nalozi') loadMobileNalozi_();
        if (target === 'm-section-presek') loadCashCounts_();
        updateMobileDirectActionsVisibility_();
      });
    });

    var loadShiftsBtn = document.getElementById('m-load-shifts-btn');
    if (loadShiftsBtn) loadShiftsBtn.addEventListener('click', function() {
      loadMyShiftsTo_('m-shifts-list');
    });
    var activeShiftBalanceBtn = document.getElementById('m-active-shift-balance-btn');
    if (activeShiftBalanceBtn) activeShiftBalanceBtn.addEventListener('click', function() {
      loadActiveShiftBalanceTo_('m-shift-result');
    });
    var mobileRefreshBtn = document.getElementById('m-knjiga-refresh');
    if (mobileRefreshBtn) mobileRefreshBtn.addEventListener('click', function() { loadKnjiga_(); });
    var mobileCountRefreshBtn = document.getElementById('m-count-refresh');
    if (mobileCountRefreshBtn) mobileCountRefreshBtn.addEventListener('click', loadCashCounts_);
    var trafficBtn = document.getElementById('m-traffic-summary-btn');
    if (trafficBtn) trafficBtn.addEventListener('click', function() {
      var box = document.getElementById('m-traffic-summary');
      if (!box) return;
      renderMobileTrafficSummary_();
      box.hidden = !box.hidden;
    });
    updateMobileDirectActionsVisibility_();
  }

  /* ─── Nalozi helpers ─────────────────────────────────────────── */

  function loadDesktopNalozi_() {
    callApi('apiListOrdersWaitingForPayment', [], function(result) {
      renderActionRecords('d-nalozi-list', result, ['order_id','pay_to_name','amount_ordered','amount_paid','currency','status'], waitingOrderActions_);
      loadDesktopNavBadges_();
    }, { quiet: true });
  }

  function loadMobileNalozi_() {
    callApi('apiListOrdersWaitingForPayment', [], function(result) {
      var list = document.getElementById('m-nalozi-list');
      if (!list) return;
      if (!result || !result.length) {
        list.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema naloga za isplatu.</p></div>';
        updateTabCounts_(null, 0); return;
      }
      list.innerHTML = result.map(function(order) {
        var remaining = Number(order.amount_ordered||0) - Number(order.amount_paid||0);
        return '<div class="m-entry">' +
          '<div class="m-entry-dot" style="background:var(--color-out)"></div>' +
          '<div class="m-entry-info">' +
            '<div class="m-entry-desc">' + escapeHtml(order.pay_to_name||'—') + '</div>' +
            '<div class="m-entry-meta">' + escapeHtml(order.order_id) + ' · ' + formatAmount_(remaining) + ' ' + escapeHtml(order.currency||'') + '</div>' +
          '</div>' +
          '<button onclick="executeOrderDirect_(\'' + escapeHtml(order.order_id) + '\')" ' +
            'style="background:var(--color-out-bg);border:1px solid var(--color-out-border);color:var(--color-out);font-size:12px;min-height:32px;padding:4px 12px;border-radius:6px;cursor:pointer">Izvrši</button>' +
        '</div>';
      }).join('');
      updateTabCounts_(null, result.length);
    }, { quiet: true });
  }

  function executeOrderDirect_(orderId) {
    appConfirm_({
      title: 'Izvršenje naloga',
      message: 'Izvršiti isplatu za nalog ' + orderId + '?',
      confirmText: 'Izvrši isplatu'
    }, function() {
      callApi('apiExecutePaymentOrder', [orderId, {}], function() {
        loadMobileNalozi_();
        loadKnjiga_(true);
        refreshBalance_();
      }, { successMessage: 'Isplata je izvršena.' });
    });
  }

  function loadDesktopNavBadges_() {
    var naloziBadge  = document.getElementById('nav-badge-nalozi');
    var zahteviBadge = document.getElementById('nav-badge-zahtevi');
    if (naloziBadge) callApi('apiListOrdersWaitingForPayment', [], function(r) {
      naloziBadge.textContent = r.length; naloziBadge.style.display = r.length > 0 ? '' : 'none';
    }, { quiet: true });
    if (zahteviBadge) callApi('apiListRequestsForApproval', [], function(r) {
      zahteviBadge.textContent = r.length; zahteviBadge.style.display = r.length > 0 ? '' : 'none';
    }, { quiet: true });
  }

  /* ─── Message helpers ────────────────────────────────────────── */

  function showDesktopMessage_(msg, type) {
    var el = document.getElementById('d-message');
    if (!el) return;
    el.textContent = msg;
    el.className   = 'message show ' + (type || 'info');
    scheduleMessageHide_(el, 'd-message', type);
  }

  function showMobileMessage_(msg, type) {
    var el = document.getElementById('m-message');
    if (!el) return;
    el.textContent = msg;
    el.className   = 'message show ' + (type || 'info');
    scheduleMessageHide_(el, 'm-message', type);
  }

  function appPrompt_(options, onConfirm) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Potvrda') + '</h3>' +
        '<p>' + escapeHtml(options.message || '') + '</p>' +
        '<textarea rows="4" data-dialog-input placeholder="' + escapeHtml(options.placeholder || options.label || '') + '"></textarea>' +
        '<div class="app-dialog-actions">' +
          '<button type="button" class="btn-ghost" data-dialog-cancel>Otkaži</button>' +
          '<button type="button" class="' + (options.danger ? 'btn-out' : 'btn-primary') + '" data-dialog-ok>' + escapeHtml(options.confirmText || 'Potvrdi') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var input = overlay.querySelector('[data-dialog-input]');
    var close = function() { overlay.remove(); };
    overlay.querySelector('[data-dialog-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', function() {
      var value = (input.value || '').trim();
      if (!value) {
        input.focus();
        showMessage('Unesite razlog pre potvrde.', 'error');
        return;
      }
      close();
      onConfirm(value);
    });
    window.setTimeout(function() { input.focus(); }, 50);
  }

  function appConfirm_(options, onConfirm) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Potvrda') + '</h3>' +
        '<p>' + escapeHtml(options.message || 'Da li želite da nastavite?') + '</p>' +
        '<div class="app-dialog-actions">' +
          '<button type="button" class="btn-ghost" data-dialog-cancel>Otkaži</button>' +
          '<button type="button" class="' + (options.danger ? 'btn-out' : 'btn-primary') + '" data-dialog-ok>' + escapeHtml(options.confirmText || 'Potvrdi') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.querySelector('[data-dialog-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', function() {
      close();
      onConfirm();
    });
  }

  function appHtmlDialog_(options) {
    options = options || {};
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog" role="dialog" aria-modal="true">' +
        '<h3>' + escapeHtml(options.title || 'Pregled') + '</h3>' +
        '<div>' + (options.html || '') + '</div>' +
        '<div class="app-dialog-actions" style="margin-top:12px">' +
          '<button type="button" class="btn-primary" data-dialog-ok>' + escapeHtml(options.confirmText || 'Zatvori') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    overlay.querySelector('[data-dialog-ok]').addEventListener('click', close);
  }

  function updateHeaderClock_() {
    var now = new Date();
    var dateText = now.toLocaleDateString('sr-RS', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
    var timeText = now.toLocaleTimeString('sr-RS', {
      hour: '2-digit',
      minute: '2-digit'
    });
    var dDate = document.getElementById('d-current-date');
    var dTime = document.getElementById('d-current-time');
    var mDate = document.getElementById('m-current-date');
    var mTime = document.getElementById('m-current-time');
    if (dDate) dDate.textContent = dateText;
    if (dTime) dTime.textContent = timeText;
    if (mDate) mDate.textContent = dateText;
    if (mTime) mTime.textContent = timeText;
  }

  function startHeaderClock_() {
    updateHeaderClock_();
    if (window.__blagajnaClockTimer) return;
    window.__blagajnaClockTimer = window.setInterval(updateHeaderClock_, 1000);
  }

  function startLiveRefresh_(isDesktop, isMobile) {
    if (window.__blagajnaLiveRefreshTimer) {
      window.clearInterval(window.__blagajnaLiveRefreshTimer);
    }
    window.__blagajnaLiveRefreshTimer = window.setInterval(function() {
      if (document.hidden) return;
      refreshActiveShiftState_({ enforce: false, refreshKnjiga: false });
      refreshBalance_();
      loadKnjiga_(true);
      if (isMobile) loadMobileNalozi_();
      if (isDesktop) loadDesktopNavBadges_();
    }, 15000);
  }

  function registerPwa_() {
    if (!('serviceWorker' in navigator)) return;
    try {
      navigator.serviceWorker.register('?view=sw').catch(function() {});
    } catch (err) {}
  }

  /* ─── Bootstrap: prošireni DOMContentLoaded ──────────────────── */

  document.addEventListener('DOMContentLoaded', function() {
    var isMobile  = Boolean(document.querySelector('.m-shell'));
    var isDesktop = Boolean(document.querySelector('.d-shell'));

    if (isMobile)  { bindMobileNav_();  bindMobileSheet_(); }
    if (isDesktop) { bindDesktopNav_(); bindDesktopQuickForm_(); }
    if (isMobile)  { bindModernShellForms_(); }
    bindBalanceOverviewButtons_();
    bindAmountFormatting_();
    startHeaderClock_();
    registerPwa_();

    // Današnji datum u date inputima
    var today = new Date().toISOString().split('T')[0];
    ['d-date-from','d-date-to'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = today;
    });
    document.querySelectorAll('[data-today]').forEach(function(el) { if (!el.value) el.value = today; });

    // Datum u mobilnom headeru
    var dateEl = document.getElementById('m-date');
    if (dateEl) {
      var now = new Date();
      dateEl.textContent = now.getDate() + '.' + (now.getMonth()+1) + '.' + now.getFullYear() + '.';
    }

    // Bootstrap API call
    callApi('apiGetUiBootstrap', [isDesktop], function(data) {
      uiState.config      = data.config || {};
      uiState.currentUser = data.user   || null;
      uiState.activeShift = data.activeShift || null;
      uiState.canPostDirectCashEvents = data.canPostDirectCashEvents === true;
      initializeSession();
      if (isMobile) {
        renderSheetCurrencyButtons_();
        bindSheetCurrencyButtons_();
      }
      fillConfigOptions();
      setTodayDefaults();
      renderPhysicalBalanceInputs();
      renderDenominationInputs_();
      applyDefaultCashboxFields();
      renderCurrentUser(uiState.currentUser);
      renderAppVersion_();
      applyActiveShiftFields_();
      applyDirectCashPermission_();
      loadCashbookFilterOptions_();
      bindBalanceOverviewButtons_();
      bindAmountFormatting_();
      enforceShiftStartup_(isDesktop, isMobile);

      // Ažuriraj korisnika u sidebar-u
      var navUser = document.querySelector('[data-nav-user]');
      if (navUser && uiState.currentUser) {
        navUser.textContent = (uiState.currentUser.full_name || uiState.currentUser.email || '') +
          ' · ' + (uiState.currentUser.role || '');
      }

      if (isDesktop && data.dashboard) renderDesktopDashboard(data.dashboard);
      if (isMobile)  applyRoleBasedHomeMobile_(uiState.currentUser && uiState.currentUser.role);

      refreshBalance_();
      loadKnjiga_(true);

      if (isMobile)  { refreshUrgentAlert(); loadMobileNalozi_(); }
      if (isDesktop) loadDesktopNavBadges_();
      startLiveRefresh_(isDesktop, isMobile);
    }, { quiet: true });
  });

</script>
