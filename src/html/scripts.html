    var el = document.getElementById('d-topbar-balance') || document.getElementById('m-balance');

    return PENDING_OPTIMISTIC_EVENTS.some(function(ev) {
      return ev.cashbox_id === SESSION.cashboxId && ev.currency === SESSION.currency;
    });
  }

  function assertClientSideCashAmount_(direction, amount, currency) {
    if (direction !== 'OUT' || currency !== SESSION.currency) return true;
    var available = getDisplayedBalanceRaw_();
    if (amount > available + 0.000001) {
      showMessage('Nedozvoljena akcija: pokušaj isplate preko raspoloživog stanja blagajne. Raspoloživo je ' + formatAmount_(available) + ' ' + currency + '.', 'error');
      return false;
    }
    return true;
  }

  function initializeSession() {
    var config = uiState.config || {};
    var cashboxes = config.cashboxes || [];
    var cashboxId = config.defaultCashboxId || (cashboxes[0] && cashboxes[0].cashbox_id) || 'CB_MAIN';
    var cashbox = cashboxes.filter(function(item) {
      return item.cashbox_id === cashboxId;
    })[0] || { cashbox_id: cashboxId, name: config.defaultCashboxName || cashboxId };
    SESSION.cashboxId = cashbox.cashbox_id;
    SESSION.cashboxName = cashbox.name || cashbox.cashbox_id;
    SESSION.currency = config.defaultCurrency || (config.currencies && config.currencies[0]) || 'RSD';
    updateContextDisplay_();
  }

  function updateContextDisplay_() {
    document.querySelectorAll('[data-session-cashbox]').forEach(function(element) {
      element.textContent = SESSION.cashboxName || SESSION.cashboxId || 'Blagajna nije izabrana';
    });
    document.querySelectorAll('[data-session-cashbox-select]').forEach(function(select) {
      var cashboxes = uiState.config.cashboxes || [];
      if (!select.options.length) {
        select.innerHTML = cashboxes.map(function(cashbox) {
          return '<option value="' + escapeHtml(cashbox.cashbox_id) + '">' +
            escapeHtml(cashbox.name || cashbox.cashbox_id) + '</option>';
        }).join('');
        select.addEventListener('change', function() {
          var selected = (uiState.config.cashboxes || []).filter(function(cashbox) {
            return cashbox.cashbox_id === select.value;
          })[0];
          SESSION.cashboxId = select.value || SESSION.cashboxId;
          SESSION.cashboxName = selected ? (selected.name || selected.cashbox_id) : SESSION.cashboxId;
          applyDefaultCashboxFields();
          refreshActiveShiftState_({ enforce: false });
          refreshBalance_();
          if (typeof loadKnjiga_ === 'function') {
            loadKnjiga_(true);
          }
        });
      }
      if (SESSION.cashboxId) {
        select.value = SESSION.cashboxId;
      }
    });
    document.querySelectorAll('[data-session-currency-select]').forEach(function(select) {
      var values = uiState.config.currencies || ['RSD', 'EUR'];
      if (!select.options.length) {
        select.innerHTML = values.map(function(value) {
          return '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>';
        }).join('');
        select.addEventListener('change', function() {
          SESSION.currency = select.value || 'RSD';
          syncCurrencyFields_();
          refreshBalance_();
          if (typeof loadKnjiga_ === 'function') {
            loadKnjiga_(true);
          }
        });
      }
      select.value = SESSION.currency;
    });
    syncCurrencyFields_();
  }

  function syncCurrencyFields_() {
    document.querySelectorAll('[data-currency-options]').forEach(function(select) {
      if (select.value !== SESSION.currency) {
        select.value = SESSION.currency;
      }
    });
  }

  function renderPhysicalBalanceInputs() {
    var currencies = uiState.config.currencies || ['RSD', 'EUR'];
    document.querySelectorAll('[data-physical-balance-inputs]').forEach(function(container) {
      container.innerHTML = currencies.map(function(currency) {
        return '<label>Fizičko stanje - ' + escapeHtml(currency) +
          '<input name="physical_' + escapeHtml(currency) + '" type="text" inputmode="decimal" placeholder="0,00"></label>';
      }).join('');
    });
    bindAmountFormatting_();
  }

  function renderDenominationInputs_() {
    document.querySelectorAll('form[data-cash-count-form]').forEach(function(form) {
      if (form.classList.contains('cash-count-page-form')) {
        renderCashCountPageForm_(form);
        return;
      }
      var currencySelect = form.querySelector('[name="currency"]');
      var container = form.querySelector('[data-denomination-inputs]');
      if (!container) return;
      var currency = currencySelect ? currencySelect.value || SESSION.currency : SESSION.currency;
      var denominations = getClientDenominations_(currency);
      form.dataset.denominationCount = String(denominations.length);
      if (!form.dataset.countRows) form.dataset.countRows = '[]';
      if (!denominations.length) {
        container.innerHTML = '<div class="shift-warning">Apoeni nisu definisani za valutu ' + escapeHtml(currency) + '. U tabeli CURRENCIES popunite kolonu denominations, na primer: 100,50,20,10,5,1.</div>' +
          '<div data-count-rows></div>';
        bindCashCountTotal_(form);
        renderCashCountRows_(form);
        return;
      }
      container.innerHTML =
        '<div class="count-entry-form">' +
          '<label>Apoen <select data-count-denomination>' + denominations.map(function(value) {
            return '<option value="' + escapeHtml(value) + '">' + escapeHtml(formatAmount_(value)) + '</option>';
          }).join('') + '</select></label>' +
          '<label>Komada <input data-count-quantity type="number" min="0" step="1" inputmode="numeric" value=""></label>' +
          '<label class="count-add-control"><span>&nbsp;</span><button class="btn-primary" data-count-add type="button">Upiši</button></label>' +
        '</div>' +
        '<div data-count-rows></div>';
      var addBtn = container.querySelector('[data-count-add]');
      if (addBtn) {
        addBtn.addEventListener('click', function() {
          var denomEl = container.querySelector('[data-count-denomination]');
          var qtyEl = container.querySelector('[data-count-quantity]');
          var denomination = Number(denomEl && denomEl.value || 0);
          var quantity = Number(qtyEl && qtyEl.value || 0);
          if (!denomination || !quantity || quantity <= 0) {
            showMessage('Unesite apoen i broj komada za popis.', 'error');
            if (qtyEl) qtyEl.focus();
            return;
          }
          addCashCountRow_(form, currency, denomination, quantity);
          if (qtyEl) {
            qtyEl.value = '';
            qtyEl.focus();
          }
        });
      }
      var qtyInput = container.querySelector('[data-count-quantity]');
      if (qtyInput) {
        qtyInput.addEventListener('keydown', function(event) {
          if (event.key !== 'Enter') return;
          event.preventDefault();
          if (addBtn) addBtn.click();
        });
      }
      bindCashCountTotal_(form);
      renderCashCountRows_(form);
    });
  }

  function getClientDenominations_(currency) {
    var configured = uiState.config && uiState.config.cashDenominations && uiState.config.cashDenominations[currency];
    if (configured && configured.length) return configured;
    if (currency === 'EUR') return [500, 200, 100, 50, 20, 10, 5, 2, 1];
    if (currency === 'ČEK' || currency === 'CEK') return [100000, 75000, 50000, 25000, 10000, 5000];
    if (currency && currency !== 'RSD') return [];
    return [5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5, 2, 1];
  }

  function currencyVisual_(currency) {
    var code = String(currency || '').toUpperCase();
    if (code === 'RSD') return { icon: '🇷🇸', name: 'Srpski dinar' };
    if (code === 'EUR') return { icon: '🇪🇺', name: 'Evro' };
    if (code === 'ČEK' || code === 'CEK') return { icon: '🎫', name: 'Čekovi' };
    return { icon: '💱', name: code || 'Valuta' };
  }

  function currencyOptionHtml_(code) {
    var visual = currencyVisual_(code);
    return '<option value="' + escapeHtml(code) + '">' + escapeHtml(visual.icon + '  ' + code) + '</option>';
  }

  function cashCountRowsRaw_(form) {
    try {
      return JSON.parse(form.dataset.countRows || '[]');
    } catch (err) {
      return [];
    }
  }

  function renderCashCountPageForm_(form) {
    var currencySelect = form.querySelector('[name="currency"]');
    var denomSelect = form.querySelector('[data-count-denomination]');
    var quantityInput = form.querySelector('[data-count-quantity]');
    if (!currencySelect || !denomSelect || !quantityInput) return;
    var currency = currencySelect.value || SESSION.currency || 'RSD';
    var denominations = getClientDenominations_(currency);
    form.dataset.denominationCount = String(denominations.length);
    if (!form.dataset.countRows) form.dataset.countRows = '[]';
    var currentDenom = denomSelect.value;
    denomSelect.innerHTML = denominations.map(function(value) {
      return '<option value="' + escapeHtml(value) + '">' + escapeHtml(formatAmount_(value)) + '</option>';
    }).join('');
    if (currentDenom && denominations.map(String).indexOf(String(currentDenom)) !== -1) {
      denomSelect.value = currentDenom;
    }
    if (form.dataset.countPageBound !== '1') {
      bindCashCountPageForm_(form);
      form.dataset.countPageBound = '1';
    }
    renderCashCountRows_(form);
    updateCashCountTotal_(form);
  }

  function bindCashCountPageForm_(form) {
    var currencySelect = form.querySelector('[name="currency"]');
    var denomSelect = form.querySelector('[data-count-denomination]');
    var quantityInput = form.querySelector('[data-count-quantity]');
    var addBtn = form.querySelector('[data-count-add]');
    var cancelBtn = form.querySelector('[data-count-cancel]');
    var draftBtn = form.querySelector('[data-count-draft]');
    if (currencySelect) {
      currencySelect.addEventListener('change', function() {
        renderCashCountPageForm_(form);
        var denom = form.querySelector('[data-count-denomination]');
        if (denom) denom.focus();
      });
    }
    if (addBtn) addBtn.addEventListener('click', function() { addCashCountLineFromForm_(form); });
    if (cancelBtn) cancelBtn.addEventListener('click', function() { cancelCashCountDialog_(form); });
    if (draftBtn) draftBtn.addEventListener('click', function() { saveCashCountDraft_(form); });
    form.addEventListener('keydown', function(event) {
      if (event.key === 'F5') {
        event.preventDefault();
        form.requestSubmit();
        return;
      }
      if (event.key === 'F9') {
        event.preventDefault();
        saveCashCountDraft_(form);
        return;
      }
      if (event.key === 'Escape') {
        event.preventDefault();
        var active = document.activeElement;
        if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') && active.value) {
          active.value = '';
        } else {
          cancelCashCountDialog_(form);
        }
        return;
      }
      if (event.key !== 'Enter' || event.target.tagName === 'TEXTAREA') return;
      event.preventDefault();
      if (event.target === currencySelect && denomSelect) denomSelect.focus();
      else if (event.target === denomSelect && quantityInput) quantityInput.focus();
      else if (event.target === quantityInput) addCashCountLineFromForm_(form);
    });
  }

  function addCashCountLineFromForm_(form) {
    var currencyEl = form.querySelector('[name="currency"]');
    var denomEl = form.querySelector('[data-count-denomination]');
    var qtyEl = form.querySelector('[data-count-quantity]');
    var noteEl = form.querySelector('[data-line-note]');
    var currency = currencyEl && currencyEl.value || SESSION.currency;
    var denomination = Number(denomEl && denomEl.value || 0);
    var quantity = Number(qtyEl && qtyEl.value || 0);
    if (!currency) {
      showMessage('Izaberite valutu.', 'error');
      if (currencyEl) currencyEl.focus();
      return;
    }
    if (!denomination) {
      showMessage('Izaberite apoen.', 'error');
      if (denomEl) denomEl.focus();
      return;
    }
    if (!Number.isInteger(quantity) || quantity <= 0) {
      showMessage('Unesite količinu veću od nule.', 'error');
      if (qtyEl) qtyEl.focus();
      return;
    }
    addCashCountRow_(form, currency, denomination, quantity, noteEl ? noteEl.value : '');
    if (qtyEl) qtyEl.value = '';
    if (noteEl) noteEl.value = '';
    if (denomEl) denomEl.focus();
  }

  function bindCashCountTotal_(form) {
    if (!form || form.dataset.cashCountBound === '1') {
      updateCashCountTotal_(form);
      return;
    }
    form.dataset.cashCountBound = '1';
    form.addEventListener('keydown', function(event) {
      if (event.key !== 'Enter' || event.target.tagName === 'TEXTAREA') return;
      event.preventDefault();
      var fields = Array.prototype.slice.call(form.querySelectorAll('select, input:not([type="hidden"]), textarea, button'))
        .filter(function(el) { return !el.disabled && el.offsetParent !== null; });
      var index = fields.indexOf(event.target);
      var addButton = form.querySelector('[data-count-add]');
      if (event.target.hasAttribute('data-count-quantity') && addButton) {
        addButton.click();
        return;
      }
      if (index >= 0 && fields[index + 1]) {
        fields[index + 1].focus();
      }
    });
    form.addEventListener('input', function() { updateCashCountTotal_(form); });
    var currencySelect = form.querySelector('[name="currency"]');
    if (currencySelect) {
      currencySelect.addEventListener('change', function() {
        renderDenominationInputs_();
      });
    }
    updateCashCountTotal_(form);
  }

  function updateCashCountTotal_(form) {
    if (!form) return;
    var totals = collectDenominations_(form).reduce(function(result, row) {
      var currency = row.currency || ((form.querySelector('[name="currency"]') || {}).value || SESSION.currency);
      result[currency] = Number(result[currency] || 0) + row.denomination * row.quantity;
      return result;
    }, {});
    var target = form.querySelector('[data-cash-count-total]');
    var updated = form.querySelector('[data-count-updated]');
    var currency = (form.querySelector('[name="currency"]') || {}).value || SESSION.currency;
    if (target) {
      var parts = Object.keys(totals).filter(function(code) { return Math.abs(Number(totals[code] || 0)) > 0.000001; })
        .map(function(code) { return formatAmount_(totals[code]) + ' ' + code; });
      target.textContent = 'Popisano: ' + (parts.length ? parts.join(' · ') : '0,00 ' + currency);
    }
    if (updated) updated.textContent = 'Poslednje ažuriranje: ' + formatDateTimeShort_(new Date());
    renderCashCountRows_(form);
  }

  function collectDenominations_(form) {
    if (!form) return [];
    try {
      return JSON.parse(form.dataset.countRows || '[]').map(function(row) {
        return {
          currency: row.currency,
          denomination: Number(row.denomination || 0),
          quantity: Number(row.quantity || 0),
          note: row.note || '',
          createdAt: row.createdAt || ''
        };
      });
    } catch (err) {
      return [];
    }
  }

  function addCashCountRow_(form, currency, denomination, quantity, note) {
    var rows = collectDenominations_(form);
    var found = rows.filter(function(row) {
      return row.currency === currency && Number(row.denomination) === Number(denomination);
    })[0];
    if (found) {
      found.quantity = Number(found.quantity || 0) + Number(quantity || 0);
      if (note) found.note = note;
      showMessage('Količina za ' + currency + ' ' + formatAmount_(denomination) + ' je uvećana za ' + quantity + '.', 'success');
    } else {
      rows.push({
        currency: currency,
        denomination: denomination,
        quantity: quantity,
        note: note || '',
        createdAt: new Date().toISOString()
      });
      showMessage('Red je dodat.', 'success');
    }
    form.dataset.countRows = JSON.stringify(rows);
    updateCashCountTotal_(form);
  }

  function removeCashCountRow_(form, index) {
    var rows = collectDenominations_(form);
    rows.splice(index, 1);
    form.dataset.countRows = JSON.stringify(rows);
    updateCashCountTotal_(form);
  }

  function renderCashCountRows_(form) {
    if (!form) return;
    var target = form.querySelector('[data-count-rows]');
    if (!target) return;
    var rows = collectDenominations_(form);
    if (form.classList.contains('cash-count-page-form')) {
      renderCashCountPageRows_(form, target, rows);
      renderCashCountPageSidebar_(form, rows);
      return;
    }
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state">Još nema unetih apoena.</div>';
      return;
    }
    target.innerHTML = '<table class="count-table"><thead><tr><th>Valuta</th><th>Apoen</th><th>Komada</th><th>Iznos</th><th></th></tr></thead><tbody>' +
      rows.map(function(row, index) {
        var amount = Number(row.denomination || 0) * Number(row.quantity || 0);
        return '<tr><td>' + escapeHtml(row.currency || '') + '</td>' +
          '<td>' + formatAmount_(row.denomination) + '</td>' +
          '<td>' + escapeHtml(row.quantity) + '</td>' +
          '<td>' + formatAmount_(amount) + '</td>' +
          '<td><button class="icon-btn" type="button" data-count-remove="' + index + '" title="Ukloni"><i class="ti ti-x"></i></button></td></tr>';
      }).join('') + '</tbody></table>';
    target.querySelectorAll('[data-count-remove]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        removeCashCountRow_(form, Number(btn.getAttribute('data-count-remove')));
      });
    });
  }

  function renderCashCountPageRows_(form, target, rows) {
    if (!rows.length) {
      target.innerHTML = '<div class="cash-count-empty">Još nema unetih apoena.</div>';
      return;
    }
    target.innerHTML =
      '<table class="cash-count-lines-table"><thead><tr><th>#</th><th>Valuta</th><th>Apoen</th><th>Količina</th><th>Iznos</th><th>Napomena</th><th>Akcije</th></tr></thead><tbody>' +
      rows.map(function(row, index) {
        var visual = currencyVisual_(row.currency);
        var amount = Number(row.denomination || 0) * Number(row.quantity || 0);
        return '<tr><td>' + (index + 1) + '</td>' +
          '<td><span class="currency-mark">' + escapeHtml(visual.icon) + '</span> ' + escapeHtml(row.currency || '') + '</td>' +
          '<td class="num">' + formatAmount_(row.denomination) + '</td>' +
          '<td class="num">' + escapeHtml(row.quantity) + '</td>' +
          '<td class="num">' + formatAmount_(amount) + '</td>' +
          '<td>' + escapeHtml(row.note || '') + '</td>' +
          '<td class="cash-count-line-actions">' +
            '<button type="button" class="icon-btn" data-count-edit="' + index + '" title="Izmeni"><i class="ti ti-pencil"></i></button>' +
            '<button type="button" class="icon-btn" data-count-remove="' + index + '" title="Obriši"><i class="ti ti-trash"></i></button>' +
          '</td></tr>';
      }).join('') + '</tbody></table>';
    target.querySelectorAll('[data-count-remove]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        removeCashCountRow_(form, Number(btn.getAttribute('data-count-remove')));
      });
    });
    target.querySelectorAll('[data-count-edit]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        editCashCountRow_(form, Number(btn.getAttribute('data-count-edit')));
      });
    });
  }

  function editCashCountRow_(form, index) {
    var rows = collectDenominations_(form);
    var row = rows[index];
    if (!row) return;
    removeCashCountRow_(form, index);
    var currencyEl = form.querySelector('[name="currency"]');
    if (currencyEl) currencyEl.value = row.currency;
    renderCashCountPageForm_(form);
    var denomEl = form.querySelector('[data-count-denomination]');
    var qtyEl = form.querySelector('[data-count-quantity]');
    var noteEl = form.querySelector('[data-line-note]');
    if (denomEl) denomEl.value = row.denomination;
    if (qtyEl) qtyEl.value = row.quantity;
    if (noteEl) noteEl.value = row.note || '';
    if (qtyEl) qtyEl.focus();
  }

  function cashCountTotalsByCurrency_(rows) {
    return rows.reduce(function(result, row) {
      var code = row.currency || SESSION.currency;
      if (!result[code]) result[code] = { rows: 0, amount: 0 };
      result[code].rows += 1;
      result[code].amount += Number(row.denomination || 0) * Number(row.quantity || 0);
      return result;
    }, {});
  }

  function renderCashCountPageSidebar_(form, rows) {
    var totalsTarget = form.querySelector('[data-count-sidebar-totals]');
    var recentTarget = form.querySelector('[data-count-recent]');
    var rowCount = form.querySelector('[data-count-kpi-rows]');
    var totalAmount = form.querySelector('[data-count-kpi-total]');
    var totals = cashCountTotalsByCurrency_(rows);
    var total = rows.reduce(function(sum, row) { return sum + Number(row.denomination || 0) * Number(row.quantity || 0); }, 0);
    if (rowCount) rowCount.textContent = String(rows.length);
    if (totalAmount) totalAmount.textContent = formatAmount_(total);
    if (totalsTarget) {
      var codes = Object.keys(totals);
      totalsTarget.innerHTML = codes.length ? codes.map(function(code) {
        var visual = currencyVisual_(code);
        var pct = total ? (totals[code].amount * 100 / total) : 0;
        return '<div class="cash-count-currency-total">' +
          '<div><strong><span class="currency-mark">' + escapeHtml(visual.icon) + '</span> ' + escapeHtml(code) + '</strong><span>' + escapeHtml(visual.name) + '</span></div>' +
          '<div><span>Količina redova</span><strong>' + totals[code].rows + '</strong></div>' +
          '<div><span>Iznos</span><strong>' + formatAmount_(totals[code].amount) + '</strong></div>' +
          '<div><span>Učešće</span><strong class="cell-in">' + formatAmount_(pct) + '%</strong></div>' +
        '</div>';
      }).join('') + '<div class="cash-count-total-all"><strong>UKUPNO SVE VALUTE</strong><strong>' + formatAmount_(total) + '</strong><span>100,00%</span></div>' : '<div class="cash-count-empty">Nema unetih redova.</div>';
    }
    if (recentTarget) {
      var recent = rows.slice(-5).reverse();
      recentTarget.innerHTML = recent.length ? recent.map(function(row) {
        var amount = Number(row.denomination || 0) * Number(row.quantity || 0);
        return '<div class="cash-count-recent-row"><span>' + escapeHtml(formatTimeOnly_(row.createdAt || new Date())) + '</span><span>' + escapeHtml(row.currency || '') + '</span><span>' + formatAmount_(row.denomination) + '</span><span>x' + escapeHtml(row.quantity) + '</span><strong>' + formatAmount_(amount) + '</strong></div>';
      }).join('') : '<div class="cash-count-empty">Nema poslednjih unosa.</div>';
    }
  }

  function saveCashCountDraft_(form) {
    var rows = collectDenominations_(form);
    if (!rows.length) {
      showMessage('Unesite bar jedan red pre čuvanja nacrta.', 'error');
      return;
    }
    var draft = {
      savedAt: new Date().toISOString(),
      cashboxId: SESSION.cashboxId,
      currency: SESSION.currency,
      rows: rows
    };
    try {
      localStorage.setItem('BLAGAJNA_CASH_COUNT_DRAFT', JSON.stringify(draft));
      showMessage('Presek je sačuvan kao lokalni nacrt.', 'success');
    } catch (err) {
      showMessage('Nije moguće sačuvati lokalni nacrt.', 'error');
    }
  }

  function cancelCashCountDialog_(form) {
    var close = form && form.closest('.app-dialog-overlay');
    var rows = collectDenominations_(form);
    var doClose = function() { if (close) close.remove(); };
    if (!rows.length) {
      doClose();
      return;
    }
    appConfirm_({
      title: 'Poništi unos',
      message: 'Uneti apoeni neće biti sačuvani. Nastaviti?',
      confirmText: 'Poništi',
      danger: true
    }, doClose);
  }

  function validateCashCountForm_(form) {
    if (!form) return true;
    var currency = (form.querySelector('[name="currency"]') || {}).value || SESSION.currency;
    var denominationCount = Number(form.dataset.denominationCount || 0);
    var cashRows = collectDenominations_(form).filter(function(row) { return Number(row.quantity || 0) > 0; });
    if (form.classList.contains('cash-count-page-form') && !cashRows.length) {
      showMessage('Unesite bar jedan red apoena pre čuvanja preseka.', 'error');
      var qty = form.querySelector('[data-count-quantity]');
      if (qty) qty.focus();
      return false;
    }
    if (denominationCount === 0 && !cashRows.length) {
      showMessage('Za valutu ' + currency + ' nisu definisani apoeni. Popis će biti sačuvan kao 0,00 ako nastavite.', 'info');
    }
    return true;
  }

  function collectPhysicalBalance_(form) {
    var result = {};
    Array.prototype.forEach.call(form.querySelectorAll('[name^="physical_"]'), function(input) {
      var currency = input.name.replace('physical_', '');
      result[currency] = parseAmountInput_(input.value);
    });
    return result;
  }

  function humanizeError_(message) {
    var text = String(message || '').trim();
    if (/insufficient|nedovolj|raspolo|negative|balance would|stanje blagajne|maksimum/i.test(text)) {
      return 'Nedozvoljena akcija: pokušaj isplate preko raspoloživog stanja blagajne. Proverite stanje po valuti i unesite manji iznos.';
    }
    if (/already has an open shift|open shift|otvorena smena/i.test(text)) {
      return 'Smena je već otvorena za ovu blagajnu. Direktno knjiženje može da radi samo korisnik koji je otvorio tu smenu.';
    }
    if (/shift_id|ID smene/i.test(text)) {
      return 'Aktivna smena nije pronađena. Otvorite smenu ili osvežite aplikaciju pre nastavka.';
    }
    if (/Pre zatvaranja smene uradite presek blagajne|presek blagajne za valute/i.test(text)) {
      return 'Pre zatvaranja smene morate uraditi popis u meniju Presek stanja za sve aktivne valute.';
    }
    return text || 'Poziv nije uspeo.';
  }

  function callApi(functionName, args, onSuccess, options) {
    options = options || {};
    if (!window.google || !google.script || !google.script.run) {
      showMessage('Greška: Apps Script okruženje nije dostupno.', 'error');
      if (options.onComplete) {
        options.onComplete();
      }
      return;
    }
    if (!options.quiet) {
      setLoading(true);
    }
    if (!options.quiet) {
      showMessage(options.loadingMessage || 'Obrađujem zahtev...', 'info');
    }
    var runner = google.script.run
      .withSuccessHandler(function(response) {
        if (!options.quiet) {
          setLoading(false);
        }
        if (!response || response.ok !== true) {
          showMessage('Greška: ' + humanizeError_(response && response.error ? response.error.message : 'poziv nije uspeo.'), 'error');
          if (options.onComplete) {
            options.onComplete(response);
          }
          return;
        }
        if (!options.quiet) {
          showMessage(options.successMessage || 'Uspešno izvršeno.', 'success');
        }
        if (onSuccess) {
          onSuccess(response.data);
        }
        if (options.onComplete) {
          options.onComplete(response);
        }
      })
      .withFailureHandler(function(error) {
        if (!options.quiet) {
          setLoading(false);
        }
        showMessage('Greška: ' + humanizeError_(error && error.message ? error.message : 'tehnički problem.'), 'error');
        if (options.onComplete) {
          options.onComplete(error);
        }
      });
    runner[functionName].apply(runner, args || []);
  }

  function initTheme_() {
    var savedTheme = '';
    try {
      savedTheme = window.localStorage ? localStorage.getItem('blagajna_theme') : '';
    } catch (e) {
      savedTheme = '';
    }
    applyTheme_(savedTheme === 'dark' ? 'dark' : 'light');
    document.querySelectorAll('[data-theme-toggle]').forEach(function(button) {
      if (button.dataset.boundThemeToggle === '1') return;
      button.dataset.boundThemeToggle = '1';
      button.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme_(next);
        try {
          if (window.localStorage) localStorage.setItem('blagajna_theme', next);
        } catch (e) {}
      });
    });
  }

  function applyTheme_(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var dark = theme === 'dark';
    document.querySelectorAll('[data-theme-toggle]').forEach(function(button) {
      button.setAttribute('aria-pressed', dark ? 'true' : 'false');
      var icon = button.querySelector('i');
      if (icon) icon.className = dark ? 'ti ti-sun' : 'ti ti-moon';
      var label = button.querySelector('[data-theme-label]');
      if (label) label.textContent = dark ? 'Svetla' : 'Tamna';
    });
  }

  function initMobileScale_() {
    updateMobileScale_();
    if (window.__blagajnaMobileScaleBound) return;
    window.__blagajnaMobileScaleBound = true;
    window.addEventListener('resize', updateMobileScale_);
    window.addEventListener('orientationchange', function() {
      window.setTimeout(updateMobileScale_, 120);
    });
  }

  function updateMobileScale_() {
    var isMobileShell = Boolean(document.querySelector('.m-shell'));
    document.documentElement.classList.toggle('mobile-view', isMobileShell);
    if (!isMobileShell) return;
    var screenWidth = window.screen && window.screen.width ? window.screen.width : window.innerWidth;
    var screenHeight = window.screen && window.screen.height ? window.screen.height : window.innerHeight;
    var shortSide = Math.min(screenWidth, screenHeight);
    var scale = shortSide / 360;
    scale = Math.max(1.72, Math.min(scale, 2.25));
    document.documentElement.style.setProperty('--mobile-scale', String(scale.toFixed(3)));
  }

  function showSection(sectionId) {
    document.querySelectorAll('[data-section]').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.classList.toggle('active', button.getAttribute('data-target') === sectionId);
    });
    var activeSection = document.getElementById(sectionId);
    var autoload = activeSection ? activeSection.getAttribute('data-autoload') : '';
    if (autoload && AUTOLOAD_MAP[autoload]) {
      AUTOLOAD_MAP[autoload](true);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showMessage(message, type) {
    if (document.getElementById('d-message')) {
      showDesktopMessage_(message, type);
      return;
    }
    if (document.getElementById('m-message')) {
      showMobileMessage_(message, type);
      return;
    }
    var box = document.getElementById('message');
    if (!box) {
      return;
    }
    box.textContent = message;
    box.className = 'message show ' + (type || 'info');
    scheduleMessageHide_(box, 'message', type);
  }

  function scheduleMessageHide_(el, key, type) {
    var messageType = type || 'info';
    var timeout = MESSAGE_TIMEOUTS_MS[messageType] || MESSAGE_TIMEOUTS_MS.info;
    if (MESSAGE_HIDE_TIMERS[key]) {
      clearTimeout(MESSAGE_HIDE_TIMERS[key]);
    }

    if (!form) {
      return data;
    }
    Array.prototype.forEach.call(form.elements, function(element) {
      if (!element.name || element.type === 'file') {
        return;
      }
      data[element.name] = element.value;
    });
    return cleanObject(data);
  }

  function fileToBase64Payload(fileInput) {
    return new Promise(function(resolve, reject) {
      if (!fileInput || !fileInput.files || !fileInput.files[0]) {
        reject(new Error('Izaberite fajl.'));
        return;
      }
      var file = fileInput.files[0];
      var reader = new FileReader();
      reader.onload = function() {
        var result = String(reader.result || '');
        resolve({
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          base64Data: result.indexOf(',') === -1 ? result : result.split(',').pop()
        });
      };
      reader.onerror = function() {
        reject(new Error('Fajl nije moguće pročitati.'));
      };
      reader.readAsDataURL(file);
    });
  }

  function shiftCurrencyCodes_(shift, events) {
    var maps = [
      parseJsonSafe_(shift && shift.opening_balance_json, {}),
      parseJsonSafe_(shift && shift.closing_balance_json, {}),
      parseJsonSafe_(shift && shift.physical_balance_json, {}),
      parseJsonSafe_(shift && shift.difference_json, {})
    ];
    var index = {};
    maps.forEach(function(map) {
      Object.keys(map || {}).forEach(function(code) { if (code) index[code] = true; });
    });
    (events || []).forEach(function(ev) { if (ev.currency) index[ev.currency] = true; });
    (uiState.config.currencies || []).forEach(function(code) { if (code) index[code] = true; });
    return Object.keys(index);

  function formatCurrencyMapChips_(map, codes) {
    map = map || {};
    codes = codes && codes.length ? codes : Object.keys(map || {});
    if (!codes.length) return '<span class="shift-muted">Nema podataka po valutama</span>';
    return codes.map(function(code) {
      return '<span class="shift-currency-chip">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(map[code] || 0)) + '</span>';
    }).join('');
  }

  function sumCurrencyMap_(events) {
    return (events || []).reduce(function(result, ev) {
      var code = ev.currency || SESSION.currency || 'RSD';
      var direction = ev.display_direction || ev.direction;
      var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var signed = direction === 'OUT' ? -amount : direction === 'IN' ? amount : 0;
      result[code] = (result[code] || 0) + signed;
      return result;
    }, {});
  }

  function countEventsForShift_(events) {
    return (events || []).filter(function(ev) { return ev.event_type === 'CASH_COUNT' || ev.source_type === 'CASH_COUNT'; });
  }

  function shiftOpeningMap_(shift) {
    return parseJsonSafe_(shift && shift.opening_balance_json, {});
  }

  function shiftClosingMap_(shift) {
    return parseJsonSafe_(shift && shift.physical_balance_json, {}) || {};
  }

  function shiftPrimaryAmount_(map) {
    var currency = SESSION.currency || 'RSD';
    if (Object.prototype.hasOwnProperty.call(map || {}, currency)) return { code: currency, value: Number(map[currency] || 0) };
    var keys = Object.keys(map || {});
    return keys.length ? { code: keys[0], value: Number(map[keys[0]] || 0) } : { code: currency, value: 0 };
  }

  function shiftRowHtml_(shift, index) {
    shift = shift || {};
    var opening = shiftOpeningMap_(shift);
    var codes = shiftCurrencyCodes_(shift, []);
    var primary = shiftPrimaryAmount_(opening);
    var isOpen = shift.status === 'OPEN';
    var closedText = shift.closed_at ? 'Završena ' + escapeHtml(formatTimeShort_(shift.closed_at)) : '—';
    var eventChips = '<span class="shift-event-chip start">POČETAK<br>' + escapeHtml(formatTimeShort_(shift.opened_at)) + '</span>' +
      '<span class="shift-event-chip count">PRESEK<br>—</span>' +
      '<span class="shift-event-chip end' + (isOpen ? ' muted' : '') + '">KRAJ<br>' + (shift.closed_at ? escapeHtml(formatTimeShort_(shift.closed_at)) : '—') + '</span>';
    return '<tr class="shift-overview-row" data-shift-index="' + index + '" role="button" tabindex="0">' +
      '<td><div class="shift-row-main"><strong>' + escapeHtml(SESSION.cashboxName || shift.cashbox_id || 'Blagajna') + '</strong>' +
        '<small>#' + escapeHtml(shift.shift_id || '') + '</small>' + 
        '<span class="shift-status-badge ' + shiftStatusClass_(shift.status) + '">' + escapeHtml(shiftStatusLabel_(shift.status)) + '</span></div></td>' +
      '<td>' + escapeHtml(shortUserLabel_(shift.opened_by || '')) + '</td>' +
      '<td><strong>' + escapeHtml(formatTimeShort_(shift.opened_at)) + '</strong><small>' + escapeHtml(formatDateLong_(shift.opened_at)) + '</small></td>' +
      '<td><strong>' + escapeHtml(formatAmount_(primary.value)) + '</strong><small>' + escapeHtml(primary.code) + '</small><div class="shift-row-currencies">' + formatCurrencyMapChips_(opening, codes) + '</div></td>' +
      '<td><div class="shift-event-chip-row">' + eventChips + '</div></td>' +
      '<td>' + closedText + '</td>' +
    '</tr>';
  }

  function renderShiftTable_(targetId, shifts, options) {
    options = options || {};
    shifts = shifts || [];
    var target = document.getElementById(targetId);
    if (!target) return;
    if (!shifts.length) {
      target.innerHTML = '<div class="empty-state">' + escapeHtml(options.empty || 'Nema smena za prikaz.') + '</div>';
      return;
    }
    window.__shiftTableRecords = window.__shiftTableRecords || {};
    window.__shiftAllRecords = window.__shiftAllRecords || {};
    window.__shiftAllRecords[targetId] = shifts;
    shifts = targetId === 'd-shifts-list' ? filterDesktopShifts_(shifts) : shifts;
    window.__shiftTableRecords[targetId] = shifts;
    if (!shifts.length) {
      target.innerHTML = '<div class="empty-state">' + escapeHtml(options.empty || 'Nema smena za prikaz.') + '</div>';
      renderShiftDetail_(null);
      return;
    }
    if (targetId !== 'd-shifts-list') {
      target.innerHTML = '<div class="table-wrap"><table class="book-table shift-table">' +
        '<thead><tr><th>Rb.</th><th>Blagajnik</th><th>Otvoreno</th><th>Zatvoreno</th><th>Status</th><th>ID</th></tr></thead>' +
        '<tbody>' + shifts.map(shiftSimpleRowHtml_).join('') + '</tbody></table></div>';
    } else {
      target.innerHTML = '<div class="shift-overview-wrap"><table class="shift-overview-table">' +
        '<thead><tr><th>Smena</th><th>Blagajnik</th><th>Otvorena</th><th>Početno stanje</th><th>Događaji</th><th>Stanje</th></tr></thead>' +
        '<tbody>' + shifts.map(shiftRowHtml_).join('') + '</tbody></table></div>' +
        '<div class="shift-table-footer"><span>Ukupno smena: ' + shifts.length + '</span><span>25 po strani</span></div>';
    }
    target.querySelectorAll('[data-shift-index]').forEach(function(row) {
      row.addEventListener('click', function() {
        var record = (window.__shiftTableRecords[targetId] || [])[Number(row.getAttribute('data-shift-index'))];
        target.querySelectorAll('[data-shift-index]').forEach(function(item) { item.classList.remove('selected'); });
        row.classList.add('selected');
        renderShiftDetail_(record);
      });
    });
    renderShiftDetail_(shifts[0]);
    renderShiftPageKpis_(uiState.activeShift || shifts[0], []);
  }

  function filterDesktopShifts_(shifts) {
    var from = (document.getElementById('d-shift-date-from') || {}).value || '';
    var to = (document.getElementById('d-shift-date-to') || {}).value || '';
    var status = (document.getElementById('d-shift-status-filter') || {}).value || '';
    var search = String((document.getElementById('d-shift-search') || {}).value || '').trim().toLowerCase();
    var fromTime = from ? new Date(from + 'T00:00:00').getTime() : 0;
    var toTime = to ? new Date(to + 'T23:59:59').getTime() : Number.MAX_SAFE_INTEGER;
    return (shifts || []).filter(function(shift) {
      var openedTime = new Date(shift.opened_at || 0).getTime();
      var haystack = [shift.shift_id, shift.opened_by, shift.status, shift.cashbox_id, SESSION.cashboxName].join(' ').toLowerCase();
      return (!status || shift.status === status) &&
        (!search || haystack.indexOf(search) !== -1) &&
        (!openedTime || (openedTime >= fromTime && openedTime <= toTime));
    });
  }

  function shiftAmountClass_(value) {
    value = Number(value) || 0;
    return value > 0 ? 'amount-positive' : value < 0 ? 'amount-negative' : 'amount-neutral';
  }

  function shiftMapTotal_(map) {
    return Object.keys(map || {}).reduce(function(total, code) {
      return total + (Number(map[code]) || 0);
    }, 0);
  }

  function shiftFormatPrimary_(map, fallbackCurrency) {
    var primary = shiftPrimaryAmount_(map || {});
    return formatAmount_(primary.value) + ' ' + (primary.code || fallbackCurrency || SESSION.currency || 'RSD');
  }

  function shiftCountKindLabel_(ev) {
    var text = String(ev.description || ev.event_type || '').toLowerCase();
    if (/otvaranje|početak|pocetak|opening/.test(text)) return 'POČETAK';
    if (/zatvaranje|završni|zavrsni|closing|kraj/.test(text)) return 'KRAJ';
    return 'PRESEK';
  }

  function shiftCountRows_(events) {
    return countEventsForShift_(events).slice().sort(function(a, b) {
      return new Date(a.event_date || a.created_at || 0) - new Date(b.event_date || b.created_at || 0);
    });
  }

  function renderShiftPageKpis_(shift, events) {
    var hasShift = Boolean(shift && shift.shift_id);
    var opening = shiftOpeningMap_(shift || {});
    var turnover = sumCurrencyMap_(events || []);
    var counts = shiftCountRows_(events || []);
    var closing = shift && shift.status === 'OPEN' ? {} : shiftClosingMap_(shift || {});
    var diff = parseJsonSafe_(shift && shift.difference_json, {});
    var activeEl = document.getElementById('d-shift-kpi-active');
    var activeSub = document.getElementById('d-shift-kpi-active-sub');
    var openingEl = document.getElementById('d-shift-kpi-opening');
    var openingSub = document.getElementById('d-shift-kpi-opening-sub');
    var turnoverEl = document.getElementById('d-shift-kpi-turnover');
    var turnoverSub = document.getElementById('d-shift-kpi-turnover-sub');
    var countsEl = document.getElementById('d-shift-kpi-counts');
    var countsSub = document.getElementById('d-shift-kpi-counts-sub');
    var closingEl = document.getElementById('d-shift-kpi-closing');
    var closingSub = document.getElementById('d-shift-kpi-closing-sub');
    if (activeEl) activeEl.textContent = uiState.activeShift && uiState.activeShift.shift_id ? (SESSION.cashboxName || 'Aktivna smena') : '—';
    if (activeSub) activeSub.textContent = uiState.activeShift && uiState.activeShift.shift_id ? 'Otvorena u ' + formatTimeShort_(uiState.activeShift.opened_at) : 'Nema aktivne smene';
    if (openingEl) openingEl.textContent = hasShift ? shiftFormatPrimary_(opening) : '0,00';
    if (openingSub) openingSub.textContent = hasShift ? formatDateTimeShort_(shift.opened_at) : '—';
    if (turnoverEl) {
      var turnoverPrimary = shiftPrimaryAmount_(turnover);
      turnoverEl.textContent = (turnoverPrimary.value > 0 ? '+' : '') + formatAmount_(turnoverPrimary.value) + ' ' + turnoverPrimary.code;
      turnoverEl.className = shiftAmountClass_(turnoverPrimary.value);
    }
    if (turnoverSub) turnoverSub.textContent = events && events.length ? 'Promet po učitanim stavkama smene' : 'Promet će biti prikazan kada API vrati stavke';
    if (countsEl) countsEl.textContent = String(counts.length);
    if (countsSub) countsSub.textContent = counts.length ? 'Poslednji u ' + formatTimeShort_(counts[counts.length - 1].event_date || counts[counts.length - 1].created_at) : 'Nema urađenih preseka';
    if (closingEl) {
      if (!hasShift || shift.status === 'OPEN') {
        closingEl.textContent = '—';
        closingEl.className = 'amount-neutral';
      } else {
        var diffPrimary = shiftPrimaryAmount_(diff);
        closingEl.textContent = diffPrimary.value ? ((diffPrimary.value > 0 ? '+' : '') + formatAmount_(diffPrimary.value) + ' ' + diffPrimary.code) : shiftFormatPrimary_(closing);
        closingEl.className = shiftAmountClass_(diffPrimary.value);
      }
    }
    if (closingSub) closingSub.textContent = !hasShift ? '—' : shift.status === 'OPEN' ? 'Smena aktivna' : 'Zatvorena u ' + formatTimeShort_(shift.closed_at);
  }

  function renderShiftCurrencySummary_(shift, events) {
    var opening = shiftOpeningMap_(shift || {});
    var closing = shiftClosingMap_(shift || {});
    var physical = parseJsonSafe_(shift && shift.physical_balance_json, {});
    var difference = parseJsonSafe_(shift && shift.difference_json, {});
    var turnover = sumCurrencyMap_(events || []);
    var codes = shiftCurrencyCodes_(shift, events);
    if (!codes.length) {
      return '<div class="shift-muted">API trenutno ne vraća stanje po valutama za ovu smenu.</div>';
    }
    return '<div class="shift-currency-grid">' + codes.map(function(code) {
      return '<article class="shift-currency-card">' +
        '<div class="shift-currency-head"><strong>' + escapeHtml(code) + '</strong><span>' + escapeHtml(currencyName_(code)) + '</span></div>' +
        '<div class="detail-row"><span class="detail-key">Početno</span><strong>' + escapeHtml(formatAmount_(opening[code] || 0)) + '</strong></div>' +
        '<div class="detail-row"><span class="detail-key">Promet</span><strong class="' + shiftAmountClass_(turnover[code] || 0) + '">' + escapeHtml(formatAmount_(turnover[code] || 0)) + '</strong></div>' +
        '<div class="detail-row"><span class="detail-key">Fizički popis</span><strong>' + escapeHtml(formatAmount_(physical[code] || 0)) + '</strong></div>' +
        '<div class="detail-row"><span class="detail-key">Završno</span><strong>' + escapeHtml(formatAmount_(closing[code] || 0)) + '</strong></div>' +
        '<div class="detail-row"><span class="detail-key">Razlika</span><strong class="' + shiftAmountClass_(difference[code] || 0) + '">' + escapeHtml(formatAmount_(difference[code] || 0)) + '</strong></div>' +
      '</article>';
    }).join('') + '</div>';
  }

  function currencyName_(code) {
    var map = { RSD: 'Srpski dinar', EUR: 'Evro', 'ČEK': 'Čekovi', CEK: 'Čekovi' };
    return map[code] || code || '';
  }

  function renderShiftTimeline_(shift, events) {
    var counts = shiftCountRows_(events || []);
    var rows = [
      {
        time: shift.opened_at,
        kind: 'POČETAK',
        text: 'Smena otvorena',
        amount: shiftFormatPrimary_(shiftOpeningMap_(shift))
      }
    ];
    counts.forEach(function(ev, index) {
      rows.push({
        time: ev.event_date || ev.created_at,
        kind: shiftCountKindLabel_(ev) === 'PRESEK' ? 'PRESEK #' + (index + 1) : shiftCountKindLabel_(ev),
        text: cleanBusinessDescription_(ev.description || 'Presek stanja'),
        amount: ev.currency ? formatAmount_(ev.amount || ev.display_amount || 0) + ' ' + ev.currency : '—'
      });
    });
    rows.push({
      time: shift.closed_at,
      kind: 'KRAJ',
      text: shift.closed_at ? 'Smena zatvorena' : 'Smena u toku',
      amount: shift.closed_at ? shiftFormatPrimary_(shiftClosingMap_(shift)) : '—'
    });
    return '<div class="shift-timeline">' + rows.map(function(row) {
      return '<div class="shift-timeline-row">' +
        '<span>' + escapeHtml(formatTimeShort_(row.time)) + '</span>' +
        '<strong>' + escapeHtml(row.kind) + '</strong>' +
        '<em>' + escapeHtml(row.text) + '</em>' +
        '<b>' + escapeHtml(row.amount) + '</b>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderShiftEntries_(events) {
    if (!events || !events.length) {
      return '<div class="shift-muted">Nema učitanih stavki za ovu smenu.</div>';
    }
    var rows = events.slice(0, 14).map(function(ev) {
      var dir = ev.display_direction || ev.direction;
      var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var isIn = dir === 'IN';
      var isOut = dir === 'OUT' && ev.event_type !== 'TREASURY_HANDOVER';
      return '<tr>' +
        '<td>' + escapeHtml(formatTimeShort_(ev.event_date || ev.created_at)) + '</td>' +
        '<td>' + escapeHtml(cashEventUserLabel_(ev)) + '</td>' +
        '<td>' + escapeHtml(cleanBusinessDescription_(ev.description || '')) + '</td>' +
        '<td class="amount-positive">' + (isIn ? escapeHtml(formatAmount_(amount)) : '—') + '</td>' +
        '<td class="amount-negative">' + (isOut ? escapeHtml(formatAmount_(amount)) : '—') + '</td>' +
        '<td>' + escapeHtml(formatAmount_(ev.running_balance || 0)) + '</td>' +
      '</tr>';
    }).join('');
    return '<div class="shift-mini-table-wrap"><table class="shift-mini-table"><thead><tr><th>Vreme</th><th>Tip unosa</th><th>Opis / primalac</th><th>Uplata</th><th>Isplata</th><th>Stanje nakon</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function renderShiftCountResults_(shift, events) {
    var counts = shiftCountRows_(events || []);
    if (!counts.length) {
      return '<div class="shift-muted">Nema posebnih preseka u ovoj smeni.</div>';
    }
    return '<div class="shift-mini-table-wrap"><table class="shift-mini-table"><thead><tr><th>Vreme</th><th>Vrsta</th><th>Valuta</th><th>Popisano</th><th>Napomena</th></tr></thead><tbody>' +
      counts.map(function(ev) {
        return '<tr>' +
          '<td>' + escapeHtml(formatTimeShort_(ev.event_date || ev.created_at)) + '</td>' +
          '<td>' + escapeHtml(shiftCountKindLabel_(ev)) + '</td>' +
          '<td>' + escapeHtml(ev.currency || '—') + '</td>' +
          '<td>' + escapeHtml(formatAmount_(ev.amount || ev.display_amount || 0)) + '</td>' +
          '<td>' + escapeHtml(cleanBusinessDescription_(ev.description || '')) + '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table><div class="shift-todo-note">TODO: prikaz očekivano / popisano / razlika po apoenima koristi kompletan breakdown kada ga API vrati za smenu.</div></div>';
  }

  function attachShiftDetailActions_(target, shift) {
    var selectedIsActive = Boolean(uiState.activeShift && uiState.activeShift.shift_id && shift && shift.shift_id === uiState.activeShift.shift_id);
    var owner = selectedIsActive && isCurrentActiveShiftOwner_();
    var openBtn = target.querySelector('[data-shift-detail-open]');
    var countBtn = target.querySelector('[data-shift-detail-count]');
    var closeBtn = target.querySelector('[data-shift-detail-close]');
    var countViewBtn = target.querySelector('[data-shift-detail-presek-view]');
    var bookBtn = target.querySelector('[data-shift-detail-book]');
    var sheetBtn = target.querySelector('[data-shift-detail-sheet]');
    if (openBtn) openBtn.addEventListener('click', function() { openShiftOpeningDialog_('desktop'); });
    if (countBtn) {
      countBtn.disabled = !selectedIsActive;
      countBtn.title = selectedIsActive ? '' : 'Presek je moguć samo nad aktivnom smenom.';
      countBtn.addEventListener('click', function() { openCashCountDialog_('desktop'); });
    }
    if (closeBtn) {
      closeBtn.disabled = !owner;
      closeBtn.title = owner ? '' : 'Smenu može zatvoriti samo korisnik koji ju je otvorio.';
      closeBtn.addEventListener('click', function() { openShiftClosingDialog_('desktop'); });
    }
    if (countViewBtn) countViewBtn.addEventListener('click', function() { openDesktopSection_('presek'); });
    if (bookBtn) bookBtn.addEventListener('click', function() { applyBookFiltersForShift_(shift); });
    if (sheetBtn) sheetBtn.addEventListener('click', function() { openCashSheetForShift_(shift); });
  }

  function loadShiftEventsForDetail_(shift) {
    if (!shift || !shift.shift_id) return;
    var filters = withUiDefaults({
      cashbox_id: shift.cashbox_id || SESSION.cashboxId,
      shift_id: shift.shift_id,
      limit: 500
    });
    delete filters.currency;
    callApi('apiGetCashMovementsReport', [filters], function(result) {
      var events = result || [];
      renderShiftPageKpis_(shift, events);
      var timeline = document.getElementById('d-shift-detail-timeline');
      var currencies = document.getElementById('d-shift-detail-currencies');
      var counts = document.getElementById('d-shift-detail-counts');
      var entries = document.getElementById('d-shift-detail-entries');
      if (timeline) timeline.innerHTML = renderShiftTimeline_(shift, events);
      if (currencies) currencies.innerHTML = renderShiftCurrencySummary_(shift, events);
      if (counts) counts.innerHTML = renderShiftCountResults_(shift, events);
      if (entries) entries.innerHTML = renderShiftEntries_(events);
    }, { quiet: true });
  }

  function renderShiftDetail_(shift) {
    var target = document.getElementById('d-shift-detail-body');
    if (!target) return;
    if (!shift || !shift.shift_id) {
      target.innerHTML = '<div class="empty-state">Izaberite smenu iz tabele.</div>';
      renderShiftPageKpis_(uiState.activeShift || {}, []);
      return;
    }
    var isActive = Boolean(uiState.activeShift && uiState.activeShift.shift_id === shift.shift_id);
    var owner = isActive && isCurrentActiveShiftOwner_();
    var opening = shiftOpeningMap_(shift);
    target.innerHTML =
      '<div class="shift-detail-header">' +
        '<div class="shift-detail-hero">' +
          '<div class="shift-detail-icon ' + (isActive ? 'active' : '') + '"><i class="ti ti-trending-up" aria-hidden="true"></i></div>' +
          '<div><strong>' + escapeHtml(SESSION.cashboxName || shift.cashbox_id || 'Glavna blagajna') + '</strong><small>#' + escapeHtml(shift.shift_id || '') + '</small></div>' +
        '</div>' +
        '<span class="shift-status-badge ' + shiftStatusClass_(shift.status) + '">' + escapeHtml(shiftStatusLabel_(shift.status)) + '</span>' +
      '</div>' +
      '<div class="shift-detail-info-grid">' +
        '<div><i class="ti ti-user" aria-hidden="true"></i><span>Blagajnik</span><strong>' + escapeHtml(shortUserLabel_(shift.opened_by || '')) + '</strong></div>' +
        '<div><i class="ti ti-calendar-event" aria-hidden="true"></i><span>Početak smene</span><strong>' + escapeHtml(formatDateTimeShort_(shift.opened_at)) + '</strong></div>' +
        '<div><i class="ti ti-cash-banknote" aria-hidden="true"></i><span>Početno stanje</span><strong>' + escapeHtml(shiftFormatPrimary_(opening)) + '</strong></div>' +
        '<div><i class="ti ti-coins" aria-hidden="true"></i><span>Valute</span><strong>' + escapeHtml(shiftCurrencyCodes_(shift, []).join(', ') || '—') + '</strong></div>' +
      '</div>' +
      '<section class="shift-detail-section"><h4>Tajmlajn događaja</h4><div id="d-shift-detail-timeline">' + renderShiftTimeline_(shift, []) + '</div></section>' +
      '<section class="shift-detail-section"><h4>Pregled po valutama</h4><div id="d-shift-detail-currencies">' + renderShiftCurrencySummary_(shift, []) + '</div></section>' +
      '<section class="shift-detail-section"><h4>Rezultati preseka</h4><div id="d-shift-detail-counts">' + renderShiftCountResults_(shift, []) + '</div></section>' +
      '<section class="shift-detail-section"><h4>Pregled po unosima</h4><div id="d-shift-detail-entries"><div class="shift-muted">Učitavam stavke smene...</div></div></section>' +
      '<div class="shift-actions-grid">' +
        '<button type="button" data-shift-detail-presek-view><i class="ti ti-list-details" aria-hidden="true"></i> Pregled preseka</button>' +
        '<button type="button" data-shift-detail-open' + (uiState.activeShift && uiState.activeShift.shift_id ? ' disabled' : '') + '><i class="ti ti-circle-plus" aria-hidden="true"></i> Otvori smenu</button>' +
        '<button class="btn-primary" type="button" data-shift-detail-count' + (!isActive ? ' disabled' : '') + '><i class="ti ti-calculator" aria-hidden="true"></i> Novi presek</button>' +
        '<button class="btn-out" type="button" data-shift-detail-close' + (!owner ? ' disabled' : '') + '><i class="ti ti-lock" aria-hidden="true"></i> Zatvori smenu</button>' +
        '<button type="button" data-shift-detail-book><i class="ti ti-book" aria-hidden="true"></i> Knjiga</button>' +
        '<button type="button" data-shift-detail-sheet><i class="ti ti-file-invoice" aria-hidden="true"></i> Blagajnički list</button>' +
      '</div>';
    attachShiftDetailActions_(target, shift);
    renderShiftPageKpis_(shift, []);
    loadShiftEventsForDetail_(shift);
  }

  function applyActiveShiftFields_() {
    var shift = uiState.activeShift || {};
    document.querySelectorAll('input[name="shift_id"]').forEach(function(input) {
      input.value = shift.shift_id || '';
    });
    document.querySelectorAll('[data-active-shift-label]').forEach(function(el) {
      el.textContent = activeShiftLabel_();
    });
    updateKnjigaContext_();
    renderShiftWorkflowState_();
  }

  function renderShiftWorkflowState_() {
    var shift = uiState.activeShift || {};
    var hasShift = Boolean(shift.shift_id);
    var owner = isCurrentActiveShiftOwner_();
    var statusHtml = hasShift
      ? '<div class="table-wrap"><table class="book-table shift-table"><thead><tr><th>Rb.</th><th>Blagajnik</th><th>Otvoreno</th><th>Zatvoreno</th><th>Status</th><th>ID</th></tr></thead><tbody>' +
        shiftRowHtml_(shift, 0) +
        '</tbody></table></div>' +
        '<div class="actions shift-inline-actions">' +
          '<button type="button" data-shift-status-count><i class="ti ti-calculator" aria-hidden="true"></i> Presek stanja</button>' +
          '<button type="button" class="btn-primary" data-shift-status-close><i class="ti ti-lock" aria-hidden="true"></i> Zatvori smenu</button>' +
        '</div>'
      : '<div class="shift-state empty"><strong>Nema aktivne smene</strong><span>Otvorite smenu kroz popis apoena da bi blagajna počela rad.</span></div>';
    ['d-shift-status','m-shift-status'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = statusHtml;
    });
    document.querySelectorAll('[data-shift-status-count]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var mobile = Boolean(btn.closest('#m-shift-status'));
        if (mobile) openMobileSection_('m-section-presek');
        else openDesktopSection_('presek');
      });
    });
    document.querySelectorAll('[data-shift-status-close]').forEach(function(btn) {
      btn.disabled = !owner;
      btn.title = owner ? '' : 'Smenu može zatvoriti samo korisnik koji ju je otvorio.';
      btn.addEventListener('click', function() {
        openShiftClosingDialog_(btn.closest('#m-shift-status') ? 'mobile' : 'desktop');
      });
    });
    document.querySelectorAll('#d-opening-count-form, #m-opening-count-form').forEach(function(form) {
      var card = form.closest('.card');
      if (card) card.style.display = 'none';
      setWorkflowFormDisabled_(form, hasShift);
    });
    document.querySelectorAll('.shift-open-action-card').forEach(function(card) {
      if (!hasShift) {
        card.removeAttribute('hidden');
        card.style.display = '';
      } else {
        card.setAttribute('hidden', 'hidden');
        card.style.display = 'none';
      }
    });
    document.querySelectorAll('#d-close-shift-form, #m-close-shift-form').forEach(function(form) {
      var card = form.closest('.card');
      if (card) card.style.display = 'none';
      setWorkflowFormDisabled_(form, !hasShift || !owner);
    });
    document.querySelectorAll('.optional-handover-card').forEach(function(card) {
      card.style.display = 'none';
    });
    document.querySelectorAll('.shift-work-card').forEach(function(card) {
      card.setAttribute('hidden', 'hidden');
      card.style.display = 'none';
    });
    ['d-shift-action-in','d-shift-action-out','d-shift-action-treasury','m-shift-action-in','m-shift-action-out','m-shift-action-treasury'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.disabled = !owner;
      btn.title = owner ? '' : 'Direktno knjiženje može da radi samo glavni blagajnik smene.';
    });
    document.querySelectorAll('#d-active-shift-balance-btn, #m-active-shift-balance-btn').forEach(function(btn) {
      btn.disabled = !hasShift;
      btn.title = hasShift ? '' : 'Nema aktivne smene.';
    });
    renderShiftPageKpis_(shift, []);
    if (hasShift && !owner) {
      ['d-shift-status','m-shift-status'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.insertAdjacentHTML('beforeend', '<div class="shift-warning">Ovu smenu je otvorio drugi korisnik. Možete raditi preko zahteva, ali ne možete direktno knjižiti.</div>');
      });
    }
    updateCountWorkflowVisibility_();
  }

  function openDesktopSection_(navKey) {
    var sectionId = 'd-section-' + navKey;
    document.querySelectorAll('.d-section').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    document.querySelectorAll('[data-d-nav]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-d-nav') === navKey);
    });
    updateDesktopDirectActionsVisibility_();
  }

  function openMobileSection_(sectionId) {
    document.querySelectorAll('.m-section').forEach(function(section) {
      section.classList.toggle('active', section.id === sectionId);
    });
    document.querySelectorAll('[data-m-nav]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-m-nav') === sectionId);
    });
    updateMobileDirectActionsVisibility_();
  }

  function openDesktopDirectAction_(buttonId) {
    openDesktopSection_('knjiga');
    window.setTimeout(function() {
      var btn = document.getElementById(buttonId);
      if (btn) btn.click();
    }, 0);
  }

  function openMobileDirectAction_(buttonId) {
    openMobileSection_('m-section-knjiga');
    window.setTimeout(function() {
      var btn = document.getElementById(buttonId);
      if (btn) btn.click();
    }, 0);
  }

  function setWorkflowFormDisabled_(form, disabled) {
    if (!form) return;
    form.classList.toggle('is-disabled-flow', disabled);
    Array.prototype.forEach.call(form.querySelectorAll('input, textarea, select, button'), function(el) {
      if (el.type === 'hidden') return;
      el.disabled = disabled;
    });
  }

  function loadCashbookFilterOptions_() {
    if (!document.getElementById('d-user-filter') && !document.getElementById('d-shift-filter') && !document.getElementById('d-cashsheet-shift')) return;
    callApi('apiGetCashbookFilterOptions', [SESSION.cashboxId], function(result) {
      renderCashbookUserFilter_(result && result.users || []);
      renderCashbookShiftFilter_(result && result.shifts || []);
    }, { quiet: true });
  }

  function renderCashbookUserFilter_(users) {
    var select = document.getElementById('d-user-filter');
    if (!select) return;
    var currentEmail = uiState.currentUser && uiState.currentUser.email || '';
    var options = [
      '<option value="">Svi korisnici</option>',
      currentEmail ? '<option value="' + escapeHtml(currentEmail) + '">Trenutni korisnik</option>' : ''
    ];
    (users || []).forEach(function(user) {
      var label = (user.full_name || shortUserLabel_(user.email)) + ' - ' + user.email + (user.role ? ' - ' + user.role : '');
      options.push('<option value="' + escapeHtml(user.email) + '">' + escapeHtml(label) + '</option>');
    });
    select.innerHTML = options.join('');
  }

  function renderCashbookShiftFilter_(shifts) {
    var activeShift = uiState.activeShift || {};
    var options = [
      '<option value="">Sve smene</option>',
      activeShift.shift_id ? '<option value="' + escapeHtml(activeShift.shift_id) + '">Aktivna smena - ' + escapeHtml(shortUserLabel_(activeShift.opened_by || '')) + ' - ' + escapeHtml(formatDateTimeShort_(activeShift.opened_at)) + '</option>' : ''
    ];
    (shifts || []).forEach(function(shift) {
      var label = shortUserLabel_(shift.opened_by || '') + ' - ' + formatDateTimeShort_(shift.opened_at) + ' - ' + (STATUS_LABEL_MAP[shift.status] || shift.status || '');
      options.push('<option value="' + escapeHtml(shift.shift_id) + '">' + escapeHtml(label) + '</option>');
    });
    ['d-shift-filter','d-cashsheet-shift'].forEach(function(id) {
      var select = document.getElementById(id);
      if (select) select.innerHTML = options.join('');
    });
  }

  function applyDirectCashPermission_() {
    var canPost = uiState.canPostDirectCashEvents === true && isCurrentActiveShiftOwner_();
    ['d-quick-form-card','m-direct-actions'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (canPost) {
        el.removeAttribute('hidden');
        el.style.display = '';
      } else {
        el.setAttribute('hidden', 'hidden');
        el.style.display = 'none';
      }
    });
    var permissionCard = document.getElementById('d-direct-permission-card');
    var permissionText = document.getElementById('d-direct-permission-text');
    if (permissionCard) {
      if (canPost) {
        permissionCard.setAttribute('hidden', 'hidden');
      } else {
        permissionCard.removeAttribute('hidden');
      }
    }
    if (permissionText) {
      permissionText.textContent = uiState.activeShift && uiState.activeShift.shift_id
        ? 'Glavni blagajnik smene je ' + shortUserLabel_(uiState.activeShift.opened_by || '') + '. Direktno knjiženje može da radi samo glavni blagajnik. Ostali korisnici rade preko zahteva.'
        : 'Nema otvorene smene. Otvorite smenu da biste mogli da knjižite direktne uplate i isplate.';
    }
    if (!canPost) {
      showMessage(permissionText ? permissionText.textContent : 'Direktne uplate i isplate može knjižiti samo glavni blagajnik aktivne smene.', 'info');
    }
    updateDesktopDirectActionsVisibility_();
    updateMobileDirectActionsVisibility_();
  }

  function updateDesktopDirectActionsVisibility_() {
    var canPost = uiState.canPostDirectCashEvents === true && isCurrentActiveShiftOwner_();
    ['d-btn-uplata','d-btn-isplata','d-btn-trezor'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.setAttribute('hidden', 'hidden');
      el.style.display = 'none';
    });
    var lockMessage = document.getElementById('d-quick-lock-message');
    var openShift = document.getElementById('d-open-shift-from-book');
    var hasShift = Boolean(uiState.activeShift && uiState.activeShift.shift_id);
    if (lockMessage) {
      if (canPost) lockMessage.setAttribute('hidden', 'hidden');
      else {
        lockMessage.removeAttribute('hidden');
        var title = lockMessage.querySelector('strong');
        var note = lockMessage.querySelector('span');
        if (hasShift) {
          if (title) title.innerHTML = '<i class="ti ti-info-circle" aria-hidden="true"></i> Aktivna smena je otvorena';
          if (note) note.textContent = 'Direktne akcije su dostupne samo glavnom blagajniku smene: ' + shortUserLabel_(uiState.activeShift.opened_by || '') + '.';
        } else {
          if (title) title.innerHTML = '<i class="ti ti-alert-triangle" aria-hidden="true"></i> Nema aktivne smene - otvorite smenu za direktan rad';
          if (note) note.textContent = 'Uplata, isplata i trezor su zaključani dok smena nije otvorena.';
        }
      }
    }
    if (openShift) {
      openShift.hidden = hasShift;
      openShift.disabled = hasShift;
    }
    ['d-side-btn-uplata','d-side-btn-isplata','d-side-btn-trezor'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.disabled = !canPost;
      btn.classList.toggle('quick-action-button--locked', !canPost);
    });
  }

  function updateMobileDirectActionsVisibility_() {
    var actions = document.getElementById('m-direct-actions');
    if (!actions) return;
    var activeTabIsBook = Boolean(document.querySelector('#m-section-knjiga.active'));
    var canPost = uiState.canPostDirectCashEvents === true && isCurrentActiveShiftOwner_();
    if (activeTabIsBook && canPost) {
      actions.removeAttribute('hidden');
      actions.style.display = '';
    } else {
      actions.setAttribute('hidden', 'hidden');
      actions.style.display = 'none';
    }
  }

  function updateCountWorkflowVisibility_() {
    var hasShift = Boolean(uiState.activeShift && uiState.activeShift.shift_id);
    ['d-cash-count-form','m-cash-count-form'].forEach(function(id) {
      var form = document.getElementById(id);
      if (!form) return;
      if (id === 'd-cash-count-form') {
        form.setAttribute('hidden', 'hidden');
        form.style.display = 'none';
        setWorkflowFormDisabled_(form, !hasShift);
        return;
      }
      if (hasShift) {
        form.removeAttribute('hidden');
        form.style.display = '';
        setWorkflowFormDisabled_(form, false);
      } else {
        form.setAttribute('hidden', 'hidden');
        form.style.display = 'none';
        setWorkflowFormDisabled_(form, true);
      }
    });
    ['d-count-lock','m-count-lock'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (hasShift) el.setAttribute('hidden', 'hidden');
      else el.removeAttribute('hidden');
    });
    var newBtn = document.getElementById('d-count-new-btn');
    if (newBtn) newBtn.disabled = !hasShift;
  }

  function enforceShiftStartup_(isDesktop, isMobile) {
    if (uiState.activeShift && uiState.activeShift.shift_id) return;
    showMessage('Prvo otvorite smenu. Direktne uplate i isplate nisu dostupne dok smena nije otvorena.', 'info');
    if (isMobile) {
      document.querySelectorAll('.m-section').forEach(function(section) {
        section.classList.toggle('active', section.id === 'm-section-smena');
      });
      document.querySelectorAll('[data-m-nav]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-m-nav') === 'm-section-smena');
      });
      updateMobileDirectActionsVisibility_();
    }
    if (isDesktop) {
      document.querySelectorAll('.d-section').forEach(function(section) {
        section.classList.toggle('active', section.id === 'd-section-smena');
      });
      document.querySelectorAll('[data-d-nav]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-d-nav') === 'smena');
      });
      updateDesktopDirectActionsVisibility_();
    }
  }

  function refreshActiveShiftState_(options) {
    options = options || {};
    if (!SESSION.cashboxId) return;
    callApi('apiGetActiveShiftState', [SESSION.cashboxId], function(result) {
      var previousId = uiState.activeShift && uiState.activeShift.shift_id || '';
      var nextShift = result && result.activeShift || null;
      var nextId = nextShift && nextShift.shift_id || '';
      uiState.activeShift = nextShift;
      uiState.canPostDirectCashEvents = result && result.canPostDirectCashEvents === true;
      applyActiveShiftFields_();
      applyDirectCashPermission_();
      updateCountWorkflowVisibility_();
      if (previousId !== nextId) {
        loadCashbookFilterOptions_();
        if (options.refreshKnjiga !== false) loadKnjiga_(true);
      }
      if (options.enforce && !nextId) {
        enforceShiftStartup_(Boolean(document.querySelector('.d-shell')), Boolean(document.querySelector('.m-shell')));
      }
    }, { quiet: true });
  }

  function bindBalanceOverviewButtons_() {
    ['d-all-balances-btn','m-all-balances-btn'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (!btn || btn.dataset.bound === '1') return;
      btn.dataset.bound = '1';
      btn.addEventListener('click', showAllCurrencyBalances_);
    });
  }

  function bindShiftWorkActions_() {
    [
      ['d-shift-action-open', function() { openShiftOpeningDialog_('desktop'); }],
      ['d-shift-action-in', function() { openDesktopDirectAction_('d-btn-uplata'); }],
      ['d-shift-action-out', function() { openDesktopDirectAction_('d-btn-isplata'); }],
      ['d-shift-action-treasury', function() { openDesktopDirectAction_('d-btn-trezor'); }],
      ['d-shift-action-count', function() { openDesktopSection_('presek'); }],
      ['d-shift-action-sheet', function() {
        var shift = uiState.activeShift || {};
        openCashSheetForShift_(shift);
      }],
      ['d-shift-action-close', function() { openShiftClosingDialog_('desktop'); }],
      ['m-shift-action-open', function() { openShiftOpeningDialog_('mobile'); }],
      ['m-shift-action-in', function() { openMobileDirectAction_('m-btn-uplata'); }],
      ['m-shift-action-out', function() { openMobileDirectAction_('m-btn-isplata'); }],
      ['m-shift-action-treasury', function() { openMobileDirectAction_('m-btn-trezor'); }],
      ['m-shift-action-count', function() { openMobileSection_('m-section-presek'); }],
      ['m-shift-action-close', function() { openShiftClosingDialog_('mobile'); }]
    ].forEach(function(item) {
      var btn = document.getElementById(item[0]);
      if (!btn || btn.dataset.bound === '1') return;
      btn.dataset.bound = '1';
      btn.addEventListener('click', item[1]);
    });
  }

  function showAllCurrencyBalances_() {
    callApi('apiGetCashboxBalanceReport', [{ cashbox_id: SESSION.cashboxId }], function(rows) {
      var filtered = (rows || []).filter(function(row) {
        return row.cashbox_id === SESSION.cashboxId;
      });
      var html = filtered.length ? filtered.map(function(row) {
        return '<div class="detail-row" style="border-bottom:1px solid var(--color-border-light);padding:10px 0">' +
          '<span class="detail-key">' + escapeHtml(row.currency) + '</span>' +
          '<strong>' + formatAmount_(row.balance) + '</strong></div>';
      }).join('') : '<p>Nema podataka za blagajnu.</p>';
      appHtmlDialog_({
        title: 'Stanje po valutama',
        html: html,
        confirmText: 'Zatvori'
      });
    }, { quiet: true });
  }

  function currencySelectOptions_() {
    var currencies = uiState.config && uiState.config.currencies || ['RSD'];
    return currencies.map(function(code) {
      return '<option value="' + escapeHtml(code) + '">' + escapeHtml(code) + '</option>';

  function openShiftClosingDialog_(mode) {
    var shift = uiState.activeShift || {};
    if (!shift.shift_id) {
      showMessage('Nema aktivne smene za zatvaranje.', 'error');
      return;
    }
    if (!isCurrentActiveShiftOwner_()) {
      showMessage('Smenu može zatvoriti samo glavni blagajnik smene.', 'error');
      return;
    }
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog app-dialog-wide" role="dialog" aria-modal="true">' +
        buildCashCountFormHtml_({
          formId: 'shift-closing-dialog-form',
          purpose: 'closing',
          title: 'Zatvaranje smene - završni popis apoena',
          subtitle: 'Unesite završno stanje kroz apoene. ENTER dodaje red, F5 zatvara smenu.',
          countType: 'SHIFT_CLOSING',
          shiftId: shift.shift_id || '',
          cashboxId: SESSION.cashboxId || shift.cashbox_id || '',
          noteName: 'note',
          noteLabel: 'Napomena',
          submitText: 'Zatvori smenu'
        }) +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#shift-closing-dialog-form');
    form.dataset.countRows = '[]';
    var currency = form.querySelector('[name="currency"]');
    if (currency) currency.value = SESSION.currency;
    renderDenominationInputs_();
    bindAmountFormatting_();
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      submitShiftClosingForm_(form, mode === 'mobile' ? 'm-shift-result' : 'd-shift-result', close);
    });
  }

    if (uiState.activeShift && uiState.activeShift.shift_id) {
      showMessage('Smena je već otvorena za ovu blagajnu.', 'error');
      return;
    }
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';
    overlay.innerHTML =
      '<div class="app-dialog app-dialog-wide" role="dialog" aria-modal="true">' +
        buildCashCountFormHtml_({
          formId: 'shift-opening-dialog-form',
          purpose: 'opening',
          title: 'Otvaranje smene - početni popis apoena',
          subtitle: 'Unesite početno stanje blagajne. ENTER dodaje red, F5 otvara smenu.',
          countType: 'SHIFT_OPENING',
          cashboxId: SESSION.cashboxId || '',
          noteName: 'opening_note',
          noteLabel: 'Napomena pri otvaranju',
          submitText: 'Otvori smenu'
        }) +
      '</div>';
    document.body.appendChild(overlay);
    var close = function() { overlay.remove(); };
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    var form = overlay.querySelector('#shift-opening-dialog-form');
    form.dataset.countRows = '[]';
    var currency = form.querySelector('[name="currency"]');
    if (currency) currency.value = SESSION.currency;
    renderDenominationInputs_();
    bindAmountFormatting_();
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      submitShiftOpeningForm_(form, mode === 'mobile' ? 'm-shift-result' : 'd-shift-result', close);
    });
  }

  function openCashCountDialog_(mode) {
    if (!(uiState.activeShift && uiState.activeShift.shift_id)) {
      showMessage('Presek stanja je dostupan tek kada postoji aktivna smena.', 'error');
      return;
    }
    if (!isCurrentActiveShiftOwner_()) {
      showMessage('Presek stanja može da proknjiži samo glavni blagajnik aktivne smene.', 'error');
      return;
    }
    var overlay = document.createElement('div');
    overlay.className = 'app-dialog-overlay';

          purpose: 'count',
          title: 'Novi presek stanja - unos apoena',
          subtitle: 'Brzo unesite apoene. ENTER potvrđuje unos i dodaje red. Fokus se pomera na sledeći unos.',
          countType: 'CASHBOX_COUNT',
          shiftId: uiState.activeShift.shift_id || '',
          cashboxId: SESSION.cashboxId || uiState.activeShift.cashbox_id || '',
          noteName: 'note',
          noteLabel: 'Napomena',
          submitText: 'Sačuvaj presek'
        }) +
      '</div>';

  function submitShiftOpeningForm_(form, targetId, closeDialog) {
    if (!validateCashCountForm_(form)) return;
    var data = withUiDefaults(serializeFormElement_(form));
    data.denominations = collectDenominations_(form);
    data.include_all_currencies = true;
    callApi('apiOpenShiftWithOpeningCount', [data], function(result) {
      uiState.activeShift = result && result.shift || null;
      uiState.canPostDirectCashEvents = true;

  function submitShiftClosingForm_(form, targetId, closeDialog) {
    if (!validateCashCountForm_(form)) return;

    data.denominations = collectDenominations_(form);
    data.include_all_currencies = true;
