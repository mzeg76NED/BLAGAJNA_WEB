  function applyRoleBasedHomeMobile_(role) {
    var visibility = {
      'home-group-requests': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','APPROVER','CASHIER','REQUESTER'],
      'home-group-approval': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','APPROVER'],
      'home-group-orders': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','CASHIER'],
      'home-group-cashbox': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR','CASHIER'],
      'home-group-shift': ['ADMIN','CASHIER_SUPERVISOR','CASHIER'],
      'home-group-closing': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR'],
      'home-group-reports': ['ADMIN','DIRECTOR','FINANCE','CASHIER_SUPERVISOR']
    };
    Object.keys(visibility).forEach(function(groupId) {
      var element = document.getElementById(groupId);
      if (element) {
        element.style.display = visibility[groupId].indexOf(role) !== -1 ? '' : 'none';
      }
      });
  }

  function loadCashCounts_() {
    var filters = {
      cashbox_id: SESSION.cashboxId || getDefaultCashboxId()
    };
    callApi('apiGetCashCountsReport', [filters], function(rows) {
      CASH_COUNT_UI.rawRows = rows || [];
      renderCashCounts_(rows || []);
    }, { quiet: true });
  }

  function cashCountBatchKey_(row) {
    return [
      row.posted_at || row.created_at || '',
      row.posted_by || row.created_by || '',
      row.count_type || '',
      row.shift_id || '',
      row.note || ''
    ].join('|');
  }

  function groupCashCounts_(rows) {
    var grouped = {};
    (rows || []).forEach(function(row) {
      var key = cashCountBatchKey_(row);
      if (!grouped[key]) {
        grouped[key] = {
          key: key,
          posted_at: row.posted_at || row.created_at,
          user: row.posted_by || row.created_by,
          count_type: row.count_type,
          shift_id: row.shift_id,
          note: row.note,
          status: row.status,
          rows: []
        };
      }
      grouped[key].rows.push(row);
    });
    return Object.keys(grouped).map(function(key) {
      var group = grouped[key];
      group.currencies = group.rows.map(function(row) { return row.currency; }).filter(Boolean).join(', ');
      group.calculated_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.calculated_balance_before || 0);
        return result;
      }, {});
      group.counted_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.counted_total || row.counted_cash_total || 0);
        return result;
      }, {});
      group.difference_by_currency = group.rows.reduce(function(result, row) {
        result[row.currency] = Number(row.difference || 0);
        return result;
      }, {});
      group.calculated_total = group.rows.reduce(function(total, row) { return total + Number(row.calculated_balance_before || 0); }, 0);
      group.counted_total = group.rows.reduce(function(total, row) { return total + Number(row.counted_total || row.counted_cash_total || 0); }, 0);
      group.difference_total = group.rows.reduce(function(total, row) { return total + Number(row.difference || 0); }, 0);
      group.has_difference = group.rows.some(function(row) { return Math.abs(Number(row.difference || 0)) > 0.000001; });
      return group;
    }).sort(function(a, b) {
      return new Date(b.posted_at || 0).getTime() - new Date(a.posted_at || 0).getTime();
    });
  }

  function cashCountTypeLabel_(type) {
    if (type === 'SHIFT_OPENING') return 'Otvaranje smene';
    if (type === 'SHIFT_CLOSING') return 'Zatvaranje smene';
    if (type === 'CASHBOX_COUNT') return 'Kontrolni presek';
    return type || 'Presek';
  }

  function renderCashCounts_(rows) {
    var groups = groupCashCounts_(rows);
    CASH_COUNT_UI.groups = groups;
    renderCashCountCurrencyFilter_(groups);
    renderCashCountsDesktop_();
    renderCashCountsMobile_(groups);
  }

  function renderCashCountsMobile_(groups) {
    var list = document.getElementById('m-counts-list');
    if (list) {
      list.innerHTML = groups.length ? groups.map(function(group, index) {
        return '<div class="m-entry count" data-count-index="' + index + '">' +
          '<div class="m-entry-dot" style="background:#d99a00"></div>' +
          '<div class="m-entry-info"><div class="m-entry-desc">' + escapeHtml(cashCountTypeLabel_(group.count_type)) + ' · ' + escapeHtml(group.currencies || '') + ' · ' + escapeHtml(formatDateTimeShort_(group.posted_at)) + '</div>' +
          '<div class="m-entry-meta">Popisano ' + cashCountCurrencySummary_(group.counted_by_currency) + '</div>' +
          '<div class="m-entry-meta">Razlika ' + cashCountDifferenceSummary_(group.difference_by_currency) + '</div></div>' +
        '</div>';
      }).join('') : '<div class="empty-state">Nema preseka za prikaz.</div>';
      list.querySelectorAll('[data-count-index]').forEach(function(row) {
        row.addEventListener('click', function() {
          renderCashCountDetail_(groups[Number(row.getAttribute('data-count-index'))], 'm-count-detail-body');
        });
      });
    }
    if (groups.length && !document.getElementById('d-count-detail-body')) {
      renderCashCountDetail_(groups[0], 'm-count-detail-body');
    }
  }

  function renderCashCountCurrencyFilter_(groups) {
    var select = document.getElementById('d-count-currency-filter');
    if (!select || select.dataset.boundCurrencies === '1') return;
    var seen = {};
    (uiState.config && uiState.config.currencies || []).forEach(function(code) { if (code) seen[code] = true; });
    (groups || []).forEach(function(group) {
      group.rows.forEach(function(row) { if (row.currency) seen[row.currency] = true; });
    });
    select.innerHTML = '<option value="">Sve valute</option>' + Object.keys(seen).sort().map(function(code) {
      return '<option value="' + escapeHtml(code) + '">' + escapeHtml(code) + '</option>';
    }).join('');
    select.dataset.boundCurrencies = '1';
  }

  function renderCashCountsDesktop_() {
    var tbody = document.getElementById('d-counts-tbody');
    if (!tbody) return;
    var filtered = applyCashCountFilters_(CASH_COUNT_UI.groups);
    CASH_COUNT_UI.filtered = filtered;
    var maxPage = Math.max(1, Math.ceil(filtered.length / CASH_COUNT_UI.pageSize));
    CASH_COUNT_UI.page = Math.max(1, Math.min(CASH_COUNT_UI.page, maxPage));
    renderCashCountKpis_(filtered);
    var start = (CASH_COUNT_UI.page - 1) * CASH_COUNT_UI.pageSize;
    var pageRows = filtered.slice(start, start + CASH_COUNT_UI.pageSize);
    tbody.innerHTML = pageRows.length ? pageRows.map(function(group, pageIndex) {
      var absoluteIndex = start + pageIndex;
      var diffClass = group.difference_total > 0 ? 'cell-in' : (group.difference_total < 0 ? 'cell-out' : 'cell-neutral');
      var selected = group.key === CASH_COUNT_UI.selectedKey ? ' is-selected' : '';
      return '<tr class="presek-row' + selected + '" data-count-index="' + absoluteIndex + '">' +
        '<td>' + escapeHtml(formatTimeOnly_(group.posted_at)) + '</td>' +
        '<td>' + escapeHtml(cashCountTypeLabel_(group.count_type)) + '</td>' +
        '<td>' + escapeHtml(shortUserLabel_(group.user || '—')) + '</td>' +
        '<td>' + renderCurrencyChips_(group.rows.map(function(row) { return row.currency; })) + '</td>' +
        '<td class="num">' + cashCountMainAmount_(group.calculated_by_currency) + '</td>' +
        '<td class="num">' + cashCountMainAmount_(group.counted_by_currency) + '</td>' +
        '<td class="num ' + diffClass + '">' + cashCountMainAmount_(group.difference_by_currency) + '</td>' +
        '<td>' + renderCompactStatusBadge_(group.status) + '</td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="8"><div class="empty-state">Nema preseka za izabrane filtere.</div></td></tr>';
    tbody.querySelectorAll('[data-count-index]').forEach(function(row) {
      row.addEventListener('click', function() {
        selectCashCountGroup_(Number(row.getAttribute('data-count-index')));
      });
    });
    updateCashCountPagination_(filtered.length, start, pageRows.length, maxPage);
    if (filtered.length) {
      var selected = filtered.filter(function(group) { return group.key === CASH_COUNT_UI.selectedKey; })[0];
      if (!selected) {
        selected = filtered[Math.min(CASH_COUNT_UI.selectedIndex, filtered.length - 1)] || filtered[0];
        CASH_COUNT_UI.selectedKey = selected.key;
      }
      renderCashCountDetail_(selected, 'd-count-detail-body');
    } else {
      CASH_COUNT_UI.selectedKey = '';
      renderCashCountDetail_(null, 'd-count-detail-body');
    }
  }

  function applyCashCountFilters_(groups) {
    var period = (document.getElementById('d-count-period-filter') || {}).value || 'today';
    var search = ((document.getElementById('d-count-search') || {}).value || '').toLowerCase().trim();
    var type = (document.getElementById('d-count-type-filter') || {}).value || '';
    var status = (document.getElementById('d-count-status-filter') || {}).value || '';
    var currency = (document.getElementById('d-count-currency-filter') || {}).value || '';
    setText_('d-count-kpi-period', cashCountPeriodLabel_(period));
    return (groups || []).filter(function(group) {
      if (!isCashCountInPeriod_(group, period)) return false;
      if (type && group.count_type !== type) return false;
      if (currency && !group.rows.some(function(row) { return row.currency === currency; })) return false;
      if (status === 'DIFFERENCE' && group.has_difference !== true) return false;
      if (status === 'DRAFT' && group.status === 'POSTED') return false;
      if (status && status !== 'DRAFT' && status !== 'DIFFERENCE' && group.status !== status) return false;
      if (search) {
        var haystack = [group.user, group.currencies, cashCountTypeLabel_(group.count_type), group.shift_id, group.note].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function cashCountPeriodLabel_(period) {
    if (period === 'yesterday') return 'juče';
    if (period === 'week') return 'ova nedelja';
    if (period === 'month') return 'ovaj mesec';
    if (period === 'all') return 'ukupno';
    return 'danas';
  }

  function isCashCountInPeriod_(group, period) {
    if (!period || period === 'all') return true;
    var d = new Date(group.posted_at || 0);
    if (isNaN(d.getTime())) return false;
    var now = new Date();
    var start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var end = new Date(start.getTime() + 86400000);
    if (period === 'yesterday') {
      end = start;
      start = new Date(start.getTime() - 86400000);
    } else if (period === 'week') {
      var day = (start.getDay() + 6) % 7;
      start = new Date(start.getTime() - day * 86400000);
      end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    } else if (period === 'month') {
      start = new Date(now.getFullYear(), now.getMonth(), 1);
      end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    }
    return d >= start && d < end;
  }

  function selectCashCountGroup_(index) {
    var group = CASH_COUNT_UI.filtered[index];
    if (!group) return;
    CASH_COUNT_UI.selectedIndex = index;
    CASH_COUNT_UI.selectedKey = group.key;
    renderCashCountsDesktop_();
  }

  function updateCashCountPagination_(total, start, length, maxPage) {
    setText_('d-count-page-info', total ? ('Prikazano ' + (start + 1) + '–' + (start + length) + ' od ' + total) : 'Prikazano 0 od 0');
    setText_('d-count-page-current', String(CASH_COUNT_UI.page));
    var prev = document.getElementById('d-count-page-prev');
    var next = document.getElementById('d-count-page-next');
    if (prev) prev.disabled = CASH_COUNT_UI.page <= 1;
    if (next) next.disabled = CASH_COUNT_UI.page >= maxPage;
  }

  function renderCashCountKpis_(groups) {
    var total = groups.length;
    var posted = groups.filter(function(group) { return group.status === 'POSTED'; }).length;
    var pending = total - posted;
    setText_('d-count-kpi-total', String(total));
    renderKpiMoney_('d-count-kpi-expected-main', 'd-count-kpi-expected-sub', sumCashCountMap_(groups, 'calculated_by_currency'));
    renderKpiMoney_('d-count-kpi-counted-main', 'd-count-kpi-counted-sub', sumCashCountMap_(groups, 'counted_by_currency'));
    renderKpiMoney_('d-count-kpi-diff-main', 'd-count-kpi-diff-sub', sumCashCountMap_(groups, 'difference_by_currency'), true);
    setText_('d-count-kpi-posted', String(posted));
    setText_('d-count-kpi-posted-pct', total ? Math.round(posted * 100 / total) + '%' : '0%');
    setText_('d-count-kpi-pending', String(pending));
    setText_('d-count-kpi-pending-pct', total ? Math.round(pending * 100 / total) + '%' : '0%');
  }

  function sumCashCountMap_(groups, field) {
    return (groups || []).reduce(function(result, group) {
      Object.keys(group[field] || {}).forEach(function(code) {
        result[code] = Number(result[code] || 0) + Number(group[field][code] || 0);
      });
      return result;
    }, {});
  }

  function setText_(id, value) {
    var el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function renderKpiMoney_(mainId, subId, values, diffOnly) {
    var codes = Object.keys(values || {}).filter(function(code) {
      return !diffOnly || Math.abs(Number(values[code] || 0)) > 0.000001;
    }).sort(function(a, b) {
      if (a === SESSION.currency) return -1;
      if (b === SESSION.currency) return 1;
      return a.localeCompare(b);
    });
    var main = document.getElementById(mainId);
    var sub = document.getElementById(subId);
    if (!codes.length) {
      if (main) {
        main.textContent = diffOnly ? 'Bez razlike' : '0,00';
        main.classList.remove('presek-danger', 'presek-success');
      }
      if (sub) sub.textContent = '—';
      return;
    }
    var first = codes[0];
    var value = Number(values[first] || 0);
    if (main) {
      main.textContent = first + ' ' + formatAmount_(value);
      main.classList.toggle('presek-danger', diffOnly && value < 0);
      main.classList.toggle('presek-success', diffOnly && value > 0);
    }
    if (sub) {
      sub.innerHTML = codes.slice(1).map(function(code) {
        var subValue = Number(values[code] || 0);
        var cls = diffOnly ? (subValue < 0 ? 'cell-out' : 'cell-in') : '';
        return '<span class="' + cls + '">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(subValue)) + '</span>';
      }).join(' · ') || '—';
    }
  }

  function renderCurrencyChips_(currencies) {
    var seen = {};
    return (currencies || []).filter(function(code) {
      if (!code || seen[code]) return false;
      seen[code] = true;
      return true;
    }).map(function(code) {
      return '<span class="presek-currency-chip">' + escapeHtml(code) + '</span>';
    }).join(' ');
  }

  function cashCountMainAmount_(values) {
    var codes = Object.keys(values || {}).sort(function(a, b) {
      if (a === SESSION.currency) return -1;
      if (b === SESSION.currency) return 1;
      return a.localeCompare(b);
    });
    if (!codes.length) return '—';
    var first = codes[0];
    return escapeHtml(formatAmount_(values[first])) + (codes.length > 1 ? ' +' + (codes.length - 1) : '');
  }

  function renderCompactStatusBadge_(status) {
    var label = status === 'POSTED' ? 'Proknjižen' : (STATUS_LABEL_MAP[status] || status || 'U obradi');
    return '<span class="presek-status-badge">' + escapeHtml(label) + '</span>';
  }

  function formatTimeOnly_(value) {
    if (!value) return '—';
    var d = new Date(value);
    if (isNaN(d.getTime())) return formatDateTimeShort_(value);
    return d.toLocaleTimeString('sr-RS', { hour: '2-digit', minute: '2-digit' });
  }

  function cashCountCurrencySummary_(values) {
    var currencies = Object.keys(values || {});
    if (!currencies.length) return '—';
    return currencies.map(function(code) {
      return '<span class="amount-line">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(values[code])) + '</span>';
    }).join(' ');
  }

  function cashCountDifferenceSummary_(values) {
    var currencies = Object.keys(values || {});
    if (!currencies.length) return '—';
    return currencies.map(function(code) {
      var value = Number(values[code] || 0);
      var cls = value >= 0 ? 'cell-in' : 'cell-out';
      return '<span class="amount-line ' + cls + '">' + escapeHtml(code) + ' ' + escapeHtml(formatAmount_(value)) + '</span>';
    }).join(' ');
  }

  function renderCashCountDetail_(countGroup, targetId) {
    var target = document.getElementById(targetId);
    if (!target) return;
    var statusTarget = document.getElementById('d-count-detail-status');
    if (!countGroup) {
      target.classList.add('empty-state');
      target.classList.remove('count-detail-body');
      target.innerHTML = 'Izaberite presek iz tabele.';
      if (statusTarget) statusTarget.innerHTML = '';
      return;
    }
    target.classList.remove('empty-state');
    target.classList.add('count-detail-body');
    var group = countGroup.rows ? countGroup : { rows: [countGroup] };
    if (statusTarget) statusTarget.innerHTML = renderCompactStatusBadge_(group.status);
    var diffClass = group.difference_total > 0 ? 'cell-in' : (group.difference_total < 0 ? 'cell-out' : 'cell-neutral');
    var tab = CASH_COUNT_UI.detailTab || 'apoeni';
    target.innerHTML =
      '<div class="presek-detail-kpis">' +
        presekInfoBlock_('Vreme', formatDateTimeShort_(group.posted_at), 'ti ti-clock') +
        presekInfoBlock_('Vrsta', cashCountTypeLabel_(group.count_type), 'ti ti-calendar-stats') +
        presekInfoBlock_('Korisnik', shortUserLabel_(group.user || ''), 'ti ti-user') +
        presekInfoBlock_('Valuta', group.currencies || '—', 'ti ti-currency-euro') +
        presekInfoBlock_('Razlika', cashCountCurrencySummaryText_(group.difference_by_currency), 'ti ti-arrows-diff', diffClass) +
      '</div>' +
      '<div class="presek-tabs">' +
        renderPresekTabButton_('pregled', 'Pregled', tab) +
        renderPresekTabButton_('valute', 'Valute', tab) +
        renderPresekTabButton_('apoeni', 'Apoeni', tab) +
        renderPresekTabButton_('zapisnik', 'Zapisnik', tab) +
      '</div>' +
      '<div class="presek-tab-panel">' + renderPresekTabPanel_(group, tab) + '</div>';
    target.querySelectorAll('[data-count-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        CASH_COUNT_UI.detailTab = btn.getAttribute('data-count-tab') || 'apoeni';
        renderCashCountDetail_(group, targetId);
      });
    });
  }

  function presekInfoBlock_(label, value, icon, extraClass) {
    return '<div class="presek-info-block ' + escapeHtml(extraClass || '') + '">' +
      '<i class="' + escapeHtml(icon || 'ti ti-info-circle') + '" aria-hidden="true"></i>' +
      '<div><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>' +
    '</div>';
  }

  function renderPresekTabButton_(id, label, active) {
    return '<button type="button" class="presek-tab ' + (id === active ? 'active' : '') + '" data-count-tab="' + escapeHtml(id) + '">' + escapeHtml(label) + '</button>';
  }

  function renderPresekTabPanel_(group, tab) {
    if (tab === 'pregled') return renderPresekPregledTab_(group);
    if (tab === 'valute') return renderPresekValuteTab_(group);
    if (tab === 'zapisnik') return renderPresekZapisnikTab_(group);
    return renderPresekApoeniTab_(group);
  }

  function renderPresekPregledTab_(group) {
    return '<div class="presek-overview-grid">' +
      presekSummaryCard_('Očekivano', cashCountCurrencySummaryText_(group.calculated_by_currency)) +
      presekSummaryCard_('Popisano', cashCountCurrencySummaryText_(group.counted_by_currency)) +
      presekSummaryCard_('Razlika', cashCountCurrencySummaryText_(group.difference_by_currency), group.difference_total >= 0 ? 'cell-in' : 'cell-out') +
      presekSummaryCard_('Napomena', group.note || '—') +
    '</div>';
  }

  function presekSummaryCard_(label, value, cls) {
    return '<div class="presek-summary-card ' + escapeHtml(cls || '') + '"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>';
  }

  function renderPresekValuteTab_(group) {
    var rows = group.rows.map(function(count) {
      var diff = Number(count.difference || 0);

    return String(value);

  function formatNumber_(value) {
    var numberValue = Number(value || 0);
    if (!isFinite(numberValue)) {
      return formatValue(value);

    return numberValue.toLocaleString('sr-RS', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function escapeHtml(value) {
    return formatValue(value)
      .replace(/&/g, '&amp;')

      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

  /* ═══════════════════════════════════════════════════════════════
     BLAGAJNIČKA KNJIGA — novi UI (redesign)

  var currentQuickFormType_ = 'IN';
  var currentSheetType_     = 'IN';

  /* ─── Format helpers ─────────────────────────────────────────── */

  function formatAmount_(value) {
    var num = Number(value) || 0;
    return num.toLocaleString('sr-RS', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function parseAmountInput_(value) {
    var text = String(value || '').trim();
    if (!text) return 0;
    text = text.replace(/\s/g, '');
    if (text.indexOf(',') !== -1) {
      text = text.replace(/\./g, '').replace(',', '.');
    } else {
      var parts = text.split('.');
      if (parts.length > 2 || (parts.length === 2 && parts[1].length === 3)) {
        text = parts.join('');
      }
    }
    return parseFloat(text) || 0;
  }

  function bindAmountFormatting_() {
    document.querySelectorAll('#d-qf-amount,#sheet-amount,input[name="physical_balance"],[name^="physical_"]').forEach(function(input) {
      if (input.dataset.amountFormattingBound === '1') return;
      input.dataset.amountFormattingBound = '1';
      input.addEventListener('focus', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? String(amount).replace('.', ',') : '';
      });
      input.addEventListener('blur', function() {
        var amount = parseAmountInput_(input.value);
        input.value = amount ? formatAmount_(amount) : '';
      });
    });
  }

  function formatDateShort_(value) {
    if (!value) return '—';
    var d = value instanceof Date ? value : new Date(value);
    if (isNaN(d.getTime())) return String(value).substring(0, 10);
    return d.getDate() + '.' + (d.getMonth() + 1) + '.';
  }

  function parseDateSafe_(value) {
    if (!value) return null;
    var date = value instanceof Date ? value : new Date(value);
    return isNaN(date.getTime()) ? null : date;
  }

  function toInputDate_(date) {
    var d = parseDateSafe_(date);
    if (!d) return '';
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function formatDateTimeShort_(value) {
    if (!value) return '—';
    return formatDateShort_(value) + ' ' + formatTimeShort_(value);
  }

  function renderStatusBadge_(status) {
    var cls = STATUS_BADGE_MAP[status] || 'badge-draft';
    var lbl = STATUS_LABEL_MAP[status] || status;
    return '<span class="badge ' + cls + '">' + escapeHtml(lbl) + '</span>';
  }

  function isCashEventBalanceAffecting_(ev) {
    return ev.status === 'POSTED' || ev.status === 'LOCKED';
  }

  /* ─── Knjiga: učitaj i renderuj ──────────────────────────────── */

  function loadKnjiga_(isBackground) {
    var dateFrom = (document.getElementById('d-date-from') || {}).value || '';
    var dateTo   = (document.getElementById('d-date-to')   || {}).value || '';
    var userFilter = (document.getElementById('d-user-filter') || {}).value || '';
    var shiftFilter = (document.getElementById('d-shift-filter') || {}).value || '';
    var tbody = document.getElementById('d-knjiga-tbody') || document.getElementById('m-knjiga-list');
    if (!tbody) return;

    if (!isBackground) {
      var skeletonRow = '<tr class="loading-row"><td colspan="6"><div class="skeleton" style="height:14px;margin:4px 0"></div></td></tr>';
      tbody.innerHTML = skeletonRow + skeletonRow + skeletonRow;
    }

    callApi('apiGetCashMovementsReport', [withUiDefaults({
      cashbox_id: SESSION.cashboxId,
      currency:   SESSION.currency,
      date_from:  dateFrom,
      date_to:    dateTo,
      user:       userFilter,
      shift_id:   shiftFilter
    })], function(events) {
      LAST_KNJIGA_EVENTS = events || [];
      renderKnjigaTable_(events || []);
      refreshBalance_();
    }, { quiet: true });
  }

  function updateKnjigaContext_() {
    var user = uiState.currentUser || {};
    var shift = uiState.activeShift || {};
    var userText = user.email ? shortUserLabel_(user.email) : 'Korisnik nije učitan';
    var shiftText = shift.shift_id
      ? 'Aktivna smena: ' + shortUserLabel_(shift.opened_by || '') + ' · ' + formatDateTimeShort_(shift.opened_at)
      : 'Nema aktivne smene za direktan rad';
    ['d-knjiga-context','m-knjiga-context'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = 'Korisnik: ' + userText + ' · ' + shiftText;
    });
  }

  function renderKnjigaTable_(events) {
    var isMobile = Boolean(document.getElementById('m-knjiga-list'));
    var container = document.getElementById(isMobile ? 'm-knjiga-list' : 'd-knjiga-tbody');
    var tfoot     = document.getElementById('d-knjiga-tfoot');
    if (!container) return;
    events = mergeOptimisticEvents_(events || []);
    if (!isMobile) events = filterKnjigaBySearch_(events);
    updateKnjigaContext_();

    if (!events.length) {
      var empty = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema transakcija za izabrani period.</p></div>';
      container.innerHTML = isMobile ? empty : '<tr><td colspan="6">' + empty + '</td></tr>';
      if (tfoot) tfoot.innerHTML = '';
      updateKnjigaTotals_(0, 0, 0, 0);
      renderCashbookKpis_([], 0, 0, 0, 0, 0, 0);
      return;
    }

    var totalIn = 0, totalOut = 0;
    var rows = [];
    var dateGroups = isMobile ? {} : events.reduce(function(index, ev) {
      var key = formatDateLong_(ev.event_date || ev.created_at);
      index[key] = (index[key] || 0) + 1;
      return index;
    }, {});
    var lastDateGroup = '';

    events.forEach(function(ev, idx) {
      var displayDirection = ev.display_direction || ev.direction;
      var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
      var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
      if (displayDirection === 'IN')  totalIn  += displayAmount;
      if (displayDirection === 'OUT' && !isTreasury) totalOut += displayAmount;
      var rowNumber = events.length - idx;
      ev.__displayIndex = rowNumber;
      ev.__balanceAfter = Number(ev.running_balance || 0);
      ev.__balanceBefore = ev.__balanceAfter - (displayDirection === 'IN' ? displayAmount : displayDirection === 'OUT' ? -displayAmount : 0);
      if (!isMobile) {
        var dateKey = formatDateLong_(ev.event_date || ev.created_at);
        if (dateKey !== lastDateGroup) {
          rows.push(renderKnjigaDateGroup_(dateKey, dateGroups[dateKey] || 0));
          lastDateGroup = dateKey;
        }
      }
      rows.push(isMobile ? renderMobileEntry_(ev, rowNumber) : renderKnjigaRow_(ev, rowNumber, Number(ev.running_balance || 0)));
    });

    container.innerHTML = rows.join('');
    if (tfoot) tfoot.innerHTML = '';
    var finalBalance = events.length ? Number(events[0].running_balance || 0) : 0;
    var netChange = totalIn - totalOut;
    var openingBalance = finalBalance - netChange;
    updateKnjigaTotals_(totalIn, totalOut, finalBalance, events.length);
    renderCashbookKpis_(events, totalIn, totalOut, finalBalance, openingBalance, netChange, events.length);

    container.querySelectorAll('[data-event-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        var eid = row.getAttribute('data-event-id');
        var ev = events.find(function(e) { return e.event_id === eid; });
        if (ev) openDetailPanel_(ev);
      });
    });
  }

  function mergeOptimisticEvents_(events) {
    var realIds = events.reduce(function(index, ev) {
      if (ev.event_id) index[ev.event_id] = true;
      return index;
    }, {});
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return !ev.event_id || !realIds[ev.event_id];
    });
    var visiblePending = PENDING_OPTIMISTIC_EVENTS.filter(function(ev) {
      return (!SESSION.cashboxId || ev.cashbox_id === SESSION.cashboxId) &&
        (!SESSION.currency || ev.currency === SESSION.currency);
    });
    return visiblePending.concat(events);
  }

  function filterKnjigaBySearch_(events) {
    var input = document.getElementById('d-knjiga-search');
    var query = input ? String(input.value || '').trim().toLowerCase() : '';
    if (!query) return events;
    return events.filter(function(ev) {
      return [
        ev.event_id,
        ev.description,
        ev.partner_name,
        ev.created_by,
        ev.posted_by,
        ev.currency,
        cashEventUserLabel_(ev),
        cashEventReasonLabel_(ev)
      ].join(' ').toLowerCase().indexOf(query) !== -1;
    });
  }

  function renderCashbookKpis_(events, totalIn, totalOut, finalBalance, openingBalance, netChange, count) {
    if (!document.getElementById('d-kpi-opening')) return;
    var currency = SESSION.currency || '';
    var inCount = 0, outCount = 0;
    (events || []).forEach(function(ev) {
      var dir = ev.display_direction || ev.direction;
      if (dir === 'IN') inCount += 1;
      if (dir === 'OUT' && ev.event_type !== 'TREASURY_HANDOVER') outCount += 1;
    });
    var firstDate = events && events.length ? formatDateTimeShort_(events[events.length - 1].event_date || events[events.length - 1].created_at) : '—';
    var lastDate = events && events.length ? formatDateTimeShort_(events[0].event_date || events[0].created_at) : '—';
    var pct = openingBalance ? (netChange / Math.abs(openingBalance)) * 100 : 0;
    setText_('d-kpi-opening', formatAmount_(openingBalance) + ' ' + currency);
    setText_('d-kpi-opening-sub', firstDate);
    setText_('d-kpi-in', formatAmount_(totalIn) + ' ' + currency);
    setText_('d-kpi-in-sub', inCount + ' transakcija');
    setText_('d-kpi-out', formatAmount_(totalOut) + ' ' + currency);
    setText_('d-kpi-out-sub', outCount + ' transakcija');
    setText_('d-kpi-net', (netChange > 0 ? '+' : '') + formatAmount_(netChange) + ' ' + currency);
    setText_('d-kpi-net-sub', (pct > 0 ? '+' : '') + formatAmount_(pct) + '%');
    setText_('d-kpi-closing', formatAmount_(finalBalance) + ' ' + currency);
    setText_('d-kpi-closing-sub', lastDate);
    var net = document.getElementById('d-kpi-net');
    if (net) {
      net.classList.toggle('amount-positive', netChange > 0);
      net.classList.toggle('amount-negative', netChange < 0);
      net.classList.toggle('amount-neutral', netChange === 0);
    }
  }

  function formatDateLong_(value) {
    if (!value) return '—';
    var date = new Date(value);
    if (!isNaN(date.getTime())) {
      return String(date.getDate()).padStart(2, '0') + '.' + String(date.getMonth() + 1).padStart(2, '0') + '.' + date.getFullYear() + '.';
    }
    return formatDateShort_(value);
  }

  function renderKnjigaDateGroup_(dateLabel, count) {
    return '<tr class="cashbook-date-group"><td colspan="6"><span><i class="ti ti-circle-dot" aria-hidden="true"></i> ' +
      escapeHtml(dateLabel) + '</span><b>' + count + '</b></td></tr>';
  }

  function scheduleKnjigaRefresh_() {
    window.setTimeout(function() {
      loadKnjiga_(true);
      refreshBalance_();
    }, OPTIMISTIC_REFRESH_DELAY_MS);
  }

  function rememberOptimisticEvent_(ev) {
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== ev.optimistic_id && item.event_id !== ev.event_id;
    });
    PENDING_OPTIMISTIC_EVENTS.unshift(ev);
    if (PENDING_OPTIMISTIC_EVENTS.length > 8) {
      PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.slice(0, 8);
    }
  }

  function removeOptimisticEvent_(tempId) {
    PENDING_OPTIMISTIC_EVENTS = PENDING_OPTIMISTIC_EVENTS.filter(function(item) {
      return item.optimistic_id !== tempId && item.event_id !== tempId;
    });
  }

  function buildOptimisticEvent_(tempId, direction, amount, currency, partner, desc, statusText) {
    var now = new Date();
    var signed = direction === 'OUT' ? -Number(amount || 0) : Number(amount || 0);
    var projectedBalance = currency === SESSION.currency ? getDisplayedBalanceRaw_() + signed : 0;
    return {
      optimistic_id: tempId,
      event_id: tempId,
      event_date: now.toISOString(),
      created_at: now.toISOString(),
      created_by: uiState.currentUser && uiState.currentUser.email || '',
      posted_at: now.toISOString(),
      posted_by: uiState.currentUser && uiState.currentUser.email || '',
      event_type: direction === 'IN' ? 'CASH_INFLOW' : 'CASH_OUTFLOW',
      cashbox_id: SESSION.cashboxId,
      currency: currency,
      direction: direction,
      amount: amount,
      display_direction: direction,
      display_amount: amount,
      partner_name: partner || '',
      description: desc || partner || '',
      status: statusText || 'KNJIŽENJE',
      running_balance: projectedBalance
    };
  }

  function cashCountEventKindFromDescription_(description) {
    var text = String(description || '').toUpperCase();
    if (text.indexOf('POČETAK SMENE') !== -1 || text.indexOf('POCETAK SMENE') !== -1) return 'Otvaranje smene';
    if (text.indexOf('ZAVRŠNI POPIS') !== -1 || text.indexOf('ZAVRSNI POPIS') !== -1 || text.indexOf('ZATVARANJE') !== -1) return 'Zatvaranje smene';
    return 'Kontrolni presek';
  }

  function cashCountEventKind_(ev) {
    if (ev && ev.count_type === 'SHIFT_OPENING') return 'Otvaranje smene';
    if (ev && ev.count_type === 'SHIFT_CLOSING') return 'Zatvaranje smene';
    if (ev && ev.count_type === 'CASHBOX_COUNT') return 'Kontrolni presek';
    return cashCountEventKindFromDescription_(ev && ev.description);
  }

  function cashCountDifferenceText_(ev) {
    var amount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var direction = ev.display_direction || ev.direction;
    if (!amount) return 'Bez razlike';
    var label = direction === 'OUT' ? 'Manjak' : 'Višak';
    return label + ': ' + formatAmount_(Math.abs(amount)) + ' ' + escapeHtml(ev.currency || SESSION.currency || '');
  }

  function cleanBusinessDescription_(description) {
    return String(description || '')
      .replace(/CNT-\d{8}-\d{6}-[A-F0-9]+/gi, '')
      .replace(/CEV-\d{8}-\d{6}-[A-F0-9]+/gi, '')
      .replace(/PRESEK SMENE\s*-\s*KOREKCIJA\s*-\s*/gi, '')
      .replace(/\s*\.\s*Razlika:/gi, '. Razlika:')
      .replace(/\s{2,}/g, ' ')
      .replace(/\s+\./g, '.')
      .trim();
  }

  function cashEventUserLabel_(ev) {
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis|početak smene|završni popis/i.test(String(ev.description || '')));
    if (isCount) return cashCountEventKind_(ev);
    if (ev.event_type === 'TREASURY_HANDOVER') return 'Predaja u trezor';
    return ev.partner_name || ev.description || '—';
  }

  function cashEventReasonLabel_(ev) {
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis|početak smene|završni popis/i.test(String(ev.description || '')));
    if (isCount) return cashCountDifferenceText_(ev);
    return cleanBusinessDescription_(ev.description || '—');
  }

  function renderKnjigaRow_(ev, index, balance) {
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
    var isIn  = displayDirection === 'IN';
    var isOut = displayDirection === 'OUT' && !isTreasury;
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis/i.test(String(ev.description || '')));
    var rowClass = (isCount || isTreasury ? 'row-count' : isIn ? 'row-in' : isOut ? 'row-out' : 'row-opening') + (ev.optimistic_id ? ' optimistic' : '');
    var amtFmt  = formatAmount_(displayAmount);
    var balFmt  = formatAmount_(balance);
    var dateStr = formatDateLong_(ev.event_date || ev.created_at);
    var label   = escapeHtml(cashEventUserLabel_(ev));
    var reason  = escapeHtml(cashEventReasonLabel_(ev));
    var createdBy = escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—'));
    var timeStr = escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date));
    var trace = ev.reversal_of_event_id ? ' · Stornirano' : '';
    var statusHint = ev.optimistic_id ? ' · Knjiženje...' : '';
    return '<tr class="' + rowClass + ' cashbook-row" data-event-id="' + escapeHtml(ev.event_id) + '">' +
      '<td><span class="cashbook-rb">' + index + '</span></td>' +
      '<td><span class="cashbook-row-date">' + dateStr + '</span><strong class="cashbook-row-time">' + timeStr + '</strong></td>' +
      '<td><div class="desc-main">' + label + '</div><div class="desc-reason">' + reason + '</div><div class="desc-sub">' + createdBy + trace + statusHint + '</div></td>' +
      '<td class="' + (isIn  ? 'cell-in'   : 'cell-dash') + '">' + (isIn  ? '<span class="amount-pill in">' + amtFmt + '</span>' : '—') + '</td>' +
      '<td class="' + (isOut ? 'cell-out'  : 'cell-dash') + '">' + (isOut ? '<span class="amount-pill out">' + amtFmt + '</span>' : '—') + '</td>' +
      '<td class="cell-bal">' + balFmt + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotals_(totalIn, totalOut, finalBalance) {
    return '<tr class="total-row">' +
      '<td colspan="3" style="font-weight:700;font-size:12px;padding:10px 12px">UKUPNO</td>' +
      '<td class="cell-in">'  + formatAmount_(totalIn)      + '</td>' +
      '<td class="cell-out">' + formatAmount_(totalOut)     + '</td>' +
      '<td class="cell-bal">' + formatAmount_(finalBalance) + '</td>' +
    '</tr>';
  }

  function renderKnjigaTotalsHtml_(totalIn, totalOut, finalBalance) {
    return '<span><strong>Ukupno uplata</strong> <b class="cell-in">' + formatAmount_(totalIn) + '</b></span>' +
      '<span><strong>Ukupno isplata</strong> <b class="cell-out">' + formatAmount_(totalOut) + '</b></span>' +
      '<span><strong>Stanje</strong> <b class="cell-bal">' + formatAmount_(finalBalance) + ' ' + escapeHtml(SESSION.currency || '') + '</b></span>';
  }

  function updateKnjigaTotals_(totalIn, totalOut, finalBalance, count) {
    LAST_KNJIGA_TOTALS = {
      totalIn: totalIn,
      totalOut: totalOut,
      finalBalance: finalBalance,
      count: count || 0
    };
    var html = renderKnjigaTotalsHtml_(totalIn, totalOut, finalBalance);
    var row = document.getElementById('d-knjiga-total-row');
    if (row) {
      row.innerHTML = '<td colspan="3">UKUPNO</td>' +
        '<td class="cell-in">' + formatAmount_(totalIn) + '</td>' +
        '<td class="cell-out">' + formatAmount_(totalOut) + '</td>' +
        '<td class="cell-bal">' + formatAmount_(finalBalance) + '</td>';
    }
    renderMobileTrafficSummary_();
  }

  function renderMobileTrafficSummary_() {
    var box = document.getElementById('m-traffic-summary');
    if (!box) return;
    box.innerHTML = renderKnjigaTotalsHtml_(LAST_KNJIGA_TOTALS.totalIn, LAST_KNJIGA_TOTALS.totalOut, LAST_KNJIGA_TOTALS.finalBalance) +
      '<span><strong>Stavki</strong> <b>' + LAST_KNJIGA_TOTALS.count + '</b></span>';
  }

  function renderMobileEntry_(ev, index) {
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
    var isIn   = displayDirection === 'IN';
    var isCount = ev.event_type === 'CASH_COUNT' || (ev.event_type === 'CORRECTION' && /presek|popis/i.test(String(ev.description || '')));
    var dotBg  = isCount || isTreasury ? '#d99a00' : isIn ? 'var(--color-in)'  : 'var(--color-out)';
    var color  = isCount || isTreasury ? '#d99a00' : isIn ? 'var(--color-in)'  : 'var(--color-out)';
    var prefix = isCount ? '' : isTreasury ? 'Trezor ' : displayAmount < 0 ? '−' : (isIn ? '+' : '−');
    var label  = escapeHtml(cashEventUserLabel_(ev));
    var reason = escapeHtml(cashEventReasonLabel_(ev));
    var meta   = escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date)) +
      ' · ' + escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—')) +
      (ev.reversal_of_event_id ? ' · Stornirano' : '');
    var statusHint = ev.optimistic_id ? ' · Knjiženje...' : '';
    return '<div class="m-entry' + (isCount ? ' count' : '') + (ev.optimistic_id ? ' optimistic' : '') + '" data-event-id="' + escapeHtml(ev.event_id) + '">' +
      '<div class="m-entry-dot" style="background:' + dotBg + '"></div>' +
      '<div class="m-entry-info">' +
        '<div class="m-entry-desc"><span class="m-entry-no">' + index + '.</span> ' + label + '</div>' +
        '<div class="m-entry-meta">' + reason + '</div>' +
        '<div class="m-entry-meta">' + meta + statusHint + '</div>' +
      '</div>' +
      '<div class="m-entry-amt" style="color:' + color + '">' + (isCount ? 'POPIS' : prefix + formatAmount_(Math.abs(displayAmount))) + '</div>' +
    '</div>';
  }

  /* ─── Detail panel (desktop) ─────────────────────────────────── */

  function openDetailPanel_(ev) {
    var panel = document.getElementById('d-detail-panel');
    var title = document.getElementById('d-detail-title');
    var body  = document.getElementById('d-detail-body');
    if (!panel || !title || !body) {
      openMobileDetailPanel_(ev);
      return;
    }
    CURRENT_SELECTED_EVENT_ID = ev.event_id || '';
    var printEventInput = document.querySelector('#print-tools-form [name="cash_event_id"]');
    if (printEventInput && CURRENT_SELECTED_EVENT_ID) {
      printEventInput.value = CURRENT_SELECTED_EVENT_ID;
    }

    var isCount  = ev.event_type === 'CASH_COUNT';
    var isTreasury = ev.event_type === 'TREASURY_HANDOVER';
    var displayDirection = ev.display_direction || ev.direction;
    var displayAmount = Number(ev.display_amount !== undefined ? ev.display_amount : ev.amount) || 0;
    var isIn     = displayDirection === 'IN';
    var isOut    = displayDirection === 'OUT' && !isTreasury;
    var dirLabel = isCount ? 'PRESEK' : isTreasury ? 'TREZOR' : isIn ? '↓ UPLATA' : '↑ ISPLATA';
    var dirColor = isCount || isTreasury ? '#d99a00' : isIn ? 'var(--color-in)' : 'var(--color-out)';

    title.innerHTML = 'Detalji stavke ' + renderStatusBadge_(ev.status);

    var balanceAfter = Number(ev.__balanceAfter !== undefined ? ev.__balanceAfter : ev.running_balance || 0);
    var balanceBefore = Number(ev.__balanceBefore !== undefined ? ev.__balanceBefore : balanceAfter - (isIn ? displayAmount : isOut ? -displayAmount : 0));
    var signedChange = isIn ? displayAmount : isOut || isTreasury ? -displayAmount : 0;
    var currencyLabel = escapeHtml(ev.currency || SESSION.currency || '');
    var amountClass = signedChange > 0 ? 'amount-positive' : signedChange < 0 ? 'amount-negative' : 'amount-neutral';
    var detailRows = [
      ['Vrsta', escapeHtml(isCount ? cashCountEventKind_(ev) : isTreasury ? 'Predaja u trezor' : isIn ? 'Uplata' : 'Isplata')],
      ['Opis', escapeHtml(cashEventReasonLabel_(ev) || '—')],
      ['Primalac / Uplatilac', escapeHtml(ev.partner_name || '—')],
      ['Korisnik', escapeHtml(shortUserLabel_(ev.posted_by || ev.created_by || '—'))],
      ['Valuta', currencyLabel],
      ['Smena', escapeHtml(ev.shift_id || '—')],
      ['Napomena', escapeHtml(ev.note || ev.comment || '—')],
      ['Način evidentiranja', ev.optimistic_id ? 'U toku knjiženja' : 'Ručno'],
      ['Referenca', escapeHtml(ev.reversal_of_event_id || ev.source_id || ev.payment_order_id || '—')]
    ];

    body.innerHTML =
      '<div class="cashbook-detail-hero">' +
        '<div class="cashbook-detail-icon" style="color:' + dirColor + '"><i class="ti ' + (isIn ? 'ti-arrow-down-circle' : isTreasury ? 'ti-building-bank' : 'ti-arrow-up-circle') + '" aria-hidden="true"></i></div>' +
        '<div><span>' + escapeHtml(dirLabel.replace(/[↓↑]/g, '').trim()) + '</span><strong class="' + amountClass + '">' +
          (signedChange > 0 ? '+' : signedChange < 0 ? '−' : '') + formatAmount_(Math.abs(displayAmount)) + ' ' + currencyLabel +
        '</strong><small>Rb. ' + escapeHtml(String(ev.__displayIndex || '—')) + ' · ' + escapeHtml(formatDateLong_(ev.event_date || ev.created_at)) + ' u ' + escapeHtml(formatTimeShort_(ev.posted_at || ev.created_at || ev.event_date)) + '</small></div>' +
      '</div>' +
      '<div class="cashbook-detail-grid">' + detailRows.map(function(r) {
        return '<div><span>' + r[0] + '</span><strong>' + r[1] + '</strong></div>';
      }).join('') +
        '<div><span>Uplata</span><strong class="amount-positive">' + (isIn ? formatAmount_(displayAmount) + ' ' + currencyLabel : '—') + '</strong></div>' +

  function formatTimeShort_(value) {
    if (!value) return '—';
    var text = String(value);
    var match = text.match(/(\d{1,2}):(\d{2})/);
    if (match) return match[1].padStart(2, '0') + ':' + match[2];
    var date = new Date(value);
    if (!isNaN(date.getTime())) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }
    return text;
  }

  function shortUserLabel_(value) {
    if (!value) return '—';
    var text = String(value);
    return text.indexOf('@') > -1 ? text.split('@')[0] : text;
  }

    });
    if (partner) partner.addEventListener('keydown', function(e) {

      }
    });
    bindEnterNavigationForForms_([
      'new-payment-request-form',
      'new-payment-order-form',
      'd-opening-count-form',
      'd-close-shift-form',
      'd-handover-form',

  function bindEnterNavigationForForms_(formIds) {
    (formIds || []).forEach(function(formId) {
      var form = document.getElementById(formId);
      if (!form || form.dataset.enterNavBound === '1') return;
      form.dataset.enterNavBound = '1';
      form.addEventListener('keydown', function(event) {
        if (event.key !== 'Enter' || event.ctrlKey || event.metaKey || event.altKey) return;
        var target = event.target;
        if (!target || target.tagName === 'TEXTAREA' || target.type === 'submit' || target.type === 'button') return;
        if (target.tagName === 'SELECT' && target.size > 1) return;
        var fields = Array.prototype.filter.call(form.querySelectorAll('input, select, textarea, button'), function(el) {
          return !el.disabled && !el.hidden && el.type !== 'hidden' && el.offsetParent !== null;
        });
        var index = fields.indexOf(target);
        if (index === -1) return;
        event.preventDefault();
        var next = fields[index + 1];
        if (next) {
          next.focus();
          if (typeof next.select === 'function' && next.tagName === 'INPUT' && next.type !== 'date') next.select();
        }
      });
    });
  }

    google.script.run

          removeOptimisticEvent_(tempId);

            realEvent.optimistic_id = realEvent.event_id;

            rememberOptimisticEvent_(realEvent);

        else {
          removeOptimisticEvent_(tempId);

          if (cur === SESSION.currency) updateTopbarBalance_(direction === 'IN' ? -amount : amount);
          showDesktopMessage_('Greška: ' + humanizeError_(resp && resp.error ? resp.error.message : 'problem.'), 'error');
        }
      })
      .withFailureHandler(function(err) {
        removeOptimisticEvent_(tempId);
        renderKnjigaTable_(LAST_KNJIGA_EVENTS || []);
        if (cur === SESSION.currency) updateTopbarBalance_(direction === 'IN' ? -amount : amount);
        showDesktopMessage_('Greška: ' + humanizeError_(err && err.message ? err.message : 'tehnički problem.'), 'error');

  function refreshBalance_() {
    if (!SESSION.cashboxId || !SESSION.currency) return;
    if (hasPendingOptimisticForSession_()) return;
    callApi('apiCalculateCashboxBalance', [SESSION.cashboxId, SESSION.currency], function(result) {
      var val = Number(result) || 0;
      ['d-topbar-balance','m-balance'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.dataset.rawValue = val;
        el.textContent = formatAmount_(val) + ' ' + SESSION.currency;
        el.style.color = val >= 0 ? 'var(--color-in)' : 'var(--color-out)';
      });
    }, { quiet: true });
  }

  function loadMobileNalozi_() {
    callApi('apiListOrdersWaitingForPayment', [], function(result) {
      var list = document.getElementById('m-nalozi-list');
      if (!list) return;
      if (!result || !result.length) {
        list.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema naloga za isplatu.</p></div>';
        updateTabCounts_(null, 0); return;
      }
      list.innerHTML = result.map(function(order) {
        var remaining = Number(order.amount_ordered||0) - Number(order.amount_paid||0);
        return '<div class="m-entry">' +
          '<div class="m-entry-dot" style="background:var(--color-out)"></div>' +
          '<div class="m-entry-info">' +
            '<div class="m-entry-desc">' + escapeHtml(order.pay_to_name||'—') + '</div>' +
            '<div class="m-entry-meta">' + escapeHtml(order.order_id) + ' · ' + formatAmount_(remaining) + ' ' + escapeHtml(order.currency||'') + '</div>' +
          '</div>' +
          '<button onclick="executeOrderDirect_(\'' + escapeHtml(order.order_id) + '\')" ' +
            'style="background:var(--color-out-bg);border:1px solid var(--color-out-border);color:var(--color-out);font-size:12px;min-height:32px;padding:4px 12px;border-radius:6px;cursor:pointer">Izvrši</button>' +
        '</div>';
      }).join('');
      updateTabCounts_(null, result.length);
    }, { quiet: true });
  }

  function loadDesktopNalozi_() {
    callApi('apiListPaymentOrders', [{}], function(result) {
      PAYMENT_ORDERS_STATE.records = Array.isArray(result) ? result.map(normalizePaymentOrder_) : [];
      PAYMENT_ORDERS_STATE.page = 1;
      populatePaymentOrderFilters_();
      renderPaymentOrdersOverview_();
      loadDesktopNavBadges_();
    }, { quiet: true });
  }

  function normalizePaymentOrder_(order) {
    order = order || {};
    var amountOrdered = Number(order.amount_ordered || order.amount || 0);
    var amountPaid = Number(order.amount_paid || 0);
    var remaining = Math.max(0, amountOrdered - amountPaid);
    return {
      raw: order,
      id: order.order_id || order.id || '',
      date: order.issued_at || order.created_at || order.updated_at || '',
      createdAt: order.created_at || '',
      issuedAt: order.issued_at || '',
      executedAt: order.executed_at || order.paid_at || '',
      issuer: order.issued_by || order.created_by || '',
      recipient: order.pay_to_name || order.recipient_name || order.requested_for_name || '',
      cashbox: order.cashbox_id || '',
      basis: order.purpose || order.payment_basis || order.description || '',
      amountOrdered: amountOrdered,
      amountPaid: amountPaid,
      remaining: remaining,
      currency: order.currency || '',
      status: order.status || '',
      dueDate: order.due_date || order.payment_due_date || '',
      sourceRequestId: order.source_request_id || '',
      cashEventId: order.linked_cash_event_id || order.cash_event_id || '',
      note: order.note || order.rejection_reason || ''
    };
  }

  function paymentOrderStatusLabel_(status) {
    var map = {
      DRAFT: 'NACRT',
      ISSUED: 'ČEKA ISPLATU',
      WAITING_PAYMENT: 'ČEKA ISPLATU',
      PARTIALLY_PAID: 'DELIMIČNO',
      PAID: 'ISPLAĆEN',
      CLOSED: 'ISPLAĆEN',
      IN_PROGRESS: 'U OBRADI',
      REJECTED: 'ODBIJEN',
      REJECTED_BY_CASHIER: 'ODBIJEN',
      CANCELLED: 'PONIŠTEN'
    };
    return map[status] || status || '—';
  }

  function paymentOrderStatusClass_(status) {
    if (status === 'PAID' || status === 'CLOSED') return 'po-status-paid';
    if (status === 'REJECTED' || status === 'REJECTED_BY_CASHIER') return 'po-status-rejected';
    if (status === 'CANCELLED') return 'po-status-cancelled';
    if (status === 'IN_PROGRESS' || status === 'PARTIALLY_PAID') return 'po-status-processing';
    return 'po-status-waiting';
  }

  function populatePaymentOrderFilters_() {
    populatePaymentOrderSelect_('d-order-cashbox-filter', 'Blagajna', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.cashbox; }));
    populatePaymentOrderSelect_('d-order-currency-filter', 'Valuta', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.currency; }));
    populatePaymentOrderSelect_('d-order-status-filter', 'Status', PAYMENT_ORDERS_STATE.records.map(function(o) { return o.status; }), paymentOrderStatusLabel_);
  }

  function populatePaymentOrderSelect_(id, label, values, formatter) {
    var el = document.getElementById(id);
    if (!el) return;
    var current = el.value;
    var unique = [];
    (values || []).forEach(function(value) {
      if (value && unique.indexOf(value) === -1) unique.push(value);
    });
    unique.sort();
    el.innerHTML = '<option value="">' + escapeHtml(label) + '</option>' + unique.map(function(value) {
      return '<option value="' + escapeHtml(value) + '">' + escapeHtml(formatter ? formatter(value) : value) + '</option>';
    }).join('');
    if (unique.indexOf(current) !== -1) el.value = current;
  }

  function filterPaymentOrders_() {
    var period = (document.getElementById('d-order-period-filter') || {}).value || 'today';
    var search = ((document.getElementById('d-order-search') || {}).value || '').toLowerCase().trim();
    var cashbox = (document.getElementById('d-order-cashbox-filter') || {}).value || '';
    var currency = (document.getElementById('d-order-currency-filter') || {}).value || '';
    var status = (document.getElementById('d-order-status-filter') || {}).value || '';
    var now = new Date();
    var start = null;
    if (period === 'today') {
      start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    } else if (period !== 'all') {
      start = new Date(now.getTime() - (Number(period) || 0) * 24 * 60 * 60 * 1000);
    }
    return PAYMENT_ORDERS_STATE.records.filter(function(order) {
      var d = order.date ? new Date(order.date) : null;
      if (start && d && d < start) return false;
      if (cashbox && order.cashbox !== cashbox) return false;
      if (currency && order.currency !== currency) return false;
      if (status && order.status !== status) return false;
      if (search) {
        var haystack = [order.id, order.recipient, order.issuer, order.basis, order.currency, order.cashbox, order.status].join(' ').toLowerCase();
        if (haystack.indexOf(search) === -1) return false;
      }
      return true;
    });
  }

  function renderPaymentOrdersOverview_() {
    PAYMENT_ORDERS_STATE.filtered = filterPaymentOrders_();
    renderPaymentOrderKpis_();
    renderPaymentOrderTable_();
    var selected = PAYMENT_ORDERS_STATE.filtered.find(function(o) { return o.id === PAYMENT_ORDERS_STATE.selectedId; }) || PAYMENT_ORDERS_STATE.filtered[0] || null;
    PAYMENT_ORDERS_STATE.selectedId = selected ? selected.id : '';
    renderPaymentOrderDetail_(selected);
  }

  function renderPaymentOrderKpis_() {
    var rows = PAYMENT_ORDERS_STATE.filtered;
    var counts = { waiting: 0, paid: 0, rejected: 0, cancelled: 0, processing: 0 };
    rows.forEach(function(order) {
      if (order.status === 'PAID' || order.status === 'CLOSED') counts.paid++;
      else if (order.status === 'REJECTED' || order.status === 'REJECTED_BY_CASHIER') counts.rejected++;
      else if (order.status === 'CANCELLED') counts.cancelled++;
      else if (order.status === 'IN_PROGRESS' || order.status === 'PARTIALLY_PAID') counts.processing++;
      else counts.waiting++;
    });
    setText_('d-order-kpi-total', rows.length);
    setText_('d-order-kpi-waiting', counts.waiting);
    setText_('d-order-kpi-paid', counts.paid);
    setText_('d-order-kpi-rejected', counts.rejected);
    setText_('d-order-kpi-cancelled', counts.cancelled);
    setText_('d-order-kpi-processing', counts.processing);
  }

  function renderPaymentOrderTable_() {
    var target = document.getElementById('d-nalozi-list');
    if (!target) return;
    var rows = PAYMENT_ORDERS_STATE.filtered;
    if (!rows.length) {
      target.innerHTML = '<div class="empty-state"><i class="ti ti-inbox-off" aria-hidden="true"></i><p>Nema naloga za izabrane filtere.</p></div>';
      return;
    }
    var pageSize = PAYMENT_ORDERS_STATE.pageSize;
    var totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    PAYMENT_ORDERS_STATE.page = Math.min(Math.max(1, PAYMENT_ORDERS_STATE.page), totalPages);
    var start = (PAYMENT_ORDERS_STATE.page - 1) * pageSize;
    var visible = rows.slice(start, start + pageSize);
    target.innerHTML =
      '<table class="po-table"><thead><tr>' +
        '<th>Broj naloga</th><th>Datum</th><th>Izdavalac</th><th>Primalac</th><th>Blagajna</th><th>Osnov isplate</th><th>Iznos</th><th>Valuta</th><th>Status</th>' +
      '</tr></thead><tbody>' +
      visible.map(function(order) {
        var selected = order.id === PAYMENT_ORDERS_STATE.selectedId ? ' po-row-selected' : '';
        return '<tr class="po-row' + selected + '" data-order-id="' + escapeHtml(order.id) + '">' +
          '<td><strong>' + escapeHtml(order.id || '—') + '</strong></td>' +
          '<td>' + escapeHtml(formatDateTimeShort_(order.date)) + '</td>' +
          '<td>' + escapeHtml(shortUserLabel_(order.issuer || '—')) + '</td>' +
          '<td>' + escapeHtml(order.recipient || '—') + '</td>' +
          '<td>' + escapeHtml(order.cashbox || '—') + '</td>' +
          '<td>' + escapeHtml(order.basis || '—') + '</td>' +
          '<td class="po-amount">' + escapeHtml(formatAmount_(order.remaining || order.amountOrdered)) + '</td>' +
          '<td>' + escapeHtml(order.currency || '—') + '</td>' +
          '<td><span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span></td>' +
        '</tr>';
      }).join('') +
      '</tbody></table>' +
      '<div class="po-pagination"><span>Prikazano ' + (start + 1) + '–' + (start + visible.length) + ' od ' + rows.length + '</span>' +
        '<button type="button" data-po-page="prev">‹</button><strong>' + PAYMENT_ORDERS_STATE.page + '</strong><button type="button" data-po-page="next">›</button>' +
        '<select id="d-order-page-size"><option value="20">20 po strani</option><option value="50">50 po strani</option></select>' +
      '</div>';
    var pageSizeEl = document.getElementById('d-order-page-size');
    if (pageSizeEl) {
      pageSizeEl.value = String(PAYMENT_ORDERS_STATE.pageSize);
      pageSizeEl.addEventListener('change', function() {
        PAYMENT_ORDERS_STATE.pageSize = Number(this.value) || 20;
        PAYMENT_ORDERS_STATE.page = 1;
        renderPaymentOrderTable_();
      });
    }
    target.querySelectorAll('[data-order-id]').forEach(function(row) {
      row.addEventListener('click', function() {
        PAYMENT_ORDERS_STATE.selectedId = row.getAttribute('data-order-id') || '';
        renderPaymentOrderTable_();
        renderPaymentOrderDetail_(PAYMENT_ORDERS_STATE.filtered.find(function(o) { return o.id === PAYMENT_ORDERS_STATE.selectedId; }) || null);
      });
    });
    target.querySelectorAll('[data-po-page]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var dir = btn.getAttribute('data-po-page');
        PAYMENT_ORDERS_STATE.page += dir === 'next' ? 1 : -1;
        renderPaymentOrderTable_();
      });
    });
  }

  function renderPaymentOrderDetail_(order) {
    var target = document.getElementById('d-order-detail-body');
    if (!target) return;
    if (!order) {
      target.className = 'po-empty-detail';
      target.innerHTML = 'Izaberite nalog iz tabele za prikaz detalja.';
      return;
    }
    target.className = '';
    var isPaid = order.status === 'PAID' || order.status === 'CLOSED';
    var canPay = order.status === 'WAITING_PAYMENT' || order.status === 'PARTIALLY_PAID';
    var canReject = !isPaid && order.status !== 'CANCELLED' && order.status !== 'REJECTED' && order.status !== 'REJECTED_BY_CASHIER';
    var canApprove = order.status === 'DRAFT';
    var amount = order.remaining || order.amountOrdered;
    target.innerHTML =
      '<div class="po-detail-head"><h3>Detalji naloga</h3><span class="po-status ' + paymentOrderStatusClass_(order.status) + '">' + escapeHtml(paymentOrderStatusLabel_(order.status)) + '</span></div>' +
      '<div class="po-detail-grid">' +
        renderPaymentOrderField_('Broj naloga', order.id) +
        renderPaymentOrderField_('Datum i vreme', formatDateTimeShort_(order.date)) +
        renderPaymentOrderField_('Izdavalac', shortUserLabel_(order.issuer || '—')) +
        renderPaymentOrderField_('Primalac', order.recipient) +
        renderPaymentOrderField_('Blagajna', order.cashbox) +
        renderPaymentOrderField_('Valuta', order.currency) +
        renderPaymentOrderField_('Rok za isplatu', formatDateShort_(order.dueDate)) +
        renderPaymentOrderField_('Osnov isplate', order.basis) +
      '</div>' +
      '<div class="po-detail-amount">' + escapeHtml(formatAmount_(amount)) + ' ' + escapeHtml(order.currency || '') + '</div>' +
      '<div class="po-tabs"><span class="active">Pregled</span><span>Povezani dokumenti</span><span>Aktivnosti</span></div>' +
      '<div class="po-detail-columns">' +
        '<div><h4>Tok naloga</h4>' + renderPaymentOrderTimeline_(order) + '</div>' +
        '<div><h4>Povezani dokumenti</h4>' + renderPaymentOrderDocuments_(order) + '</div>' +
      '</div>' +
      '<div class="po-panel-actions">' +
        '<button type="button" id="d-order-open-detail"><i class="ti ti-external-link" aria-hidden="true"></i> Otvori detalje</button>' +
        '<button type="button" id="d-order-approve" ' + (canApprove ? '' : 'disabled') + '><i class="ti ti-check" aria-hidden="true"></i> Odobri</button>' +
        '<button type="button" id="d-order-reject" ' + (canReject ? '' : 'disabled') + '><i class="ti ti-circle-x" aria-hidden="true"></i> Odbij</button>' +
        '<button type="button" id="d-order-pay" ' + (canPay && !isPaid ? '' : 'disabled') + '><i class="ti ti-credit-card" aria-hidden="true"></i> Označi kao isplaćen</button>' +
      '</div>';
    bindPaymentOrderDetailActions_(order);
  }

  function renderPaymentOrderField_(label, value) {
    return '<div class="po-detail-field"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value || '—') + '</strong></div>';
  }

  function renderPaymentOrderTimeline_(order) {
    var items = [
      ['Nalog kreiran', order.createdAt || order.date, order.issuer],
      ['Poslat na odobrenje', order.issuedAt || order.date, order.issuer],
      ['Čeka isplatu', order.date, 'Sistem']
    ];
    if (order.executedAt || order.status === 'PAID' || order.status === 'CLOSED') items.push(['Isplaćen', order.executedAt || order.date, 'Blagajna']);
    if (order.status === 'REJECTED' || order.status === 'REJECTED_BY_CASHIER') items.push(['Odbijen', order.raw.updated_at || order.date, order.issuer]);
    if (order.status === 'CANCELLED') items.push(['Poništen', order.raw.updated_at || order.date, order.issuer]);
    return '<div class="po-timeline">' + items.map(function(item, index) {
      return '<div class="po-timeline-item ' + (index === items.length - 1 ? 'current' : '') + '">' +
        '<span></span><strong>' + escapeHtml(item[0]) + '</strong><small>' + escapeHtml(shortUserLabel_(item[2] || '—')) + ' · ' + escapeHtml(formatDateTimeShort_(item[1])) + '</small>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderPaymentOrderDocuments_(order) {
    var docs = [];
    if (order.sourceRequestId) docs.push(['Zahtev za isplatu', order.sourceRequestId, formatDateShort_(order.date)]);
    if (order.cashEventId) docs.push(['Blagajnički događaj', order.cashEventId, formatDateShort_(order.executedAt || order.date)]);
    if (!docs.length) return '<div class="po-empty-docs">Nema povezanih dokumenata u dostupnim podacima.</div>';
    return '<table class="po-doc-table"><thead><tr><th>Tip dokumenta</th><th>Broj dokumenta</th><th>Datum</th></tr></thead><tbody>' +
      docs.map(function(doc) {
        return '<tr><td>' + escapeHtml(doc[0]) + '</td><td>' + escapeHtml(doc[1]) + '</td><td>' + escapeHtml(doc[2]) + '</td></tr>';
      }).join('') + '</tbody></table>';
  }

  function bindPaymentOrderDetailActions_(order) {
    var open = document.getElementById('d-order-open-detail');
    if (open) open.addEventListener('click', function() {
      showDesktopMessage_('Detaljan prikaz naloga biće povezan sa ekranom za novi/detaljni nalog u narednoj fazi.', 'info');
    });
    var approve = document.getElementById('d-order-approve');
    if (approve) approve.addEventListener('click', function() {
      callApi('apiIssuePaymentOrder', [order.id], function() {
        showDesktopMessage_('Nalog je odobren i poslat na isplatu.', 'success');
        loadDesktopNalozi_();
      });
    });
    var reject = document.getElementById('d-order-reject');
    if (reject) reject.addEventListener('click', function() {
      appPrompt_({
        title: 'Odbijanje naloga',
        message: 'Unesite razlog odbijanja naloga ' + order.id + '.',
        confirmText: 'Odbij nalog',
        placeholder: 'Razlog odbijanja'
      }, function(reason) {
        if (!String(reason || '').trim()) {
          showDesktopMessage_('Razlog odbijanja je obavezan.', 'error');
          return;
        }
        callApi('apiRejectPaymentOrderByCashier', [order.id, reason], function() {
          showDesktopMessage_('Nalog je odbijen.', 'success');
          loadDesktopNalozi_();
        });
      });
    });
    var pay = document.getElementById('d-order-pay');
    if (pay) pay.addEventListener('click', function() {
      appConfirm_({
        title: 'Označi kao isplaćen',
        message: 'Potvrđujete izvršenje isplate za nalog ' + order.id + '?',
        confirmText: 'Potvrdi isplatu'
      }, function() {
        callApi('apiExecutePaymentOrder', [order.id, {}], function() {
          showDesktopMessage_('Nalog je isplaćen.', 'success');
          loadDesktopNalozi_();
          loadKnjiga_(true);
          refreshBalance_();
        });
      });
    });
  }

  function bindNewPaymentOrderScreen_() {
    if (window.__newPaymentOrderBound) return;
    window.__newPaymentOrderBound = true;
    var form = document.getElementById('new-payment-order-form');
    if (!form) return;
    var back = document.getElementById('new-order-back-btn');
    if (back) back.addEventListener('click', function() { confirmLeaveNewPaymentOrder_(openPaymentOrdersOverview_); });
    var cancel = document.getElementById('new-order-cancel');
    if (cancel) cancel.addEventListener('click', function() { confirmLeaveNewPaymentOrder_(openPaymentOrdersOverview_); });
    var save = document.getElementById('new-order-save-draft');
    if (save) save.addEventListener('click', function() { saveNewPaymentOrderDraft_(); });
    var issue = document.getElementById('new-order-issue');
    if (issue) issue.addEventListener('click', issueNewPaymentOrder_);
    var file = document.getElementById('new-order-file');
    if (file) file.addEventListener('change', handleNewOrderFiles_);
    form.querySelectorAll('input,select,textarea').forEach(function(input) {
      input.addEventListener('input', function() {
        NEW_PAYMENT_ORDER_STATE.dirty = true;
        if (input.id === 'new-order-note') updateNewOrderNoteCounter_();
        clearNewOrderFieldError_(input.id);
        renderNewOrderSummary_();
      });
      input.addEventListener('change', function() {
        NEW_PAYMENT_ORDER_STATE.dirty = true;
        clearNewOrderFieldError_(input.id);
        renderNewOrderSummary_();
      });
    });
    var amount = document.getElementById('new-order-amount');
    if (amount) {
      amount.addEventListener('focus', function() {
        var value = parseAmountInput_(amount.value);
        amount.value = value ? String(value).replace('.', ',') : '';
      });
      amount.addEventListener('blur', function() {
        var value = parseAmountInput_(amount.value);
        amount.value = value ? formatAmount_(value) : '';
        renderNewOrderSummary_();
      });
    }
  }

  function openNewPaymentOrderScreen_() {
    document.querySelectorAll('.d-section').forEach(function(section) {
      section.classList.toggle('active', section.id === 'd-section-nalog-novi');
    });
    document.querySelectorAll('[data-d-nav]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-d-nav') === 'nalozi');
    });
    updateDesktopDirectActionsVisibility_();
    resetNewPaymentOrderForm_();
  }

  function openPaymentOrdersOverview_() {
    openDesktopSection_('nalozi');
    loadDesktopNalozi_();
  }

  function resetNewPaymentOrderForm_() {
    var form = document.getElementById('new-payment-order-form');
    if (!form) return;
    NEW_PAYMENT_ORDER_STATE.savedOrderId = '';
    NEW_PAYMENT_ORDER_STATE.status = 'PENDING_SEND';
    NEW_PAYMENT_ORDER_STATE.dirty = false;
    NEW_PAYMENT_ORDER_STATE.attachments = [];
    NEW_PAYMENT_ORDER_STATE.activities = [];
    clearAllNewOrderErrors_();
    var now = new Date();
    setNewOrderValue_('new-order-number', 'NI-' + now.getFullYear() + '-PRIPREMA');
    setNewOrderValue_('new-order-date', toDateTimeLocal_(now));
    setNewOrderValue_('new-order-issuer', newOrderCurrentUserName_());
    setNewOrderValue_('new-order-recipient', '');
    setNewOrderValue_('new-order-amount', '');
    setNewOrderValue_('new-order-purpose', '');
    setNewOrderValue_('new-order-due-date', toInputDate_(new Date(now.getTime() + 24 * 60 * 60 * 1000)));
    setNewOrderValue_('new-order-note', '');
    populateNewOrderSelects_();
    populateNewOrderDatalists_();
    addNewOrderActivity_('Kreiran dokument', 'Nalog je pripremljen za unos.');
    updateNewOrderNoteCounter_();
    renderNewOrderAttachments_();
    renderNewOrderSummary_();
    renderNewOrderTimeline_();
    renderNewOrderActivities_();
    updateNewOrderStatusBadge_();
  }

  function populateNewOrderSelects_() {
    var cashbox = document.getElementById('new-order-cashbox');
    if (cashbox) {
      var cashboxes = uiState.config.cashboxes || [{ cashbox_id: SESSION.cashboxId || 'CB_MAIN', name: SESSION.cashboxName || 'Glavna blagajna' }];
      cashbox.innerHTML = cashboxes.map(function(item) {
        return '<option value="' + escapeHtml(item.cashbox_id) + '">' + escapeHtml(item.name || item.cashbox_id) + '</option>';
      }).join('');
      cashbox.value = SESSION.cashboxId || (cashboxes[0] && cashboxes[0].cashbox_id) || '';
    }
    var currency = document.getElementById('new-order-currency');
    if (currency) {
      var currencies = uiState.config.currencies || [SESSION.currency || 'RSD'];
      currency.innerHTML = currencies.map(function(code) {
        return '<option value="' + escapeHtml(code) + '">' + escapeHtml(code) + '</option>';
      }).join('');
      currency.value = SESSION.currency || currencies[0] || 'RSD';
    }

  function populateNewOrderDatalists_() {
    var recipientList = document.getElementById('new-order-recipient-list');
    if (recipientList) {
      var recipients = PAYMENT_ORDERS_STATE.records.map(function(o) { return o.recipient; }).filter(Boolean);
      ['Petar Petrović', 'Ana Jovanović', 'Dobavljač AS DOO', 'Jelena Marković'].forEach(function(name) {
        if (recipients.indexOf(name) === -1) recipients.push(name);
      });
      recipientList.innerHTML = recipients.slice(0, 30).map(function(name) {
        return '<option value="' + escapeHtml(name) + '"></option>';
      }).join('');
    }
    var purposeList = document.getElementById('new-order-purpose-list');
    if (purposeList) {
      purposeList.innerHTML = [
        'Akontacija za službeni put',
        'Isplata dobavljaču',
        'Plaćanje računa',
        'Dnevnice',
        'Refundacija troškova',
        'Povraćaj sredstava',
        'Isplata zarade'
      ].map(function(value) {
        return '<option value="' + escapeHtml(value) + '"></option>';
      }).join('');
    }
  }

  function collectNewPaymentOrderData_() {
    return {
      cashbox_id: valueOf_('new-order-cashbox'),
      pay_to_name: valueOf_('new-order-recipient'),
      amount_ordered: parseAmountInput_(valueOf_('new-order-amount')),
      currency: valueOf_('new-order-currency'),
      purpose: valueOf_('new-order-purpose'),
      due_date: valueOf_('new-order-due-date'),
      description: valueOf_('new-order-note'),
      document_status: NEW_PAYMENT_ORDER_STATE.attachments.length ? 'ATTACHED' : 'NONE'
    };
  }

  function validateNewPaymentOrder_() {
    clearAllNewOrderErrors_();
    var data = collectNewPaymentOrderData_();
    var ok = true;
    if (!data.cashbox_id) ok = setNewOrderFieldError_('new-order-cashbox', 'Izaberite blagajnu.') && false;
    if (!data.pay_to_name) ok = setNewOrderFieldError_('new-order-recipient', 'Unesite primaoca isplate.') && false;
    if (!data.amount_ordered || data.amount_ordered <= 0) ok = setNewOrderFieldError_('new-order-amount', 'Unesite iznos veći od nule.') && false;
    if (!data.currency) ok = setNewOrderFieldError_('new-order-currency', 'Izaberite valutu.') && false;
    if (!data.purpose) ok = setNewOrderFieldError_('new-order-purpose', 'Unesite osnov isplate.') && false;
    if (!valueOf_('new-order-date')) ok = setNewOrderFieldError_('new-order-date', 'Unesite datum i vreme.') && false;
    if (!ok) showDesktopMessage_('Popunite obavezna polja pre čuvanja naloga.', 'error');
    return ok;

  function saveNewPaymentOrderDraft_(afterSave) {
    if (!validateNewPaymentOrder_()) return;
    if (NEW_PAYMENT_ORDER_STATE.savedOrderId) {
      addNewOrderActivity_('Sačuvan nacrt', 'Nalog ' + NEW_PAYMENT_ORDER_STATE.savedOrderId + ' je već sačuvan.');
      NEW_PAYMENT_ORDER_STATE.dirty = false;
      renderNewOrderActivities_();
      showDesktopMessage_('Nacrt je već sačuvan. Izmene postojećeg nacrta će biti dostupne u narednoj fazi.', 'info');
      if (afterSave) afterSave(NEW_PAYMENT_ORDER_STATE.savedOrderId);
      return;
    }
    callApi('apiCreateDirectPaymentOrder', [collectNewPaymentOrderData_()], function(result) {
      var orderId = result && result.order_id || result && result.id || '';
      NEW_PAYMENT_ORDER_STATE.savedOrderId = orderId;
      NEW_PAYMENT_ORDER_STATE.status = 'DRAFT';
      NEW_PAYMENT_ORDER_STATE.dirty = false;
      if (orderId) setNewOrderValue_('new-order-number', orderId);
      addNewOrderActivity_('Sačuvan nacrt', 'Nacrt naloga je sačuvan.');
      updateNewOrderStatusBadge_();
      renderNewOrderSummary_();
      renderNewOrderTimeline_();
      renderNewOrderActivities_();
      if (afterSave) afterSave(orderId);
    }, { successMessage: 'Nacrt naloga je sačuvan.' });
  }

  function issueNewPaymentOrder_() {
    if (!validateNewPaymentOrder_()) return;
    appConfirm_({
      title: 'Izdavanje naloga',
      message: 'Da li ste sigurni da želite da izdate nalog blagajni? Nakon izdavanja, blagajnik će videti nalog i moći će da ga izvrši.',
      confirmText: 'Izdaj nalog'
    }, function() {
      var issueSaved = function(orderId) {
        if (!orderId) {
          showDesktopMessage_('Nalog nije sačuvan i ne može biti izdat.', 'error');
          return;
        }
        callApi('apiIssuePaymentOrder', [orderId], function() {
          NEW_PAYMENT_ORDER_STATE.status = 'WAITING_PAYMENT';
          NEW_PAYMENT_ORDER_STATE.dirty = false;
          addNewOrderActivity_('Izdat nalog', 'Nalog je poslat blagajni na isplatu.');
          showDesktopMessage_('Nalog je izdat i čeka isplatu.', 'success');
          openPaymentOrdersOverview_();
        }, { successMessage: 'Nalog je izdat.' });
      };
      if (NEW_PAYMENT_ORDER_STATE.savedOrderId) {
        issueSaved(NEW_PAYMENT_ORDER_STATE.savedOrderId);
      } else {
        saveNewPaymentOrderDraft_(issueSaved);
      }
    });
  }

  function handleNewOrderFiles_(event) {
    var files = Array.prototype.slice.call(event.target.files || []);
    files.forEach(function(file) {
      var okType = /\.(pdf|jpg|jpeg|png)$/i.test(file.name || '');
      if (!okType) {
        showDesktopMessage_('Prilog nije dodat: dozvoljeni su PDF, JPG i PNG fajlovi.', 'error');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showDesktopMessage_('Prilog nije dodat: maksimalna veličina je 10 MB.', 'error');
        return;
      }
      NEW_PAYMENT_ORDER_STATE.attachments.push({
        id: 'att-' + Date.now() + '-' + Math.random().toString(16).slice(2),
        name: file.name,
        size: file.size,
        type: file.type || 'file'
      });
      addNewOrderActivity_('Dodat prilog', 'Dodat prilog: ' + file.name);
      NEW_PAYMENT_ORDER_STATE.dirty = true;
    });
    event.target.value = '';
    renderNewOrderAttachments_();
    renderNewOrderActivities_();
    renderNewOrderSummary_();
  }

        '<i class="ti ti-file-type-pdf" aria-hidden="true"></i>' +
