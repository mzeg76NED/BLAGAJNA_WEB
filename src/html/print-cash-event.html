<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('html/print-styles'); ?>
  </head>
  <body>
    <? var data = printData || {}; var header = data.printHeader || {}; var event = data.event || {}; var cashbox = data.cashbox || {}; var order = data.linkedOrder || {}; var request = data.linkedRequest || {}; var documents = data.documents || []; ?>
    <main class="print-page">
      <div class="print-actions no-print">
        <button type="button" onclick="window.print()">Štampaj / Sačuvaj kao PDF</button>
      </div>
      <header class="print-header">
        <div class="brand"><?= header.appName ?></div>
        <div><?= header.subtitle ?></div>
        <div class="muted"><?= header.companyName ?></div>
      </header>

      <h1>Blagajnički događaj</h1>
      <section class="field-grid">
        <div class="field"><span class="label">ID događaja</span><?= event.event_id ?></div>
        <div class="field"><span class="label">Status</span><?= event.status ?></div>
        <div class="field"><span class="label">Datum</span><?= event.event_date ?></div>
        <div class="field"><span class="label">Tip</span><?= event.event_type ?></div>
        <div class="field"><span class="label">Blagajna</span><?= cashbox.name || event.cashbox_id ?></div>
        <div class="field"><span class="label">Smer</span><?= event.direction ?></div>
        <div class="field"><span class="label">Iznos</span><?= event.amount ?> <?= event.currency ?></div>
        <div class="field"><span class="label">Partner</span><?= event.partner_name ?></div>
        <div class="field"><span class="label">Nalog</span><?= order.order_id || event.linked_order_id ?></div>
        <div class="field"><span class="label">Zahtev</span><?= request.request_id || event.linked_request_id ?></div>
        <div class="field"><span class="label">Knjižio</span><?= event.posted_by ?></div>
        <div class="field"><span class="label">Knjiženo</span><?= event.posted_at ?></div>
      </section>

      <h2>Opis</h2>
      <p><?= event.description ?></p>
      <h2>Dokumenti</h2>
      <table>
        <thead><tr><th>ID</th><th>Naziv fajla</th><th>Status</th><th>Link</th></tr></thead>
        <tbody>
          <? if (documents.length === 0) { ?><tr><td colspan="4">Nema dokumenata.</td></tr><? } ?>
          <? documents.forEach(function(documentRecord) { ?>
            <tr><td><?= documentRecord.document_id ?></td><td><?= documentRecord.file_name ?></td><td><?= documentRecord.status ?></td><td><?= documentRecord.file_url ?></td></tr>
          <? }); ?>
        </tbody>
      </table>

      <div class="signature-grid"><div class="signature-line">Blagajnik</div><div class="signature-line">Primalac / predavalac</div></div>
      <footer class="print-footer">
        <div>Generisano: <?= header.generatedAt ?> · Korisnik: <?= header.generatedBy ?> · Izvor: <?= header.sourceType ?> <?= header.sourceId ?></div>
        <div><?= header.note ?></div>
      </footer>
    </main>
  </body>
</html>
