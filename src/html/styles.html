<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {

    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #172033;
  }

    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #f4f6f8;
  }

  .app-shell,
  .mobile-shell,
  .desktop-shell {
    min-height: 100vh;
    padding: 20px;
  }

  .mobile-shell {
    padding-bottom: 86px;
  }

  .app-shell {

    align-content: center;
    gap: 18px;
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    display: grid;
    gap: 6px;
    margin-bottom: 18px;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  h1 {
    font-size: 28px;
    line-height: 1.15;
  }

  h2 {
    font-size: 21px;
    line-height: 1.2;
  }

  h3 {
    font-size: 16px;
    line-height: 1.25;
  }

  .muted {
    color: #667085;
    font-size: 14px;
  }

  .top-bar {
    align-items: center;
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .button-grid,
  .desktop-nav,
  .dashboard-grid {

    padding: 12px;
  }

  }

    border-radius: 8px;
    background: #ffffff;
    color: #172033;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    min-height: 44px;
    padding: 12px 14px;
    text-align: center;
    text-decoration: none;
  }

  button i,
  a.button-link i {
    font-size: 18px;
    vertical-align: -2px;
  }

  button:hover,
  a.button-link:hover {
    background: #eef3f8;
  }

  button.primary {

    border-color: #165dff;
    color: #ffffff;

  button.danger {
    border-color: #f0b8b8;
    color: #9f1d1d;
  }

  button.small {
    font-size: 13px;
    min-height: 34px;
    padding: 7px 10px;

  .section {

  }

    gap: 14px;
  }

    border: 1px solid #d6dde6;
    border-radius: 8px;
    display: grid;
    gap: 12px;
    padding: 14px;

    display: grid;
    gap: 10px;
  }

  label {

    gap: 5px;
    font-size: 13px;
    font-weight: 700;
  }

  select,
  textarea {

    border-radius: 8px;
    font: inherit;
    min-height: 42px;
    padding: 10px;
    width: 100%;
  }

  textarea {
    min-height: 86px;
    resize: vertical;

    flex-wrap: wrap;

    font-weight: 700;
    padding: 12px;

  }

  .message.error {

    color: #9f1d1d;
  }

  .message.info {

    border: 1px solid #bfd1ff;
    color: #17479e;
  }

    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

    background: #f0f3f7;
    border: 1px solid #d6dde6;

    gap: 8px;
    padding: 12px;
  }

  .record-title {
    font-weight: 800;
  }

  .badge {

    background: #edf2f7;
    border-radius: 999px;
    display: inline-flex;
    font-size: 12px;
    font-weight: 800;
    gap: 4px;
    padding: 4px 8px;
  }

  .badge-submitted,
  .badge-in-review,
  .badge-open { background: #eef4ff; color: #1a56db; }
  .badge-approved,
  .badge-paid,
  .badge-posted { background: #e9f8ef; color: #176332; }

  .badge-cancelled,
  .badge-reversed,
  .badge-urgent { background: #fff0f0; color: #9f1d1d; }

  .badge-locked { background: #f5f3ff; color: #5b21b6; }
  .badge-closed { background: #f0f3f7; color: #4b5563; }

    border-left: 4px solid #165dff;
  }

  .empty-state {

    color: #667085;
    display: flex;
    flex-direction: column;
    font-size: 14px;
    gap: 8px;
    padding: 30px 16px;
    text-align: center;
  }

  .empty-state i {
    font-size: 32px;
  }

    align-items: center;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 8px;

    display: flex;
    gap: 12px;
    padding: 12px 14px;

  .alert-card i {

    flex-shrink: 0;

    font-size: 13px;
    font-weight: 800;
  }

  .alert-sub {

    font-size: 12px;
    margin-top: 2px;
  }

    border-top: 1px solid #d6dde6;

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    left: 0;
    padding: 6px 0 10px;
    position: fixed;
    right: 0;
    z-index: 10;
  }

    background: none;
    border: none;
    border-radius: 0;
    color: #667085;

    flex-direction: column;

    font-weight: 800;
    gap: 3px;
    min-height: 0;
    padding: 6px 4px;

    font-weight: 800;

    padding: 1px 5px;

    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));

    background: #ffffff;
    border: 1px solid #d6dde6;
    border-radius: 8px;
    padding: 14px 16px;
  }

  .kpi-label {
    align-items: center;
    color: #667085;
    display: flex;
    font-size: 12px;
    gap: 5px;
  }

  .kpi-value {
    color: #172033;
    font-size: 26px;

    font-weight: 800;
    margin-top: 6px;
  }

  .kpi-sub {
    color: #667085;
    font-size: 11px;
    margin-top: 2px;
  }

  .kpi-danger .kpi-value { color: #9f1d1d; }

  .detail-row {
    align-items: center;
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }

  .detail-key {
    color: #667085;

    display: flex;
    flex-wrap: wrap;
    gap: 8px;

    background: #edf2f7;

    color: #344054;
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 8px;
  }

  td {

  @media (max-width: 960px) {
    .desktop-two-col {
      grid-template-columns: 1fr;
    }

    .kpi-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
