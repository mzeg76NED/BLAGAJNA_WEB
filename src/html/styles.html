<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --color-in: #176332;
    --color-in-bg: #e9f8ef;
    --color-in-border: #a8dfb8;
    --color-out: #9f1d1d;
    --color-out-bg: #fff0f0;
    --color-out-border: #e6b8b8;
    --color-text: #172033;
    --color-text-muted: #667085;
    --color-text-hint: #9aa3b0;
    --color-bg: #f4f6f8;
    --color-surface: #ffffff;
    --color-border: #d6dde6;
    --color-border-light: #eef0f4;
    --color-primary: #165dff;
    --color-primary-bg: #eef4ff;
    --color-warning: #8a5a00;
    --color-warning-bg: #fff6d8;
    --color-warning-border: #f0c85d;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --mobile-scale: 1;
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --color-in: #5ad27d;
    --color-in-bg: #0f2a1b;
    --color-in-border: #2f7b49;
    --color-out: #ff7a7a;
    --color-out-bg: #321719;
    --color-out-border: #8b3c3f;
    --color-text: #f2f5f9;
    --color-text-muted: #aeb8c6;
    --color-text-hint: #7d8999;
    --color-bg: #0f1319;
    --color-surface: #171c24;
    --color-border: #333d4b;
    --color-border-light: #242c38;
    --color-primary: #7aa2ff;
    --color-primary-bg: #172543;
    --color-warning: #ffd36a;
    --color-warning-bg: #31270f;
    --color-warning-border: #7b6422;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  html {
    color-scheme: light;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, p {
    margin: 0;
  }

  h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
  h2 { font-size: 18px; font-weight: 700; line-height: 1.3; }
  h3 { font-size: 15px; font-weight: 700; line-height: 1.3; }

  .muted {
    color: var(--color-text-muted);
    font-size: 13px;
  }

  /* ─── Buttons ─────────────────────────────────────────── */

  button, a.button-link {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    cursor: pointer;
    display: inline-flex;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    gap: 6px;
    justify-content: center;
    min-height: 40px;
    padding: 8px 14px;
    text-align: center;
    text-decoration: none;
    transition: background 0.12s, opacity 0.12s;
  }

  button i, a.button-link i {
    font-size: 17px;
    flex-shrink: 0;
  }

  button:hover, a.button-link:hover {
    background: #eef3f8;
  }

  input,
  select,
  textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
  }

  :root[data-theme="dark"] input,
  :root[data-theme="dark"] select,
  :root[data-theme="dark"] textarea {
    background: #111821;
    color: var(--color-text);
    color-scheme: dark;
  }

  :root[data-theme="dark"] select option {
    background: #171c24;
    color: #f2f5f9;
  }

  :root[data-theme="dark"] button:hover,
  :root[data-theme="dark"] a.button-link:hover {
    background: #202938;
  }

  button.small {
    font-size: 12px;
    min-height: 32px;
    padding: 5px 10px;
  }

  .btn-in {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
    color: var(--color-in);
  }
  .btn-in:hover { background: #d3f2e0; }
  :root[data-theme="dark"] .btn-in:hover { background: #173b27; }

  .btn-out {
    background: var(--color-out-bg);
    border-color: var(--color-out-border);
    color: var(--color-out);
  }
  .btn-out:hover { background: #fde0e0; }
  :root[data-theme="dark"] .btn-out:hover { background: #482023; }

  .btn-primary, button.primary {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }
  .btn-primary:hover, button.primary:hover { background: #1250e0; }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--color-text-muted);
  }
  .btn-ghost:hover { background: var(--color-bg); }

  .btn-full { width: 100%; }
  .btn-lg { min-height: 48px; font-size: 15px; }

  button.danger {
    border-color: var(--color-out-border);
    color: var(--color-out);
  }

  /* ─── Forms ───────────────────────────────────────────── */

  input, select, textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-family: inherit;
    font-size: 14px;
    min-height: 40px;
    padding: 8px 10px;
    width: 100%;
  }

  textarea { min-height: 80px; resize: vertical; }

  input:focus, select:focus, textarea:focus {
    border-color: var(--color-primary);
    outline: none;
  }

  label {
    display: grid;
    font-size: 12px;
    font-weight: 700;
    gap: 4px;
  }

  .form-grid { display: grid; gap: 10px; }
  .form-row-2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ─── Cards ───────────────────────────────────────────── */

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    display: grid;
    gap: 12px;
    padding: 16px;
  }

  .card-head {
    align-items: center;
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin: -16px -16px 0;
    padding: 12px 16px;
  }

  .card-head h2, .card-head h3 {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }

  .card-body { display: grid; gap: 10px; }

  /* ─── Badges ──────────────────────────────────────────── */

  .badge {
    align-items: center;
    border-radius: 999px;
    display: inline-flex;
    font-size: 11px;
    font-weight: 800;
    gap: 3px;
    padding: 3px 8px;
  }

  .badge-in    { background: var(--color-in-bg);   color: var(--color-in);  border: 1px solid var(--color-in-border); }
  .badge-out   { background: var(--color-out-bg);  color: var(--color-out); border: 1px solid var(--color-out-border); }
  .badge-draft { background: #f0f3f7; color: #4b5563; }
  .badge-submitted, .badge-in-review, .badge-open { background: var(--color-primary-bg); color: #1a56db; }
  .badge-approved, .badge-paid, .badge-posted { background: var(--color-in-bg); color: var(--color-in); }
  .badge-rejected, .badge-cancelled, .badge-reversed, .badge-urgent { background: var(--color-out-bg); color: var(--color-out); }
  .badge-waiting, .badge-difference { background: #fffbeb; color: #92400e; }
  .badge-partially { background: #fff7ed; color: #c2410c; }
  .badge-locked { background: #f5f3ff; color: #5b21b6; }
  .badge-closed { background: #f0f3f7; color: #4b5563; }

  /* ─── Book table ──────────────────────────────────────── */

  .book-table {
    border-collapse: collapse;
    font-size: 13px;
    min-width: 560px;
    width: 100%;
  }

  .book-table th {
    background: #f0f3f7;
    border-bottom: 2px solid var(--color-border);
    font-size: 11px;
    font-weight: 800;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 3;
  }

  .book-table .total-row-top td {
    position: sticky;
    top: 33px;
    z-index: 3;
  }

  :root[data-theme="dark"] .book-table th {
    background: #202733;
  }

  .book-table th.num, .book-table td.num { text-align: right; }

  .book-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    vertical-align: middle;
  }

  .book-table tr:hover td { background: #f7f9fc; }
  :root[data-theme="dark"] .book-table tr:hover td { background: #1d2530; }

  .book-table tr.selected td { background: var(--color-primary-bg); }

  .row-in td { border-left: 3px solid var(--color-in); }
  .row-out td { border-left: 3px solid var(--color-out); }
  .row-opening td { border-left: 3px solid var(--color-primary); }
  .row-count td {
    border-left: 3px solid #d99a00;
  }

  .row-in { background: #fafffe; }
  .row-out { background: #fffafa; }
  :root[data-theme="dark"] .row-in,
  :root[data-theme="dark"] .row-out {
    background: transparent;
  }
  :root[data-theme="dark"] .row-count td {
    border-left-color: #f4c542;
  }

  .cell-in  { color: var(--color-in);  font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-out { color: var(--color-out); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-bal { color: var(--color-text); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-dash { color: var(--color-text-hint); text-align: right; }

  .total-row td {
    background: #f0f3f7;
    border-top: 2px solid var(--color-border);
    font-size: 12px;
    font-weight: 800;
    padding: 10px 12px;
  }

  :root[data-theme="dark"] .total-row td {
    background: #202733;
  }

  .desc-main { font-weight: 600; }
  .desc-reason { color: var(--color-text); font-size: 12px; margin-top: 2px; overflow-wrap: anywhere; }
  .desc-sub  { color: var(--color-text-muted); font-size: 11px; margin-top: 2px; }

  .table-wrap { overflow: auto; }

  .knjiga-main {
    display: flex;
    flex-direction: column;
    max-height: calc(100dvh - 132px);
  }

  .knjiga-main .card-head {
    align-items: center;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .knjiga-main .table-wrap {
    flex: 1;
  }

  .knjiga-context {
    color: var(--color-text-muted);
    flex-basis: 100%;
    font-size: 12px;
    font-weight: 700;
  }

  .knjiga-total-strip,
  .m-traffic-summary {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: flex;
    flex-basis: 100%;
    flex-wrap: wrap;
    gap: 10px 16px;
    padding: 8px 10px;
  }

  .knjiga-total-strip span,
  .m-traffic-summary span {
    display: inline-flex;
    gap: 6px;
    white-space: nowrap;
  }

  .report-total-strip {
    margin-bottom: 8px;
  }

  .shift-current-label {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 12px;
  }

  .shift-status-body {
    display: grid;
    gap: 10px;
  }

  .shift-state {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 4px;
    padding: 12px;
  }

  .shift-state strong {
    font-size: 16px;
  }

  .shift-state.active {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
  }

  .shift-state.empty {
    background: var(--color-primary-bg);
  }

  .shift-info-table {
    border-collapse: collapse;
    width: 100%;
  }

  .shift-info-table th,
  .shift-info-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 9px 10px;
    text-align: left;
    vertical-align: top;
  }

  .shift-info-table th {
    color: var(--color-text-muted);
    font-size: 12px;
    width: 135px;
  }

  .shift-table tbody tr {
    cursor: pointer;
  }

  .shift-table tbody tr:hover td {
    background: var(--color-primary-bg);
  }

  .balance-pill {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border-light);
    border-radius: 999px;
    display: inline-flex;
    font-weight: 800;
    margin: 0 6px 6px 0;
    padding: 4px 9px;
  }

  .shift-warning {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    border-radius: var(--radius-md);
    color: var(--color-out);
    font-weight: 800;
    margin-top: 8px;
    padding: 10px 12px;
  }

  .is-disabled-flow {
    opacity: 0.55;
  }

  .denomination-grid,
  .cash-count-entry-area {
    display: grid;
    gap: 8px;
  }

  .count-entry-form {
    align-items: end;
    display: grid;
    gap: 10px;
    grid-template-columns: minmax(220px, 1fr) minmax(160px, 1fr) 120px;
    max-width: 860px;
  }

  .count-add-control {
    align-self: end;
    display: flex;
    min-height: 46px;
  }

  .count-add-control span {
    display: none;
  }

  .count-add-control button {
    min-height: 46px;
    width: 100%;
  }

  .shift-inline-actions {
    margin-top: 10px;
  }

  #d-cash-count-form {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }

  #d-cash-count-form > label:first-of-type {
    max-width: 320px;
  }

  #d-cash-count-form > label textarea {
    min-height: 52px;
  }

  .count-table {
    border-collapse: collapse;
    margin-top: 10px;
    width: 100%;
  }

  .count-table th,
  .count-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    text-align: left;
  }

  .count-table th {
    background: var(--color-warning-bg);
    color: var(--color-warning);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  @media (max-width: 760px) {
    .count-entry-form {
      grid-template-columns: 1fr 1fr;
    }

    .count-entry-form .btn-primary {
      grid-column: 1 / -1;
      min-height: 52px;
    }

    .count-add-control {
      grid-column: 1 / -1;
    }

    #d-cash-count-form {
      grid-template-columns: 1fr;
    }

    #d-cash-count-form > label:first-of-type,
    #d-cash-count-form .cash-count-entry-area {
      grid-column: 1 / -1;
    }
  }

  .denomination-row {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: grid;
    gap: 6px;
    grid-template-columns: auto minmax(0, 1fr);
    padding: 8px;
  }

  .denomination-row span {
    font-weight: 800;
  }

  .cash-count-total {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 18px;
    font-weight: 900;
    padding: 12px;
  }

  .permission-card p {
    color: var(--color-text-muted);
    font-size: 13px;
    margin-top: 0;
  }

  /* ─── Empty state ─────────────────────────────────────── */

  .empty-state {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 13px;
    gap: 8px;
    padding: 32px 16px;
    text-align: center;
  }

  .empty-state i { font-size: 32px; }

  /* ─── Skeleton ────────────────────────────────────────── */

  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .skeleton {
    animation: shimmer 1.2s ease-in-out infinite;
    background: linear-gradient(90deg, #e8ecf0 25%, #f0f3f7 50%, #e8ecf0 75%);
    background-size: 800px 100%;
    border-radius: var(--radius-sm);
    display: block;
  }

  :root[data-theme="dark"] .skeleton {
    background: linear-gradient(90deg, #202733 25%, #2a3442 50%, #202733 75%);
    background-size: 800px 100%;
  }

  /* ─── Spinner ─────────────────────────────────────────── */

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  /* ─── Message ─────────────────────────────────────────── */

  .message {
    border-radius: var(--radius-md);
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.18);
    display: none;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    max-width: min(520px, calc(100vw - 32px));
    padding: 10px 14px;
    pointer-events: none;
    position: fixed;
    right: 20px;
    top: 72px;
    z-index: 700;
  }

  .message.show { display: block; }

  #m-message {
    left: 12px;
    max-width: none;
    right: 12px;
    top: max(12px, env(safe-area-inset-top));
  }

  .message.success {
    background: var(--color-in-bg);
    border: 1px solid var(--color-in-border);
    color: var(--color-in);
  }

  .message.error {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    color: var(--color-out);
  }

  .message.info {
    background: var(--color-primary-bg);
    border: 1px solid #bfd1ff;
    color: #17479e;
  }

  :root[data-theme="dark"] .message.info {
    background: #12243f;
    border-color: #3867b7;
    color: #bfdbfe;
  }

  :root[data-theme="dark"] .message.success {
    background: #0d281a;
    border-color: #1f8f55;
    color: #8af0b5;
  }

  :root[data-theme="dark"] .message.error {
    background: #351414;
    border-color: #9f2f2f;
    color: #ffb4b4;
  }

  /* ─── Mobile shell ────────────────────────────────────── */

  .m-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: contain;
  }

  .m-header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-shrink: 0;
    padding: 12px 16px 10px;
    padding-top: max(12px, env(safe-area-inset-top));
    z-index: 20;
  }

  .m-header-balance {
    font-size: 24px;
    font-weight: 800;
    color: var(--color-in);
    line-height: 1.1;
  }

  .m-header-meta {
    color: var(--color-text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .m-header-chips {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .m-chip {
    align-items: center;
    background: #f0f3f7;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    color: #344054;
    display: inline-flex;
    font-size: 12px;
    gap: 5px;
    padding: 4px 10px;
  }

  .m-chip.theme-toggle {
    cursor: pointer;
    min-height: 30px;
  }

  :root[data-theme="dark"] .m-chip,
  :root[data-theme="dark"] .chip-select,
  :root[data-theme="dark"] .summary-label {
    background: #202733;
    color: var(--color-text);
  }

  .m-chip select {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    min-height: 0;
    padding: 0;
    width: auto;
  }

  .m-content {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(180px + env(safe-area-inset-bottom));
  }

  .m-section {
    display: none;
    padding: 14px 14px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
    flex-direction: column;
  }

  .m-section.active {
    display: flex;
  }

  .m-book-tools {
    background: var(--color-bg);
    display: grid;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) auto;
    padding: 0 0 8px;
  }

  .m-book-tools button {
    min-height: 48px;
  }

  .m-traffic-summary {
    margin-bottom: 10px;
  }

  .m-section-actions {
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr;
  }

  .m-section-label {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Mobile entry rows */
  .m-entry {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    gap: 10px;
    padding: 10px 12px;
  }
  .m-entry.count {
    border-color: #e7bd45;
  }
  :root[data-theme="dark"] .m-entry.count {
    border-color: #6f5720;
  }

  .m-entry:active { background: #f4f6f8; }
  :root[data-theme="dark"] .m-entry:active { background: #202733; }

  .m-entry-dot {
    border-radius: 999px;
    flex-shrink: 0;
    height: 10px;
    width: 10px;
  }

  .m-entry-info {
    flex: 1;
    min-width: 0;
  }

  .m-entry-desc {
    font-size: 13px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .m-entry-no {
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }

  .m-entry-meta {
    color: var(--color-text-muted);
    font-size: 11px;
    margin-top: 1px;
  }

  .m-entry-amt {
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Mobile bottom nav */
  .m-bottom-nav {
    background: var(--color-surface);
    border-top: 1px solid var(--color-border-light);
    display: grid;
    flex-shrink: 0;
    grid-template-columns: repeat(5, 1fr);
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    padding-top: 6px;
  }

  .m-tab {
    align-items: center;
    background: none;
    border: none;
    border-radius: 0;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 700;
    gap: 2px;
    min-height: 0;
    padding: 8px 4px;
    position: relative;
  }

  .m-tab i { font-size: 26px; }

  .m-fixed-actions {
    background: linear-gradient(180deg, rgba(244, 246, 248, 0), var(--color-bg) 20%);
    bottom: calc(92px + env(safe-area-inset-bottom));
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(3, 1fr);
    left: 0;
    padding: 12px 12px 10px;
    position: fixed;
    right: 0;
    z-index: 90;
  }

  :root[data-theme="dark"] .m-fixed-actions {
    background: linear-gradient(180deg, rgba(15, 19, 25, 0), var(--color-bg) 20%);
  }

  .m-fixed-actions[hidden] {
    display: none;
  }

  .m-detail-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 160;
  }

  .m-detail-sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-height: 82dvh;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .m-detail-sheet,
  .m-detail-sheet .detail-row,
  .m-detail-sheet .detail-key {
    font-size: 130%;
  }

  .m-detail-actions {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr 1fr;
  }

  .m-detail-actions button {
    align-items: center;
    display: inline-flex;
    font-size: 19px;
    font-weight: 900;
    justify-content: center;
    min-height: 64px;
  }

  .m-detail-actions button i {
    font-size: 24px;
  }

  .m-tab.active { color: var(--color-primary); }

  .m-tab-badge {
    background: var(--color-out-bg);
    border-radius: 999px;
    color: var(--color-out);
    font-size: 10px;
    font-weight: 800;
    left: calc(50% + 4px);
    padding: 1px 5px;
    position: absolute;
    top: 2px;
  }

  /* ─── Bottom sheet ────────────────────────────────────── */

  .sheet-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 100;
  }

  html.mobile-view .sheet-overlay {
    align-items: center;
    padding: 16px 0 calc(120px + env(safe-area-inset-bottom));
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-width: 520px;
    padding: 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .cashsheet-header {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    padding: 12px;
  }

  .cashsheet-header div,
  .cashsheet-calc-row {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 11px;
  }

  .cashsheet-header span,
  .cashsheet-calc-row span {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 800;
  }

  .cashsheet-calc {
    display: grid;
    gap: 6px;
    padding: 0 12px 12px;
  }

  #d-section-presek .count-page-layout {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1.55fr) minmax(420px, 0.9fr);
  }

  #d-section-presek .count-history-panel {
    display: block;
    max-height: none;
  }

  #d-section-presek .count-history-wrap {
    max-height: 520px;
  }

  #d-count-detail-panel {
    position: sticky;
    top: 82px;
  }

  #d-count-detail-wide {
    display: none;
  }

  #d-count-detail-wide.count-detail-body,
  .count-detail-body {
    align-items: stretch;
    display: grid;
    gap: 14px;
    padding: 0;
    text-align: left;
  }

  #d-count-detail-wide .count-detail-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }

  .count-detail-summary {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 12px;
  }

  #d-count-detail-wide .count-detail-summary {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .count-detail-summary > div {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    display: grid;
    gap: 4px;
    padding: 10px 12px;
  }

  .count-detail-summary .detail-key {
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .count-detail-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  #d-count-detail-wide .detail-row {
    justify-content: space-between;
  }

  #d-count-detail-wide .count-table {
    font-size: 13px;
  }

  .count-detail-meta,
  .count-detail-totals {
    border-collapse: collapse;
    width: 100%;
  }

  .count-detail-meta th,
  .count-detail-meta td,
  .count-detail-totals th,
  .count-detail-totals td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 9px 10px;
    text-align: left;
  }

  .count-detail-meta th,
  .count-detail-totals th {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .count-detail-totals .num,
  .count-table .num {
    text-align: right;
  }

  .count-detail-section-title {
    color: var(--color-text);
    font-size: 14px;
    font-weight: 900;
    margin: 4px 0 0;
  }

  .amount-line {
    display: inline-block;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-right: 10px;
    white-space: nowrap;
  }

  @media (max-width: 1180px) {
    #d-section-presek .count-page-layout {
      grid-template-columns: 1fr;
    }

    #d-count-detail-panel {
      position: static;
    }
  }

  .sheet-handle {
    background: #d6dde6;
    border-radius: 999px;
    height: 4px;
    margin: 0 auto 4px;
    width: 40px;
  }

  :root[data-theme="dark"] .sheet-handle {
    background: #465366;
  }

  .sheet-title {
    font-size: 16px;
    font-weight: 800;
    text-align: center;
  }

  .sheet-title.in  { color: var(--color-in); }
  .sheet-title.out { color: var(--color-out); }

  .sheet-amount-input {
    font-size: 28px !important;
    font-weight: 800 !important;
    text-align: center;
  }

  .cur-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .cur-btn {
    border-radius: 999px;
    font-size: 13px;
    min-height: 32px;
    padding: 4px 16px;
  }

  .cur-btn.active.in  { background: var(--color-in-bg);  border-color: var(--color-in-border);  color: var(--color-in); }
  .cur-btn.active.out { background: var(--color-out-bg); border-color: var(--color-out-border); color: var(--color-out); }

  /* ─── Desktop shell ───────────────────────────────────── */

  .d-shell {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    height: 100dvh;
    overflow: hidden;
  }

  .d-nav {
    background: var(--color-surface);
    border-right: 1px solid var(--color-border-light);
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    padding: 16px 10px;
  }

  .nav-brand {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
    padding: 0 6px 12px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .nav-brand-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--color-text);
  }

  .nav-brand-user {
    color: var(--color-text-muted);
    font-size: 11px;
    text-align: center;
  }

  .app-version {
    color: var(--color-text-hint);
    font-size: 10px;
    font-weight: 800;
    text-align: center;
  }

  .nav-section-label {
    color: var(--color-text-hint);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    margin-top: 10px;
    margin-bottom: 2px;
    padding: 0 8px;
    text-transform: uppercase;
  }

  .nav-item {
    align-items: center;
    background: none;
    border: none;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    display: flex;
    font-size: 13px;
    font-weight: 600;
    gap: 8px;
    justify-content: flex-start;
    min-height: 36px;
    padding: 6px 10px;
    text-align: left;
    width: 100%;
  }

  .nav-item i { font-size: 16px; flex-shrink: 0; }

  .nav-item:hover { background: var(--color-bg); color: var(--color-text); }

  .nav-item.active {
    background: var(--color-primary-bg);
    color: var(--color-primary);
    font-weight: 700;
  }

  .nav-badge {
    background: var(--color-out-bg);
    border-radius: 999px;
    color: var(--color-out);
    font-size: 10px;
    font-weight: 800;
    margin-left: auto;
    padding: 1px 6px;
  }

  .nav-badge.info {
    background: var(--color-primary-bg);
    color: var(--color-primary);
  }

  .nav-bottom {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--color-border-light);
  }

  .d-main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .d-topbar {
    align-items: center;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    flex-shrink: 0;
    gap: 12px;
    padding: 10px 20px;
    flex-wrap: wrap;
  }

  .topbar-balance {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-right: 4px;
  }

  .topbar-balance-label {
    color: var(--color-text-muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .topbar-balance-value {
    color: var(--color-in);
    font-size: 20px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    line-height: 1;
  }

  .topbar-clock {
    align-items: flex-start;
    border-left: 1px solid var(--color-border-light);
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-left: 12px;
  }

  .topbar-clock span {
    color: var(--color-text-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .topbar-clock strong {
    color: var(--color-text);
    font-size: 20px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    line-height: 1;
  }

  .topbar-chips {
    display: flex;
    flex: 1;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip-select {
    align-items: center;
    background: #f0f3f7;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    color: #344054;
    display: inline-flex;
    font-size: 12px;
    gap: 5px;
    padding: 4px 10px;
  }

  .theme-toggle {
    white-space: nowrap;
  }

  .chip-select select {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    min-height: 0;
    padding: 0;
    width: auto;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .d-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* ─── Desktop sections ────────────────────────────────── */

  .d-section { display: none; }
  .d-section.active { display: block; }

  /* ─── Knjiga layout ───────────────────────────────────── */

  .knjiga-layout {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 1fr) 280px;
    align-items: start;
  }

  .knjiga-main { min-width: 0; }

  .knjiga-side {
    position: sticky;
    top: 0;
  }

  /* ─── Type toggle ─────────────────────────────────────── */

  .type-toggle {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
  }

  .type-btn {
    font-size: 13px;
    min-height: 36px;
    opacity: 0.6;
  }

  .type-btn.active { opacity: 1; }

  .type-btn-in.active  { background: var(--color-in-bg);  border-color: var(--color-in-border);  color: var(--color-in); }
  .type-btn-out.active { background: var(--color-out-bg); border-color: var(--color-out-border); color: var(--color-out); }

  /* ─── Desktop two col ─────────────────────────────────── */

  .desktop-two-col {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1fr) 300px;
  }

  /* ─── KPI row ─────────────────────────────────────────── */

  .kpi-row {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 16px;
  }

  .kpi-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }

  .kpi-label {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    font-size: 12px;
    gap: 5px;
  }

  .kpi-value {
    color: var(--color-text);
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-top: 6px;
  }

  .kpi-sub {
    color: var(--color-text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .kpi-warn .kpi-value  { color: #92400e; }
  .kpi-danger .kpi-value { color: var(--color-out); }
  .kpi-success .kpi-value { color: var(--color-in); }

  /* ─── Summary cards ───────────────────────────────────── */

  .dashboard-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .summary-card { border-left: 4px solid var(--color-primary); }

  .record {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 8px;
    padding: 12px;
  }

  .record-title { font-weight: 800; }

  .summary-row {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .summary-label {
    background: #edf2f7;
    border-radius: 999px;
    color: #344054;
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 8px;
  }

  .detail-row {
    align-items: center;
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }

  .detail-block {
    border-top: 1px solid var(--color-border-light);
    display: grid;
    gap: 8px;
    padding-top: 10px;
  }

  .detail-key { color: var(--color-text-muted); }

  .list, .result-box { display: grid; gap: 10px; }

  /* ─── Alert card ──────────────────────────────────────── */

  .alert-card {
    align-items: center;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    gap: 12px;
    padding: 12px 14px;
  }

  .alert-card i { color: #c2410c; flex-shrink: 0; font-size: 22px; }
  .alert-title { color: #9a3412; font-size: 13px; font-weight: 800; }
  .alert-sub   { color: #c2410c; font-size: 12px; margin-top: 2px; }

  /* ─── Misc legacy helpers ─────────────────────────────── */

  pre {
    background: #101828;
    border-radius: var(--radius-md);
    color: #fff;
    margin: 0;
    overflow: auto;
    padding: 12px;
    white-space: pre-wrap;
  }

  .section { display: none; }
  .section.active { display: grid; gap: 14px; }

  /* ─── Responsive ──────────────────────────────────────── */

  html.mobile-view,
  html.mobile-view body {
    font-size: calc(16px * var(--mobile-scale));
    min-width: 320px;
  }

  html.mobile-view button,
  html.mobile-view a.button-link {
    font-size: calc(14px * var(--mobile-scale));
    min-height: calc(42px * var(--mobile-scale));
    padding: calc(8px * var(--mobile-scale)) calc(12px * var(--mobile-scale));
  }

  html.mobile-view input,
  html.mobile-view select,
  html.mobile-view textarea {
    font-size: calc(15px * var(--mobile-scale));
    min-height: calc(42px * var(--mobile-scale));
  }

  html.mobile-view .m-header {
    padding: calc(14px * var(--mobile-scale)) calc(16px * var(--mobile-scale)) calc(12px * var(--mobile-scale));
    padding-top: max(calc(14px * var(--mobile-scale)), env(safe-area-inset-top));
  }

  html.mobile-view .m-header-balance {
    font-size: calc(34px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock {
    display: flex;
    align-items: baseline;
    gap: calc(8px * var(--mobile-scale));
    margin-top: calc(4px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock span,
  html.mobile-view .m-header-clock strong {
    font-size: calc(34px * var(--mobile-scale));
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    line-height: 1;
  }

  html.mobile-view .m-header-meta,
  html.mobile-view .m-chip,
  html.mobile-view .m-chip select {
    font-size: calc(13px * var(--mobile-scale));
  }

  html.mobile-view .m-section {
    gap: calc(14px * var(--mobile-scale));
    padding: calc(16px * var(--mobile-scale));
    padding-bottom: calc(126px + env(safe-area-inset-bottom));
  }

  html.mobile-view .btn-lg {
    font-size: calc(19px * var(--mobile-scale));
    min-height: calc(64px * var(--mobile-scale));
  }

  html.mobile-view .m-entry {
    gap: calc(12px * var(--mobile-scale));
    padding: calc(16px * var(--mobile-scale)) calc(14px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-dot {
    height: calc(12px * var(--mobile-scale));
    width: calc(12px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-desc {
    font-size: calc(24px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-meta {
    font-size: calc(19px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-amt {
    font-size: calc(26px * var(--mobile-scale));
  }

  html.mobile-view .m-tab {
    font-size: calc(16px * var(--mobile-scale));
    padding: calc(12px * var(--mobile-scale)) 4px;
  }

  html.mobile-view .m-tab i {
    font-size: calc(36px * var(--mobile-scale));
  }

  html.mobile-view .m-fixed-actions {
    bottom: calc(126px + env(safe-area-inset-bottom));
    gap: calc(10px * var(--mobile-scale));
    padding: calc(12px * var(--mobile-scale)) calc(12px * var(--mobile-scale)) calc(10px * var(--mobile-scale));
