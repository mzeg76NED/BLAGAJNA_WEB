<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --focus-ring: #facc15;
    --focus-glow: rgba(250, 204, 21, .38);
    --color-in: #176332;
    --color-in-bg: #e9f8ef;
    --color-in-border: #a8dfb8;
    --color-out: #9f1d1d;
    --color-out-bg: #fff0f0;
    --color-out-border: #e6b8b8;
    --color-text: #172033;
    --color-text-muted: #667085;
    --color-text-hint: #9aa3b0;
    --color-bg: #f4f6f8;
    --color-surface: #ffffff;
    --color-border: #d6dde6;
    --color-border-light: #eef0f4;
    --color-primary: #165dff;
    --color-primary-bg: #eef4ff;
    --color-warning: #8a5a00;
    --color-warning-bg: #fff6d8;
    --color-warning-border: #f0c85d;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --mobile-scale: 1;
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --color-in: #5ad27d;
    --color-in-bg: #0f2a1b;
    --color-in-border: #2f7b49;
    --color-out: #ff7a7a;
    --color-out-bg: #321719;
    --color-out-border: #8b3c3f;
    --color-text: #f2f5f9;
    --color-text-muted: #aeb8c6;
    --color-text-hint: #7d8999;
    --color-bg: #0f1319;
    --color-surface: #171c24;
    --color-border: #333d4b;
    --color-border-light: #242c38;
    --color-primary: #7aa2ff;
    --color-primary-bg: #172543;
    --color-warning: #ffd36a;
    --color-warning-bg: #31270f;
    --color-warning-border: #7b6422;
    --focus-ring: #fde68a;
    --focus-glow: rgba(253, 230, 138, .42);
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  /* KRITIČNA ISPRAVKA (FAZA 3w): bilo koji element koji ima [hidden] atribut MORA
     ostati stvarno sakriven, bez obzira na to koje klase ima. Bez ovog pravila,
     autorski CSS koji na tom elementu eksplicitno postavlja "display" (npr.
     .po-primary-btn/.po-secondary-btn/.cash-count-action { display:inline-flex },
     .empty-state { display:flex }, .card { display:... } i slicno) uvek nadjača
     UA podrazumevano "[hidden] { display:none }" pravilo - poreklo (author vs.
     user-agent) odlučuje bez obzira na specifičnost selektora. Posledica je bila
     niz "duh" bagova ove sesije: dugmad i poruke koje JS ispravno postavlja na
     hidden=true/false ostaju vidljive/nevidljive pogrešno (npr. "Nemate
     ovlašćenje..." poruka na Korisnicima/Valutama koja se preklapala sa sadržajem
     iako je sadržaj ispravno bio dozvoljen/zabranjen, ili dugmad za akcije kojima
     korisnik ne sme da pristupi a ostaju prikazana). Ovo pravilo mora biti iznad
     (ili bar ne oborено niže u fajlu) svih drugih pravila koja postavljaju
     "display" - !important garantuje prevagu bez obzira na redosled/specifičnost. */
  [hidden] {
    display: none !important;
  }

  html {
    color-scheme: light;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, p {
    margin: 0;
  }

  h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
  h2 { font-size: 18px; font-weight: 700; line-height: 1.3; }
  h3 { font-size: 15px; font-weight: 700; line-height: 1.3; }

  .muted {
    color: var(--color-text-muted);
    font-size: 13px;
  }

  /* ─── Buttons ─────────────────────────────────────────── */

  /* FAZA 3t: opšte smanjenje dugmadi za "profesionalniji" (kompaktniji) izgled -
     min-height 40→34px, padding 8/14→6/12, font 14→13px. Primenjeno globalno pa se
     kolorne varijante (.btn-in/.btn-out/.btn-primary/.btn-ghost/.cash-count-action)
     automatski smanjuju bez posebnih izmena po klasi. */
  button, a.button-link {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    cursor: pointer;
    display: inline-flex;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    gap: 6px;
    justify-content: center;
    min-height: 34px;
    padding: 6px 12px;
    text-align: center;
    text-decoration: none;
    transition: background 0.12s, opacity 0.12s;
  }

  button i, a.button-link i {
    font-size: 15px;
    flex-shrink: 0;
  }

  button:hover, a.button-link:hover {
    background: #eef3f8;
  }

  input,
  select,
  textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
  }

  button:focus-visible,
  a.button-link:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible,
  [tabindex]:focus-visible {
    border-color: var(--focus-ring) !important;
    box-shadow: 0 0 0 3px rgba(250, 204, 21, .22), 0 0 16px var(--focus-glow);
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  :root[data-theme="dark"] input,
  :root[data-theme="dark"] select,
  :root[data-theme="dark"] textarea {
    background: #111821;
    color: var(--color-text);
    color-scheme: dark;
  }

  :root[data-theme="dark"] select option {
    background: #171c24;
    color: #f2f5f9;
  }

  :root[data-theme="dark"] button:hover,
  :root[data-theme="dark"] a.button-link:hover {
    background: #202938;
  }

  button.small {
    font-size: 11px;
    min-height: 27px;
    padding: 4px 9px;
  }

  .btn-in {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
    color: var(--color-in);
  }
  .btn-in:hover { background: #d3f2e0; }
  :root[data-theme="dark"] .btn-in:hover { background: #173b27; }

  .btn-out {
    background: var(--color-out-bg);
    border-color: var(--color-out-border);
    color: var(--color-out);
  }
  .btn-out:hover { background: #fde0e0; }
  :root[data-theme="dark"] .btn-out:hover { background: #482023; }

  .btn-primary, button.primary {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }
  .btn-primary:hover, button.primary:hover { background: #1250e0; }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--color-text-muted);
  }
  .btn-ghost:hover { background: var(--color-bg); }

  .btn-full { width: 100%; }
  .btn-lg { min-height: 48px; font-size: 15px; }

  button.danger {
    border-color: var(--color-out-border);
    color: var(--color-out);
  }

  /* ─── Forms ───────────────────────────────────────────── */

  input, select, textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-family: inherit;
    font-size: 14px;
    min-height: 40px;
    padding: 8px 10px;
    width: 100%;
  }

  textarea { min-height: 80px; resize: vertical; }

  input:focus, select:focus, textarea:focus {
    border-color: var(--focus-ring);
    box-shadow: 0 0 0 3px rgba(250, 204, 21, .20), 0 0 14px var(--focus-glow);
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  label {
    display: grid;
    font-size: 12px;
    font-weight: 700;
    gap: 4px;
  }

  .form-grid { display: grid; gap: 10px; }
  .form-row-2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ─── Cards ───────────────────────────────────────────── */

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    display: grid;
    gap: 12px;
    padding: 16px;
  }

  .card-head {
    align-items: center;
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin: -16px -16px 0;
    padding: 12px 16px;
  }

  .card-head h2, .card-head h3 {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }

  .card-body { display: grid; gap: 10px; }

  /* ─── Badges ──────────────────────────────────────────── */

  .badge {
    align-items: center;
    border-radius: 999px;
    display: inline-flex;
    font-size: 11px;
    font-weight: 800;
    gap: 3px;
    padding: 3px 8px;
  }

  .badge-in    { background: var(--color-in-bg);   color: var(--color-in);  border: 1px solid var(--color-in-border); }
  .badge-out   { background: var(--color-out-bg);  color: var(--color-out); border: 1px solid var(--color-out-border); }
  .badge-draft { background: #f0f3f7; color: #4b5563; }
  .badge-submitted, .badge-in-review, .badge-open { background: var(--color-primary-bg); color: #1a56db; }
  .badge-approved, .badge-paid, .badge-posted { background: var(--color-in-bg); color: var(--color-in); }
  .badge-rejected, .badge-cancelled, .badge-reversed, .badge-urgent { background: var(--color-out-bg); color: var(--color-out); }
  .badge-waiting, .badge-difference { background: #fffbeb; color: #92400e; }
  .badge-partially { background: #fff7ed; color: #c2410c; }
  .badge-locked { background: #f5f3ff; color: #5b21b6; }
  .badge-closed { background: #f0f3f7; color: #4b5563; }

  /* ─── Book table ──────────────────────────────────────── */

  .book-table {
    border-collapse: collapse;
    font-size: 13px;
    min-width: 560px;
    width: 100%;
  }

  .book-table th {
    background: #f0f3f7;
    border-bottom: 2px solid var(--color-border);
    font-size: 11px;
    font-weight: 800;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 3;
  }

  .book-table .total-row-top td {
    position: sticky;
    top: 33px;
    z-index: 3;
  }

  :root[data-theme="dark"] .book-table th {
    background: #202733;
  }

  .book-table th.num, .book-table td.num { text-align: right; }

  .book-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    vertical-align: middle;
  }

  .book-table tr:hover td { background: #f7f9fc; }
  :root[data-theme="dark"] .book-table tr:hover td { background: #1d2530; }

  .book-table tr.selected td { background: var(--color-primary-bg); }

  .row-in td { border-left: 3px solid var(--color-in); }
  .row-out td { border-left: 3px solid var(--color-out); }
  .row-opening td { border-left: 3px solid var(--color-primary); }
  .row-count td {
    border-left: 3px solid #d99a00;
  }

  .row-in { background: #fafffe; }
  .row-out { background: #fffafa; }
  :root[data-theme="dark"] .row-in,
  :root[data-theme="dark"] .row-out {
    background: transparent;
  }
  :root[data-theme="dark"] .row-count td {
    border-left-color: #f4c542;
  }

  .cell-in  { color: var(--color-in);  font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-out { color: var(--color-out); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-bal { color: var(--color-text); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-dash { color: var(--color-text-hint); text-align: right; }

  .total-row td {
    background: #f0f3f7;
    border-top: 2px solid var(--color-border);
    font-size: 12px;
    font-weight: 800;
    padding: 10px 12px;
  }

  :root[data-theme="dark"] .total-row td {
    background: #202733;
  }

  .desc-main { font-weight: 600; }
  .desc-reason { color: var(--color-text); font-size: 12px; margin-top: 2px; overflow-wrap: anywhere; }
  .desc-sub  { color: var(--color-text-muted); font-size: 11px; margin-top: 2px; }

  .table-wrap { overflow: auto; }

  .knjiga-main {
    display: flex;
    flex-direction: column;
    max-height: calc(100dvh - 132px);
  }

  .knjiga-main .card-head {
    align-items: center;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .knjiga-main .table-wrap {
    flex: 1;
  }

  .knjiga-context {
    color: var(--color-text-muted);
    flex-basis: 100%;
    font-size: 12px;
    font-weight: 700;
  }

  .knjiga-total-strip,
  .m-traffic-summary {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: flex;
    flex-basis: 100%;
    flex-wrap: wrap;
    gap: 10px 16px;
    padding: 8px 10px;
  }

  .knjiga-total-strip span,
  .m-traffic-summary span {
    display: inline-flex;
    gap: 6px;
    white-space: nowrap;
  }

  .report-total-strip {
    margin-bottom: 8px;
  }

  .shift-current-label {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 12px;
  }

  .shift-status-body {
    display: grid;
    gap: 10px;
  }

  .shift-state {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 4px;
    padding: 12px;
  }

  .shift-state strong {
    font-size: 16px;
  }

  .shift-state.active {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
  }

  .shift-state.empty {
    background: var(--color-primary-bg);
  }

  .shift-info-table {
    border-collapse: collapse;
    width: 100%;
  }

  .shift-info-table th,
  .shift-info-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 9px 10px;
    text-align: left;
    vertical-align: top;
  }

  .shift-info-table th {
    color: var(--color-text-muted);
    font-size: 12px;
    width: 135px;
  }

  .shift-table tbody tr {
    cursor: pointer;
  }

  .shift-table tbody tr:hover td {
    background: var(--color-primary-bg);
  }

  .balance-pill {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border-light);
    border-radius: 999px;
    display: inline-flex;
    font-weight: 800;
    margin: 0 6px 6px 0;
    padding: 4px 9px;
  }

  .shift-warning {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    border-radius: var(--radius-md);
    color: var(--color-out);
    font-weight: 800;
    margin-top: 8px;
    padding: 10px 12px;
  }

  .is-disabled-flow {
    opacity: 0.55;
  }

  .denomination-grid,
  .cash-count-entry-area {
    display: grid;
    gap: 8px;
  }

  .count-entry-form {
    align-items: end;
    display: grid;
    gap: 10px;
    grid-template-columns: minmax(220px, 1fr) minmax(160px, 1fr) 120px;
    max-width: 860px;
  }

  .count-add-control {
    align-self: end;
    display: flex;
    min-height: 46px;
  }

  .count-add-control span {
    display: none;
  }

  .count-add-control button {
    min-height: 46px;
    width: 100%;
  }

  .shift-inline-actions {
    margin-top: 10px;
  }

  #d-cash-count-form {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }

  #d-cash-count-form > label:first-of-type {
    max-width: 320px;
  }

  #d-cash-count-form > label textarea {
    min-height: 52px;
  }

  .count-table {
    border-collapse: collapse;
    margin-top: 10px;
    width: 100%;
  }

  .count-table th,
  .count-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    text-align: left;
  }

  .count-table th {
    background: var(--color-warning-bg);
    color: var(--color-warning);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  @media (max-width: 760px) {
    .count-entry-form {
      grid-template-columns: 1fr 1fr;
    }

    .count-entry-form .btn-primary {
      grid-column: 1 / -1;
      min-height: 52px;
    }

    .count-add-control {
      grid-column: 1 / -1;
    }

    #d-cash-count-form {
      grid-template-columns: 1fr;
    }

    #d-cash-count-form > label:first-of-type,
    #d-cash-count-form .cash-count-entry-area {
      grid-column: 1 / -1;
    }
  }

  .denomination-row {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: grid;
    gap: 6px;
    grid-template-columns: auto minmax(0, 1fr);
    padding: 8px;
  }

  .denomination-row span {
    font-weight: 800;
  }

  .cash-count-total {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 18px;
    font-weight: 900;
    padding: 12px;
  }

  .permission-card p {
    color: var(--color-text-muted);
    font-size: 13px;
    margin-top: 0;
  }

  /* ─── Empty state ─────────────────────────────────────── */

  .empty-state {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 13px;
    gap: 8px;
    padding: 32px 16px;
    text-align: center;
  }

  /* FAZA 3w bugfix: bez ovoga je [hidden] atribut na "denied" porukama
     (#d-users-admin-denied, #d-currencies-denied - klasa "empty-state") bio
     nadjacan ".empty-state { display:flex }" pravilom (autorski CSS uvek bije
     UA podrazumevano [hidden] pravilo, bez obzira na specificnost) - poruka
     "Nemate ovlašćenje..." je ostajala vidljiva/preklopljena preko sadržaja
     i kad je hidden=true postavljen, sto je izgledalo kao da ADMIN nema
     privilegije iako je JS provera bila ispravna i sadržaj ispod je i dalje
     radio (video se paradoks: "nemate prava" + izmena/dodavanje i dalje rade). */
  .empty-state[hidden] {
    display: none;
  }

  .empty-state i { font-size: 32px; }

  /* ─── Skeleton ────────────────────────────────────────── */

  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .skeleton {
    animation: shimmer 1.2s ease-in-out infinite;
    background: linear-gradient(90deg, #e8ecf0 25%, #f0f3f7 50%, #e8ecf0 75%);
    background-size: 800px 100%;
    border-radius: var(--radius-sm);
    display: block;
  }

  :root[data-theme="dark"] .skeleton {
    background: linear-gradient(90deg, #202733 25%, #2a3442 50%, #202733 75%);
    background-size: 800px 100%;
  }

  /* ─── Spinner ─────────────────────────────────────────── */

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  /* FAZA 3w-4: kratak "flash" na panelu detalja kad se otvori preko "oko"
     dugmeta - garantovana vidljiva potvrda klika, čak i kad se sadržaj panela
     ne menja (npr. već izabran red). */
  @keyframes flashHighlight {
    0%   { box-shadow: 0 0 0 3px rgba(59, 130, 246, .55); }
    100% { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0); }
  }

  .flash-highlight {
    animation: flashHighlight 0.9s ease-out;
  }

  /* ─── Message ─────────────────────────────────────────── */

  .message {
    border-radius: var(--radius-md);
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.18);
    display: none;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    max-width: min(520px, calc(100vw - 32px));
    padding: 10px 14px;
    pointer-events: none;
    position: fixed;
    right: 20px;
    top: 72px;
    z-index: 700;
  }

  .message.show { display: block; }

  #m-message {
    left: 12px;
    max-width: none;
    right: 12px;
    top: max(12px, env(safe-area-inset-top));
  }

  .message.success {
    background: var(--color-in-bg);
    border: 1px solid var(--color-in-border);
    color: var(--color-in);
  }

  .message.error {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    color: var(--color-out);
  }

  .message.info {
    background: var(--color-primary-bg);
    border: 1px solid #bfd1ff;
    color: #17479e;
  }

  :root[data-theme="dark"] .message.info {
    background: #12243f;
    border-color: #3867b7;
    color: #bfdbfe;
  }

  :root[data-theme="dark"] .message.success {
    background: #0d281a;
    border-color: #1f8f55;
    color: #8af0b5;
  }

  :root[data-theme="dark"] .message.error {
    background: #351414;
    border-color: #9f2f2f;
    color: #ffb4b4;
  }

  /* ─── Mobile shell ────────────────────────────────────── */

  .m-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: contain;
  }

  /* FAZA 3v: header smanjen ~25% (padding/font) - hamburger + saldo su sada jedini
     stalni elementi, sve podesavanje (blagajna/valuta/tema/korisnik/odjava) je
     preselo u hamburger fioku (#m-drawer-overlay), donja traka sa tabovima je
     ukinuta (navigacija je takodje u fioci - .m-drawer-nav). */
  .m-header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-shrink: 0;
    /* FAZA 3w: jos -30% visine trake ("elemente ostavi iste velicine" - samo
       razmaci/padding su smanjeni, font/ikonice ispod su netaknuti). */
    padding: 6px 12px 5px;
    padding-top: max(6px, env(safe-area-inset-top));
    z-index: 20;
  }

  .m-header-top {
    align-items: center;
    display: flex;
    gap: 6px;
    justify-content: space-between;
  }

  .m-hamburger-btn {
    align-items: center;
    background: none;
    border: none;
    color: var(--color-text);
    display: inline-flex;
    flex-shrink: 0;
    /* FAZA 3w: uvecano ("Hamburger je premali, sama oznaka mora biti malo veca") */
    font-size: 23px;
    height: 34px;
    justify-content: center;
    width: 34px;
  }

  /* Saldo je sad dugme (ne div) - klik otvara/zatvara #m-header-kpi red ispod
     (bindMobileHeaderKpiToggle_ u scripts.html). Strelica se rotira kad je otvoren. */
  .m-header-balance {
    align-items: center;
    background: none;
    border: none;
    color: var(--color-in);
    display: flex;
    flex: 1;
    font-size: 18px;
    font-weight: 800;
    gap: 5px;
    justify-content: center;
    line-height: 1.1;
    min-height: 0;
    padding: 0;
  }

  .m-header-balance i {
    color: var(--color-text-muted);
    font-size: 13px;
    transition: transform .15s ease;
  }

  .m-header-balance.open i {
    transform: rotate(180deg);
  }

  .m-header-meta {
    color: var(--color-text-muted);
    font-size: 10px;
    margin-top: 1px;
    text-align: center;
  }

  /* KPI red - isti podaci kao renderKnjigaTotalsHtml_ (Blagajnicki list stil),
     otvara se klikom na saldo umesto ranijeg posebnog dugmeta "Pregled prometa". */
  .m-header-kpi {
    margin-top: 5px;
  }

  .m-header-kpi[hidden] {
    display: none;
  }

  .m-chip-version {
    color: var(--color-text-muted);
    font-size: 10px;
  }

  .m-chip {
    align-items: center;
    background: #f0f3f7;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    color: #344054;
    display: inline-flex;
    font-size: 12px;
    gap: 5px;
    padding: 4px 10px;
  }

  .m-chip.theme-toggle {
    cursor: pointer;
    min-height: 30px;
  }

  :root[data-theme="dark"] .m-chip,
  :root[data-theme="dark"] .chip-select,
  :root[data-theme="dark"] .summary-label {
    background: #202733;
    color: var(--color-text);
  }

  .m-chip select {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    min-height: 0;
    padding: 0;
    width: auto;
  }

  /* ─── Hamburger fioka (FAZA 3v) - zamena za donju traku sa tabovima + stari
     header zupčanik. Modalni overlay (position:fixed OVDE je ispravno - ovo je
     pravi modal, ne stalna chrome traka koja se sudara sa flex layout-om,
     razlika objasnjena uz mandatory-count-bar komentar dole). ────────────── */
  .m-drawer-overlay {
    background: rgba(0, 0, 0, .45);
    bottom: 0;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 200;
  }

  .m-drawer {
    background: var(--color-surface);
    bottom: 0;
    box-shadow: 2px 0 16px rgba(15, 23, 42, .25);
    display: flex;
    flex-direction: column;
    gap: 10px;
    left: 0;
    max-width: 78%;
    overflow-y: auto;
    padding: max(14px, env(safe-area-inset-top)) 14px 14px;
    position: absolute;
    top: 0;
    width: 280px;
  }

  .m-drawer-head {
    align-items: center;
    display: flex;
    font-size: 15px;
    font-weight: 800;
    justify-content: space-between;
  }

  .m-drawer-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .m-drawer-nav-item {
    align-items: center;
    background: none;
    border: none;
    border-radius: 999px;
    color: var(--color-text-muted);
    display: flex;
    font-size: 13px;
    font-weight: 700;
    gap: 12px;
    justify-content: flex-start;
    min-height: 40px;
    padding: 8px 14px;
    position: relative;
  }

  .m-drawer-nav-item i { font-size: 18px; }

  .m-drawer-nav-item.active {
    background: var(--color-primary-bg);
    color: var(--color-primary);
  }

  .m-drawer-nav-item .m-tab-badge {
    left: auto;
    position: static;
    margin-left: auto;
    top: auto;
  }

  .m-drawer-divider {
    background: var(--color-border-light);
    height: 1px;
    margin: 2px 0;
  }

  .m-drawer-label {
    color: var(--color-text-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 0 14px;
    text-transform: uppercase;
  }

  .m-drawer-settings {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 10px;
  }

  .m-content {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    /* FAZA 3w: .m-fab-row je sada position:fixed (LEBDI preko sadrzaja, ne redak u
       flex toku - dogovoreno da vise ne "jede" deo ekrana kao stalan red ispod
       liste). Zato ovde treba dovoljno dna-razmaka da poslednja stavka u listi ne
       ostane TRAJNO ispod dugmeta (i dalje se moze skrolovati iznad njega). */
    padding-bottom: 84px;
  }

  .m-section {
    display: none;
    padding: 14px 14px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
    flex-direction: column;
  }

  .m-section.active {
    display: flex;
  }

  .m-book-tools {
    background: var(--color-bg);
    display: grid;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) auto;
    padding: 0 0 8px;
  }

  .m-book-tools button {
    min-height: 48px;
  }

  .m-traffic-summary {
    margin-bottom: 10px;
  }

  .m-section-actions {
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr;
  }

  .m-section-label {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Mobile entry rows - FAZA 3u: kartica sa icon-bedžom po uzoru na Moj Maxi listu
     računa (obojena zaobljena ikonica levo + bold naslov/iznos + meta), umesto
     tanke linije sa malom tačkom. Boja bedža koristi iste --color-in/out/bg
     tokene, pa dark/light rade automatski bez dodatnih pravila. */
  /* FAZA 3v: visina kartice smanjena ~20% (dogovoreno) - bedz 40->32px, padding
     12->9px, razmak 12->9px, font malo tanji - isti vizuelni jezik (icon-bedz),
     samo kompaktnije da vise stavki stane na ekran. */
  .m-entry {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border-light);
    border-radius: 12px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
    cursor: pointer;
    display: flex;
    gap: 9px;
    padding: 9px;
  }
  .m-entry.count {
    border-color: #e7bd45;
  }
  :root[data-theme="dark"] .m-entry.count {
    border-color: #6f5720;
  }

  .m-entry:active { background: #f4f6f8; transform: scale(.99); }
  :root[data-theme="dark"] .m-entry:active { background: #202733; }

  .m-entry-icon {
    align-items: center;
    border-radius: 10px;
    display: flex;
    flex-shrink: 0;
    font-size: 16px;
    height: 32px;
    justify-content: center;
    width: 32px;
  }

  .m-entry-info {
    flex: 1;
    min-width: 0;
  }

  .m-entry-desc {
    font-size: 12px;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .m-entry-no {
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }

  .m-entry-meta {
    color: var(--color-text-muted);
    font-size: 10px;
    margin-top: 1px;
  }

  .m-entry-amt {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    flex-shrink: 0;
  }

  /* Mobile bottom nav - FAZA 3u: zaobljeni gornji uglovi + top-senka umesto tanke
     linije (docked-bar utisak), pill pozadina iza aktivne ikonice. */
  .m-bottom-nav {
    background: var(--color-surface);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -3px 12px rgba(15, 23, 42, .07);
    display: grid;
    flex-shrink: 0;
    grid-template-columns: repeat(5, 1fr);
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    padding-top: 6px;
    position: relative;
    z-index: 10;
  }

  .m-tab {
    align-items: center;
    background: none;
    border: none;
    border-radius: 0;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 700;
    gap: 3px;
    min-height: 0;
    padding: 8px 4px;
    position: relative;
  }

  .m-tab i {
    border-radius: 10px;
    font-size: 22px;
    padding: 2px 12px;
    transition: background .15s ease, color .15s ease;
  }

  .m-tab.active i {
    background: var(--color-primary-bg);
    color: var(--color-primary);
  }

  /* Direktne akcije (Uplata/Isplata/Trezor) - normalan flex clan m-shell-a, zalepljen
     direktno iznad donje navigacije (m-bottom-nav). NAMERNO nije position:fixed sa
     nagadjanjem "bottom" ofseta (ranije: 92px/110px pretpostavka visine trake ispod,
     koja je vremenom izasla iz sinhronizacije sa stvarnom visinom trake i pravila da
     dugmad "lebde" pogresno pozicionirana). Kao pravi flex sibling automatski sedi
     tacno iznad trake, bez obzira na buduce promene velicine fonta/ikonica u traci. */
  /* FAZA 3s: Uplata/Isplata/Trezor/Najava dugmad zamenjena jednim okruglim "+" FAB
     dugmetom - .m-fab-row je i dalje pravi flex sibling (isti razlog kao gornji
     komentar - bez position:fixed nagadjanja). Meni se otvara position:absolute
     bottom:100% RELATIVNO na sam red (ne na viewport), pa se automatski naslanja
     tacno iznad dugmeta bez obzira na visinu bilo cega ispod. */
  /* FAZA 3w: korisnik je primetio da .m-fab-row (iako je poslednji flex sibling,
     ne bar preko celog ekrana) i dalje REZERVISE sopstveni red i "jede" deo
     ekrana. Trazeno je da dugme stvarno LEBDI PREKO sadrzaja - zato je ovo sada
     position:fixed (VISE NIJE flex sibling u m-shell-u). Ovo NIJE isti anti-pattern
     kao stari mandatory-count-bar bag (FAZA 3q/3t) - taj je bio PUNA SIRINA traka
     koja se stalno prikazuje i sudara sa STVARNIM flex siblinzima (bottom nav);
     ovo je mali krug u jednom uglu, ne postoji nikakva traka ispod njega sa kojom
     bi se sudario (donja stalna traka je ukinuta u FAZA 3v), a .m-content ima
     dovoljno padding-bottom (gore) da poslednja stavka ostane dostupna skrolom. */
  .m-fab-row {
    align-items: center;
    bottom: max(14px, env(safe-area-inset-bottom));
    display: flex;
    justify-content: flex-end;
    position: fixed;
    right: 14px;
    z-index: 210;
  }

  .m-fab-backdrop {
    background: rgba(0, 0, 0, .5);
    bottom: 0;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 195;
  }

  .m-fab-backdrop[hidden] {
    display: none;
  }

  .m-fab-btn {
    align-items: center;
    background: var(--color-primary);
    border: 3px solid var(--color-bg);
    border-radius: 999px;
    box-shadow: 0 8px 18px rgba(15, 23, 42, .32);
    color: #fff;
    display: flex;
    font-size: 24px;
    height: 54px;
    justify-content: center;
    transition: transform .15s ease;
    width: 54px;
  }

  .m-fab-btn.active {
    transform: rotate(45deg);
  }

  .m-fab-menu {
    align-items: stretch;
    bottom: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
    position: absolute;
    right: 0;
  }

  .m-fab-menu[hidden] {
    display: none;
  }

  /* Bez ovoga bi [hidden] atribut na pojedinacnoj pilili bio nadjacan od
     ".m-fab-menu-item { display:flex }" pravila ispod (autorski CSS uvek bije
     UA podrazumevano [hidden] pravilo bez obzira na specificnost) - eksplicitno
     ga vracamo da updateMobileDirectActionsVisibility_/bindAnnouncementButtons_
     stvarno sakriju dugme, ne samo postave atribut. */
  .m-fab-menu-item[hidden] {
    display: none;
  }

  /* Pilula: ikonica u obojenom kruzicu (levo) + naziv - isti obrazac kao
     Google Keep "Image/Drawing/Audio/List/Text" meni. Boja kruzica/teksta
     dolazi od .in/.out/.najava/.order/.count modifikatora ispod. */
  .m-fab-menu-item {
    align-items: center;
    background: var(--color-surface);
    border: none;
    border-radius: 999px;
    box-shadow: 0 6px 16px rgba(15, 23, 42, .22);
    display: flex;
    font-size: 13px;
    font-weight: 800;
    gap: 10px;
    justify-content: flex-start;
    min-height: 40px;
    padding: 5px 16px 5px 5px;
    white-space: nowrap;
  }

  .m-fab-menu-item i {
    align-items: center;
    border-radius: 999px;
    display: flex;
    flex-shrink: 0;
    font-size: 15px;
    height: 30px;
    justify-content: center;
    width: 30px;
  }

  .m-fab-menu-item.in { color: var(--color-in); }
  .m-fab-menu-item.in i { background: var(--color-in-bg); }
  .m-fab-menu-item.out { color: var(--color-out); }
  .m-fab-menu-item.out i { background: var(--color-out-bg); }
  .m-fab-menu-item.najava { color: #7c8bb0; }
  .m-fab-menu-item.najava i { background: rgba(124,139,176,.16); }
  .m-fab-menu-item.order { color: var(--color-primary); }
  .m-fab-menu-item.order i { background: var(--color-primary-bg); }
  .m-fab-menu-item.count { color: #d99a00; }
  .m-fab-menu-item.count i { background: rgba(217,154,0,.15); }
  .m-fab-menu-item.lock { color: var(--color-out); }
  .m-fab-menu-item.lock i { background: var(--color-out-bg); }

  .m-detail-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 160;
  }

  .m-detail-sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-height: 82dvh;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .m-detail-sheet,
  .m-detail-sheet .detail-row,
  .m-detail-sheet .detail-key {
    font-size: 130%;
  }

  .m-detail-actions {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr 1fr;
  }

  .m-detail-actions button {
    align-items: center;
    display: inline-flex;
    font-size: 19px;
    font-weight: 900;
    justify-content: center;
    min-height: 64px;
  }

  .m-detail-actions button i {
    font-size: 24px;
  }

  /* FAZA 3v: pilule (ikonica u kruzicu + naziv) SAMO za staticni detalj-list stavke
     (#m-detail-overlay) - po dogovoru, generička .m-detail-actions klasa iznad
     ostaje netaknuta jer je deljena sa drugim, dinamicki generisanim dijalozima
     (najave/nalozi forme) koji imaju drugačiji broj/tip dugmadi. */
  #m-detail-overlay .m-detail-actions {
    gap: 8px;
    grid-template-columns: repeat(2, 1fr);
  }

  #m-detail-overlay .m-detail-actions button {
    background: var(--color-surface-alt, #202733);
    border: 1px solid var(--color-border);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    gap: 8px;
    justify-content: flex-start;
    min-height: 44px;
    padding: 5px 14px 5px 5px;
  }

  #m-detail-overlay .m-detail-actions button i {
    align-items: center;
    background: rgba(148, 163, 184, .16);
    border-radius: 999px;
    color: var(--color-text-muted);
    display: flex;
    flex-shrink: 0;
    font-size: 16px;
    height: 32px;
    justify-content: center;
    width: 32px;
  }

  #m-detail-overlay .m-detail-actions #m-detail-storno {
    background: var(--color-out-bg);
    border-color: var(--color-out-border, var(--color-out));
    color: var(--color-out);
  }

  #m-detail-overlay .m-detail-actions #m-detail-storno i {
    background: rgba(159, 29, 29, .14);
    color: var(--color-out);
  }

  .m-tab.active { color: var(--color-primary); }

  .m-tab-badge {
    background: var(--color-out-bg);
    border-radius: 999px;
    color: var(--color-out);
    font-size: 10px;
    font-weight: 800;
    left: calc(50% + 4px);
    padding: 1px 5px;
    position: absolute;
    top: 2px;
  }

  /* ─── Bottom sheet ────────────────────────────────────── */

  .sheet-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 100;
  }

  html.mobile-view .sheet-overlay {
    align-items: center;
    padding: 16px 0 calc(120px + env(safe-area-inset-bottom));
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-width: 520px;
    padding: 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .cashsheet-header {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    padding: 12px;
  }

  .cashsheet-header div,
  .cashsheet-calc-row {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 11px;
  }

  .cashsheet-header span,
  .cashsheet-calc-row span {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 800;
  }

  .cashsheet-calc {
    display: grid;
    gap: 6px;
    padding: 0 12px 12px;
  }

  .cashsheet-kpis {
    padding: 0 12px 12px;
  }

  .cashsheet-row-print-btn {
    align-items: center;
    display: inline-flex;
    justify-content: center;
    min-height: 28px;
    padding: 4px 8px;
  }

  /* FAZA 3t: spajalica na Knjizi - vidljiva SAMO na redovima koji imaju prilog (vidi
     KNJIGA_DOCS_WITH_FILES_ u scripts.html), klik otvara Dokumenti dijalog bez da
     otvori i detalj panel (stopPropagation u inline onclick-u). */
  .cashbook-row-clip {
    align-items: center;
    background: rgba(59, 130, 246, .12);
    border: none;
    border-radius: 999px;
    color: var(--color-primary, #3b82f6);
    cursor: pointer;
    display: inline-flex;
    font-size: 12px;
    height: 20px;
    justify-content: center;
    margin-left: 6px;
    padding: 0;
    vertical-align: middle;
    width: 20px;
  }

  .cashbook-row-clip:hover {
    background: rgba(59, 130, 246, .22);
  }

  /* FAZA 3w-4: "oko" dugme u koloni Akcije - jedini nacin da se otvore detalji

  /* FAZA 3t (fix): obavezan presek stanja - dinamički ubačen div (vidi
     ensureMandatoryCountBar_ u scripts.html). ISPRAVKA: prva verzija je koristila
     position:fixed preko celog ekrana, što je na mobilnom preklapalo .m-bottom-nav
     (koji je pravi flex sibling, ne fixed - isti anti-pattern kao ranije rešeni FAB
     slučaj). Sada je bar pravi flex sibling ODMAH POSLE .m-header/.d-topbar unutar
     .m-shell/.d-shell - normalan tok dokumenta, gura sadržaj dole, nema preklapanja,
     nema position:fixed/z-index trikova. Dva stanja: .locked (upadljiv crveni red) i

  #mandatory-count-bar.mandatory-count-bar {

  #mandatory-count-bar.locked .mandatory-count-bar-actions {

    gap: 8px;

  }

     filter red - kompaktna inline varijanta iste visine kao ostali filteri,

  }

  .cashbook-kpi-multi-body {
    min-width: 0;

  .cashbook-layout {

  .cashbook-table-panel,

  :root:not([data-theme="dark"]) .cashbook-details-panel,

  .cashbook-table-panel {
    min-width: 0;
    overflow: hidden;
  }

  .cashbook-context {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 700;

  }

  .cashbook-period {
    color: var(--color-text-muted);

    font-size: 11px;

  .cashbook-table-wrap {
    max-height: calc(100dvh - 350px);
    min-height: 0;
    overflow: auto;
  }

  .cashbook-table {
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
    min-width: 760px;
  }

  .cashbook-table th {
    background: rgba(20, 49, 79, 0.96);
    border-bottom: 1px solid rgba(99, 147, 195, 0.22);
    color: #bed0e5;
    height: 42px;
    padding: 10px 14px;
    text-transform: none;
  }

  .cashbook-total-row { display: none; }

  .cashbook-table td {
    background: rgba(8, 28, 49, 0.46);
    border-bottom: 1px solid rgba(99, 147, 195, 0.12);
    padding: 11px 14px;
  }

  :root:not([data-theme="dark"]) .cashbook-table td {
    background: #ffffff;
  }

  .cashbook-row {
    cursor: pointer;
    position: relative;
  }

  .cashbook-row td:first-child {
    position: relative;
  }

  .cashbook-row td:first-child::before {
    background: rgba(99, 147, 195, 0.25);
    bottom: -18px;
    content: "";
    left: 16px;
    position: absolute;
    top: -18px;
    width: 1px;
  }

  .cashbook-row td:first-child::after {
    border-radius: 999px;
    content: "";
    height: 10px;
    left: 11px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
  }

  .cashbook-row.row-in td:first-child::after { background: var(--color-in); }
  .cashbook-row.row-out td:first-child::after { background: var(--color-out); }
  .cashbook-row.row-count td:first-child::after { background: #f4c542; }
  .cashbook-row.row-opening td:first-child::after { background: #60a5fa; }

  .cashbook-row:hover td {
    background: rgba(22, 63, 103, 0.68);
  }

    align-items: center;
    display: inline-flex;

  /* FAZA 3w fix (#103): desni panel (komande) vise NE skroluje kao jedna celina -
     ranije je "Brze akcije" (Uplata/Isplata/Trezor) moglo da nestane sa ekrana
     prostim skrolovanjem ka dnu detalja, sto korisnik eksplicitno ne zeli
     ("sve mora biti fiksno, a skroluje se samo prikaz stavki na knjizi"). Sada je
     ovo fleks kolona: "Brze akcije" karta ima svoju prirodnu visinu (flex-shrink:0,
     vidi .cashbook-quick-actions nize), a "Detalji stavke" karta popunjava ostatak
     prostora i sama iznutra skroluje samo svoj sadrzaj (#d-detail-body), dok dugmad

  .cashbook-details-panel {
    background: transparent;
    border: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;

    overflow: hidden;
    position: sticky;
    top: 0;

  .cashbook-transaction-details {

    flex-direction: column;

  .cashbook-panel-actions {

  /* ─── Shifts final UI ─────────────────────────────────── */

  .visually-hidden {
    clip: rect(0 0 0 0);
    clip-path: inset(50%);
    height: 1px;
    overflow: hidden;
    position: absolute;
    white-space: nowrap;
    width: 1px;
  }

  .shifts-page {
    display: grid;
    gap: 14px;
    min-width: 0;
  }

  #d-section-smena.active .shifts-page {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    padding: 20px;
  }

  .shifts-page-head {
    align-items: center;
    display: flex;
    justify-content: space-between;
  }

  .shifts-title {
    align-items: center;
    color: var(--color-text);
    display: flex;
    gap: 10px;
  }

  .shifts-title h2 {
    font-size: 26px;
    line-height: 1.1;
    margin: 0;
  }

  .shifts-kpis {
    display: grid;
    flex-shrink: 0;
    gap: 12px;
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  .shift-kpi-card {
    align-items: center;
    background: linear-gradient(145deg, rgba(12, 46, 78, 0.92), rgba(8, 31, 55, 0.92));
    border: 1px solid rgba(99, 147, 195, 0.24);
    border-radius: 12px;
    display: grid;
    gap: 12px;
    grid-template-columns: 54px minmax(0, 1fr);
    min-height: 96px;
    padding: 16px;
  }

  :root:not([data-theme="dark"]) .shift-kpi-card,
  :root:not([data-theme="dark"]) .shifts-list-panel,
  :root:not([data-theme="dark"]) .shift-detail-panel {
    background: #ffffff;
  }

  .shift-kpi-card span {
    color: var(--color-text-muted);
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .shift-kpi-card strong {
    color: var(--color-text);
    display: block;
    font-size: 18px;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
    margin-top: 4px;
  }

  .shift-kpi-card small {
    color: var(--color-text-muted);
    display: block;
    font-size: 12px;
    margin-top: 4px;

  .shift-kpi-icon {

    height: 54px;

  .shifts-layout {
    align-items: start;
    display: grid;

    gap: 12px;

    min-height: 0;
    overflow: hidden;

  .shifts-list-panel,
  .shift-detail-panel {

  }

  /* FAZA 3w-7: fiksni panel (kao .payment-orders-page .po-detail-panel) - skroluje
     SAMO unutrasnji .shift-detail-scroll omotac, ne ceo panel (vidi komentar u
     scripts.html renderShiftDetail_ za puno objasnjenje uzroka "sadrzaj skace"). */
  .shift-detail-panel {

    flex-direction: column;
    max-height: 100%;
    min-height: 0;
    overflow: hidden;

    display: flex;
    flex: 1;
    flex-direction: column;
    min-height: 0;

    min-height: 0;

  .shift-overview-table th,
  .shift-mini-table th {

  .shift-overview-row {

  .shift-overview-row:hover td,
  .shift-overview-row.selected td {

  }

  .shift-row-main {
    display: grid;
    gap: 5px;
  }

  .shift-row-main strong {
    color: var(--color-text);
    font-size: 13px;
  }

  .shift-row-main small,
  .shift-overview-table td small {
    color: var(--color-text-muted);
    display: block;
    font-size: 11px;
  }

  .shift-status-badge {
    border-radius: 999px;
    display: inline-flex;
    font-size: 11px;
    font-weight: 900;
    justify-content: center;
    padding: 4px 9px;
    width: fit-content;
  }

  .shift-status-active {
    background: rgba(34, 197, 94, 0.18);
    color: var(--color-in);
  }

  .shift-status-closed {
    background: rgba(96, 165, 250, 0.18);
    color: #93c5fd;
  }

  .shift-status-diff {
    background: rgba(245, 158, 11, 0.18);
    color: #fbbf24;
  }

  .shift-status-neutral {
    background: rgba(148, 163, 184, 0.16);
    color: var(--color-text-muted);
  }

  .shift-row-currencies {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }

  .shift-currency-chip {
    background: rgba(96, 165, 250, 0.16);
    border-radius: 999px;
    color: #dbeafe;
    display: inline-flex;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 8px;
  }

  .shift-event-chip-row {
    display: flex;
    gap: 7px;
  }

  .shift-event-chip {
    border-radius: 8px;
    display: inline-flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 900;
    min-width: 58px;
    padding: 6px 8px;
    text-align: center;
  }

  .shift-event-chip.start { background: rgba(34, 197, 94, 0.14); color: var(--color-in); }
  .shift-event-chip.count { background: rgba(59, 130, 246, 0.14); color: #93c5fd; }
  .shift-event-chip.end { background: rgba(239, 68, 68, 0.14); color: var(--color-out); }
  .shift-event-chip.muted { opacity: 0.55; }

  .shift-table-footer {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    justify-content: space-between;
    padding: 12px 4px 2px;
  }

  .shift-detail-panel {
    padding: 14px;
  }

  .shift-detail-header {

    border-bottom: 1px solid rgba(99, 147, 195, 0.18);
    display: flex;
    justify-content: space-between;
    padding-bottom: 14px;

  .shift-detail-hero {

    display: grid;
    gap: 12px;
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .shift-detail-icon {
    align-items: center;
    background: rgba(96, 165, 250, 0.16);
    border-radius: 999px;

  /* FAZA 3w-7: dugmad VISE NISU "sticky" unutar jedne velike skrol-zone (taj
     pristup je bio stvarni uzrok "sadrzaj skace" - sticky se aktivira tek na
     kraju skrola, pa je pozicija dugmadi zavisila od duzine sadrzaja tekuce
     smene). Sad su .shift-detail-scroll (skroluje) i .shift-actions-grid
     (fiksno) odvojena rodjena braca van skrol zone (vidi .shift-detail-panel

     isplatu (.po-order-detail-scroll / .po-panel-actions). */

    background: linear-gradient(145deg, rgba(10, 34, 58, 0.9), rgba(8, 25, 43, 0.94));

    .shifts-kpis {
      grid-template-columns: repeat(2, minmax(0, 1fr));

    .shifts-filters,

  /* ─── Type toggle ─────────────────────────────────────── */

  .type-toggle {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
  }

  .type-btn {
    font-size: 13px;
    min-height: 36px;
    opacity: 0.6;
  }

  .type-btn.active { opacity: 1; }

  .type-btn-in.active  { background: var(--color-in-bg);  border-color: var(--color-in-border);  color: var(--color-in); }
  .type-btn-out.active { background: var(--color-out-bg); border-color: var(--color-out-border); color: var(--color-out); }

  /* ─── Desktop two col ─────────────────────────────────── */

  .desktop-two-col {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1fr) 300px;
  }

  /* ─── KPI row ─────────────────────────────────────────── */

  .kpi-row {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 16px;
  }

  .kpi-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }

  .kpi-label {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    font-size: 12px;
    gap: 5px;
  }

  .kpi-value {
    color: var(--color-text);
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-top: 6px;
  }

  .kpi-sub {
    color: var(--color-text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .kpi-warn .kpi-value  { color: #92400e; }
  .kpi-danger .kpi-value { color: var(--color-out); }
  .kpi-success .kpi-value { color: var(--color-in); }

  /* ─── Summary cards ───────────────────────────────────── */

  .dashboard-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .summary-card { border-left: 4px solid var(--color-primary); }

  .record {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 8px;
    padding: 12px;
  }

  .record-title { font-weight: 800; }

  .summary-row {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .summary-label {
    background: #edf2f7;
    border-radius: 999px;
    color: #344054;
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 8px;
  }

  .detail-row {
    align-items: center;
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }

  .detail-block {
    border-top: 1px solid var(--color-border-light);
    display: grid;
    gap: 8px;
    padding-top: 10px;
  }

  .detail-key { color: var(--color-text-muted); }

  .list, .result-box { display: grid; gap: 10px; }

  /* ─── Alert card ──────────────────────────────────────── */

  .alert-card {
    align-items: center;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    gap: 12px;
    padding: 12px 14px;
  }

  .alert-card i { color: #c2410c; flex-shrink: 0; font-size: 22px; }
  .alert-title { color: #9a3412; font-size: 13px; font-weight: 800; }
  .alert-sub   { color: #c2410c; font-size: 12px; margin-top: 2px; }

  /* ─── Misc legacy helpers ─────────────────────────────── */

  pre {
    background: #101828;
    border-radius: var(--radius-md);
    color: #fff;
    margin: 0;
    overflow: auto;
    padding: 12px;
    white-space: pre-wrap;
  }

  .section { display: none; }
  .section.active { display: grid; gap: 14px; }

  /* ─── Responsive ──────────────────────────────────────── */

  /* Sizes below assume --mobile-scale ~= 1 already produces a normal, dense mobile
     web-app UI (44-48px touch targets per platform HIG, not oversized POS-terminal
     text). Previously these baseline values (34px header balance, 64px-tall buttons,
     24-26px entry text, 36px tab icons) were themselves too large even before any
     --mobile-scale multiplier was applied - on a real phone the header alone ate a
     third of the screen and entry titles had to be ellipsis-truncated because the
     text didn't fit its own row. Reduced across the board; --mobile-scale now only
     nudges these up/down slightly for unusually small/large screens. */
  html.mobile-view,
  html.mobile-view body {
    font-size: calc(15px * var(--mobile-scale));
    min-width: 320px;
  }

  html.mobile-view button,
  html.mobile-view a.button-link {
    font-size: calc(13px * var(--mobile-scale));
    min-height: calc(44px * var(--mobile-scale));
    padding: calc(8px * var(--mobile-scale)) calc(12px * var(--mobile-scale));
  }

  html.mobile-view input,
  html.mobile-view select,
  html.mobile-view textarea {
    font-size: calc(14px * var(--mobile-scale));
    min-height: calc(44px * var(--mobile-scale));
  }

  html.mobile-view .m-header {
    padding: calc(6px * var(--mobile-scale)) calc(12px * var(--mobile-scale)) calc(5px * var(--mobile-scale));
    padding-top: max(calc(6px * var(--mobile-scale)), env(safe-area-inset-top));
  }

  html.mobile-view .m-header-balance {
    font-size: calc(18px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock {
    display: flex;
    align-items: baseline;
    gap: calc(6px * var(--mobile-scale));
    margin-top: calc(4px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock span,
  html.mobile-view .m-header-clock strong {
    font-size: calc(20px * var(--mobile-scale));
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    line-height: 1;
  }

  html.mobile-view .m-header-meta,
  html.mobile-view .m-chip,
  html.mobile-view .m-chip select {
    font-size: calc(10px * var(--mobile-scale));
  }

  html.mobile-view .m-section {
    gap: calc(10px * var(--mobile-scale));
    padding: calc(14px * var(--mobile-scale));
    padding-bottom: max(calc(14px * var(--mobile-scale)), env(safe-area-inset-bottom));
  }

  html.mobile-view .btn-lg {
    font-size: calc(15px * var(--mobile-scale));
    min-height: calc(48px * var(--mobile-scale));
  }

  html.mobile-view .m-entry {
    gap: calc(8px * var(--mobile-scale));
    padding: calc(9px * var(--mobile-scale)) calc(9px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-icon {
    font-size: calc(14px * var(--mobile-scale));
    height: calc(29px * var(--mobile-scale));
    width: calc(29px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-desc {
    font-size: calc(12px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-meta {
    font-size: calc(10px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-amt {
    font-size: calc(13px * var(--mobile-scale));
  }

  html.mobile-view .m-tab {
    font-size: calc(11px * var(--mobile-scale));
    padding: calc(8px * var(--mobile-scale)) 4px;
  }

  html.mobile-view .m-tab i {
    font-size: calc(20px * var(--mobile-scale));
  }

  html.mobile-view .m-fab-row {
    padding: calc(5px * var(--mobile-scale)) calc(10px * var(--mobile-scale));
  }

  html.mobile-view .m-fab-btn {
    font-size: calc(18px * var(--mobile-scale));
    height: calc(38px * var(--mobile-scale));
    width: calc(38px * var(--mobile-scale));
  }

  html.mobile-view .m-fab-menu-item {
    font-size: calc(11px * var(--mobile-scale));
    min-height: calc(34px * var(--mobile-scale));
    padding: calc(5px * var(--mobile-scale)) calc(10px * var(--mobile-scale));

  /* Shift-work-card action row (Uplata/Isplata/Trezor/Presek/Zatvori) and the

     Korisnici/Valute) su i dalje "skakala" (2 vs 3 po redu, razlicite visine)
     jer je flexbox `flex-basis` (calc(50% - 5px), niza specificnost) uvek
     imao prednost nad kasnijim `width:auto` (visa specificnost, ali RAZLICITO
     svojstvo - flexbox po specifikaciji ignorise width kad flex-basis nije
     auto) - dva razlicita mehanizma su se nadmetala nepredvidivo. CSS GRID
     nema ovu dvosmislenost: `grid-template-columns: repeat(2, 1fr)` GARANTUJE
     tacno 2 kolone jednake sirine, a grid podrazumevano razvlaci sve celije u
     redu (`align-items:stretch`) na visinu NAJVISE celije u tom redu - ovo
     resava i "razlicita visina dugmadi" bez potrebe za fiksnim max-height/
     overflow:hidden koji je ranije mogao da odseca duzi tekst. */
  .po-panel-actions {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(2, minmax(0, 1fr));

  /* KONSOLIDACIJA (FAZA 3w-2, prepravljeno FAZA 3w-5): izgled dugmadi u akcionim
     trakama. Podeljeno u DVE grupe jer im kontejneri rade na razlicit nacin:
     - Grid grupa (.po-panel-actions/.shift-actions-grid): kontejner je CSS Grid
       (repeat(2,1fr)) koji vec garantuje 2 jednake kolone i automatski razvlaci
       (align-items:stretch) sve dugmadi u redu na istu visinu - NEMA fiksnog
       max-height/overflow:hidden (moze da odseca tekst), umesto toga min-height

  /* FAZA 3w-5: Nalog za isplatu - isti "fiksni panel, skroluje samo sadrzaj"
     obrazac kao Zahtevi (.payment-requests-page .po-detail-panel) i Korisnici
     (.users-admin-page .po-detail-panel). Ovaj panel je RANIJE bio jedini bez
     ove ispravke (imao je samo min-height, bez ogranicene visine/skrola), pa
     se ceo .d-content skrolovao i dugmad (.po-panel-actions) su zavisila od
     toga koliko "Tok naloga" stavki ima dati nalog - otud utisak "dugmad
     skacu" pri prebacivanju izmedju naloga. */
  .payment-orders-page .po-detail-panel {
    display: flex;
    flex-direction: column;
    max-height: calc(100dvh - 260px);

  /* FAZA 3w-6: PRAVI uzrok "dugmad i dalje skacu" i posle FAZA 3w-5 ispravke -
     .po-order-detail-scroll (flex:1;overflow:auto) i .po-panel-actions
     (flex-shrink:0) su deca #d-order-detail-body, NE direktna deca
     .po-detail-panel - a #d-order-detail-body (obican <div> u koji JS ubacuje
     innerHTML) NIJE bio flex kontejner, pa su flex:1/flex-shrink:0 na njegovoj
     deci potpuno bez efekta (te osobine rade samo unutar flex/grid roditelja).
     Bez ovoga se ceo sadrzaj samo secirao (overflow:hidden na .po-detail-panel)
     umesto da skroluje, a dugmad su ostajala na mestu gde ih je "Tok naloga"
     gurnuo pre secenja - otud utisak skakanja pri prebacivanju izmedju naloga. */
  .payment-orders-page #d-order-detail-body {

  /* Universal "Blagajnički list" print overlay - see printCashSheetForEvent_ in
     scripts.html. Injected into <body> on demand, works from any screen (mobile or
     desktop), invisible until html.printing-cashsheet-overlay is toggled on right
     before window.print(). */
  #print-cashsheet-overlay {
    display: none;
  }

  @media print {
    html.printing-cashsheet-overlay body > *:not(#print-cashsheet-overlay) {
      display: none !important;
    }

    html.printing-cashsheet-overlay #print-cashsheet-overlay {
      background: #ffffff !important;
      color: #111827 !important;
      display: block !important;
      padding: 16px !important;
      width: 100% !important;
    }

    #print-cashsheet-overlay .book-table {
      border-collapse: collapse !important;
      color: #111827 !important;
      font-size: 11px !important;
      width: 100% !important;
    }

    #print-cashsheet-overlay .book-table th,
    #print-cashsheet-overlay .book-table td {
      background: #ffffff !important;
      border: 1px solid #d1d5db !important;
      color: #111827 !important;
      padding: 5px 6px !important;
    }

    #print-cashsheet-overlay .book-table th {
      background: #f3f4f6 !important;
      font-weight: 800 !important;
    }

    /* Priznanica (buildReceiptPrintHtml_) - dva primerka (arhiva/korisnik) na jednoj
       strani, po uzoru na stari GAS print-cash-event.html izlaz koji je korisnik
       priložio kao referencu. Isti overlay mehanizam kao Blagajnički list iznad. */
    .receipt-sheet {
      display: block !important;
    }

    .receipt-copy {
      border: 1px dashed #9ca3af !important;
      break-inside: avoid !important;
      margin-bottom: 14px !important;
      padding: 14px !important;
      position: relative !important;
    }

    .receipt-copy-label {
      color: #6b7280 !important;
      font-size: 10px !important;
      font-weight: 800 !important;
      letter-spacing: .04em !important;
      position: absolute !important;
      right: 14px !important;
      text-transform: uppercase !important;
      top: 10px !important;
    }

    .receipt-head {
      align-items: flex-start !important;
      border-bottom: 1px solid #d1d5db !important;
      display: flex !important;
      justify-content: space-between !important;
      padding-bottom: 8px !important;
    }

    .receipt-head strong {
      color: #111827 !important;
      display: block !important;
      font-size: 14px !important;
    }

    .receipt-head span {
      color: #4b5563 !important;
      display: block !important;
      font-size: 10px !important;
    }

    .receipt-head-right {
      text-align: right !important;
    }

    .receipt-box {
      border: 1px solid #16a34a !important;
      border-radius: 4px !important;
      margin: 10px 0 !important;
      padding: 10px 12px !important;
    }

    .receipt-box h3 {
