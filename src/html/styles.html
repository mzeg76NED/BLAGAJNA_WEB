<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --color-in: #176332;
    --color-in-bg: #e9f8ef;
    --color-in-border: #a8dfb8;
    --color-out: #9f1d1d;
    --color-out-bg: #fff0f0;
    --color-out-border: #e6b8b8;
    --color-text: #172033;
    --color-text-muted: #667085;
    --color-text-hint: #9aa3b0;
    --color-bg: #f4f6f8;
    --color-surface: #ffffff;
    --color-border: #d6dde6;
    --color-border-light: #eef0f4;
    --color-primary: #165dff;
    --color-primary-bg: #eef4ff;
    --color-warning: #8a5a00;
    --color-warning-bg: #fff6d8;
    --color-warning-border: #f0c85d;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --mobile-scale: 1;
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --color-in: #5ad27d;
    --color-in-bg: #0f2a1b;
    --color-in-border: #2f7b49;
    --color-out: #ff7a7a;
    --color-out-bg: #321719;
    --color-out-border: #8b3c3f;
    --color-text: #f2f5f9;
    --color-text-muted: #aeb8c6;
    --color-text-hint: #7d8999;
    --color-bg: #0f1319;
    --color-surface: #171c24;
    --color-border: #333d4b;
    --color-border-light: #242c38;
    --color-primary: #7aa2ff;
    --color-primary-bg: #172543;
    --color-warning: #ffd36a;
    --color-warning-bg: #31270f;
    --color-warning-border: #7b6422;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  html {
    color-scheme: light;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, p {
    margin: 0;
  }

  h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
  h2 { font-size: 18px; font-weight: 700; line-height: 1.3; }
  h3 { font-size: 15px; font-weight: 700; line-height: 1.3; }

  .muted {
    color: var(--color-text-muted);
    font-size: 13px;
  }

  /* ─── Buttons ─────────────────────────────────────────── */

  button, a.button-link {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    cursor: pointer;
    display: inline-flex;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    gap: 6px;
    justify-content: center;
    min-height: 40px;
    padding: 8px 14px;
    text-align: center;
    text-decoration: none;
    transition: background 0.12s, opacity 0.12s;
  }

  button i, a.button-link i {
    font-size: 17px;
    flex-shrink: 0;
  }

  button:hover, a.button-link:hover {
    background: #eef3f8;
  }

  input,
  select,
  textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
  }

  :root[data-theme="dark"] input,
  :root[data-theme="dark"] select,
  :root[data-theme="dark"] textarea {
    background: #111821;
    color: var(--color-text);
    color-scheme: dark;
  }

  :root[data-theme="dark"] select option {
    background: #171c24;
    color: #f2f5f9;
  }

  :root[data-theme="dark"] button:hover,
  :root[data-theme="dark"] a.button-link:hover {
    background: #202938;
  }

  button.small {
    font-size: 12px;
    min-height: 32px;
    padding: 5px 10px;
  }

  .btn-in {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
    color: var(--color-in);
  }
  .btn-in:hover { background: #d3f2e0; }
  :root[data-theme="dark"] .btn-in:hover { background: #173b27; }

  .btn-out {
    background: var(--color-out-bg);
    border-color: var(--color-out-border);
    color: var(--color-out);
  }
  .btn-out:hover { background: #fde0e0; }
  :root[data-theme="dark"] .btn-out:hover { background: #482023; }

  .btn-primary, button.primary {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }
  .btn-primary:hover, button.primary:hover { background: #1250e0; }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--color-text-muted);
  }
  .btn-ghost:hover { background: var(--color-bg); }

  .btn-full { width: 100%; }
  .btn-lg { min-height: 48px; font-size: 15px; }

  button.danger {
    border-color: var(--color-out-border);
    color: var(--color-out);
  }

  /* ─── Forms ───────────────────────────────────────────── */

  input, select, textarea {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-family: inherit;
    font-size: 14px;
    min-height: 40px;
    padding: 8px 10px;
    width: 100%;
  }

  textarea { min-height: 80px; resize: vertical; }

  input:focus, select:focus, textarea:focus {
    border-color: var(--color-primary);
    outline: none;
  }

  label {
    display: grid;
    font-size: 12px;
    font-weight: 700;
    gap: 4px;
  }

  .form-grid { display: grid; gap: 10px; }
  .form-row-2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ─── Cards ───────────────────────────────────────────── */

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    display: grid;
    gap: 12px;
    padding: 16px;
  }

  .card-head {
    align-items: center;
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin: -16px -16px 0;
    padding: 12px 16px;
  }

  .card-head h2, .card-head h3 {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }

  .card-body { display: grid; gap: 10px; }

  /* ─── Badges ──────────────────────────────────────────── */

  .badge {
    align-items: center;
    border-radius: 999px;
    display: inline-flex;
    font-size: 11px;
    font-weight: 800;
    gap: 3px;
    padding: 3px 8px;
  }

  .badge-in    { background: var(--color-in-bg);   color: var(--color-in);  border: 1px solid var(--color-in-border); }
  .badge-out   { background: var(--color-out-bg);  color: var(--color-out); border: 1px solid var(--color-out-border); }
  .badge-draft { background: #f0f3f7; color: #4b5563; }
  .badge-submitted, .badge-in-review, .badge-open { background: var(--color-primary-bg); color: #1a56db; }
  .badge-approved, .badge-paid, .badge-posted { background: var(--color-in-bg); color: var(--color-in); }
  .badge-rejected, .badge-cancelled, .badge-reversed, .badge-urgent { background: var(--color-out-bg); color: var(--color-out); }
  .badge-waiting, .badge-difference { background: #fffbeb; color: #92400e; }
  .badge-partially { background: #fff7ed; color: #c2410c; }
  .badge-locked { background: #f5f3ff; color: #5b21b6; }
  .badge-closed { background: #f0f3f7; color: #4b5563; }

  /* ─── Book table ──────────────────────────────────────── */

  .book-table {
    border-collapse: collapse;
    font-size: 13px;
    min-width: 560px;
    width: 100%;
  }

  .book-table th {
    background: #f0f3f7;
    border-bottom: 2px solid var(--color-border);
    font-size: 11px;
    font-weight: 800;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 3;
  }

  .book-table .total-row-top td {
    position: sticky;
    top: 33px;
    z-index: 3;
  }

  :root[data-theme="dark"] .book-table th {
    background: #202733;
  }

  .book-table th.num, .book-table td.num { text-align: right; }

  .book-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    vertical-align: middle;
  }

  .book-table tr:hover td { background: #f7f9fc; }
  :root[data-theme="dark"] .book-table tr:hover td { background: #1d2530; }

  .book-table tr.selected td { background: var(--color-primary-bg); }

  .row-in td { border-left: 3px solid var(--color-in); }
  .row-out td { border-left: 3px solid var(--color-out); }
  .row-opening td { border-left: 3px solid var(--color-primary); }
  .row-count td {
    border-left: 3px solid #d99a00;
  }

  .row-in { background: #fafffe; }
  .row-out { background: #fffafa; }
  :root[data-theme="dark"] .row-in,
  :root[data-theme="dark"] .row-out {
    background: transparent;
  }
  :root[data-theme="dark"] .row-count td {
    border-left-color: #f4c542;
  }

  .cell-in  { color: var(--color-in);  font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-out { color: var(--color-out); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-bal { color: var(--color-text); font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .cell-dash { color: var(--color-text-hint); text-align: right; }

  .total-row td {
    background: #f0f3f7;
    border-top: 2px solid var(--color-border);
    font-size: 12px;
    font-weight: 800;
    padding: 10px 12px;
  }

  :root[data-theme="dark"] .total-row td {
    background: #202733;
  }

  .desc-main { font-weight: 600; }
  .desc-reason { color: var(--color-text); font-size: 12px; margin-top: 2px; overflow-wrap: anywhere; }
  .desc-sub  { color: var(--color-text-muted); font-size: 11px; margin-top: 2px; }

  .table-wrap { overflow: auto; }

  .knjiga-main {
    display: flex;
    flex-direction: column;
    max-height: calc(100dvh - 132px);
  }

  .knjiga-main .card-head {
    align-items: center;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .knjiga-main .table-wrap {
    flex: 1;
  }

  .knjiga-context {
    color: var(--color-text-muted);
    flex-basis: 100%;
    font-size: 12px;
    font-weight: 700;
  }

  .knjiga-total-strip,
  .m-traffic-summary {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: flex;
    flex-basis: 100%;
    flex-wrap: wrap;
    gap: 10px 16px;
    padding: 8px 10px;
  }

  .knjiga-total-strip span,
  .m-traffic-summary span {
    display: inline-flex;
    gap: 6px;
    white-space: nowrap;
  }

  .report-total-strip {
    margin-bottom: 8px;
  }

  .shift-current-label {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 12px;
  }

  .shift-status-body {
    display: grid;
    gap: 10px;
  }

  .shift-state {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 4px;
    padding: 12px;
  }

  .shift-state strong {
    font-size: 16px;
  }

  .shift-state.active {
    background: var(--color-in-bg);
    border-color: var(--color-in-border);
  }

  .shift-state.empty {
    background: var(--color-primary-bg);
  }

  .shift-info-table {
    border-collapse: collapse;
    width: 100%;
  }

  .shift-info-table th,
  .shift-info-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 9px 10px;
    text-align: left;
    vertical-align: top;
  }

  .shift-info-table th {
    color: var(--color-text-muted);
    font-size: 12px;
    width: 135px;
  }

  .shift-table tbody tr {
    cursor: pointer;
  }

  .shift-table tbody tr:hover td {
    background: var(--color-primary-bg);
  }

  .balance-pill {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border-light);
    border-radius: 999px;
    display: inline-flex;
    font-weight: 800;
    margin: 0 6px 6px 0;
    padding: 4px 9px;
  }

  .shift-warning {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    border-radius: var(--radius-md);
    color: var(--color-out);
    font-weight: 800;
    margin-top: 8px;
    padding: 10px 12px;
  }

  .is-disabled-flow {
    opacity: 0.55;
  }

  .denomination-grid,
  .cash-count-entry-area {
    display: grid;
    gap: 8px;
  }

  .count-entry-form {
    align-items: end;
    display: grid;
    gap: 10px;
    grid-template-columns: minmax(220px, 1fr) minmax(160px, 1fr) 120px;
    max-width: 860px;
  }

  .count-add-control {
    align-self: end;
    display: flex;
    min-height: 46px;
  }

  .count-add-control span {
    display: none;
  }

  .count-add-control button {
    min-height: 46px;
    width: 100%;
  }

  .shift-inline-actions {
    margin-top: 10px;
  }

  #d-cash-count-form {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }

  #d-cash-count-form > label:first-of-type {
    max-width: 320px;
  }

  #d-cash-count-form > label textarea {
    min-height: 52px;
  }

  .count-table {
    border-collapse: collapse;
    margin-top: 10px;
    width: 100%;
  }

  .count-table th,
  .count-table td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 8px 10px;
    text-align: left;
  }

  .count-table th {
    background: var(--color-warning-bg);
    color: var(--color-warning);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  @media (max-width: 760px) {
    .count-entry-form {
      grid-template-columns: 1fr 1fr;
    }

    .count-entry-form .btn-primary {
      grid-column: 1 / -1;
      min-height: 52px;
    }

    .count-add-control {
      grid-column: 1 / -1;
    }

    #d-cash-count-form {
      grid-template-columns: 1fr;
    }

    #d-cash-count-form > label:first-of-type,
    #d-cash-count-form .cash-count-entry-area {
      grid-column: 1 / -1;
    }
  }

  .denomination-row {
    align-items: center;
    background: var(--color-surface-muted);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: grid;
    gap: 6px;
    grid-template-columns: auto minmax(0, 1fr);
    padding: 8px;
  }

  .denomination-row span {
    font-weight: 800;
  }

  .cash-count-total {
    background: var(--color-primary-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 18px;
    font-weight: 900;
    padding: 12px;
  }

  .permission-card p {
    color: var(--color-text-muted);
    font-size: 13px;
    margin-top: 0;
  }

  /* ─── Empty state ─────────────────────────────────────── */

  .empty-state {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 13px;
    gap: 8px;
    padding: 32px 16px;
    text-align: center;
  }

  .empty-state i { font-size: 32px; }

  /* ─── Skeleton ────────────────────────────────────────── */

  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .skeleton {
    animation: shimmer 1.2s ease-in-out infinite;
    background: linear-gradient(90deg, #e8ecf0 25%, #f0f3f7 50%, #e8ecf0 75%);
    background-size: 800px 100%;
    border-radius: var(--radius-sm);
    display: block;
  }

  :root[data-theme="dark"] .skeleton {
    background: linear-gradient(90deg, #202733 25%, #2a3442 50%, #202733 75%);
    background-size: 800px 100%;
  }

  /* ─── Spinner ─────────────────────────────────────────── */

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spin { animation: spin 0.8s linear infinite; display: inline-block; }

  /* ─── Message ─────────────────────────────────────────── */

  .message {
    border-radius: var(--radius-md);
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.18);
    display: none;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    max-width: min(520px, calc(100vw - 32px));
    padding: 10px 14px;
    pointer-events: none;
    position: fixed;
    right: 20px;
    top: 72px;
    z-index: 700;
  }

  .message.show { display: block; }

  #m-message {
    left: 12px;
    max-width: none;
    right: 12px;
    top: max(12px, env(safe-area-inset-top));
  }

  .message.success {
    background: var(--color-in-bg);
    border: 1px solid var(--color-in-border);
    color: var(--color-in);
  }

  .message.error {
    background: var(--color-out-bg);
    border: 1px solid var(--color-out-border);
    color: var(--color-out);
  }

  .message.info {
    background: var(--color-primary-bg);
    border: 1px solid #bfd1ff;
    color: #17479e;
  }

  :root[data-theme="dark"] .message.info {
    background: #12243f;
    border-color: #3867b7;
    color: #bfdbfe;
  }

  :root[data-theme="dark"] .message.success {
    background: #0d281a;
    border-color: #1f8f55;
    color: #8af0b5;
  }

  :root[data-theme="dark"] .message.error {
    background: #351414;
    border-color: #9f2f2f;
    color: #ffb4b4;
  }

  /* ─── Mobile shell ────────────────────────────────────── */

  .m-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: contain;
  }

  .m-header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border-light);
    flex-shrink: 0;
    padding: 12px 16px 10px;
    padding-top: max(12px, env(safe-area-inset-top));
    z-index: 20;
  }

  .m-header-balance {
    font-size: 24px;
    font-weight: 800;
    color: var(--color-in);
    line-height: 1.1;
  }

  .m-header-meta {
    color: var(--color-text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .m-header-chips {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .m-chip {
    align-items: center;
    background: #f0f3f7;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    color: #344054;
    display: inline-flex;
    font-size: 12px;
    gap: 5px;
    padding: 4px 10px;
  }

  .m-chip.theme-toggle {
    cursor: pointer;
    min-height: 30px;
  }

  :root[data-theme="dark"] .m-chip,
  :root[data-theme="dark"] .chip-select,
  :root[data-theme="dark"] .summary-label {
    background: #202733;
    color: var(--color-text);
  }

  .m-chip select {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    min-height: 0;
    padding: 0;
    width: auto;
  }

  .m-content {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(180px + env(safe-area-inset-bottom));
  }

  .m-section {
    display: none;
    padding: 14px 14px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
    flex-direction: column;
  }

  .m-section.active {
    display: flex;
  }

  .m-book-tools {
    background: var(--color-bg);
    display: grid;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) auto;
    padding: 0 0 8px;
  }

  .m-book-tools button {
    min-height: 48px;
  }

  .m-traffic-summary {
    margin-bottom: 10px;
  }

  .m-section-actions {
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr;
  }

  .m-section-label {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Mobile entry rows */
  .m-entry {
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    gap: 10px;
    padding: 10px 12px;
  }
  .m-entry.count {
    border-color: #e7bd45;
  }
  :root[data-theme="dark"] .m-entry.count {
    border-color: #6f5720;
  }

  .m-entry:active { background: #f4f6f8; }
  :root[data-theme="dark"] .m-entry:active { background: #202733; }

  .m-entry-dot {
    border-radius: 999px;
    flex-shrink: 0;
    height: 10px;
    width: 10px;
  }

  .m-entry-info {
    flex: 1;
    min-width: 0;
  }

  .m-entry-desc {
    font-size: 13px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .m-entry-no {
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }

  .m-entry-meta {
    color: var(--color-text-muted);
    font-size: 11px;
    margin-top: 1px;
  }

  .m-entry-amt {
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Mobile bottom nav */
  .m-bottom-nav {
    background: var(--color-surface);
    border-top: 1px solid var(--color-border-light);
    display: grid;
    flex-shrink: 0;
    grid-template-columns: repeat(5, 1fr);
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    padding-top: 6px;
  }

  .m-tab {
    align-items: center;
    background: none;
    border: none;
    border-radius: 0;
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 700;
    gap: 2px;
    min-height: 0;
    padding: 8px 4px;
    position: relative;
  }

  .m-tab i { font-size: 26px; }

  .m-fixed-actions {
    background: linear-gradient(180deg, rgba(244, 246, 248, 0), var(--color-bg) 20%);
    bottom: calc(92px + env(safe-area-inset-bottom));
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(3, 1fr);
    left: 0;
    padding: 12px 12px 10px;
    position: fixed;
    right: 0;
    z-index: 90;
  }

  :root[data-theme="dark"] .m-fixed-actions {
    background: linear-gradient(180deg, rgba(15, 19, 25, 0), var(--color-bg) 20%);
  }

  .m-fixed-actions[hidden] {
    display: none;
  }

  .m-detail-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 160;
  }

  .m-detail-sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-height: 82dvh;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .m-detail-sheet,
  .m-detail-sheet .detail-row,
  .m-detail-sheet .detail-key {
    font-size: 130%;
  }

  .m-detail-actions {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr 1fr;
  }

  .m-detail-actions button {
    align-items: center;
    display: inline-flex;
    font-size: 19px;
    font-weight: 900;
    justify-content: center;
    min-height: 64px;
  }

  .m-detail-actions button i {
    font-size: 24px;
  }

  .m-tab.active { color: var(--color-primary); }

  .m-tab-badge {
    background: var(--color-out-bg);
    border-radius: 999px;
    color: var(--color-out);
    font-size: 10px;
    font-weight: 800;
    left: calc(50% + 4px);
    padding: 1px 5px;
    position: absolute;
    top: 2px;
  }

  /* ─── Bottom sheet ────────────────────────────────────── */

  .sheet-overlay {
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.45);
    bottom: 0;
    display: flex;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 100;
  }

  html.mobile-view .sheet-overlay {
    align-items: center;
    padding: 16px 0 calc(120px + env(safe-area-inset-bottom));
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .sheet {
    animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
    background: var(--color-surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: grid;
    gap: 10px;
    max-width: 520px;
    padding: 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    width: 100%;
  }

  .cashsheet-header {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    padding: 12px;
  }

  .cashsheet-header div,
  .cashsheet-calc-row {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 11px;
  }

  .cashsheet-header span,
  .cashsheet-calc-row span {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 800;
  }

  .cashsheet-calc {
    display: grid;
    gap: 6px;
    padding: 0 12px 12px;
  }

  #d-section-presek .count-page-layout {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1.55fr) minmax(420px, 0.9fr);
  }

  #d-section-presek .count-history-panel {
    display: block;
    max-height: none;
  }

  #d-section-presek .count-history-wrap {
    max-height: 520px;
  }

  #d-count-detail-panel {
    position: sticky;
    top: 82px;
  }

  #d-count-detail-wide {
    display: none;
  }

  #d-count-detail-wide.count-detail-body,
  .count-detail-body {
    align-items: stretch;
    display: grid;
    gap: 14px;
    padding: 0;
    text-align: left;
  }

  #d-count-detail-wide .count-detail-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }

  .count-detail-summary {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 12px;
  }

  #d-count-detail-wide .count-detail-summary {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .count-detail-summary > div {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    display: grid;
    gap: 4px;
    padding: 10px 12px;
  }

  .count-detail-summary .detail-key {
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .count-detail-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  #d-count-detail-wide .detail-row {
    justify-content: space-between;
  }

  #d-count-detail-wide .count-table {
    font-size: 13px;
  }

  .count-detail-meta,
  .count-detail-totals {
    border-collapse: collapse;
    width: 100%;
  }

  .count-detail-meta th,
  .count-detail-meta td,
  .count-detail-totals th,
  .count-detail-totals td {
    border-bottom: 1px solid var(--color-border-light);
    padding: 9px 10px;
    text-align: left;
  }

  .count-detail-meta th,
  .count-detail-totals th {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .count-detail-totals .num,
  .count-table .num {
    text-align: right;
  }

  .count-detail-section-title {
    color: var(--color-text);
    font-size: 14px;
    font-weight: 900;
    margin: 4px 0 0;
  }

  .amount-line {
    display: inline-block;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-right: 10px;
    white-space: nowrap;
  }

  /* ─── Presek stanja: dashboard layout ───────────────────── */

  .presek-page {
    display: grid;
    gap: 14px;
  }

  .presek-kpi-strip {
    background: linear-gradient(135deg, #102946, #0c1d33);
    border: 1px solid rgba(122, 162, 255, 0.22);
    border-radius: var(--radius-md);
    box-shadow: 0 16px 44px rgba(2, 10, 25, 0.18);
    display: grid;
    gap: 0;
    grid-template-columns: repeat(6, minmax(0, 1fr)) auto;
    overflow: hidden;
  }

  :root:not([data-theme="dark"]) .presek-kpi-strip {
    background: linear-gradient(135deg, #f7fbff, #eaf3ff);
    box-shadow: none;
  }

  .presek-kpi-card {
    border-right: 1px solid rgba(122, 162, 255, 0.18);
    display: grid;
    gap: 5px;
    min-height: 92px;
    padding: 14px 16px;
  }

  .presek-kpi-label {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .presek-kpi-value {
    color: var(--color-text);
    font-size: 18px;
    font-weight: 900;
    line-height: 1.15;
    white-space: nowrap;
  }

  .presek-kpi-sub {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 700;
  }

  .presek-success,
  .presek-kpi-value.presek-success {
    color: var(--color-in);
  }

  .presek-danger,
  .presek-kpi-value.presek-danger {
    color: var(--color-out);
  }

  .presek-warning {
    color: var(--color-warning);
  }

  .presek-primary-action {
    align-self: center;
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
    margin: 16px;
    min-width: 140px;
  }

  .presek-split {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1.08fr) minmax(460px, 0.92fr);
  }

  .presek-panel {
    background: linear-gradient(180deg, rgba(22, 35, 52, 0.92), rgba(17, 26, 39, 0.94));
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  :root:not([data-theme="dark"]) .presek-panel {
    background: var(--color-surface);
  }

  .presek-panel-head,
  .presek-detail-head {
    align-items: center;
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
  }

  .presek-panel-head p {
    color: var(--color-text-muted);
    font-size: 12px;
    font-weight: 700;
  }

  .presek-info-line {
    background: var(--color-primary-bg);
    border: 1px solid rgba(122, 162, 255, 0.34);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-weight: 800;
    margin: 12px 16px 0;
    padding: 10px 12px;
  }

  .presek-hidden-form {
    display: none !important;
  }

  .presek-filters {
    display: grid;
    gap: 8px;
    grid-template-columns: 120px minmax(180px, 1fr) 150px 130px 120px;
    padding: 12px 16px;
  }

  .presek-search {
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr);
    align-items: center;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    gap: 6px;
    min-height: 40px;
    padding: 0 10px;
  }

  .presek-search input {
    border: 0;
    min-height: 34px;
    padding: 0;
  }

  .presek-table-wrap {
    max-height: min(66vh, 740px);
    overflow: auto;
    padding: 0 16px;
  }

  .presek-table,
  .presek-detail-table {
    border-collapse: separate;
    border-spacing: 0;
    font-variant-numeric: tabular-nums;
    width: 100%;
  }

  .presek-table th,
  .presek-table td,
  .presek-detail-table th,
  .presek-detail-table td {
    border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    padding: 10px 12px;
    text-align: left;
    vertical-align: middle;
  }

  .presek-table th,
  .presek-detail-table th {
    background: #1f2b3b;
    color: #cbd5e1;
    font-size: 11px;
    font-weight: 900;
    position: sticky;
    text-transform: uppercase;
    top: 0;
    z-index: 1;
  }

  :root:not([data-theme="dark"]) .presek-table th,
  :root:not([data-theme="dark"]) .presek-detail-table th {
    background: #eef4fb;
    color: #475569;
  }

  .presek-table td.num,
  .presek-detail-table td.num,
  .presek-detail-table th.num {
    text-align: right;
  }

  .presek-row {
    cursor: pointer;
  }

  .presek-row:hover,
  .presek-row.is-selected {
    background: rgba(22, 93, 255, 0.18);
  }

  .presek-currency-chip,
  .presek-status-badge {
    background: var(--color-primary-bg);
    border-radius: 999px;
    color: var(--color-text);
    display: inline-flex;
    font-size: 12px;
    font-weight: 900;
    line-height: 1;
    margin: 1px;
    padding: 5px 8px;
    white-space: nowrap;
  }

  .presek-status-badge {
    background: var(--color-in-bg);
    color: var(--color-in);
  }

  .presek-pagination {
    align-items: center;
    border-top: 1px solid var(--color-border-light);
    color: var(--color-text-muted);
    display: flex;
    font-size: 12px;
    font-weight: 800;
    justify-content: space-between;
    padding: 10px 16px;
  }

  .presek-pagination button {
    min-height: 30px;
    min-width: 34px;
    padding: 4px 8px;
  }

  .presek-detail-panel {
    position: sticky;
    top: 82px;
  }

  .presek-detail-actions {
    display: flex;
    gap: 8px;
  }

  .presek-detail-kpis {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    padding: 16px;
  }

  .presek-info-block {
    align-items: center;
    background: rgba(15, 23, 42, 0.28);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: flex;
    gap: 10px;
    min-width: 0;
    padding: 10px;
  }

  :root:not([data-theme="dark"]) .presek-info-block {
    background: #f8fafc;
  }

  .presek-info-block i {
    color: var(--color-text-muted);
    font-size: 19px;
  }

  .presek-info-block span {
    color: var(--color-text-muted);
    display: block;
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .presek-info-block strong {
    display: block;
    font-size: 13px;
    overflow-wrap: anywhere;
  }

  .presek-tabs {
    display: flex;
    gap: 8px;
    padding: 0 16px 14px;
  }

  .presek-tab {
    background: transparent;
    min-height: 36px;
  }

  .presek-tab.active {
    background: var(--color-primary-bg);
    border-color: var(--color-primary);
    color: var(--color-primary);
  }

  .presek-tab-panel {
    display: grid;
    gap: 14px;
    padding: 0 16px 16px;
  }

  .presek-overview-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .presek-summary-card {
    background: rgba(15, 23, 42, 0.28);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: grid;
    gap: 6px;
    padding: 12px;
  }

  :root:not([data-theme="dark"]) .presek-summary-card {
    background: #f8fafc;
  }

  .presek-summary-card span {
    color: var(--color-text-muted);
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .presek-currency-block {
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .presek-currency-block h3 {
    border-bottom: 1px solid var(--color-border-light);
    padding: 12px 14px;
  }

  .presek-total-row td,
  .presek-all-total {
    font-weight: 900;
  }

  .presek-all-total {
    align-items: center;
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: space-between;
    padding: 14px;
  }

  .presek-zapisnik {
    background: rgba(15, 23, 42, 0.28);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    display: grid;
    gap: 8px;
    padding: 14px;
  }

  :root:not([data-theme="dark"]) .presek-zapisnik {
    background: #f8fafc;
  }

  .cell-neutral {
    color: var(--color-text);
  }

  @media (max-width: 1380px) {
    .presek-kpi-strip {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .presek-primary-action {
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .presek-split {
      grid-template-columns: 1fr;
    }

    .presek-detail-panel {
      position: static;
    }
  }

  @media (max-width: 980px) {
    .presek-filters,
    .presek-detail-kpis,
    .presek-overview-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 1180px) {
    #d-section-presek .count-page-layout {
      grid-template-columns: 1fr;
    }

    #d-count-detail-panel {
      position: static;
    }
  }

  .sheet-handle {
    background: #d6dde6;
    border-radius: 999px;
    height: 4px;
    margin: 0 auto 4px;
    width: 40px;
  }

  :root[data-theme="dark"] .sheet-handle {
    background: #465366;
  }

  .sheet-title {
    font-size: 16px;
    font-weight: 800;
    text-align: center;
  }

  .sheet-title.in  { color: var(--color-in); }
  .sheet-title.out { color: var(--color-out); }

  .sheet-amount-input {
    font-size: 28px !important;
    font-weight: 800 !important;
    text-align: center;
  }

  .cur-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .cur-btn {
    border-radius: 999px;
    font-size: 13px;
    min-height: 32px;
    padding: 4px 16px;
  }

  .cur-btn.active.in  { background: var(--color-in-bg);  border-color: var(--color-in-border);  color: var(--color-in); }
  .cur-btn.active.out { background: var(--color-out-bg); border-color: var(--color-out-border); color: var(--color-out); }

  /* ─── Desktop shell ───────────────────────────────────── */

  .d-shell {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    height: 100dvh;
    overflow: hidden;
  }

  .d-nav {
    background: var(--color-surface);
    border-right: 1px solid var(--color-border-light);
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    padding: 16px 10px;
  }

  .nav-brand {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
    padding: 0 6px 12px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .nav-brand-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--color-text);
  }

  .nav-brand-user {
    color: var(--color-text-muted);
    font-size: 11px;
    text-align: center;
  }

  .app-version {
    color: var(--color-text-hint);
    font-size: 10px;
    font-weight: 800;
    text-align: center;
  }

  .nav-section-label {
    color: var(--color-text-hint);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    margin-top: 10px;
    margin-bottom: 2px;
    padding: 0 8px;
    text-transform: uppercase;
  }

  .nav-item {
    align-items: center;
    background: none;
    border: none;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    display: flex;
    font-size: 13px;
    font-weight: 600;
    gap: 8px;
    justify-content: flex-start;
    min-height: 36px;
    padding: 6px 10px;
    text-align: left;
    width: 100%;
  }

  .nav-item i { font-size: 16px; flex-shrink: 0; }

  .nav-item:hover { background: var(--color-bg); color: var(--color-text); }

  .nav-item.active {
    background: var(--color-primary-bg);
    color: var(--color-primary);
    font-weight: 700;
  }

  .nav-badge {
    background: var(--color-out-bg);
    border-radius: 999px;
    color: var(--color-out);
    font-size: 10px;
    font-weight: 800;
    margin-left: auto;
    padding: 1px 6px;
  }

  .nav-badge.info {
    background: var(--color-primary-bg);
    color: var(--color-primary);
  }

  .nav-bottom {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--color-border-light);
  }

  .d-main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .d-topbar {

  .cashbook-row {
    cursor: pointer;

  }

  .cashbook-row td:first-child {
    position: relative;
  }

  .cashbook-row td:first-child::before {
    background: rgba(99, 147, 195, 0.25);
    bottom: -18px;
    content: "";
    left: 16px;
    position: absolute;
    top: -18px;
    width: 1px;
  }

  .cashbook-row td:first-child::after {
    border-radius: 999px;
    content: "";
    height: 10px;
    left: 11px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
  }

  .cashbook-row.row-in td:first-child::after { background: var(--color-in); }
  .cashbook-row.row-out td:first-child::after { background: var(--color-out); }
  .cashbook-row.row-count td:first-child::after { background: #f4c542; }

  .cashbook-date-group span {

  .shift-overview-row:hover td,
  .shift-overview-row.selected td {
    background: rgba(37, 99, 235, 0.2);
  }

  .shift-row-main {
    display: grid;
    gap: 5px;
  }

  .shift-row-main strong {
    color: var(--color-text);
    font-size: 13px;
  }

  .shift-row-main small,
  .shift-overview-table td small {
    color: var(--color-text-muted);
    display: block;
    font-size: 11px;
  }

  .shift-status-badge {
    border-radius: 999px;
    display: inline-flex;
    font-size: 11px;
    font-weight: 900;
    justify-content: center;
    padding: 4px 9px;
    width: fit-content;
  }

  .shift-status-active {
    background: rgba(34, 197, 94, 0.18);
    color: var(--color-in);
  }

  .shift-status-closed {
    background: rgba(96, 165, 250, 0.18);
    color: #93c5fd;
  }

  .shift-status-diff {
    background: rgba(245, 158, 11, 0.18);
    color: #fbbf24;
  }

  .shift-status-neutral {
    background: rgba(148, 163, 184, 0.16);
    color: var(--color-text-muted);
  }

  .shift-row-currencies {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }

  .shift-currency-chip {
    background: rgba(96, 165, 250, 0.16);
    border-radius: 999px;
    color: #dbeafe;
    display: inline-flex;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 8px;
  }

  .shift-event-chip-row {
    display: flex;
    gap: 7px;
  }

  .shift-event-chip {
    border-radius: 8px;
    display: inline-flex;
    flex-direction: column;
    font-size: 11px;
    font-weight: 900;
    min-width: 58px;
    padding: 6px 8px;
    text-align: center;
  }

  .shift-event-chip.start { background: rgba(34, 197, 94, 0.14); color: var(--color-in); }
  .shift-event-chip.count { background: rgba(59, 130, 246, 0.14); color: #93c5fd; }
  .shift-event-chip.end { background: rgba(239, 68, 68, 0.14); color: var(--color-out); }
  .shift-event-chip.muted { opacity: 0.55; }

  .shift-table-footer {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    justify-content: space-between;
    padding: 12px 4px 2px;
  }

  .shift-detail-panel {
    padding: 14px;
  }

  .shift-detail-header {
    align-items: center;
    border-bottom: 1px solid rgba(99, 147, 195, 0.18);
    display: flex;
    justify-content: space-between;
    padding-bottom: 14px;
  }

  .shift-detail-hero {
    align-items: center;
    display: grid;
    gap: 12px;
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .shift-detail-icon {
    align-items: center;
    background: rgba(96, 165, 250, 0.16);
    border-radius: 999px;
    color: #93c5fd;
    display: inline-flex;
    font-size: 30px;
    height: 58px;
    justify-content: center;
    width: 58px;
  }

  .shift-detail-icon.active {
    background: rgba(34, 197, 94, 0.18);
    color: var(--color-in);
  }

  .shift-detail-hero strong {
    display: block;
    font-size: 18px;
  }

  .shift-detail-hero small {
    color: var(--color-text-muted);
  }

  .shift-detail-info-grid {
    border: 1px solid rgba(99, 147, 195, 0.16);
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-top: 12px;
    overflow: hidden;
  }

  .shift-detail-info-grid div {
    border-bottom: 1px solid rgba(99, 147, 195, 0.12);
    display: grid;
    gap: 4px;
    grid-template-columns: 24px minmax(0, 1fr);
    padding: 12px;
  }

  .shift-detail-info-grid i {
    color: #93c5fd;
    grid-row: span 2;
    margin-top: 2px;
  }

  .shift-detail-info-grid span,
  .shift-muted,
  .shift-todo-note {
    color: var(--color-text-muted);
    font-size: 12px;
  }

  .shift-detail-info-grid strong {
    overflow-wrap: anywhere;
  }

  .shift-detail-section {
    border: 1px solid rgba(99, 147, 195, 0.16);
    border-radius: 10px;
    margin-top: 12px;
    padding: 12px;
  }

  .shift-detail-section h4 {
    margin: 0 0 10px;
  }

  .shift-timeline {
    display: grid;
    gap: 8px;
  }

  .shift-timeline-row {
    align-items: start;
    display: grid;
    gap: 10px;
    grid-template-columns: 46px 82px minmax(0, 1fr) auto;
  }

  .shift-timeline-row span,
  .shift-timeline-row em {
    color: var(--color-text-muted);
    font-style: normal;
  }

  .shift-timeline-row b {
    color: var(--color-text);
    font-variant-numeric: tabular-nums;
  }

  .shift-currency-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .shift-currency-card {
    background: rgba(5, 20, 38, 0.36);
    border: 1px solid rgba(99, 147, 195, 0.14);
    border-radius: 10px;
    padding: 10px;
  }

  .shift-currency-head {
    align-items: baseline;
    display: flex;
    gap: 7px;
    margin-bottom: 8px;
  }

  .shift-currency-head span {
    color: var(--color-text-muted);
    font-size: 12px;
  }

  .shift-mini-table-wrap {
    max-height: 270px;
    overflow: auto;
  }

  .shift-mini-table {
    font-size: 12px;
  }

  .shift-mini-table td:nth-child(4),
  .shift-mini-table td:nth-child(5),
  .shift-mini-table td:nth-child(6) {
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .shift-todo-note {
    margin-top: 8px;
  }

  .shift-actions-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    margin-top: 14px;
  }

  .shift-actions-grid button {
    min-height: 48px;
  }

  @media (max-width: 1500px) {
    .shifts-layout {
      grid-template-columns: 1fr;
    }

    .shift-detail-panel {
      position: static;
    }
  }

  @media (max-width: 1180px) {
    .shifts-kpis {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .shifts-panel-head,
    .shifts-filters,
    .shift-detail-info-grid,
    .shift-currency-grid,
    .shift-actions-grid {
      grid-template-columns: 1fr;
    }
  }

  /* ─── Type toggle ─────────────────────────────────────── */

  .type-toggle {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
  }

  .type-btn {
    font-size: 13px;
    min-height: 36px;
    opacity: 0.6;
  }

  .type-btn.active { opacity: 1; }

  .type-btn-in.active  { background: var(--color-in-bg);  border-color: var(--color-in-border);  color: var(--color-in); }
  .type-btn-out.active { background: var(--color-out-bg); border-color: var(--color-out-border); color: var(--color-out); }

  /* ─── Desktop two col ─────────────────────────────────── */

  .desktop-two-col {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1fr) 300px;
  }

  /* ─── KPI row ─────────────────────────────────────────── */

  .kpi-row {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 16px;
  }

  .kpi-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }

  .kpi-label {
    align-items: center;
    color: var(--color-text-muted);
    display: flex;
    font-size: 12px;
    gap: 5px;
  }

  .kpi-value {
    color: var(--color-text);
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-top: 6px;
  }

  .kpi-sub {
    color: var(--color-text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  .kpi-warn .kpi-value  { color: #92400e; }
  .kpi-danger .kpi-value { color: var(--color-out); }
  .kpi-success .kpi-value { color: var(--color-in); }

  /* ─── Summary cards ───────────────────────────────────── */

  .dashboard-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .summary-card { border-left: 4px solid var(--color-primary); }

  .record {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: grid;
    gap: 8px;
    padding: 12px;
  }

  .record-title { font-weight: 800; }

  .summary-row {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .summary-label {
    background: #edf2f7;
    border-radius: 999px;
    color: #344054;
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 8px;
  }

  .detail-row {
    align-items: center;
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }

  .detail-block {
    border-top: 1px solid var(--color-border-light);
    display: grid;
    gap: 8px;
    padding-top: 10px;
  }

  .detail-key { color: var(--color-text-muted); }

  .list, .result-box { display: grid; gap: 10px; }

  /* ─── Alert card ──────────────────────────────────────── */

  .alert-card {
    align-items: center;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    gap: 12px;
    padding: 12px 14px;
  }

  .alert-card i { color: #c2410c; flex-shrink: 0; font-size: 22px; }
  .alert-title { color: #9a3412; font-size: 13px; font-weight: 800; }
  .alert-sub   { color: #c2410c; font-size: 12px; margin-top: 2px; }

  /* ─── Misc legacy helpers ─────────────────────────────── */

  pre {
    background: #101828;
    border-radius: var(--radius-md);
    color: #fff;
    margin: 0;
    overflow: auto;
    padding: 12px;
    white-space: pre-wrap;
  }

  .section { display: none; }
  .section.active { display: grid; gap: 14px; }

  /* ─── Responsive ──────────────────────────────────────── */

  html.mobile-view,
  html.mobile-view body {
    font-size: calc(16px * var(--mobile-scale));
    min-width: 320px;
  }

  html.mobile-view button,
  html.mobile-view a.button-link {
    font-size: calc(14px * var(--mobile-scale));
    min-height: calc(42px * var(--mobile-scale));
    padding: calc(8px * var(--mobile-scale)) calc(12px * var(--mobile-scale));
  }

  html.mobile-view input,
  html.mobile-view select,
  html.mobile-view textarea {
    font-size: calc(15px * var(--mobile-scale));
    min-height: calc(42px * var(--mobile-scale));
  }

  html.mobile-view .m-header {
    padding: calc(14px * var(--mobile-scale)) calc(16px * var(--mobile-scale)) calc(12px * var(--mobile-scale));
    padding-top: max(calc(14px * var(--mobile-scale)), env(safe-area-inset-top));
  }

  html.mobile-view .m-header-balance {
    font-size: calc(34px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock {
    display: flex;
    align-items: baseline;
    gap: calc(8px * var(--mobile-scale));
    margin-top: calc(4px * var(--mobile-scale));
  }

  html.mobile-view .m-header-clock span,
  html.mobile-view .m-header-clock strong {
    font-size: calc(34px * var(--mobile-scale));
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    line-height: 1;
  }

  html.mobile-view .m-header-meta,
  html.mobile-view .m-chip,
  html.mobile-view .m-chip select {
    font-size: calc(13px * var(--mobile-scale));
  }

  html.mobile-view .m-section {
    gap: calc(14px * var(--mobile-scale));
    padding: calc(16px * var(--mobile-scale));
    padding-bottom: calc(126px + env(safe-area-inset-bottom));
  }

  html.mobile-view .btn-lg {
    font-size: calc(19px * var(--mobile-scale));
    min-height: calc(64px * var(--mobile-scale));
  }

  html.mobile-view .m-entry {
    gap: calc(12px * var(--mobile-scale));
    padding: calc(16px * var(--mobile-scale)) calc(14px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-dot {
    height: calc(12px * var(--mobile-scale));
    width: calc(12px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-desc {
    font-size: calc(24px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-meta {
    font-size: calc(19px * var(--mobile-scale));
  }

  html.mobile-view .m-entry-amt {
    font-size: calc(26px * var(--mobile-scale));
  }

  html.mobile-view .m-tab {
    font-size: calc(16px * var(--mobile-scale));
    padding: calc(12px * var(--mobile-scale)) 4px;
  }

  html.mobile-view .m-tab i {
    font-size: calc(36px * var(--mobile-scale));
  }

  html.mobile-view .m-fixed-actions {
    bottom: calc(126px + env(safe-area-inset-bottom));
    gap: calc(10px * var(--mobile-scale));
    padding: calc(12px * var(--mobile-scale)) calc(12px * var(--mobile-scale)) calc(10px * var(--mobile-scale));
  }

  html.mobile-view .m-detail-actions {
    gap: calc(12px * var(--mobile-scale));
  }

  html.mobile-view .m-detail-actions button {
    font-size: calc(19px * var(--mobile-scale));
    min-height: calc(64px * var(--mobile-scale));
    padding: calc(12px * var(--mobile-scale)) calc(14px * var(--mobile-scale));
  }

  html.mobile-view .m-detail-actions button i {
    font-size: calc(24px * var(--mobile-scale));
  }

  html.mobile-view .sheet {
    max-width: none;
    padding: calc(18px * var(--mobile-scale));
    padding-bottom: max(calc(22px * var(--mobile-scale)), env(safe-area-inset-bottom));
  }

  html.mobile-view .sheet-amount-input {
    font-size: calc(44px * var(--mobile-scale)) !important;
  }

  html.mobile-view .sheet-title {
    font-size: calc(28px * var(--mobile-scale));
  }

  html.mobile-view .sheet input,
  html.mobile-view .sheet textarea,
  html.mobile-view .sheet select {
    font-size: calc(21px * var(--mobile-scale));
  }

  .app-dialog-overlay {
    align-items: center;
    background: rgba(15, 19, 25, 0.55);
    display: flex;
    inset: 0;
    justify-content: center;
    padding: 18px;
    position: fixed;
    z-index: 500;
  }

  .app-dialog {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.25);
    color: var(--color-text);
    max-height: calc(100dvh - 36px);
    max-width: 440px;
    overflow-y: auto;
    padding: 18px;
    width: min(100%, 440px);
  }

  .app-dialog-wide {
    max-width: 760px;
    width: min(100%, 760px);
  }

  .app-dialog-wide:has(.cash-count-page-form) {
    background: linear-gradient(135deg, #071523, #0b1e33);
    border-color: rgba(96, 165, 250, 0.28);
    max-width: 1480px;
    padding: 0;
    width: min(100%, 1480px);
  }

  .cash-count-page-form {
    color: #e5edf7;
  }

  .cash-count-entry-page {
    display: grid;
    gap: 16px;
    padding: 22px;
  }

  .cash-count-title-row {
    align-items: start;
    display: flex;
    gap: 16px;
    justify-content: space-between;
  }

  .cash-count-title-row h2 {
    color: #f8fbff;
    font-size: 28px;
    line-height: 1.15;
  }

  .cash-count-title-row p {
    color: #c6d3e1;
    font-size: 15px;
    margin: 8px 0 0;
  }

  .cash-count-status-pill {
    background: rgba(234, 179, 8, 0.16);
    border: 1px solid rgba(234, 179, 8, 0.38);
    border-radius: 999px;
    color: #facc15;
    font-weight: 900;
    padding: 7px 12px;
    white-space: nowrap;
  }

  .cash-count-kpi-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .cash-count-kpi {
    align-items: center;
    background: linear-gradient(180deg, rgba(19, 45, 73, 0.92), rgba(16, 38, 61, 0.88));
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 12px;
    display: flex;
    gap: 14px;
    min-height: 74px;
    padding: 14px 16px;
  }

  .cash-count-kpi i {
    background: rgba(148, 163, 184, 0.12);
    border-radius: 10px;
    color: #bfdbfe;
    font-size: 24px;
    padding: 9px;
  }

  .cash-count-kpi span,
  .cash-count-currency-total span {
    color: #93a4b8;
    display: block;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .cash-count-kpi strong {
    color: #f8fbff;
    display: block;
    font-size: 18px;
  }

  .cash-count-main-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 1fr) 390px;
  }

  .cash-count-left,
  .cash-count-right {
    display: grid;
    gap: 14px;
  }

  .cash-count-line-card,
  .cash-count-table-card,
  .cash-count-side-card,
  .cash-count-actions-card {
    background: rgba(16, 38, 61, 0.86);
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 12px;
    padding: 14px;
  }

  .cash-count-step-title {
    align-items: center;
    color: #c6d3e1;
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .cash-count-step-title span {
    align-items: center;
    border: 1px solid #93c5fd;
    border-radius: 999px;
    color: #dbeafe;
    display: inline-flex;
    font-weight: 900;
    height: 24px;
    justify-content: center;
    width: 24px;
  }

  .cash-count-step-title em {
    color: #93a4b8;
    font-style: normal;
  }

  .cash-count-fast-row {
    align-items: end;
    display: grid;
    gap: 12px;
    grid-template-columns: minmax(160px, 1.1fr) minmax(150px, 1fr) minmax(120px, 0.8fr) minmax(180px, 1fr) 88px;
  }

  .cash-count-fast-row label {
    color: #d7e2ef;
    font-size: 13px;
  }

  .cash-count-fast-row input,
  .cash-count-fast-row select {
    background: rgba(7, 21, 35, 0.9);
    border-color: rgba(96, 165, 250, 0.45);
    color: #f8fbff;
    margin: 0;
    min-height: 48px;
  }

  .cash-count-fast-row input:focus,
  .cash-count-fast-row select:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.18);
  }

  .cash-count-add-btn {
    background: rgba(37, 99, 235, 0.28);
    border-color: rgba(96, 165, 250, 0.45);
    color: #dbeafe;
    min-height: 48px;
  }

  .cash-count-add-btn span {
    display: none;
  }

  .cash-count-keyboard-hint {
    align-items: center;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 10px;
    color: #c6d3e1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin-top: 12px;
    padding: 10px 12px;
  }

  .cash-count-keyboard-hint strong {
    color: #f8fbff;
  }

  .cash-count-lines-table {
    border-collapse: collapse;
    width: 100%;
  }

  .cash-count-lines-table th,
  .cash-count-lines-table td {
    border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    padding: 10px 12px;
    text-align: left;
  }

  .cash-count-lines-table th {
    background: rgba(30, 58, 92, 0.75);
    color: #aebfd2;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .cash-count-lines-table .num {
    text-align: right;
  }

  .currency-mark {
    display: inline-block;
    font-size: 18px;
    line-height: 1;
    margin-right: 8px;
    vertical-align: -2px;
  }

  .cash-count-line-actions {
    white-space: nowrap;
  }

  .cash-count-line-actions .icon-btn {
    color: #cbd5e1;
    min-height: 30px;
    min-width: 30px;
    padding: 3px;
  }

  .cash-count-table-foot {
    align-items: center;
    color: #93a4b8;
    display: flex;
    justify-content: space-between;
    padding: 12px 2px 0;
  }

  .cash-count-table-foot [data-cash-count-total] {
    color: #f8fbff;
    font-size: 18px;
    font-weight: 900;
  }

  .cash-count-side-card h3 {
    color: #f8fbff;
    font-size: 15px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .cash-count-currency-total {
    background: rgba(19, 45, 73, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 10px;
    display: grid;
    gap: 8px;
    grid-template-columns: 1.3fr 0.8fr 1fr 0.8fr;
    margin-bottom: 8px;
    padding: 12px;
  }

  .cash-count-currency-total strong,
  .cash-count-total-all strong {
    color: #f8fbff;
  }

  .cash-count-total-all {
    align-items: center;
    border-top: 1px solid rgba(148, 163, 184, 0.2);
